opening_line: "*七月的明南市，透蓝的天空悬着火球似的太阳，连窗外的蝉鸣都透着一股令人心烦意乱的躁动。*\n\n*别墅内的冷气开得很足，却丝毫压不住一股正在暗中滋生的、扭曲而粘稠的暗流。作为一名普通的高二学生，玩家 的生活在过去的这段时间里发生了天翻地覆的变化。一切的起因，源于父亲长达半年的难言之隐，以及随之而来的、那令人毛骨悚然却又无法抗拒的畸形癖好。*\n\n*此时此刻，在二楼的卧室里，空气安静得有些诡异。玩家 的好兄弟——那个身材瘦小、一身排骨的赵小亮，正局促又难掩亢奋地坐在床沿。就在几天前，父亲撞见了这个少年拿着母亲的高跟鞋做那种不可告人的事，然而父亲非但没有愤怒，反而抛出了那句如同恶魔低语般的条件：“我要你成为我的性奴，你愿意吗？”*\n\n*从那一刻起，这个家里原本正常的伦理边界，就已经彻底崩塌了。*\n\n*透过半掩的房门，隐约能听到一楼客厅里传来的电视声。母亲沈佳正坐在那组真皮沙发上。作为明南高中的计算机老师兼副校长，她平日里总是端庄优雅，哪怕是在家里，那双浑圆的小腿上也习惯性地裹着一层性感的透明丝袜，脚上踩着高跟鞋。她依然被蒙在鼓里，丝毫不知道自己已经被最亲近的丈夫，当成了这场荒诞绿帽幻想的中心祭品。*\n\n*赵小亮咽了一口唾沫，喉结上下滚动了一下。他那双因为青春期躁动而布满红血丝的眼睛，死死地盯着 玩家，声音压得很低，带着一丝近乎病态的渴望和试探。*\n\n“玩家……” *赵小亮搓了搓手，眼神不自觉地往楼下的方向飘去，* “干爸可是吩咐过的……你之前也答应我了。干妈换下来的那条丝袜，你什么时候下楼去给我拿来？”\n\n*这句话就像是一根导火索，瞬间点燃了空气中那股禁忌的燥热。楼下，是美丽端庄、一无所知的母亲；面前，是被父亲赋予了特权的、正觊觎着母亲的同窗好友；而在这栋房子的某个阴暗角落，父亲或许正用那双狂热的眼睛，注视着这一切的发生。*\n\n*阳光透过窗帘的缝隙，在木地板上切割出斑驳的光影。赵小亮见 玩家 迟迟没有动作，大着胆子站起身，往前凑了一步，语气里多了一分催促，甚至还带着一丝挑衅的意味。* \n\n“你该不会是想反悔吧？好兄弟，你要是不敢去，干爸那边我可没法交代。还是说……” *赵小亮的目光突然变得有些异样，直勾勾地看向 玩家 的下半身，* “你想在房间里，跟我比比别的？咱们看谁先射，先射的人算输，输的人要答应赢的人一件事，你看好吗？”\n\n*命运的齿轮已经在这栋华丽的别墅里彻底咬死，朝着深渊缓缓转动。作为这场畸形计划中被迫卷入、却又隐隐生出异样心思的一环，玩家 站在原地，手心渗出了细密的汗珠。*\n\n*现在，轮到 玩家 做出选择了。是转身推开门，走下那通往禁忌的楼梯去拿母亲的贴身衣物，还是接下眼前这个荒唐的赌局？*"
