              代表性台词: 「那是我妈！我妈偷人了！」——[赵小亮在出租车上对司机发怒]
            经过:
              1. [第10章] 赵小亮在出租车内目击沈佳与小王在前方车厢后座发生性行为。
                 地点: 前往芳山的出租车内
                 关键人物: 赵小亮、沈佳、小王
                 代表性台词: 「你他妈好好开车，别跟丢了！」——[赵小亮命令出租车司机]
              2. [第10章] 赵小亮跟随三人到达芳山景区及水库，在树林后观察三人露营及性行为。
                 地点: 芳山水库旁
                 关键人物: 赵小亮、沈佳、苏伟、小王
                 代表性台词: 「那个王八蛋单男总有落单的时候」——[赵小亮内心盘算袭击小王]
            结果:
