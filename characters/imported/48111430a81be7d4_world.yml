    lore:
        - name: 设定·世界观常识·社会与教育体系
          keys: 社会与教育体系
          content: |-
            世界观常识: 社会与教育体系
            首次出现: 序
            描述: 现代城市背景，采用高中学科教育制度，学生在校学习语文、物理、英语、计算机、体育等课程。学校实行半封闭式管理，设有期末考试考核标准与公开课听讲评估机制。日常使用手机、MP4等电子设备，网络论坛存在小说连载功能，支持通过电子邮箱发送音频附件（序、第01章、第02章）。
        - name: 设定·世界观常识·社会货币与科技体系
          keys: 社会货币与科技体系
          content: |-
            世界观常识: 社会货币与科技体系
            首次出现: 第05章
            描述: 背景为现代日常社会，无超自然力量体系。使用人民币作为现代常规货币体系，如 玩家 支付打车费两百元，剩余三百多元，提供逃犯线索奖励三万元。存在手机、QQ通讯、笔记本电脑等现代科技设备（第05章、第06章、第07章）。
        - name: 设定·世界观常识·社会与职业体系
          keys: 社会与职业体系
          content: |-
            世界观常识: 社会与职业体系
            首次出现: 第10章
            描述: 现代都市背景，无超自然力量。包含教师、医生、护士、出租车司机等常规职业。沈佳的公开职业为「人民教师」，在芳山游览与医院陪护期间均采取措施掩盖多人性行为以防止职业身份受损。玩家 为沈佳的亲生儿子，赵小亮为沈佳的干儿子及 玩家 的兄弟（第10章）。
        - name: 设定·世界观常识·绿帽与单男亚文化圈
          keys: 绿帽与单男亚文化圈
          content: |-
            世界观常识: 绿帽与单男亚文化圈
            首次出现: 第05章
            描述: 社会中存在特定的性亚文化交流渠道。夫妻会通过网络途径寻找「单男」进行文字调教游戏，并在线下前往特定酒店进行三人性行为。该圈层内存在互换贴身衣物、角色扮演等行为规范（第05章）。
    events:
        - name: 事件线·主线·芳山水库遇险与救援
          arc: 主线
          keys: 芳山水库遇险与救援, 沈佳, 苏伟, 小王, 赵小亮, 歹徒
          content: |-
            事件线: 芳山水库遇险与救援
            类型: 主线
            起因:
              章节: 第10章
              概括: 沈佳、苏伟与小王在芳山水库露营时遭两名歹徒持刀抢劫与袭击。
              代表性台词: 「都他妈的别动，也别叫！把老子吓到，万一老子手一抖，这么漂亮的美人儿就香消玉损了！」——[歹徒持刀威胁]
            经过:
              1. [第10章] 小王逃脱，歹徒将苏伟捆绑后对沈佳实施性侵犯。
                 地点: 芳山水库帐篷处
                 关键人物: 沈佳、苏伟、小王、歹徒
                 代表性台词: 「哟！皇帝不急太监急了」——[歹徒嘲讽逃跑的小王]
              2. [第10章] 暗中跟踪的赵小亮使用砖头击打歹徒头部，交战中被歹徒用刀刺伤腰部倒地。
                 地点: 芳山水库帐篷处
                 关键人物: 赵小亮、沈佳、歹徒
                 代表性台词: 「哥……我……我杀人了……」——[歹徒刺伤赵小亮后惊慌失措]
            结果:
              章节: 第10章
              概括: 歹徒因伤人逃离现场，沈佳发现救人者为赵小亮。
              代表性台词: 「啊！怎么是你，小亮！」——[沈佳认出重伤的救人者]
            后续影响: 赵小亮因伤住院，沈佳留在医院进行贴身陪护。
