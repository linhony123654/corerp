                  - 「老婆，我看你上面这张嘴也吃饱了，你下面那张嘴可还饿着呢，这块木瓜喂你下面好吗？」
                决策倾向: 面对歹徒持刀威胁，选择推开歹徒并拉开距离，随后逃跑弃下沈佳与苏伟。
    locations:
        - name: 设定·地理·明南高中
          keys: 明南高中
          content: |-
            地理: 明南高中
            首次出现: 序
            描述: 县城内的半封闭式管理学校，设有高二4班，玩家、赵小亮、梁伊伊在此就读。沈佳在此担任副校长与计算机老师。中午为学生提供食堂午餐与午休场地。与 玩家 的关系：玩家 多次因成绩与上课走神被教师点名（序、第01章、第02章）。
