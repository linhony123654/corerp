    描述: 背景为现代日常社会，无超自然力量体系。使用人民币作为现代常规货币体系，如 玩家 支付打车费两百元，剩余三百多元，提供逃犯线索奖励三万元。存在手机、QQ通讯、笔记本电脑等现代科技设备（第05章、第06章、第07章）。

