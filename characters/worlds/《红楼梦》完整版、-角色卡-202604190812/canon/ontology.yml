          content: "**名称**: 雪雁  \n**性别**: 女  \n**年龄**: 十岁  \n**特征**: 甚小，一团孩气  \n**身份**: 林黛玉从苏州带来的贴身小丫鬟，潇湘馆丫鬟  \n**性格**: 年幼单纯，天真直率，话多热心，善于观察，但容易慌张，不够谨慎，有时多嘴  \n**MBTI**: ESFP（机灵活泼、善于应变，但有时冲动）  \n**重要事件**:  \n1. 受紫鹃之命给黛玉送小手炉，被黛玉借题发挥奚落宝玉  \n2. 从王夫人房中取人参回来，路过发现宝玉独坐桃花树下哭泣，告知紫鹃  \n3. 巧妙拒绝赵姨娘借月白缎子袄儿的请求，将责任推给紫鹃和黛玉，自称衣裳簪环都由紫鹃收着，须先告知并回明姑娘  \n4. 领着婆子拿菱藕瓜果时，向宝玉透露黛玉的异常举动——写诗、搬琴桌、摆龙文鼒，但自己也不知缘故，叮嘱宝玉不许对姑娘说  \n5. 从侍书处听闻宝玉定亲消息，转告紫鹃，不料被黛玉窃听，导致黛玉病重，事后极为后悔，“恨不得长出百十个嘴来说‘我没说’”  \n6. 黛玉病重时在旁伺候，又向侍书追问真相  \n7. 在潇湘馆守护病中黛玉，为黛玉取诗稿，黛玉焚稿时试图抢救但已烧得所余无几  \n8. 被调去新房，在婚礼上扶新人（代替紫鹃），使宝玉信以为真；心中怀疑宝玉假装丢玉装傻以娶宝钗，对宝玉不满，偷偷去看宝玉形状  \n**话语示例**:  \n- “我的衣裳簪环，都是姑娘叫紫鹃姐姐收着呢。如今先得去告诉他，还得回姑娘呢。”  \n- “我告诉你，可不许你对姑娘说去。”  \n- “姐姐你听见了么？宝玉定了亲了！”  \n- “这是怎么说！白白的送了我们这一位的命了！”  \n**内心想法**: 怀疑宝玉假装丢玉装傻以娶宝钗，对宝玉不满"
