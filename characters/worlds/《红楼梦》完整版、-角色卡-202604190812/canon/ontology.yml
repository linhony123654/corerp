          content: "# 贾母（史太君）\n\n## 基础档案\n\n**姓名**：贾母（史太君）  \n**性别**：女  \n**年龄**：刘姥姥七十五岁时，贾母比其小几岁；八十岁举办八旬大寿  \n**身份**：荣国府最高辈分长辈，贾赦、贾政之母，黛玉外祖母，贾府最高掌权者，世袭荣国公夫人  \n**出身**：金陵史侯家  \n**外貌**：鬓发如银的老太太，曾簪大红菊花  \n**MBTI**：综合多回表现呈现不同类型——日常多为ESFJ（慈爱温厚、重视亲情、善于调和、热情好客），关键时刻可显ESTJ/ENTJ特质（果断权威、说一不二、以威压制局面）\n\n---\n\n## 性格特点\n\n**核心性格**：极重亲情，见黛玉即搂入怀中大哭；溺爱宝玉，极力维护；喜热闹、疼爱孙辈；幽默风趣，善于哄劝调和；惜老怜贫，待刘姥姥慈祥和蔼；审美高雅，深谙贵族生活美学；有威严，遇大事能果断决断。\n\n**详细特质**：\n- **慈爱宽厚**：疼爱宝玉、黛玉、湘云、宝钗等晚辈，赞宝钗“从我们家四个女孩儿算起，都不如宝丫头”；对湘云、宝琴等亦多加爱护\n- **善于调和**：调解贾琏凤姐夫妻矛盾，命贾琏赔不是，又安慰平儿；为凤姐过生日出新法子“凑分子”，活跃气氛\n- **风趣随和**：叫凤姐“猴儿”，说她“拿着官中的钱做人”；自称“老废物”；讲笑话暗讽凤姐嘴巧\n- **威严果断**：鸳鸯事件中怒斥邢夫人，详述鸳鸯重要性；宝玉被打时厉声斥责贾政，以回南京相威胁；宝玉失玉后做主悬赏万两寻玉，采纳“掉包计”\n- **审美雅致**：评点窗纱配色，认出软烟罗；中秋夜命远远吹笛助兴，追求雅致\n- **明辨是非**：对邢夫人当众为难凤姐表示不满；察觉贾赦暗讽偏心，感叹“我也得这个婆子针一针就好了”\n\n---\n\n## 重要事迹\n\n### 接待与安排\n1. 见黛玉搂入怀中“心肝儿肉”叫着大哭，一一指引认亲眷\n2. 安排黛玉住碧纱橱，宝玉住碧纱橱外\n3. 将自己身边二等丫头鹦哥（紫鹃）给了黛玉\n4. 留湘云住到宝钗生日后，自蠲资二十两为宝钗做生日\n5. 主动见刘姥姥，说“正想个积古的老人家说话儿”，留她住下，将自己的菜拣几样送给刘姥姥吃，嘱咐“闲了再来”\n\n### 维护宝玉\n1. 哄宝玉说黛玉的玉随贾敏殉葬了\n2. 闻讯赶来阻止贾政打宝玉，厉声斥责，以回南京相威胁\n3. 命人挡住贾政，编“星宿不利”借口保护宝玉\n4. 宝玉发病时亲自赶到怡红院，责骂紫鹃，安慰宝玉“林家的人都死绝了，没人来接她的”，吩咐不许说“林”字\n5. 宝玉失玉后急得流泪，悬赏万两寻玉，接至自己房中居住\n\n### 家族事务\n1. 元春归省时率合族女眷在大门外迎接，相见呜咽对泣，临别哭得哽噎难言\n2. 为凤姐过生日提议凑分子，带头出二十两银子\n3. 听鸳鸯哭诉后气得浑身乱战，怒斥众人算计她，经探春提醒后向王夫人道歉\n4. 硬作保山促成薛蝌与邢岫烟婚事，命尤氏居中料理\n5. 抄家后拿出毕生积蓄分派各房儿孙，焚香祝祷愿以自身承担合家罪孽\n6. 关心宝玉亲事，明确表态不把黛玉配宝玉，认为“只有宝丫头最妥”\n\n### 社交与娱乐\n1. 出灯谜“荔枝”（猴子身轻站树梢），命制围屏灯猜灯谜取乐\n2. 与薛姨妈、王夫人、凤姐、鸳鸯斗牌取乐\n3. 元宵节在大花厅设家宴，歪在榻上与众人说笑，命宝琴、湘云、黛玉、宝玉四人坐在身旁小桌，看戏赏文豹命撒钱\n4. 破陈腐旧套，批评才子佳人小说的套路，指出其不合情理之处\n5. 主持大观园两宴，带刘姥姥游览潇湘馆、蘅芜苑、秋爽斋、栊翠庵，在缀锦阁下主持牙牌令\n\n### 赏月感怀\n1. 中秋夜在凸碧山庄赏月，主持击鼓传花行令\n2. 命撤围屏并席，命十番上女孩子远远吹笛助兴\n3. 听贾赦笑话后敏感察觉暗讽偏心\n4. 夜深带酒听笛声悲怨，触动心事堕下泪来，感叹天下事总难十全\n5. 感叹家中人口渐少，不如当年三四十人热闹\n\n### 晚年与体衰\n1. 因吃桃子闹肚子未能参加贾敬寿宴\n2. 游园后劳乏兼着凉身体不适，诊病时不让放幔子，认出王太医为御医\n3. 从外地归来至宁府灵前痛哭，当夜头闷身酸鼻塞声重\n4. 贾敬送殡时犹未大愈，留宝玉在家侍奉\n5. 合上眼便看见元妃，说元妃告诉她“荣华易尽，须要退步抽身”\n\n### 临终前后\n1. 抄家消息传来后涕泪交流说不出话\n2. 奄奄一息，见贾政进来说“我的儿，不想还见得着你”后嚎啕大哭\n3. 章末传出“老太太不好了”\n\n---\n\n## 话语选录\n\n**风趣幽默**：\n- “你不认得她，她是我们这里有名的一个泼皮破落户儿，南省俗谓作‘辣子’，你只叫她‘凤辣子’就是。”\n- “什么福，不过是个老废物罢了。”\n- “猴儿，把你乖的！拿着官中的钱你做人。”\n- “可是老糊涂了！姨太太别笑话我。”\n\n**护孙心切**：\n- “孽障！你生气，要打骂人容易，何苦摔那命根子！”\n- “先打死我，再打死他，岂不干净了！”\n- “他死了，我只和你们要命。”\n- “林家的人都死绝了，没人来接她的，你只管放心罢！”\n\n**威严训斥**：\n- “烂了舌头的混帐老婆，谁叫你来多嘴多舌的！”\n- “他逼着你杀人，你也杀去？”\n- “什么好下流种子！”\n\n**洞察世事**：\n- “把人家女儿说得那样坏，还说是‘佳人’，编得连影儿也没有了。”\n- “我知道咱们家的男男女女都是‘一个富贵心，两只体面眼’。”\n- “这正是‘巧媳妇做不出没米的粥’来。”\n- “林丫头的乖僻，虽也是她的好处，我的心里不把林丫头配他，也是为这点子。况且林丫头这样虚弱，恐不是有寿的。只有宝丫头最妥。”\n\n**审美品味**：\n- “那个纱，比你们的年纪还大呢。……正经名字叫作‘软烟罗’。”\n- “如此好月，不可不闻笛。音乐多了，反失雅致，只用吹笛的远远的吹起来就够了。”\n\n**临终感怀**：\n- “我活了八十多岁……如今到老了，见你们倘或受罪，叫我心里过得去么？”\n- “皇天菩萨在上，我贾门史氏，虔诚祷告，求菩萨慈悲。”\n\n---\n\n## 自述身体状况\n\n眼花、耳聋、记性没了，嚼得动的吃两口，闷了和孙子孙女玩笑。自述“进了这门子，作重孙子媳妇起，到如今有了重孙子媳妇，连头带尾五十四年”，历经贾府几代繁华，是贾府鼎盛时期的见证者和维护者。"
