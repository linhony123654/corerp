            **内心独白与情感变化**:

            ### 一、对花名签的敏感
            1. 抽到宝钗牡丹签"任是无情也动人"后，"只管拿着那签，口内颠来倒去念"，眼看着芳官不语——内心被这句诗触动，似在品味宝钗的"无情"与"动人"
            2. 麝月抽到荼蘼签"开到荼蘼花事了"时，宝玉"愁眉，忙将签藏了"——敏锐感知到"花事了"的不祥寓意，内心忧虑繁华将尽

            ### 二、对妙玉拜帖的重视
            1. 看到妙玉帖子后"直跳了起来"，大惊小怪——视妙玉为特殊之人，极为重视
            2. 提笔回帖时"出神，半天仍没主意"——认真对待妙玉的"槛外人"自称，不愿草率回应
            3. 想到"若问宝钗去，她必又批评怪诞，不如问黛玉去"——内心判断：宝钗会批评，黛玉更能理解

            ### 三、对岫烟的惊喜
            1. 听闻岫烟与妙玉的渊源后"恍如听了焦雷一般，喜得笑道"——如获至宝的惊喜
            2. 听岫烟解说"槛外人"典故后"如醍醐灌顶"——豁然开朗的畅快

            ### 四、对香菱的怜惜（前文延续）
            - 暗算"可惜这么一个人，没父母，连自己本姓都忘了，被人拐出来，偏又卖与了这个霸王"——对弱者命运的深切同情

            ### 五、对芳官改名的兴致
            - 为芳官取番名时大发议论，将戏谑与"称功颂德"混为一谈——既是玩心大起，也流露出不切实际的书生意气

            **心理矛盾**: 宝玉一方面敏锐感知到花签中的不祥预兆（荼蘼花事了），内心隐隐忧虑；另一方面又沉浸在生日欢乐与改名游戏中，试图以玩乐抵御内心的不安

            ---

            **原文内容**: "我能够和姊妹们过一日是一日，死了就完了。什么后事不后事！" "人事莫定，知道谁死谁活。倘或我在今日明日，今年明年死了，也算是遂心一辈子了。"

            **内心独白**: 宝玉活在当下，珍惜与姊妹们相聚的每一天，对未来的离散有隐约的预感和恐惧，但选择以"不虑后事"来回避这种痛苦

            **心理矛盾**:
            - 明知姊妹们终将"出门"（出嫁）离散，却不愿面对
            - 被众人评为"又傻又呆""又疯了"，实则是对世俗功利的彻底拒绝
            - 劝探春"别听俗语，想俗事，只管安富尊荣"，实为自己的人生哲学

            **情感变化**: 表面嬉笑 → 说出"死了就完了"时的真情流露 → 被众人打断后归于沉默

            ---

            **内心独白**: "说笑话倘或不发笑，又说没口才，连一笑话不能说，何况别的，这有不是。若说好了，又说正经的不会，只惯油嘴贫舌，更有不是。不如不说的好。"

            **情感变化**:
            1. **踧踖不安**: 因贾政在座，自始至终紧张不安
            2. **左右为难**: 花落手中时反复权衡说与不说的利弊
            3. **灵机一动**: 辞说笑话改为作诗，找到相对安全的表现方式
            4. **碰在心坎上**: 听贾政说不许用堆砌字眼、要另出己见，正合其性情

            **心理矛盾**: 在父亲面前永远处于"做什么都不对"的困境中，说笑话怕被批油嘴，不说怕被批无能

            ---

            **原文内容**: 宝玉见雀金裘"神已痴了"，回房后"不似往日有说有笑"，"和衣躺在炕上"，"无精打彩"，"翻来覆去只睡不着"

            **内心独白**:
            1. 见雀金裘触发对晴雯的深切怀念，叹气说"那么着，你就收拾起来，给我包好了。我也总不穿他了"
            2. 焚词祭奠时口中祝祷，词中写"谁料风波平地起，顿教躯命实时休"，感叹晴雯命运之惨
            3. "想象更无怀梦草，添衣还见翠云裘。脉脉使人愁"——物在人亡的深切哀痛

            **情感变化**:
            - 学房中见雀金裘：震惊→痴呆→拒绝穿着
            - 回房后：沉默→不吃饭→失眠→焚词祭奠
            - 祭奠后：心事稍解→去访黛玉
            - 与黛玉对话：欲言又止→觉得冒失→讪讪离去

            **动机分析**: 宝玉对晴雯之死深感愧疚与悲痛，雀金裘成为触发情感的关键物件。对黛玉则"欲将实言安慰，又恐黛玉生嗔，反添病症"，"满腔心事，只是说不出来"

            **心理矛盾**: 对黛玉有万千言语却不敢说，"亲极反疏"；既想安慰又怕说错话，处于深深的情感困境中

            ---

            **内心独白与心理变化**:

            ### 一、对薛姨妈冷淡的猜疑
            - 见薛姨妈不似从前亲热，满腹猜疑
            - 疑心宝钗是否不和自己好了

            ### 二、被黛玉点醒后的豁然
            - 听黛玉分析后"豁然开朗"，笑道"很是很是"
            - 承认"你的性灵比我竟强远了"
            - 自比"丈六金身，还借你一茎所化"

            ### 三、禅语对答中的坚定
            - 面对黛玉六问，呆了半晌后大笑
            - "任凭弱水三千，我只取一瓢饮"——表明对黛玉的专一
            - "禅心已作沾泥絮，莫向春风舞鹧鸪"——表示心意已定
            - "有如三宝"——以佛门誓言担保

            ### 四、对柳五儿的欣喜
            - 回忆五儿两次未能进院的经过
            - 想起在吴贵家见五儿"更觉娇娜妩媚"
            - 听闻凤姐安排五儿补缺，"喜出望外"，呆呆想她

            **心理矛盾**: 一方面以禅语向黛玉表明"只取一瓢"的专一，另一方面又对柳五儿喜出望外，体现宝玉多情本性与理想承诺之间的张力

            ---

            **情感变化**:

            ### 一、观蒋玉菡演戏时
            - 重逢蒋玉菡，见其风采依旧，内心欣喜
            - 观《占花魁》时"神魂都唱了进去了"，完全沉浸
            - 暗忖："不知日后谁家的女孩儿嫁他？要嫁着这样的人材儿，也算是不辜负了"——对蒋玉菡的欣赏与祝福
            - 由戏曲联想到《乐记》"情动于中，故形于声"，萌生研究音律之念

            ### 二、海棠花开时
            - 对花"看一回，赏一回，叹一回，爱一回"，心中无数悲喜离合都弄到花上
            - 想起晴雯死的那年海棠死了，今日复荣，"但是晴雯不能像花的死而复生了"——转喜为悲
            - 又想起巧姐提凤姐要补五儿入院，"或此花为她而开"——转悲为喜
            - 内心在悲喜之间反复摇摆，体现其多情善感本性

            ### 三、失玉之后
            - 起初不以为意："不用着急，少不得在屋里的"
            - 后来急了："都是这劳什子闹事！我也不要他了"——看似洒脱实则无奈
            - 为保护袭人等，主动编造"出门丢了"的谎言

            ---

            **原文内容**: 宝玉深夜央求袭人叫紫鹃来，倾诉对黛玉的思念与愧疚

            **内心独白**:
            1. "她是我本不愿意的，都是老太太她们捉弄的，好端端把一个林妹妹弄死了"——对被瞒婚的愤怒与无奈
            2. "我并不是负心的，我如今叫你们弄成了一个负心人了"——深感冤屈，自己被迫成为负心人
            3. "如今林姑娘死了，莫非倒不如晴雯么？死了连祭都不能祭一祭"——以晴雯之死对比，痛感对黛玉的亏欠
            4. 质疑黛玉是否真死，猜测"成了神，或是登了仙去"——不愿接受黛玉死亡的事实
            5. 想为黛玉写祭文，"断断俗俚不得一点儿的"——对黛玉的尊重与自身灵机丧失的痛苦

            **情感变化**:
            - 贾政问起黛玉时→暗里伤心，一路滴泪
            - 独坐外间纳闷→借口定神支开宝钗
            - 向袭人倾诉→越说越激动，指着里屋说宝钗"是我本不愿意的"
            - 被催去睡→含愁进去，耳边叮嘱"明儿不要忘了"

            **动机分析**: 宝玉想通过紫鹃了解黛玉临终的真实想法，确认黛玉是否怨恨自己，以求内心解脱。同时想为黛玉写祭文以表达深情，但病后灵机全无，更添痛苦。

            **心理矛盾**:
            1. 对宝钗无爱却不得不同房共处的煎熬
            2. 想祭奠黛玉却被宝钗管着不让碰黛玉遗物
            3. 不愿相信黛玉真死，又亲眼见过棺材
            4. 想找紫鹃问话，又知紫鹃恨自己

            ---

            **原文内容**: 宝玉见宝钗大恸，亦有一番悲戚。
            **内心独白**: “老太太年老不得安，老爷、太太见此光景，不免悲伤。众姐妹风流云散，一日少似一日。追想在园中吟诗起社，何等热闹。自从林妹妹一死，我郁闷到今，又有宝姐姐过来，未便时常悲切。”
            **情感变化**: 由郁闷转为更深的悲戚与无助。
            **另一处内心独白**（闻史湘云出阁后）: “如今一天一天的都过不得了。为什么人家养了女儿到大了必要出嫁？一出了嫁就改变。史妹妹这样一个人，又被她叔叔硬压着配人了，她将来见了我，必是又不理我了。我想一个人到了这个没人理的份儿，还活着做什么！”
            **心理矛盾**: 既为家族败落悲伤，又为姐妹们风流云散而痛心，深感人生无味，无人理睬。
