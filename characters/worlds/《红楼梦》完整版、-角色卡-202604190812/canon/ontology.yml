          content: "**名称**: 尤氏\n**性别**: 女\n**身份**: 贾珍之妻，宁国府当家主母\n**重要事件**: 因宁府花园梅花盛开，治酒请贾母、邢夫人、王夫人等赏花\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**MBTI**: ISFJ（性格软弱、宽厚忍让、无力管束下人）\n**身份**: 贾珍之妻，宁国府当家主母\n**性格**: 太软弱，被凤姐批评纵容家人\n**重要事件**:\n1. 与秦氏一同接待凤姐和宝玉\n2. 解释焦大的功劳和为何无人管束他\n3. 与秦氏打牌输了戏酒东道\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**MBTI**: ESFJ（关心家人，善于待人接物，操心媳妇病情，周到体贴）\n**身份**: 贾珍之妻，宁国府当家主母\n**性格**: 体贴周到，对秦可卿如亲女儿般关爱，为其病情焦心不已\n**重要事件**:\n1. 对秦可卿关怀备至，嘱咐她不必拘礼，叫贾蓉不许累掯她\n2. 向金氏详述秦可卿病情，无意中化解了金氏的怒气\n3. 操办贾敬寿辰家宴，接待邢夫人、王夫人等\n4. 与凤姐儿商议秦可卿后事准备\n**话语示例**: \"她要想什么吃，只管到我这里取来。倘或她有个好歹，你再要娶这么一个媳妇，这么个模样儿，这么个性情的人儿，打着灯笼也没地方找去。\"\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**身份**: 宁国府贾珍之妻，贾蓉继母\n**重要事件**:\n1. 秦可卿死后正犯了胃疼旧疾，睡在床上，不能料理事务\n2. 因其犯病，贾珍不得不请凤姐来协理宁国府\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**MBTI**: ISFJ（守卫者型，温和厚道、善于操持、处事圆滑）\n**身份**: 宁国府贾珍之妻\n**性格**: 温厚、善于调和、有分寸、偶尔打趣\n**重要事件**:\n1. 被贾母指派操办凤姐生日宴\n2. 收取各方份子银两，与林之孝家的对接\n3. 当面点数银子，发现凤姐少了李纨的一份，与凤姐打趣\n4. 暗中退还鸳鸯、彩云、周赵二姨娘等人的份子钱，体恤下人\n5. 劝凤姐\"太满了，就要泼出来的\"\n6. 在贾母处为平儿说公道话\n**话语示例**:\n- \"我劝你收着些儿好。太满了，就要泼出来的。\"\n- \"平儿没有不是，是凤丫头拿着人家出气。\"\n- \"只许你主子作弊，就不许我作情儿。\"\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**MBTI**: ISFJ（温和顺从，尽职持家，注重礼节）\n**身份**: 贾珍之妻，宁国府当家奶奶\n**性格**: 温和得体，善于操持家务，待人恭敬有礼\n**重要事件**:\n1. 与贾蓉之妻打点送贾母的针线礼物\n2. 查看押岁锞子（梅花式、海棠式、笔锭如意、八宝联春等样式）\n3. 祭祀后亲捧茶与贾母，挽留贾母用晚饭\n4. 随邢夫人等同至荣府\n**话语示例**:\n- \"已经预备下老太太的晚饭。每年都不肯赏些体面，用过晚饭过去，果然我们就不及凤丫头不成？\"\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**身份**: 贾珍之妻，宁国府当家奶奶\n**重要事件**:\n1. 元宵宴上与李纨夹着贾兰坐\n2. 笑问李纨\"谁是吃过猴儿尿的\"\n3. 打趣凤姐\"听见放炮仗，吃了蜜蜂儿屎似的，今儿又轻狂起来\"\n4. 笑指凤姐\"这个东西真会数贫嘴\"\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**身份**: 宁国府贾珍之妻\n**重要事件**:\n1. 受贾母之命居中料理薛蝌与邢岫烟的婚事\n2. 深知邢夫人情性，本不欲管，但贾母亲嘱只得应了\n3. 惟有忖度邢夫人之意行事\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**MBTI**: ISFJ（谨慎本分，不愿多事，但被迫承担责任）\n**身份**: 宁国府贾珍之妻\n**重要事件**:\n1. 报了产育之名被腾挪出来，协理荣宁两处事体\n2. 天天过来不过应名点卯，不肯乱作威福\n3. 与王夫人商议遣发十二女伶之事，提出妥当方案：叫父母亲自来领\n4. 讨了老旦茄官\n5. 每日照管贾母王夫人下处所需，甚为操劳\n\n---\n\n**名称**: 尤氏\n**性别**: 女\n**身份**: 贾珍之妻，宁国府当家奶奶\n**性格**: 懦弱顺从，知事不妥却无力阻止\n**重要事件**: 知道贾琏娶尤二姐之事不妥，极力劝止，但贾珍主意已定，素日顺从惯了，且与二姐非同母，不便深管，只得由他们闹去\n**MBTI**: ISFJ（顺从隐忍、不善抗