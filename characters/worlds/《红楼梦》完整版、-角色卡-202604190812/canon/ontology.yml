        - name: 角色 - 贾敬
          keys: 贾敬, 敬老爹, 太爷, 老爷
          content: "**名称**: 贾敬  \n**性别**: 男  \n**身份**: 宁国府贾代化次子，贾珍之父，乙卯科进士，原袭官后让与儿子贾珍。  \n**性格**: 一味好道，素不茹酒，只爱烧丹炼汞，好清净修养，不问世事。  \n**MBTI**: INTP（超脱世俗，沉迷修道）  \n\n**背景**:  \n年迈后常养静于都城之外玄真观，不肯回原籍，只与道士胡羼，一概不管家事。在家内亦净室默处，一无所闻。\n\n**重要事件**:  \n1. **寿辰拒归**：寿辰当日拒绝回家受礼，自称清净惯了，不愿往是非场中闹，只命贾珍刻印其所注《阴骘文》一万张散人，并嘱咐好生款待来客。  \n2. **长孙媳丧事**：闻长孙媳秦可卿死，因自为早晚飞升，不肯回家沾染红尘，恐前功尽弃，丧事全凭贾珍料理。  \n3. **祭祀**：祭祀中担任主祭，十七日祖祀完毕便出城修养。  \n4. **死因**：因导气之术虚诞，守庚申时服秘法新制丹砂，吞金服砂后烧胀而殁，肚硬如铁，面皮嘴唇烧得紫绛皱裂。  \n5. **身后事**：天子念其祖父功绩，追赐五品之职，令子孙扶柩由北下门入都私第殡殓，光禄寺按例赐祭，朝中王公以下准祭吊，停灵于铁槛寺。\n\n**话语示例**:  \n“我是清净惯了的，我不愿意往你们那样是非场中去闹去。”"
