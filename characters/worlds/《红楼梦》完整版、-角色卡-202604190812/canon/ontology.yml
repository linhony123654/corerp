            - **MBTI**: ISTJ（综合多处描述，核心特质为稳重务实、守拙藏愚、安分随时、识大体、善于分忧、注重规矩礼节，兼有ESTJ的处事圆融周全、善于观察、知识渊博）
            - **外貌**: 肌骨莹润，举止娴雅；容貌丰美，人多谓黛玉所不及；脸若银盆，眼如水杏，唇不红而红，眉不画而翠；肌肤丰泽，雪白酥臂，另具一种妩媚风流；家常衣服，头上只散挽着簪儿，不爱花儿粉儿装饰，看去不觉奢华；贾母赞“从我们家四个女孩儿算起，都不如宝丫头”；元春评为“姣花软玉”；出阁时盛妆艳服，丰肩偄体，鬟低鬓弹，眼瞬息微，“荷粉露垂，杏花烟润”
            - **住所**: 蘅芜苑，朴素非常，如雪洞一般，贾母叹其太老实并赐摆件

