          keys: 风月宝鉴, 风月鉴, 镜子, 妖镜, 宝贝
          content: |-
            **名称**: 风月宝鉴
            **类型**: 仙家法器/镜子
            **外观**: 两面皆可照人，镜把上面錾着"风月宝鉴"四字
            **来源**: 出自太虚幻境空灵殿上，警幻仙子所制
            **功能**:
            - **正面**: 照之可见心中所想之人（贾瑞照见凤姐招手），入镜可与幻象云雨，但会耗尽精气致死
            - **背面**: 照之只见骷髅立在里面，为警醒之用
            - 专治邪思妄动之症，有济世保生之功
            **使用规则**: "千万不可照正面，只照它的背面，要紧，要紧！"
            **持有者**: 跛足道人携带至世间，赠予贾瑞，后贾瑞死，代儒欲烧毁，被跛足道人抢回
            **适用对象**: 单与那些聪明杰俊、风雅王孙等看照
            **重要事件**:
            1. 贾瑞照背面见骷髅，吓得掩住
            2. 照正面见凤姐招手，反复入镜云雨三四次
            3. 最后一次入镜被两人用铁锁套住拉走，贾瑞精尽而亡
            4. 代儒命烧时，镜内哭道："谁叫你们瞧正面了！你们自己以假为真，何苦来烧我？"
            5. 跛足道人赶来抢救，飘然而去
            **寓意**: 以假为真则丧命，照见真相（骷髅）方可保命。"风月"即色欲，"宝鉴"即镜鉴警示
