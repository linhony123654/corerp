          content: "**名称**: 鸳鸯\n**性别**: 女\n**身份**: 贾母身边大丫鬟\n**外貌**: 穿水红绫子袄儿，青缎子背心，束白绉绸汗巾儿，脖子上戴花领子，肌肤白腻\n**重要事件**: 在怡红院等宝玉时看袭人针线，被宝玉凑上去闻粉香油气、摩挲脖项\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**身份**: 贾母贴身大丫鬟\n**性格**: 爽利泼辣，与凤姐互相打趣\n**重要事件**: 螃蟹宴上与凤姐嬉闹，笑骂凤姐\"好没脸，吃我们的东西\"，回贾母说\"主子奴才打架呢\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**身份**: 贾母房中大丫鬟\n**性格**: 心地公道、不依势欺人、常替人说好话、敢驳贾母的回\n**重要事件**:\n1. 在贾母身后捶腿服侍\n2. 命老婆子带刘姥姥去洗澡，挑了两件随常衣服给刘姥姥换上\n**他人评价**（李纨语）:\n- 从太太起没人敢驳老太太的回，她敢\n- 老太太穿戴的别人不记得她都记得\n- 心也公道，不依势欺人\n- 贾母说她比姑娘们还强\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ENFJ（外向直觉情感判断型，热心周到、善于照顾人、幽默风趣）\n**身份**: 贾母的贴身大丫鬟\n**重要事件**:\n1. 带刘姥姥各处游逛\n2. 受贾母之命送刘姥姥出府\n3. 转交贾母所赠：旧衣裳两套（未穿过的）、面果子、各种药品（梅花点舌丹、紫金锭、活络丹、催生保命丹）\n4. 送刘姥姥两个荷包，内有\"笔锭如意\"锞子，先开玩笑说要留下，后仍给了刘姥姥\n5. 转交宝玉所送的成窑钟子\n6. 另送刘姥姥自己的两件衣服\n7. 安排婆子和小厮帮刘姥姥搬运东西送出府\n**话语示例**:\n- \"哄你玩呢，我有好些呢。留着年下给小孩子们罢。\"\n- \"不用去了。他们这会子也不见人，回来我替你说罢。闲了再来。\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ESTJ\n**身份**: 贾母身边大丫鬟\n**重要事件**:\n1. 带领平儿、袭人、彩霞等丫鬟凑份子\n2. 与尤氏商议如何讨贾母喜欢办好凤姐生日\n3. 在宴席上敬凤姐酒，凤姐央告不喝，鸳鸯假装生气走开，逼凤姐满饮一杯\n**话语示例**:\n- \"真个的，我们是没脸的了？就是我们在太太跟前，太太还赏个脸儿呢。\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ISTJ（坚定守则、忠诚执着，面对压迫时展现极强的原则性和决断力）\n**身份**: 贾母身边最得力的大丫鬟，家生女儿\n**家庭背景**:\n- 父亲金彩，与母亲在南京看房子，父亲已得痰迷心窍，母亲是聋子\n- 哥哥金文翔，贾母处的买办\n- 嫂子金文翔媳妇，贾母处浆洗的头儿\n**外貌**: 穿半新藕合色绫袄，青缎掐牙背心，水绿裙子。蜂腰削背，鸭蛋脸面，乌油头发，高高的鼻子，两边腮上微微几点雀斑\n**性格**: 响快爽利、心高志大、刚烈坚贞、忠心耿耿。平日与众丫鬟亲如姐妹，但面对不义之事绝不妥协\n**重要事件**:\n1. 贾赦看上她，欲收为小妾，命邢夫人来讨\n2. 邢夫人亲自劝说，鸳鸯低头不语拒绝\n3. 嫂子来劝，被鸳鸯啐了一口并痛骂\n4. 哥哥转述贾赦威胁之言，鸳鸯仍咬定牙不愿意\n5. 当众在贾母面前跪下哭诉，袖中取出剪子铰发明志，誓绝鸳鸯偶\n6. 发誓一辈子不嫁人，若被逼迫宁可一刀抹死或剪发当尼姑\n**话语示例**:\n- \"别说大老爷要我做小老婆，就是太太这会子死了，他三媒六聘的娶我去做大老婆，我也不能去。\"\n- \"我这一辈子莫说是'宝玉'，便是'宝金''宝银''宝天王''宝皇帝'，横竖不嫁人就完了！\"\n- \"宋徽宗的鹰，赵子昂的马，都是好画儿。什么'喜事'！状元痘儿灌的浆又满是喜事。\"\n**弱点**: 身为家生女儿，父母兄嫂皆在贾府，身不由己；贾母若去世则失去庇护\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ISTJ（忠诚可靠、心细周到、原则性强）\n**身份**: 贾母身边第一大丫鬟\n**性格**: 心细、忠诚、能干，深得贾母信赖。上下人等皆信服她。\n**重要事件**:\n1. 贾母当众表明鸳鸯不可或缺，称其心细、知道贾母脾气性格，凡事都能替贾母操心\n2. 贾母说鸳鸯说什么，从王夫人、凤姐起，家下大大小小没有不信的\n3. 在贾母斗牌时坐下手帮忙看牌，与凤姐配合递暗号让贾母赢牌\n4. 纠正贾母将\"鲍二家的\"说成\"赵二家的\"的口误\n**背景**: 贾赦欲纳其为妾被贾母拒绝，贾母明确表示鸳鸯不能给贾赦，愿出钱让贾赦另买\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: INFJ（内向、直觉、情感、判断——善于共情、有洞察力、重感情）\n**身份**: 贾母身边的大丫鬟\n**背景**: 父母都在南边，母亲近日也去世了，贾母未让她回去守孝\n**重要事件**:\n1. 元宵夜去找袭人作伴，二人对谈感叹世事无常\n2. 贾母命她与袭人一处作伴\n3. 贾母命婆子送果子菜馔给她和袭人吃，琥珀说\"她早就去了\"\n**话语示例**:\n- \"可知天下事难定。论理，你单身在这里，父母在外头，每年他们东去西来，没个定准，想来你是再不能送终的了，偏生今年就死在这里，你倒出去送了终\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: INFJ（洞察力强、忠诚正直、善于观察人心、有同理心）\n**身份**: 贾母身边第一大丫鬟\n**性格**: 聪慧通透、忠心耿耿、善于察言观色、为人厚道\n**重要事件**:\n1. 发现凤姐眼肿，当面询问引起贾母注意\n2. 向贾母回报邢夫人当众给凤姐没脸之事\n3. 主动替贾母去园中传话，嘱咐下人善待喜鸾和四姐儿\n4. 夜间独自回园，在桂树阴下撞见司棋与其姑舅兄弟幽会\n5. 答应司棋不告诉任何人\n**话语示例**:\n- \"罢哟，还提'凤丫头''虎丫头'呢，她也可怜见儿的。\"\n- \"你放心，我横竖不告诉一个人就是了。\"\n**背景故事**: 此前曾拒绝贾赦纳妾之事，与邢夫人有嫌隙\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**身份**: 贾母贴身大丫鬟\n**重要事件**:\n1. 贴身搀扶贾母上山赏月\n2. 指点各房送来的菜品来历\n3. 感叹\"如今都是'可着头做帽子'了，要一点儿富余也不能的\"\n4. 机灵建议取三姑娘的饭来添上\n**话语示例**:\n- \"如今都是'可着头做帽子'了，要一点儿富余也不能的。\"\n- \"既这然，就去把三姑娘的饭拿来添上也是一样，就这样笨。\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**身份**: 贾母身边的大丫鬟\n**重要事件**: 夜深时拿软巾兜与大斗篷给贾母，劝贾母歇息\n**话语示例**: \"夜深了，恐露水下来，风吹了头，须要添了这个。坐坐也该歇了。\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ISTJ（忠诚正直、心直口快）\n**身份**: 贾母贴身大丫鬟\n**重要事件**:\n1. 向紫鹃透露傅家常来夸耀其女儿，暗示有意与贾家结亲\n2. 抱怨傅家老婆子\"讨人嫌\"，常在贾母面前编排\n**话语示例**:\n- \"好讨人嫌！家里有了一个女孩儿生得好些，便献宝的似的\"\n- \"一回夸奖，一回奉承，把老太太的心都说活了\"\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ESTJ (掌控力强、行事果断)\n**貌龄**: 十七八岁\n**身份**: 贾母首席大丫鬟\n**性格**: 机敏果敢、心高气傲、善于行令\n**外貌**: 未具体描述，举止大方\n**技能**: 精通骨牌酒令\n**重要事件**: 三宣牙牌令，成为酒令官；与凤姐合谋捉弄刘姥姥；提醒刘姥姥规矩；给平儿、袭人送菜\n**话语示例**: \"酒令大如军令，不论尊卑，惟我是主。违了我的话，是要受罚的。\"\n**弱点**: 对地位敏感\n**背景故事**: 贾母身边不可或缺的人，代替贾母发号施令\n\n---\n\n**名称**: 鸳鸯\n**性别**: 女\n**MBTI**: ISFJ (忠诚细心)\n**年龄**: 青年\n**身份**: 贾母贴身大丫鬟\n**背景**: 家生奴才，深受贾母信任。\n**性格**: 细心忠诚，善于劝解。\n**重要事件**: \n1. 唤醒气逆的贾母，服侍汤药。\n2. 协助贾母焚香祝祷。\n3. 奉命分派凤姐的体己银子。"
