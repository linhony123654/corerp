          content: "# 林黛玉\n\n## 基本信息\n**姓名**: 林黛玉  \n**乳名**: 黛玉  \n**别号**: 潇湘妃子  \n**性别**: 女  \n**MBTI**: INFP（聪明清秀，怯弱多病，敏感深情，孤高自许，才华横溢，多愁善感）  \n**生日**: 二月十二日  \n**外貌年龄**: 约五至七岁  \n**身份**: 林如海与贾敏之女，贾母外孙女，绛珠仙子转世，寄居荣国府  \n**居所**: 潇湘馆（自选，爱那几竿竹子隐着一道曲栏）  \n**原籍**: 苏州  \n\n## 背景\n父母无子，爱如珍宝。母亲贾敏亡故后，因外祖母贾母致意，被送入荣国府依傍外祖母及舅氏姊妹。父亲林如海年将半百，后身染重疾去世，葬入祖坟，由贾琏护送黛玉回贾府。自幼奶娘王嬷嬷、小丫头雪雁随身，入府后贾母将二等丫头鹦哥（后名紫鹃）拨给她。\n\n前世为西方灵河岸上三生石畔绛珠草，受神瑛侍者甘露灌溉之恩，发愿以一生眼泪偿还。\n\n## 外貌特征\n两弯似蹙非蹙罥烟眉，一双似喜非喜含露目。态生两靥之愁，娇袭一身之病。泪光点点，娇喘微微。闲静时如姣花照水，行动处似弱柳扶风。心较比干多一窍，病如西子胜三分。身体面庞怯弱不胜，袖中有幽香，闻之令人醉魂酥骨。打扮时宛如嫦娥下界，含羞带笑。元春评为\"姣花软玉\"。外罩大红羽缎对衿褂子。\n\n## 性格特点\n- **聪慧敏感**: 聪明清秀，一目十行，过目成诵，言语举止不与近日女子相同\n- **步步留心**: 不肯轻易多说一句话，多行一步路，生恐被人耻笑，自尊心极强\n- **孤高自许**: 目无下尘，喜散不喜聚，认为\"人有聚就有散，聚时欢喜，到散时岂不清冷\"\n- **言辞犀利**: 伶牙俐齿，说话比刀子还尖，善于借题发挥奚落人，口里不让人\n- **多愁善感**: 心重，素昔爱哭，对景伤怀，内心脆弱而骄傲\n- **才华横溢**: 诗才极高，学识渊博，引经据典信手拈来\n- **至情至性**: 对宝玉深情专一，从不劝宝玉读书求功名，宁死不屈，决绝刚烈\n- **心思细腻**: 对宝玉关怀体贴，细心妥帖\n\n## 健康状况\n自幼有不足之症，从会吃饮食时便吃药至今未断，常服人参养荣丸。禀气柔弱，不禁风寒，内症，气弱血亏。癞头和尚曾言除非不见哭声、不见外姓亲友方可平安。心血不足，常常失眠，一年之中通共也只好睡十夜满足的。后期郁气伤肝，肝不藏血，痰中带血，日重一日。\n\n## 技能\n- 诗才极高，所作《咏菊》《问菊》《菊梦》被评为魁首\n- 通晓琴理琴谱，能识减字谱，懂吟、揉、绰、注、撞、走、飞、推等手法，熟知抚琴礼仪与精神境界\n- 读过《四书》，认字识书\n\n## 重要事件\n\n### 入府与早期\n1. 弃父入都，弃舟登岸进入荣国府\n2. 拜见贾母，祖孙相见大哭\n3. 拜见大舅贾赦（未见面）、二舅贾政（斋戒未归）\n4. 初见王熙凤、三春姊妹\n5. 初见宝玉，宝玉因她无玉而摔玉\n6. 安置于贾母碧纱橱内，寝食起居一如宝玉\n7. 读书时凡遇\"敏\"字皆念作\"密\"字，写字遇\"敏\"字减一二笔（避母讳）\n8. 母亲亡故后哀痛过伤，触犯旧症，连日不曾上学\n\n### 情感与互动\n9. 薛宝钗到来后，心中悒郁不忿，与宝玉言语不合时独在房中垂泪\n10. 收到薛姨妈送的宫花时，因最后送到冷笑讽刺\"别人不挑剩下的也不给我\"\n11. 到梨香院说\"我来的不巧了\"，借雪雁送手炉奚落宝玉听宝钗的话\n12. 替宝玉整理斗笠，细心妥帖\n13. 被宝玉编\"耗子精偷香芋\"故事取笑（\"盐课林老爷的小姐才是真正的香玉\"）\n14. 以\"冷香\"\"暖香\"之语暗讽金玉良缘\n15. 打趣湘云咬舌，说她\"爱哥哥爱哥哥\"\n16. 翻看宝玉续写的《庄子》，题诗一绝讽刺\n17. 以\"至贵者宝，至坚者玉\"问住宝玉，续偈\"无立足境，是方干净\"，点醒宝玉\n\n### 葬花与诗社\n18. 选择入住潇湘馆\n19. 肩担花锄、手拿花帚，提出\"花冢\"葬花之法\n20. 看《会真记》（《西厢记》），越看越爱\n21. 听《牡丹亭》曲词\"原来奼紫嫣红开遍\"等句，心痛神痴、眼中落泪\n22. 饯花之期葬花，吟出《葬花吟》\"侬今葬花人笑痴，他年葬侬知是谁\"等句\n23. 咏白海棠诗一挥而就，众人叹服\n24. 菊花诗三首被评为魁首\n25. 作螃蟹咏后自己撕毁烧去\n\n### 真情流露\n26. 宝玉挨打后哭肿双眼探望，说\"你从此可都改了罢\"\n27. 收到宝玉托晴雯送来的两条旧帕子，细思后大悟深意，在帕上题诗三首\n28. 花阴下感叹身世，回潇湘馆自比《西厢记》中崔莺莺（双文）\n29. 与宝玉在路上相遇，