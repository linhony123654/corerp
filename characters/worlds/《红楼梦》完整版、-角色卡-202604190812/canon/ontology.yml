            2. 警幻仙子居于此处
            3. 僧道约定三劫后同往太虚幻境销号

            ---

            **名称**: 太虚幻境
            **位置**: 离恨天之上，灌愁海之中，放春山遣香洞
            **特征**:
              1. 入口有石牌横建，上书"太虚幻境"四字
              2. 对联："假作真时真亦假，无为有处有还无"
              3. 宫门横书"孽海情天"，对联："厚地高天，堪叹古今情不尽；痴男怨女，可怜风月债难偿"
              4. 内有多个配殿：痴情司、结怨司、朝啼司、夜哭司、春感司、秋悲司、薄命司等
              5. 珠帘绣幕，画栋雕檐，光摇朱户金铺地，雪照琼窗玉作宫
              6. 仙花馥郁，异草芬芳
              7. 室内有瑶琴、宝鼎、古画、新诗，壁上对联："幽微灵秀地，无可奈何天"
            **功能**: 贮存普天之下所有女子过去未来的簿册；以情欲声色警醒痴顽之人
            **重要事件**: 宝玉梦游此处，翻阅金陵十二钗册籍，听《红楼梦》十二支曲，与兼美成姻

