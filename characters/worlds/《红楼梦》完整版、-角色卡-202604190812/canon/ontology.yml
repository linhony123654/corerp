            **主要事件**:

            ### 一、大观园入住安排
            1. 元春命探春抄录题咏、命大观园勒石，贾珍率人监工
            2. 凤姐替周氏谋事，将小和尚道士送铁槛寺由贾芹管理，领三月供给银二三百两
            3. 元春下谕命宝钗等姊妹入大观园居住，特命宝玉随入读书
            4. 宝玉闻贾政召唤如遭雷击，贾母安慰护送
            5. 贾政训话：见宝玉神彩飘逸想起贾珠，嫌恶减了八九；因"袭人"名字斥宝玉不务正业
            6. 二月二十二日众人搬入：黛玉住潇湘馆、宝玉住怡红院、宝钗住蘅芜苑等

            ### 二、宝玉园中生活与读禁书
            1. 宝玉心满意足，每日与姊妹丫头读书写字弹琴作画，作四首即事诗流传
            2. 忽一日烦闷不自在，茗烟从书坊买来小说传奇
            3. 宝玉将文理细密者藏入园中密看

            ### 三、西厢记妙词通戏语
            1. 三月中浣，宝玉在沁芳闸桥桃花下读《会真记》
            2. 桃花被风吹落，宝玉兜花瓣抖入池中
            3. 黛玉担花锄而来，提出"花冢"葬花法
            4. 黛玉看《会真记》，越看越爱，词藻警人余香满口
            5. 宝玉以"多愁多病身""倾国倾城貌"戏语黛玉
            6. 黛玉先怒后笑，反引"银样镴枪头"回敬
            7. 二人共埋落花，袭人来唤宝玉去请安

            ### 四、牡丹亭艳曲警芳心
            1. 黛玉独行至梨香院墙角，听到《牡丹亭》曲词
            2. "原来奼紫嫣红开遍，似这般都付与断井颓垣"——感慨缠绵
            3. "良辰美景奈何天，赏心乐事谁家院"——点头自叹
            4. "如花美眷，似水流年"——心动神摇，如醉如痴
            5. 联想"水流花谢两无情""流水落花春去也"及《西厢记》"花落水流红"，心痛神痴落泪
            6. 香菱从背后拍她一掌，打断伤感

            ### 五、醉金刚轻财尚义侠
            1. 贾芸求贾琏谋事，被告知已给贾芹，需等种花木工程
            2. 贾芸求舅舅卜世仁赊冰片麝香被拒，舅母揭穿家中无米
            3. 路遇醉汉倪二（醉金刚），倪二仗义借银十五两三钱有零，不要利钱不写文约
            4. 贾芸买冰片麝香孝敬凤姐，编造朋友赠送故事
            5. 凤姐得意欢喜，最终派贾芸管种树工程，批银二百两
            6. 贾芸次日一早还清倪二银子

            ### 六、痴女儿遗帕惹相思
            1. 宝玉房中丫鬟皆外出，小红趁机为宝玉倒茶
            2. 秋纹碧痕回来发现，辱骂排挤小红
            3. 小红在外书房门前遇贾芸，二人互相注目
            4. 小红听闻贾芸将来监工，心中明白
            5. 小红闷闷回房，贾芸在窗外低唤归还手帕——"遗帕惹相思"

            **出场角色**: 贾宝玉、林黛玉、王熙凤、贾政、王夫人、贾母、贾琏、贾元春（谕旨）、贾芸、倪二、卜世仁及其妻、小红（红玉）、袭人、鸳鸯、金钏儿、秋纹、碧痕、茗烟、香菱、邢夫人、贾环、贾兰、贾芹、周氏、赵姨娘、贾赦、贾琮、夏守忠

            **关键转折**:
            1. 元春谕旨令众人入住大观园——开启园中生活新篇章
            2. 宝玉与黛玉共读《西厢记》——二人感情的重要推进
            3. 黛玉听《牡丹亭》曲词心痛落泪——青春觉醒与命运感伤
            4. 倪二仗义借银——"不是人"的舅舅与泼皮义侠的对比
            5. 小红遗帕、贾芸拾帕——底层人物的情感线索开启

