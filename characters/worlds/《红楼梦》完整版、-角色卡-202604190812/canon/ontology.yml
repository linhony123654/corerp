            2. 风雨无阻
            3. 固定日期外可自愿加社
            4. 社长、副社长三人不强制作诗，遇容易题目可随便作一首
            5. 四位社员须限定作诗
            **首次活动**: 咏白海棠（七言律诗，十三元韵）
            **第二次活动**: 菊花诗十二题（七言律诗，不限韵）+ 螃蟹咏
        - name: 组织 - 贾府
          keys: 贾府, 贾家, 宁荣两府, 宁荣二宅, 宁荣二府, 宁府, 荣府, 荣国府, 咱们家
          content: "**名称**: 贾府（宁荣两府）\n**性质**: 金陵世勋贵族，钟鸣鼎食之家，翰墨诗书之族\n**起源**: 宁国公与荣国公为一母同胞弟兄\n**世系**:\n- **宁国府**: 宁国公→贾代化→贾敬→贾珍→贾蓉\n- **荣国府**: 荣国公→贾代善（妻史侯家小姐）→贾赦、贾政\n**现状**: \n- 外面架子虽未甚倒，内囊却也尽上来了\n- 生齿日繁，事务日盛，安富尊荣者尽多，运筹谋画者无一\n- 日用排场费用不能将就省俭\n- 儿孙竟一代不如一代\n**成员关系**:\n- 贾政夫人王氏，子女：贾珠（亡）、元春、贾宝玉\n- 贾赦子贾琏，娶王氏内侄女\n- 贾赦妾出迎春，贾政庶出探春\n- 惜春为宁府贾珍胞妹，养在荣府祖母处\n**与其他家族关系**: 与金陵甄家为老亲兼世交\n\n---\n\n**名称**: 贾府（宁国府、荣国府）\n**性质**: 世袭贵族之家\n**成员**: 贾母、贾赦、贾政、贾珍、贾琏、贾蓉、贾蔷、王熙凤、贾元春等\n**重要事件**:\n1. 贾元春晋封贤德妃，全府欣然踊跃\n2. 大兴土木修建省亲别院，合两府之力\n3. 管事人员分工：贾珍、赖大等监工点人丁；贾蓉管打造金银器皿；贾蔷往姑苏采办；贾琏总理协调\n4. 贾政不惯俗务，只偶尔看望商议\n5. 贾赦高卧在家，有事传呼贾琏、赖大领命\n**历史**: 当年太祖皇帝仿舜巡时，贾府在姑苏扬州监造海舫、修理海塘，接驾一次，\"银子花的淌海水似的\"\n\n---\n\n**名称**: 贾府（荣国府）\n**性质**: 世家大族\n**本章涉及成员关系**:\n- **贾母**: 最高长辈，掌握实权\n- **贾赦-邢夫人**: 长房，贾赦好色，邢夫人愚顺\n- **贾政-王夫人**: 二房，王夫人在贾母面前受委屈\n- **贾琏-凤姐**: 管家夫妇，凤姐精明周旋\n- **鸳鸯**: 贾母心腹大丫鬟，被贾赦觊觎\n**本章矛盾**: 长房贾赦欲强纳贾母心腹丫鬟鸳鸯为妾，引发家族内部冲突，暴露贾府内部权力关系与伦理矛盾\n\n---\n\n**名称**: 贾府\n**性质**: 世家大族，荣宁二府\n**成员**: 贾母、贾赦、贾政、贾珍、贾琏、邢夫人、王夫人、王熙凤、尤氏、宝玉、众姊妹等\n**本章体现的内部矛盾**:\n1. 邢夫人与凤姐的嫌隙日深\n2. 下人们\"一个富贵心，两只体面眼\"，势利眼严重\n3. 新出来的管事奶奶们嫉妒挟怨，背地里咬舌根、挑三窝四\n4. 邢夫人一方与王夫人一方的暗中对立\n5. 鸳鸯感叹\"为人是难作的\"，治一经损一经\n\n---\n\n**名称**: 贾府\n**性质**: 世家大族\n**本章相关成员**: 贾母、贾政、王夫人、贾琏、王熙凤、贾宝玉、李纨、鸳鸯、袭人等\n**重要事件**:\n1. 全府上下配合凤姐\"偷梁换柱\"之计，以宝钗代黛玉嫁宝玉\n2. 婚事不惊动亲友，从简办理\n3. 贾政婚礼次日即起程赴外任\n4. 上下人等虽知实情，因凤姐吩咐不敢走漏风声"
        - name: 组织 - 贾府陪房管事群
