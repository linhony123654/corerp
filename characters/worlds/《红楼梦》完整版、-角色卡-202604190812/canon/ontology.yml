          content: "# 贾宝玉\n\n## 基本信息\n\n**名称**：贾宝玉  \n**性别**：男  \n**貌龄**：出场时约七八岁，后渐长为十二三岁少年  \n**身份**：荣国府贾政与王夫人之次子（第三胎），贾母最疼爱的嫡孙；前世为西方灵河岸赤瑕宫神瑛侍者，以甘露灌溉绛珠草，凡心偶炽下凡造历幻缘  \n**MBTI**：ENFP/INFP（兼具两者特质：聪俊灵秀，乖僻邪谬，正邪两赋之人；外向时热情率真、不拘礼法、好奇心强；内向时理想主义、重情感、痴情天真、不慕功名）  \n**背景**：衔玉而生——出生时嘴里衔下一块五彩晶莹的通灵宝玉，上有字迹，故取名宝玉。通灵宝玉原为青埂峰下女娲补天未用之石，由茫茫大士、渺渺真人携入凡间历劫\n\n---\n\n## 外貌\n\n- **正装时**：束发嵌宝紫金冠，齐眉勒着二龙抢珠金抹额，穿二色金百蝶穿花大红箭袖，外罩石青起花八团倭缎排穗褂；或戴累丝嵌宝紫金冠，穿秋香色立蟒白狐腋箭袖，系五色蝴蝶鸾绦；或戴束发银冠，勒双龙出海抹额，穿白蟒箭袖，围攒珠银带\n- **家常时**：在家不戴冠，四围短发编成小辫，往顶心归总编一根大辫，红绦结住，自发顶至辫梢一路四颗珍珠，下有金坠脚\n- **面容**：面若中秋之月，色如春晓之花；鬓若刀裁，眉如墨画；面如桃瓣，眼若秋波；虽怒时而若笑，即瞋视而有情；换装后面如敷粉，唇若施脂，转盼多情，语言常笑\n- **特征**：项上佩戴通灵宝玉；神彩飘逸，秀色夺人；面若春花，目如点漆\n\n---\n\n## 性格特质\n\n### 核心性格\n- **正邪两赋**：天性聪俊灵秀，又乖僻邪谬；聪慧乖觉百个不及一个，淘气异常\n- **女儿崇拜**：认为“女儿是水作的骨肉，男人是泥作的骨肉”，见了女儿便清爽，见了男子便觉浊臭逼人；认为“山川日月之精秀只钟于女儿，须眉男子不过是渣滓浊沫”\n- **重情轻物**：至情至性，对姊妹极好，对下人体贴关怀；甘心为诸丫鬟充役，怜惜尊重女子\n- **厌恶功名**：极恶读书，称读书上进之人为“禄蠹”；除《四书》外竟将别的书焚了；懒与士大夫诸男人接谈，最厌峨冠礼服、贺吊往还等事；被宝钗等劝立身扬名便生气，斥为“钓名沽誉，入了国贼禄鬼之流”\n- **偏僻乖张**：行为偏僻性乖张，不通世务，那管世人诽谤；不安本分，随心所欲\n\n### 待人情态\n- 对黛玉：情深意重，痴情专一，体贴入微；常说“你放心”“睡里梦里也忘不了你”\n- 对姊妹丫鬟：温柔体贴，多情善感；爱在姊妹丫鬟间厮混，有吃胭脂的毛病；对女孩子细心周到\n- 对下人：善待下人，认为“耽待她们是粗笨可怜的人就完了”；替彩云担下偷窃之事\n- 对父亲：畏父如虎，见贾政如遭雷击，贾政在场时唯唯诺诺，贾政走后如“开了锁的猴子”\n\n### 特殊癖性与弱点\n- 淘气憨顽，任性恣情；感情用事，易受情绪影响走极端\n- 有“呆根子”，玩话常当真，听风就是雨；情感过于激烈，容易急痛迷心\n- 说话常犯忌讳（说死说烟）；痴狂任性，动辄发作\n- 通灵玉被声色货利所迷时失去灵验，易受邪祟侵害\n\n---\n\n## 技能与才情\n\n- **文学才华**：才思敏捷，出口成章，有“歪才情”；擅长题匾额、对对联，敢于批驳众清客和父亲的意见，有独立审美判断；熟悉《离骚》《文选》，善于杜撰典故；文章清奇，略一经心读书便无有不能\n- **博识异草**：能辨认杜若蘅芜、茞兰、清葛、金簦草、玉蕗藤、紫芸、青芷等多种异草\n- **自制化妆品**：会制作紫茉莉花粉和花露胭脂\n- **诗作**：咏白海棠、菊花诗《访菊》《种菊》、螃蟹咏、海棠诗等\n\n---\n\n## 别号\n\n- 怡红公子（诗社用号）\n- 富贵闲人（宝钗所赠）\n- 绛洞花主（旧号）\n\n---\n\n## 重要事件\n\n### 童年时期\n1. 出生时衔玉而生，取名宝玉\n2. 周岁抓周时只取脂粉钗环，贾政大怒称“将来酒色之徒”\n3. 说出“女儿是水作的骨肉，男人是泥作的骨肉”之语\n4. 初见黛玉，觉面善如旧相识，说“这个妹妹我曾见过的”；为黛玉取字“颦颦”；闻黛玉无玉，登时发痴狂病，摘玉狠命摔去\n5. 梦入太虚幻境，翻阅金陵十二钗册籍，听《红楼梦》十二支曲，与兼美（可卿）有云雨之事\n6. 与袭人初试云雨\n7. 初见秦钟，一见如故，自惭形秽称“我竟成了泥猪癞狗了”；商议同入家塾读书\n\n### 大观园时期前后\n8. 路谒北静王，获赠鹡鸰香念珠一串；将念珠转赠黛玉被拒\n9. 闻秦可卿死讯，心中似戳一刀，喷出一口血来，连夜赶往宁国府痛哭\n10. 秦钟病重时前往探望，携手垂泪送终；秦钟死后“痛哭不已”“日日思慕感悼”\n11. 随贾政游大观园题对额，题“曲径通幽处”“沁芳”“