          content: "**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（稳重细心、善解人意、忠心能干）\n**身份**: 凤姐的心腹通房大丫头\n**外貌**: 遍身绫罗，插金带银，花容玉貌\n**性格**: 有主见，能自作主意处理事务，素知凤姐与秦氏厚密\n**重要事件**:\n1. 接待刘姥姥，安排其在倒厅等候\n2. 自作主意拿尺头和金锞子作为凤姐给秦钟的表礼\n3. 将宫花中两枝送给小蓉大奶奶（秦可卿）\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 王熙凤的贴身丫鬟\n**重要事件**:\n1. 凤姐儿回家后为其换家常衣服、端茶\n2. 汇报家中事务：旺儿媳妇送来三百银子利银，贾瑞派人打听凤姐儿\n3. 听凤姐儿说贾瑞之事后骂道\"癞蛤蟆想天鹅肉吃\"\n**话语示例**: \"癞蛤蟆想天鹅肉吃，没人伦的混帐东西，起这个念头，叫他不得好死！\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 王熙凤的贴身丫鬟/通房大丫头\n**重要事件**:\n1. 与凤姐说话时报告贾瑞来访之事\n2. 听凤姐讲述贾瑞调戏之事后骂\"癞蛤蟆想天鹅肉吃，没人伦的混帐东西\"\n3. 贾琏走后，每晚与凤姐说笑、灯下拥炉倦绣、屈指算行程\n**话语示例**: \"癞蛤蟆想天鹅肉吃，没人伦的混帐东西，起这个念头，叫他不得好死！\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（忠诚细心，善于周旋，替主子遮掩）\n**身份**: 王熙凤的贴身丫鬟，贾琏的通房丫头\n**性格**: 机灵聪慧，忠心护主，处事圆滑\n**重要事件**:\n1. 在堂屋里截住旺儿嫂子送来的利钱银子，防止被贾琏发现\n2. 撒谎说是香菱来问话，巧妙遮掩凤姐放贷之事\n3. 服侍贾琏、凤姐饮宴\n**话语示例**:\n- \"奶奶的那利钱银子，迟不送来，早不送来，这会子二爷在家，她却送这个来了。\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: INFJ（聪慧周全型，善于在凤姐与贾琏之间周旋，既忠于凤姐又懂得变通）\n**身份**: 王熙凤的贴身丫鬟（通房大丫头）\n**性格**: 聪明机敏、善于应对、娇俏伶俐，在主子间左右逢源\n**重要事件**:\n1. 收拾贾琏外间衣物时发现枕套中的青丝\n2. 先拿去问贾琏，被贾琏揪住抢夺\n3. 凤姐进来时巧妙应对，替贾琏遮掩\n4. 凤姐旁敲侧击问\"可少什么没有\"\"别多出来\"时，平儿圆滑回答化解危机\n5. 事后向贾琏邀功，被贾琏抢回头发\n**话语示例**:\n- \"你就是没良心的。我好意瞒着她来问你，你倒赌狠！\"\n- \"没良心的东西，过了河就拆桥，明儿还想我替你撒谎！\"\n- \"我浪我的，谁叫你动火了？\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 王熙凤的贴身丫鬟兼通房\n**性格**: 聪明伶俐，善于分析\n**重要事件**:\n1. 猜出仆人来孝敬凤姐是为了争金钏儿死后空出的一两银子月例大丫鬟名额\n**话语示例**:\n- \"如今金钏儿死了，必定他们要弄这两银子的巧宗儿呢\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 王熙凤的贴身丫鬟（通房大丫头）\n**重要事件**: 螃蟹宴上本要抹琥珀，结果误将螃蟹黄抹在凤姐脸上，引发众人大笑\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（内向感觉情感判断型，忠诚可靠、细心周到、善于协调）\n**身份**: 王熙凤的贴身丫鬟（通房大丫头），凤姐的得力助手\n**性格**: 温和体贴、办事周到、忠心耿耿、善于调和\n**外貌**: 好体面模样儿，被李纨赞为\"不知道的人，谁不拿你当作奶奶太太看\"\n**重要事件**:\n1. 受凤姐之命来要螃蟹带回去吃，被李纨等人留下喝酒\n2. 向袭人透露月钱被凤姐挪用放贷的秘密\n3. 管理凤姐处下人事务，处理小厮请假、催收利钱等\n4. 引领刘姥姥去见贾母\n**话语示例**:\n- \"多喝了又把我怎么样？\"\n- \"你快去罢，不相干的。我们老太太最是惜老怜贫的，比不得那个狂三诈四的那些人。\"\n**背景故事**: 先时陪了四个丫头来凤姐处，死的死去的去，只剩她一个\n**关键细节**: 身上带着钥匙，被李纨戏称为\"凤丫头的一把总钥匙\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（内向感觉情感判断型，温和善良、细心体贴、谦逊有礼）\n**身份**: 凤姐的贴身丫鬟、通房大丫头\n**性格**: 温和善良、谦逊有礼、心思细腻\n**重要事件**:\n1. 为刘姥姥一一展示凤姐所赠之物并详细说明\n2. 私下另送刘姥姥两件旧袄、两条裙子、四块包头、一包绒线\n3. 向刘姥姥要干菜：灰条菜干子、豇豆、扁豆、茄子、葫芦条儿等\n4. 主动帮刘姥姥收拾打点行李，安排小厮雇车装运\n**话语示例**:\n- \"衣裳虽是旧的，我也没大很穿，你要弃嫌我就不敢说了。\"\n- \"休说外话，咱们都是自己，我才这样。\"\n- \"到年下，你只把你们晒的那个灰条菜干子和豇豆、扁豆、茄子、葫芦条儿各样干菜带些来。\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（守卫者型，忠诚隐忍、善解人意、委曲求全，在夹缝中求生存）\n**身份**: 贾琏之妾，凤姐的心腹陪房丫头\n**性格**: 聪明清俊、忍辱负重、善于周全、有委屈不轻易发作\n**背景**: 无父母兄弟姊妹，独自一人供应贾琏夫妇二人\n**重要事件**:\n1. 凑份子时私自另外为凤姐备了生日礼，又出官中一份\n2. 凤姐泼醋时无辜被打，先被凤姐打两下，又被贾琏踢骂\n3. 气急之下跑出去找刀子要寻死\n4. 被李纨拉入大观园安慰，宝钗劝解\n5. 在怡红院被宝玉细心照料理妆\n6. 次日主动给凤姐磕头认错：\"奶奶的千秋，我惹了奶奶生气，是我该死\"\n**话语示例**:\n- \"你们做这些没脸的事，好好的又拉上我做什么！\"\n- \"二奶奶倒没说的，只是那淫妇治的我，他又偏拿我凑趣。\"\n- \"我伏侍了奶奶这么几年，也没弹我一指甲。\"\n**弱点**: 身份尴尬，夹在贾琏与凤姐之间，无处诉冤\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（温和体贴、善解人意、忠诚可靠）\n**身份**: 凤姐的贴身丫鬟，贾琏的通房丫头\n**本章表现**:\n1. 听凤姐转述讨鸳鸯之事，摇头认为此事未必妥当\n2. 按凤姐吩咐回避到园子里，遇见鸳鸯\n3. 开玩笑称鸳鸯\"新姨娘\"，后自悔失言\n4. 将凤姐过去回来的始末原由告诉鸳鸯\n5. 为鸳鸯出主意（虽是玩笑）\n6. 面对金家嫂子挑拨，不为所动\n**话语示例**:\n- \"新姨娘来了！\"\n- \"你只和老太太说，就说已经给了琏二爷了，大老爷就不好要了。\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 凤姐的陪嫁丫鬟、贾琏之通房\n**性格**: 机灵体贴、善于周旋\n**重要事件**:\n1. 劝贾琏不要去贾母处碰钉子\n2. 送钱给凤姐斗牌\n3. 向宝钗讲述贾琏被打的原委，详细说明石呆子扇子事件和贾雨村的恶行\n4. 向宝钗要棒疮药给贾琏上药\n**话语示例**:\n- \"我说着你不听，到底碰在网里了\"\n- \"都是那贾雨村什么风村，半路途中哪里来的饿不死的野杂种！\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ENFJ（善于调和，有威信，处事圆融但不失原则）\n**身份**: 王熙凤的陪房丫鬟，贾琏之妾\n**重要事件**:\n1. 被麝月请来处理婆子闹事，传话\"撵她出去，在角门外打她四十板子\"\n2. 实际到场后说\"得饶人处且饶人\"\n3. 透露这几日各处大小出了八九件事，怡红院的算极小的\n**话语示例**: \"'得饶人处且饶人'，得省的将就省些事也罢了。能去了几日，只听各处大小人儿都作起反来了。\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**MBTI**: ISFJ（忠诚务实，善于调和矛盾，顾全大局）\n**身份**: 王熙凤的贴身丫鬟，荣国府二奶奶屋里的大丫头\n**性格**: 明白事理、大方得体、善于周旋、处事圆滑而不失原则\n**背景**: 生日与宝玉、宝琴、岫烟同日。平日在凤姐身边处理各类事务，深得信任\n**重要事件**:\n1. 吩咐林之孝家的大事化小、小事化无，恢复柳家的职务，退回秦显家的\n2. 生日被湘云说出，探春等人为她张罗庆生宴席\n3. 忙着打发各家送寿礼的人，回明凤姐后方入园赴宴\n4. 与袭人划拳对饮\n**话语示例**: \"我们是那牌儿名上的人，生日也没拜寿的福，又没受礼职份，可吵闹什么，可不悄悄的过去？\"\n\n---\n\n**名称**: 平儿\n**性别**: 女\n**身份**: 凤姐身边大丫鬟\n**重要事件**:\n1. 帮袭人借了一坛好绍兴酒\n2. 次日亲自来请众人，说\"今儿我还东\"\n3. 在榆荫堂还席，采芍药传花行令\n**话语示例**:\n- \"好！白