          content: "# 薛姨妈\n\n## 基本信息\n\n**姓名**: 薛姨妈  \n**性别**: 女  \n**年龄**: 四十上下 / 四十余岁  \n**身份**: 薛蟠、薛宝钗之母；王夫人之胞妹；王子腾之妹；薛家当家太太；寄居贾府梨香院，后搬至潇湘馆与黛玉同住  \n**MBTI**: ESFJ（热情好客，慈爱宽厚，善于哄劝，重感情，善于维系关系，遇事易焦虑，依赖他人帮助）/ ISFJ（温和慈爱，随顺环境，容易伤心落泪）  \n**外貌**: 未具体描述\n\n## 性格特点\n\n- **明理持重，温和随和**: 知进知退，处事周全，善于劝慰他人\n- **热情慈爱，宽厚大方**: 待宝玉如亲儿，主动安慰黛玉，是个\"无可无不可\"的随和之人\n- **慈母心肠，护女心切**: 见宝钗哭自己也撑不住，对薛蟠又气又无奈，遇事容易哭泣，缺乏决断\n- **善于社交，通情达理**: 与贾母闲谈、与王夫人相叙，善于维系人际关系\n- **重视家庭和谐**: 容易被表象迷惑，容易自我安慰\n\n## 重要事件\n\n### 入住贾府前后\n1. 坚持住在贾府以拘紧薛蟠，与王夫人说明一应日费供给一概免却\n2. 每日饭后或晚间过来与贾母闲谈、与王夫人相叙\n3. 将宫里做的十二支堆纱花分送各位姑娘，托周瑞家的带去：三位贾府姑娘各两枝，林黛玉两枝，凤姐四枝\n\n### 与宝玉相关\n1. 见宝玉来访，一把拉入怀中，热情招待\n2. 取自家糟制的鹅掌鸭信给宝玉尝\n3. 千哄万哄只容宝玉吃了几杯酒便收过\n4. 替宝玉挡李嬷嬷：\"老货，你只放心吃你的去。便是老太太问，有我呢。\"\n5. 宝玉发病时安慰贾母，分析宝玉心实、黛玉从小一处长大故伤心是常情\n6. 送宝玉寿礼比王子腾减一等\n\n### 与薛蟠相关\n1. 薛蟠打死人后吓得战战兢兢，一面哭一面处理，在当铺兑银子送去打点\n2. 求王夫人转求贾政说情\n3. 来探望挨打的宝玉时，质问薛蟠是否唆人告发宝玉，被薛蟠气得乱战\n4. 家中被金桂搅得翻江倒海，见金桂安静便以为是薛蟠转运，欢喜不已\n5. 对金桂引入夏三缺乏警觉，到金桂房中见到夏三，被门后人影吓了一跳\n6. 收到薛蟠来信说道里驳回、要亲提，又哭了一场，命薛蝌赴县照料，兑银打点\n7. 筹措银两为薛蟠赎罪\n\n### 撮合姻缘\n1. 看中邢岫烟端雅稳重，原欲说与薛蟠，后因恐薛蟠糟蹋人家女儿，改说与薛蝌\n2. 通过凤姐向贾母提亲，促成薛蝌与邢岫烟的婚事\n3. 主动提议将黛玉许配宝玉：\"不如竟把你林妹妹定与他，岂不四角俱全？\"\n4. 对宝玉亲事\"十分愿意\"，但说蟠儿不在家需商量\n\n### 照管园中姊妹\n1. 受贾母之托在园内照管姊妹丫鬟，挪进园中\n2. 搬至潇湘馆与黛玉同房，对黛玉药饵饮食十分经心，黛玉感戴不尽，以\"姐姐\"呼宝钗，以\"妹妹\"呼宝琴，俨似同胞\n3. 只管照管姊妹、禁约丫头，不肯多管家中大小事务\n\n### 宴席表现\n1. 在贾母处凑趣，目睹鸳鸯哭诉；贾母迁怒王夫人时，因是亲姊妹不好劝；贾母道歉后回应：\"老太太偏心，多疼小儿子媳妇，也是有的。\"\n2. 元宵宴上坐正面上席，与李婶同为贵客\n3. 劝凤姐\"你少兴头些！外头有人，比不得往常\"\n4. 称赞小戏子文官\"好个灵透孩子\"\n5. 笑说\"笑话儿不在好歹，只要对景就发笑\"\n6. 放烟火时搂着湘云\n7. 宴席上自称\"老天拔地\"不合群，到议事厅上歪着自在\n8. 随贾母游览，称没见过软烟罗，在酒令中配合\n\n### 宝钗婚事\n1. 心里愿意这门亲事，但顾虑宝钗委屈\n2. 回家将婚事告知宝钗，用好言劝慰\n3. 安排薛蝌送庚帖、办理相关事宜\n4. 同意蠲免装奁，从简办理\n\n### 其他事件\n1. 到潇湘馆探望黛玉，搂着黛玉说\"心里更疼你\"\n2. 巧妙掩饰岫烟当票之事\n3. 宝钗病重时慌了手脚，哭得死去活来，来求王夫人帮忙\n4. 薛蝌回来后到贾府替王夫人照应作伴\n5. 与王夫人商议袭人出路，提出周全方案，劝慰王夫人、宝钗、袭人\n6. 平日嘴碎，常说孩子们不知过日子、遭踏东西\n\n## 经典话语\n\n- \"咱们且忙忙收拾房屋，岂不使人见怪？……我带了你妹子投你姨娘家去，你道好不好？\"\n- \"别怕，别怕，我的儿！来了这里，没好的你吃，别把这点子东西吓得存在心里，倒叫我不安。只管放心吃，都有我呢！\"\n- \"不知好歹的冤家，都是你闹的，你还有脸来问！\"\n- \"我的儿，你别委屈了，你等我处分孽子障\"\n- \"你要有这个恒劲，那龙也下蛋了\"\n- \"千里姻缘一线牵。\"\n- \"你不知我心里更疼你呢！\"\n- \"不如竟把你林妹妹定与他，岂不四角俱全？\"\n- \"我一出这主意，老太太必喜欢的。\"\n- \"我也不要命了，赶到那里见他一面，同他死在一处就完了。\"\n- \"我虽有儿，如今就像没有的了。\"\n- \"邢丫头实在是个有廉耻、有心计儿的，又守得贫，耐得富。\"\n- \"幸喜有了胎，将来生个外孙子，必定是有成立的，后来就有了结果了。\"\n- \"好一个柔顺的孩子\"（赞袭人）\n- \"好个灵透孩子\"（赞文官）\n\n## 总评\n\n薛姨妈是《红楼梦》中一位典型的慈母形象，为人温和慈爱、通情达理，善于维系人际关系。作为寄居贾府的亲戚，她明理持重，知进知退，既能与贾母、王夫人等长辈融洽相处，又能体贴照顾黛玉等晚辈。她对子女宠爱有加，尤其是对儿子薛蟠的管教有心无力，常因儿子的不肖而伤心落泪；对女儿宝钗则既疼爱又倚重。在贾府诸多事务中，她扮演着润滑剂的角色，善于劝慰调解，处事周全。然而面对家庭变故时，她也显露出遇事容易焦虑、依赖他人帮助的一面，缺乏足够的决断力。总体而言，薛姨妈是一位善良、温和、重情重义的贵族妇女形象。"
