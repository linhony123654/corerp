          keys: 第45章, 醉金刚小鳅生大浪, 痴公子余痛触前情, 锦衣军查抄宁国府, 骢马使弹劾平安州
          content: |-
            **章节标题**: 第45章（含醉金刚小鳅生大浪、痴公子余痛触前情、锦衣军查抄宁国府、骢马使弹劾平安州）

            **主要事件**:

            ### 一、贾雨村渡口遇火与倪二事件
            1. 雨村离开甄士隐所在庙宇后，庙宇起火，雨村不肯回去查看，只派人探视
            2. 衙役回报：庙中全烧，道士不见踪影，蒲团瓢儿完好但一触即化为灰——士隐已仙去
            3. 雨村进都门，醉金刚倪二酒醉冲撞轿子，被鞭打拘押

            ### 二、贾芸失信与倪二怒骂
            1. 倪二妻女求贾芸到荣府说情，贾芸满口应承却办不成
            2. 贾芸到荣府被门上拒绝，园门也锁着，无法见到贾琏或宝玉
            3. 贾芸推诿搪塞，倪家另托人将倪二弄出
            4. 倪二出狱后怒骂贾芸忘恩负义，扬言要揭发贾家强占民女等丑事
            5. 倪二提及"小张"女人被贾家占了之事——伏笔贾珍强占良民妻女案

            ### 三、贾政回京与朝堂惊变
            1. 贾政江西粮道被参回京谢罪
            2. 皇上追问"贾化"之名，又问苏州贾范强占良民妻女案，变色斥责
            3. 贾政回家训诫贾珍贾琏，众亲友提醒侍郎和内监有不睦
            4. 贾政得知黛玉已死，掉泪叹息

            ### 四、宝玉痴情追忆黛玉
            1. 宝玉因贾政问起黛玉而暗自伤心
            2. 深夜央求袭人叫紫鹃来，要问黛玉临终之事
            3. 宝玉痛诉自己被"弄成负心人"，想为黛玉写祭文却灵机全无
            4. 质疑黛玉是否真死，猜测其成仙

            ### 五、锦衣军查抄贾府（高潮）
            1. 贾政设宴请酒时，锦衣府赵全带人闯入，西平王奉旨查抄贾赦家产
            2. 旨意：贾赦"交通外官，依势凌弱"，革去世职，被拿下
            3. 赵全主张全抄，西平王主张只查贾赦一边
            4. 北静王赶到宣旨：只提贾赦质审，余交西平王办理
            5. 查出禁用之物、借券（重利盘剥）、大量金银珠宝皮货
            6. 贾琏承认借券为己所为，被看守并案办理
            7. 凤姐听闻抄家消息当场昏死，后被救醒
            8. 贾母奄奄一息，章末传出"老太太不好了"

            ### 六、东府宁国府被抄
            1. 贾珍被参引诱世家子弟赌博、强占良民妻女凌逼致死
            2. 贾珍、贾蓉被拿，女眷被关押，家产被抄
            3. 焦大从东府跑到西府，痛哭控诉
            4. 李御史参奏平安州牵连贾赦，火上浇油

            **出场角色**: 贾雨村、甄士隐（未直接出场）、倪二、贾芸、贾政、宝玉、袭人、麝月、宝钗、凤姐、贾母、王夫人、邢夫人、贾赦、贾琏、贾珍、贾蓉、贾兰、平儿、巧姐、焦大、薛蝌、西平郡王、北静王、赵全

            **关键转折**:
            1. 倪二扬言揭发贾家丑事——伏笔贾珍案
            2. 皇上追问"贾"姓案件——暗示贾家已入皇帝视线
            3. 锦衣军查抄——贾府由盛转衰的决定性事件
            4. 北静王到来扭转局势——贾政一支暂时保全
            5. 贾母"不好了"——暗示贾母将亡

            **伏笔线索**:
            1. 倪二提及"小张"女人被贾家占——对应贾珍强占良民妻女案
            2. 皇上对"贾"姓不满——预示贾家更大灾祸
            3. 借券和禁用之物——后续追究的隐患
            4. 凤姐昏死、贾母奄奄一息——预示二人将亡
            5. 贾政"巴不得不做官"——预示最终结局
        - name: 章节剧情 - 第46章
          keys: 第46章, 第一百六回, 第一百七回, 王熙凤致祸抱羞惭, 贾太君祷天消祸患, 散余资贾母明大义, 复世职政老沐天恩
          content: |-
            **章节标题**: 第46章（含王熙凤致祸抱羞惭、贾太君祷天消祸患、散余资贾母明大义、复世职政老沐天恩）

            **主要事件**:
            ### 一、贾政蒙恩免罪，家产给还
            1. 贾政进内见北静王，王爷代奏后，主上悯恤，着贾政仍在工部员外上行走，所封家产除贾赦部分外，余俱给还。
            2. 贾琏革去职衔，免罪释放，但历年积聚及凤姐体己七八万金尽失。
            3. 贾政查问放债之事，贾琏推说不知，要问周瑞、旺儿。贾政感叹库上无银、尚有亏空，珠儿早逝，宝玉无用。

            ### 二、贾母焚香祈祷，愿代子孙受罪
            1. 贾母见世职革去、子孙监禁、凤姐病危，日夜不宁，眼泪不干。
            2. 傍晚扎挣坐起，命各处佛堂上香，自出院中焚斗香跪下祝告天地，愿以自身承担合家罪孽，只求饶恕儿孙。
            3. 王夫人带宝玉、宝钗来，众人想起各自伤心事，满屋哭声震天，惊动贾政。

            ### 三、史湘云出阁消息传来
            1. 史侯家两个女人来报，说史湘云不多几日就要出阁，姑爷才情学问都好。
            2. 贾母听后既喜且悲，感叹自己不能去吃喜酒，宝玉听后更觉凄凉，想女子一出嫁就改变。

            ### 四、贾赦贾珍定罪发配
            1. 贾政进枢密院听旨：贾赦倚势强索石呆子古扇逼死人命，从宽发往台站效力赎罪；贾珍尤二姐、尤三姐案，革去世职，派往海疆效力赎罪。
            2. 贾蓉年幼无干，省释。贾政免治治家不正之罪。
            3. 贾赦、贾珍回家告别，贾母分派积蓄，给各房银两及首饰衣物，安排后事。

            ### 五、贾母明大义散余资
            1. 贾母开箱倒笼，将毕生积攒分派：给贾赦三千两、贾珍三千两、凤姐三千两，又给贾琏五百两送黛玉灵柩回南，余下金银给宝玉，珠儿媳妇及兰儿也分些。
            2. 命贾政变卖金子偿还欠款，清理家人，该配人赏去。
            3. 贾政感叹母亲理家有方，自己不长进。

            ### 六、凤姐抱羞惭病重托付
            1. 贾母亲自去看凤姐，凤姐自愧辜负期望，病中悔恨贪财招祸。
            2. 凤姐向平儿托付巧姐儿，担心张华案连累贾琏，欲寻短见又不敢。
            3. 贾母赠银安慰，平儿紧紧守着。

            ### 七、贾政承袭世职，家计萧条
            1. 贾赦等分离后，贾政意外承袭荣国公世职，感极涕零。
            2. 亲友趋炎附势，又来贺喜。
            3. 贾琏亏空日重，典房卖地，家人欺瞒装穷。

            ### 八、包勇酒后骂雨村，被罚看园
            1. 包勇正直忠心，见众人欺瞒主子不忿，每日吃了就睡。
            2. 酒后当街大骂贾雨村忘恩负义、踢弄贾府。
            3. 荣府家人趁机告状，贾政责骂包勇，派他去看守园子。
        - name: 章节剧情 - 第47章
          keys: 第47章, 甄士隐详说太虚情, 贾雨村归结红楼梦, 第一百二十回
          content: |-
            **章节标题**: 第47章 甄士隐详说太虚情 贾雨村归结红楼梦

            **主要事件**:

            ### 一、袭人病重与宝玉出家后的余波
            1. 袭人急怒攻心，心痛气厥，大夫诊为急怒所致
            2. 袭人梦中见宝玉以和尚形象出现，说"我是不认得你们的了"
            3. 袭人独自思量宝玉必是悟道出家，左右为难

            ### 二、贾政金陵安葬与毘陵驿遇宝玉
            1. 贾政扶贾母灵柩至金陵安葬，贾蓉送秦氏、凤姐、鸳鸯、黛玉棺木安葬
            2. 贾政收到家书知宝玉中举后走失
            3. 毘陵驿雪中，宝玉光头赤脚披猩猩毡斗篷向贾政跪拜四拜
            4. 一僧一道夹住宝玉说"俗缘已毕，还不快走"，三人飘然而去
            5. 贾政追赶不及，闻歌声"我所居兮，青埂之峰……归彼大荒"
            6. 贾政回忆三次见僧道经历，感叹宝玉"下凡历劫"

            ### 三、薛蟠出狱与香菱扶正
            1. 薛姨妈凑齐赎罪银两，薛蟠出狱立誓改过
            2. 薛姨妈提议将香菱扶正为薛蟠正妻，众人称"大奶奶"

            ### 四、众人得知宝玉下落
            1. 贾政家书寄到，贾兰念信，众人痛哭
            2. 众人以"借胎""出佛爷"之说劝慰
            3. 王夫人叹媳妇命苦，薛姨妈以宝钗有孕、贾兰中举劝解

            ### 五、袭人出嫁蒋玉菡
            1. 王夫人与薛姨妈商议袭人出路
            2. 花自芳家说亲，蒋家条件优厚
            3. 袭人含悲叩辞，怀必死之心上轿
            4. 蒋玉菡按正配规矩迎娶，开箱见猩红汗巾知是宝玉丫头
            5. 蒋玉菡拿出松花绿汗巾，袭人始信姻缘前定
            6. 蒋玉菡温柔体贴，袭人"真无死所"

            ### 六、贾政回京与朝廷恩赏
            1. 贾政回京，贾赦、贾珍已回家
            2. 贾政进内谢恩，圣上赐宝玉"文妙真人"道号
            3. 巧姐许配周家，刘姥姥来应亲事
            4. 贾政吩咐按理持家

            ### 七、甄士隐详说太虚情
            1. 贾雨村犯婪索案褫籍为民，至急流津觉迷渡口遇甄士隐
            2. 甄士隐详说宝玉来历：通灵宝玉由茫茫大士、渺渺真人携下凡，尘缘满后携归
            3. 解说太虚幻境即真如福地，仙草归真
            4. 预言"兰桂齐芳，家道复初"
            5. 告知香菱"产难完劫，遗一子于薛家"
            6. 甄士隐度脱香菱送至太虚幻境

            ### 八、归结红楼梦
            1. 僧道将通灵宝玉送还青埂峰女娲炼石补天之处
            2. 空空道人再过青埂峰，再次抄录石上文字
            3. 在急流津遇贾雨村，被指引去找曹雪芹
            4. 曹雪芹在悼红轩接受传述
            5. 空空道人仰天大笑飘然而去

            **出场角色**: 袭人、宝钗、贾政、王夫人、薛姨妈、薛蟠、香菱、蒋玉菡、贾兰、巧姐、贾琏、贾珍、贾蓉、刘姥姥、甄士隐、贾雨村、空空道人、曹雪芹、一僧一道、花自芳、秋纹、平儿、薛蝌

            **关键转折**:
            1. 宝玉毘陵驿雪中拜别贾政，随僧道飘然而去——确认宝玉彻底出世
            2. 袭人见汗巾知姑爷即蒋玉菡——姻缘前定的呼应
            3. 甄士隐揭示宝玉全部来历与归宿——全书谜底揭晓
            4. 空空道人→贾雨村→曹雪芹的传书链条——元叙事闭环

            **伏笔线索**:
            1. 猩红汗巾与松花绿汗巾的互换早已暗示袭人与蒋玉菡的姻缘
            2. "兰桂齐芳"预言贾兰与宝钗之子的未来
            3. 宝玉"高魁子贵"暗示遗腹子将来显达
            4. "贾雨村言"即"假语村言"，全书以假托真的叙事框架完成闭合
            5. 结尾偈语"由来同一梦，休笑世人痴"总结全书主旨
