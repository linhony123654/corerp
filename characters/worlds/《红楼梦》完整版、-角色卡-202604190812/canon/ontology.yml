          content: "**名称**: 秦可卿  \n**性别**: 女  \n**身份**: 宁国府贾蓉之妻，贾珍儿媳，秦钟之姐，秦业之女  \n**背景**: 贾母重孙媳中第一个得意之人；小名“可卿”，自称此名府中无人知晓  \n**外貌**: 袅娜纤巧；病中面容消瘦，“脸上身上的肉全瘦干了”  \n**性格**: 温柔和平，行事妥当，体贴周到，细心体贴，善于周旋，有说有笑、会行事；心性高强，聪明过人，但心细心重，忧虑伤身，听见什么话都要度量三日五夜；为人行事得体，亲戚长辈无不喜欢；素日孝顺、和睦亲密、慈爱、怜贫惜贱、慈老爱幼  \n**MBTI**: 呈现多面性——ESFJ（极妥当，行事温柔和平，善于照料他人，社交得体）；ENFJ（热情周到、善于照顾人、与凤姐厚密）；INFJ（心性高强，聪明过人，思虑太过；临终托梦展现深远洞察力与忧患意识）  \n\n**房间陈设**:  \n1. 唐伯虎画的《海棠春睡图》  \n2. 宋学士秦太虚对联：“嫩寒锁梦因春冷，芳气笼人是酒香”  \n3. 武则天宝镜、飞燕金盘、安禄山木瓜  \n4. 寿昌公主之榻、同昌公主涟珠帐  \n5. 西子纱衾、红娘鸳枕  \n6. 房中有一股细细的甜香  \n\n**病情**:  \n- 经期两个多月未来，经诊断非喜  \n- 下半天懒待动、懒待说话、眼神发眩  \n- 张太医诊断：心气虚生火、肝家气滞血亏、肺经气分太虚、脾土被肝木克制  \n- 病因：忧虑伤脾，肝木忒旺，聪明太过、思虑太过所致  \n- 张太医认为有三分治得，过了春分可望全愈（实为委婉说法）  \n- 上月中秋还跟老太太们玩了半夜，二十后一日比一日觉懒  \n- 冬至后病情未见大好，凤姐儿暗示尤氏准备后事  \n- 吃了贾母赏的枣泥馅山药糕两块，似能克化  \n\n**重要事件**:  \n1. 主动安置宝玉午睡，先引至上房（被宝玉拒绝），后引至自己房中；吩咐小丫鬟看着猫儿狗儿打架  \n2. 宝玉梦中呼叫“可卿救我”，秦氏纳闷其小名如何被宝玉知晓  \n3. 在宁府接待凤姐和宝玉；引荐弟弟秦钟与宝玉相见，嘱咐宝玉照看秦钟，又嘱咐秦钟注意言行  \n4. 平儿特意送两枝宫花给她  \n5. 听闻弟弟秦钟在学堂被欺负，又恼又气，连早饭也没吃  \n6. 凤姐儿来探望时拉着手诉说衷肠，自言“未必熬的过年去”“治得病治不得命”“不过是挨日子”  \n7. 病逝：合家皆知，无不纳罕，都有些疑心  \n8. 托梦凤姐：告诫“月满则亏，水满则溢”“登高必跌重”“树倒猢狲散”“盛筵必散”；提出两件未妥之事——祖茔无一定钱粮、家塾无一定供给，建议趁富贵时多置田庄房舍；预言“不日又有一件非常喜事”，“烈火烹油、鲜花着锦之盛”，但不过是“瞬间的繁华，一时的欢乐”；临别赠言：“三春去后诸芳尽，各自须寻各自门”  \n9. 丧礼极尽奢华：停灵四十九日，一百零八众禅僧拜大悲忏，九十九位全真道士打解冤洗业醮；灵牌写“天朝诰授贾门秦氏恭人之灵位”（因贾蓉蠲了五品龙禁尉）  \n\n**与梦境关联**: 宝玉梦中所见兼美女子“鲜艳妩媚有似乎宝钗，风流袅娜则又如黛玉”，乳名兼美、字可卿，暗合秦可卿  \n\n**丫鬟**: 瑞珠（触柱而亡）、宝珠（甘为义女，任摔丧驾灵之任）  \n\n**话语示例**:  \n- “我这屋子，大约神仙也可以住得了。”  \n- “我的小名这里没人知道，他如何从梦里叫出来？”  \n- “这都是我没福。这样人家，公公、婆婆当自己的女孩儿似的待。”  \n- “任凭神仙也罢，治得病治不得命。婶子，我知道我这病不过是挨日子。”  \n- “好不好，春天就知道了。”"
