        - name: 玩法 - 猜灯谜
          keys: 灯谜, 猜谜, 春灯雅谜
          content: |-
            **名称**: 猜灯谜
            **规则说明**:
            1. **元春灯谜**: 娘娘差人送出灯谜，众人猜着后不说出来，暗暗写在纸上封进宫去验证。各人也拈一物作谜挂在灯上送入宫中
            2. **家中灯谜**: 贾母命制围屏灯，姊妹各自暗暗做灯谜粘于屏上，预备香茶细果及玩物为猜着之贺
            **参与条件**: 贾府众人，包括宝玉、黛玉、湘云、宝钗、迎春、探春、惜春、贾环、贾兰等
            **奖惩机制**:
            - 猜着者得宫制诗筒、茶筅等赏赐
            - 猜不着者无赏（迎春、贾环未得）
            - 贾母与贾政互猜时，猜不着要罚东西，猜着要领赏
            **灯谜内容**:
            - 贾母："猴子身轻站树梢"——荔枝
            - 贾政："身自端方，体自坚硬。虽不能言，有言必应"——砚台
            - 元春：爆竹
            - 迎春：算盘
            - 探春：风筝
            - 惜春：佛前海灯
            - 宝钗：更香（七言律诗）
            - 贾环：枕头、兽头
        - name: 玩法 - 测字
          keys: 测字, 刘铁嘴
          content: |-
            **名称**: 测字
            **规则说明**: 拈一字，由测字先生根据字形拆解推断吉凶
            **具体案例**:
            1. 林之孝拈得"赏"字
            2. 刘铁嘴拆解：上"小"下"口"——可含嘴里的珠子宝石；底下"贝"拆开不成"见"字——"不见"了；上头拆"当"字——到当铺找；加"人"字成"偿"——找着当铺就有人，赎回即偿还
            3. 结论：玉丢不了，将来有人送还

            ---

            **名称**: 测字
            **规则说明**: 一种占卜方法，通过分析汉字的字形、字义来预测吉凶祸福。
            **参与条件**: 随意拈一字。
            **奖惩机制**: 无。
            **重要事件**: 林之孝家的找刘铁嘴测了一个“赏”字，拆解为当铺里能找到、有人会送还等意。
        - name: 玩法 - 抄检大观园
          keys: 抄检, 搜检, 查抄
          content: |-
            **名称**: 抄检大观园
            **规则说明**:
            1. **起因**: 傻大姐在园中山石上拾到春意香袋，王夫人震怒
            2. **时机**: 晚饭后贾母安寝、宝钗等入园后
            3. **执行方式**: 王善保家的提议"猛不防"突击搜检——关闭角门上锁，内外不通风，带人到各处丫头房里逐一搜寻箱柜
            4. **执行人**: 凤姐带队，王善保家的、周瑞家的等陪房参与
            5. **搜检路线**: 上夜婆子屋→怡红院→潇湘馆→探春院→李纨处→惜春房→迎春房
            6. **例外**: 薛宝钗屋里不搜（"岂有抄起亲戚家来"）
            **搜检结果**:
            - 上夜婆子屋：多余蜡烛灯油
            - 怡红院：晴雯箱中无私弊，有几样宝玉旧物
            - 潇湘馆：紫鹃房中有宝玉旧物（寄名符、荷包等）
            - 探春院：探春怒斥抵制，掌掴王善保家的
            - 李纨处：病中，丫鬟房无异物
            - 惜春房：入画箱中搜出金银锞子、玉带板子等
            - 迎春房：司棋箱中搜出男子鞋袜、同心如意、潘又安情书
        - name: 玩法 - 除夕祭宗祠仪式
          keys: 祭宗祠, 祭祖, 祭祀
          content: |-
            **名称**: 除夕祭宗祠仪式
            **规则说明**:
            1. **准备**: 开宗祠、打扫、收拾供器、请神主、悬供遗真影像
            2. **参与者着装**: 有诰封者按品级着朝服
            3. **入场顺序**: 先进宫朝贺行礼领宴，回来后到宁国府
            4. **祭祀分工**:
               - 贾敬主祭
               - 贾赦陪祭
               - 贾珍献爵
               - 贾琏、贾琮献帛
               - 宝玉捧香
               - 贾菖、贾菱展拜毯、守焚池
            5. **传菜规矩**: 从仪门外传至阶上贾敬手中→贾蓉（长房长孙在槛内）→其妻→凤姐尤氏诸人→王夫人→贾母捧放桌上。邢夫人在供桌之西东向立同贾母供放
            6. **排列规矩**: 左昭右穆，男东女西；从文旁贾敬为首，从玉旁贾珍为首，从草头贾蓉为首
            7. **行礼**: 俟贾母拈香下拜，众人方一齐跪下
            8. **仪式流程**: 青衣乐奏→三献爵→拜兴→焚帛奠酒→礼毕乐止→退出
        - name: 玩法 - 传花令
          keys: 传花, 击鼓传花
          content: |-
            **名称**: 传花令
            **规则说明**: 命女先儿击鼓，众人传一枝芍药花，鼓停花在谁手中即行令
            **参与人数**: 约二十来人
            **场景**: 平儿还席时在榆荫堂中进行
        - name: 玩法 - 春喜上眉梢令
          keys: 春喜上眉梢, 击鼓传梅, 传梅
          content: |-
            **名称**: 春喜上眉梢令（击鼓传梅）
            **规则说明**:
            1. 由女先生击黑漆铜钉花腔令鼓
            2. 席上众人传递一枝红梅
            3. 鼓声慢则传梅慢，鼓声疾则传梅疾
            4. 鼓声停时，梅花在谁手中，谁便饮一杯酒
            5. 饮酒后须说一个笑话
            **参与条件**: 在席众人皆参与
            **奖惩机制**: 梅花停在谁手中谁输，须饮酒并说笑话
            **特殊情况**: 小丫头们与女先生串通，以咳嗽为暗号，故意让梅花停在凤姐手中
            **提出者**: 凤姐儿提议，贾母赞同"正对时对景"
        - name: 玩法 - 凑份子做生日
          keys: 凑分子, 凑份子, 攒金庆寿
          content: |-
            **名称**: 凑份子做生日
            **规则说明**:
            - 贾母提议"学小家子"大家凑分子为凤姐过生日
            - 按身份等级出不同数额的银子：
              1. 贾母、薛姨妈：各二十两
              2. 邢夫人、王夫人：各十六两（另各替一位姑娘出一份）
              3. 尤氏、李纨（凤姐代出）：各十二两
              4. 赖大母亲等有体面嬷嬷：与少奶奶同等十二两
              5. 姑娘们：照一个月月例
              6. 大丫鬟们：二两或一两不等
              7. 姨娘们：各二两
            - 共凑得一百五十两有余
            **参与条件**: 贾府上下有头脸的人均参与
            **特殊规则**:
            - 凤姐精明算账，指出贾母替宝玉黛玉出钱吃亏
            - 凤姐主动替李纨出份子
            - 尤氏暗中退还部分下人份子钱（鸳鸯、彩云、周赵姨娘等）
            **用途**: 操办戏酒宴席，请外面戏班、耍百戏、说书等
        - name: 玩法 - 斗草
          keys: 斗草
          content: |-
            **名称**: 斗草
            **规则说明**: 各人采集花草，以花草名对仗比拼，说出对应的花草名，对不上者为输
            **参与者**: 小螺、香菱、芳官、蕊官、藕官、荳官等
            **示例对仗**:
            - 观音柳对罗汉松
            - 君子竹对美人蕉
            - 星星翠对月月红
            - 《牡丹亭》上的牡丹花对《琵琶记》里的枇杷果
            - 姐妹花对夫妻蕙
        - name: 玩法 - 斗牌
          keys: 斗牌, 玩牌
          content: |-
            **名称**: 斗牌
            **规则说明**:
            1. 铺下红毡，洗牌告幺，多人起牌
            2. 牌面有"二饼"等
            3. 牌"十严"即将和牌，等特定牌即可赢
            4. 可递暗号配合
            5. 赢牌有彩头（赌注）
            **参与者**: 贾母、薛姨妈、王夫人、凤姐、鸳鸯五人
            **特殊情节**:
            - 鸳鸯坐贾母下手帮看牌，递暗号给凤姐
            - 凤姐故意将贾母需要的二饼发给薛姨妈，让贾母赢牌
            - 凤姐故意输钱逗贾母开心，化解贾母怒气
        - name: 玩法 - 凤姐协理宁府管理制度
          keys: 协理, 点卯, 分班, 定规
          content: |-
            **名称**: 凤姐协理宁国府管理制度
            **规则说明**:
            ### 一、人员分工
            - 二十人分两班：专管人来客往、倒茶
            - 二十人分两班：专管本家亲戚茶饭
            - 四十人分两班：专管灵前上香添油、挂幔守灵、供饭供茶、随起举哀
            - 四人：内茶房收管杯碟茶器（少一件描赔）
            - 四人：管酒饭器皿（少一件描赔）
            - 八人：监收祭礼
            - 八人：管各处灯油蜡烛纸札（总支后按定数分派）
            - 三十人：轮流各处上夜、照管门户、监察火烛、打扫地方
            - 其余按房屋分开，各守各处，物品丢坏则描赔
            ### 二、时间制度
            - 卯正二刻：点卯
            - 巳正：吃早饭
            - 午初刻：领牌、回事
            - 戌初：烧黄昏纸后亲查各处
            - 查完后上夜的交明钥匙
            ### 三、奖惩机制
            - 来升媳妇每日揽总查看，发现偷懒、赌钱吃酒、打架拌嘴立刻回报
            - 徇情者严惩
            - 迟到者：第一次打二十板、革一月银米；明日四十板，后日六十板，递增
            ### 四、领牌交牌制度
            - 支取东西须持帖子，经凤姐审核数目
            - 彩明登记，前一人交清牌后方发下一人
        - name: 玩法 - 扶乩
          keys: 扶乩
          content: |-
            **名称**: 扶乩
            **规则说明**: 一种占卜方法，通过请神、书符、扶乩等步骤，让仙乩在沙盘上写字，以解答疑问。
            **参与条件**: 需要有道行的人主持。
            **奖惩机制**: 无。
            **重要事件**: 邢岫烟求妙玉扶乩，得到了关于宝玉失玉的仙机偈语。
        - name: 玩法 - 扶鸾请仙
          keys: 扶鸾请仙, 乩坛, 乩仙
          content: |-
            **名称**: 扶鸾请仙
            **规则说明**: 门子为贾雨村献计了结薛蟠案的手段——在堂上设下乩坛，令军民人等来看，假托乩仙批语，称死者冯渊与薛蟠因夙孽相逢，薛蟠已得无名之病被冯魂追索已死，祸因拐子而起，按法处治拐子，余不略及。再令薛家出烧埋银子给冯家
            **参与条件**: 需暗中调停，令薛家族中报暴病身亡，递保呈；暗中嘱托拐子令其实招
            **奖惩机制**: 薛家出钱（一千或五百）与冯家作烧埋之费，冯家得银了事
            **备注**: 雨村虽说"不妥"，但最终仍徇情枉法胡乱判断了此案
        - name: 玩法 - 赶围棋
          keys: 赶围棋, 围棋
          content: |-
            **名称**: 赶围棋
            **规则说明**: 一种以围棋子和骰子配合的博戏，一磊十个钱，掷骰子决定输赢。如掷个七点便赢，掷六点则下家有机会赢
            **参与条件**: 需有钱作赌注
            **相关事件**:
            1. 宝钗、香菱、莺儿三人赶围棋，贾环加入
            2. 贾环输了赖钱，将幺说成六点
            3. 宝玉与人玩时输了不在意，小丫头们一抢他一笑就罢了
        - name: 玩法 - 还泪之说
          keys: 还泪, 灌溉之情, 眼泪还他
          content: |-
            **名称**: 还泪之说
            **规则说明**: 绛珠仙子因受神瑛侍者甘露灌溉之恩，无水可还，遂发愿：神瑛侍者下世为人，她也下世为人，以一生所有的眼泪偿还灌溉之德
            **参与条件**: 神瑛侍者凡心偶炽下凡，在警幻仙子案前挂号
            **连锁效应**: 此事勾出多少风流冤家来陪他们了结此案
            **象征意义**: 为林黛玉一生以泪洗面、泪尽而亡的命运埋下伏笔
        - name: 玩法 - 海棠诗社规则
          keys: 诗社规则, 起社, 开社
          content: |-
            **名称**: 海棠诗社规则
            **规则说明**:
            1. **固定开社日**: 每月初二、十六
            2. **固定地点**: 稻香村（李纨处）
            3. **人员分工**:
             - 社长李纨评阅优劣
             - 菱洲（迎春）出题限韵
             - 藕榭（惜春）誊录监场
            4. **作诗要求**: 四位社员（探春、宝钗、黛玉、宝玉）须限定作诗；社长及副社长遇容易题目可随便作
            5. **加社机制**: 固定日期外，任何人有兴致可自愿加开一社
            6. **东道主制**: 起社者须作东道主
            7. **计时**: 用"梦甜香"计时，香烬未成诗则受罚
            **参与条件**: 大观园中姐妹及宝玉
            **奖惩机制**: 诗作由社长公评优劣排名；迟交者受罚
        - name: 玩法 - 好了歌
          keys: 好了歌, 好了
          content: |-
            **名称**: 《好了歌》
            **规则说明**: 跛足道人所唱之歌，揭示世间万般皆空的道理。"好便是了，了便是好。若不了，便不好；若要好，须是了。"
            **核心内容**:
            1. 功名：古今将相在何方？荒冢一堆草没了
            2. 金银：终朝只恨聚无多，及到多时眼闭了
            3. 姣妻：君生日日说恩情，君死又随人去了
            4. 儿孙：痴心父母古来多，孝顺儿孙谁见了
            **甄士隐解注**: 以具体世态炎凉、兴衰荣辱之事解注，涵盖笏满床到衰草枯杨、金满箱到乞丐人皆谤等对比
            **效果**: 甄士隐闻歌彻悟，随道人出家而去
        - name: 玩法 - 击鼓传花
          keys: 击鼓传花, 传花, 行令
          content: |-
            **名称**: 击鼓传花
            **规则说明**:
            1. 折一枝桂花，命一媳妇在屏后击鼓
            2. 桂花从贾母起依次传递
            3. 鼓声停时花在谁手中，该人饮酒一杯
            4. 罚说笑话一个（若说得不笑还要再罚）
            5. 也可改为作诗（如宝玉辞说笑话改为即景作秋诗）
            **参与条件**: 在座男女皆参与
            **奖惩机制**:
            - 花落手中者罚酒一杯并说笑话或作诗
            - 诗作好者赏赐（如宝玉获海南扇子、贾兰亦获赏）
            - 诗作不好者"明日仔细"
        - name: 玩法 - 贾府年节风俗
          keys: 年事, 过年, 年节
          content: |-
            **名称**: 贾府年节风俗
            **规则说明**:
            1. **治病秘法**: 伤风咳嗽以净饿为主，次则服药调养
            2. **换新**: 腊月二十九换门神、联对、挂牌，新油桃符
            3. **除夕**: 各处佛堂灶王前焚香上供，正房院内设天地纸马香供，大观园挑大明角灯
            4. **元旦**: 五鼓按品大妆进宫朝贺，兼祝元春千秋
            5. **请年酒**: 拟定日期单子，两府不能重犯日子，以免显得"送虚情怕费事"
            6. **分年物**: 族中闲着无进益的子弟可领取年物
            7. **合欢宴**: 男东女西归坐，献屠苏酒、合欢汤、吉祥果、如意糕
            8. **散押岁钱荷包金银锞**
        - name: 玩法 - 菊花诗赛
          keys: 菊花诗, 菊花题, 菊谱
          content: |-
            **名称**: 菊花诗赛
            **规则说明**:
            1. **体裁**: 七言律诗
            2. **不限韵**（宝钗主张："分明有好诗，何苦为韵所缚"）
            3. **题目**: 十二题，以菊花为宾、人为主，两字题（一虚一实）
            4. **十二题次序**: 忆菊→访菊→种菊→对菊→供菊→咏菊→画菊→问菊→簪菊→菊影→菊梦→残菊
            5. **选题自由**: 谁作哪个就作哪个，有力量者十二首都作也可，一首不成也可
            6. **先到先得**: 十二首已全便不许后来者再作
            **拟题者**: 宝钗与湘云共同拟定
            **评判结果**（李纨评）:
            - 第一：《咏菊》（黛玉）
            - 第二：《问菊》（黛玉）
            - 第三：《菊梦》（黛玉）
            - 潇湘妃子夺魁
        - name: 玩法 - 拇战
          keys: 拇战, 划拳
          content: |-
            **名称**: 拇战（划拳）
            **规则说明**:
            1. 两人对划，输者饮酒
            2. 输者须说酒面和酒底
            3. 湘云定的酒面规则：一句古文、一句旧诗、一句骨牌名、一句曲牌名、一句时宪书上的话，共总凑成一句话
            4. 酒底：要关人事的果菜名
            **参与者**: 湘云与宝玉、尤氏与鸳鸯、平儿与袭人各为一对
        - name: 玩法 - 女儿酒令
          keys: 女儿酒令, 酒令, 新令
          content: |-
            **名称**: 女儿酒令
            **规则说明**:
            1. **基本要求**: 说悲、愁、喜、乐四字，每句都要说出"女儿"来，并注明四字原故
            2. **说完后**: 饮门杯
            3. **酒面**: 唱一个新鲜时样曲子
            4. **酒底**: 席上生风一样东西，或古诗、旧对，《四书》《五经》成语
            5. **惩罚**: 不遵者连罚十大海，逐出席外与人斟酒
            **发起者**: 贾宝玉
            **参与者**: 宝玉、冯紫英、云儿、薛蟠、蒋玉菡
            **各人表现**:
            - 宝玉：工整雅致，唱《红豆曲》，酒底"雨打梨花深闭门"
            - 冯紫英：通俗有趣，酒底"鸡声茅店月"
            - 云儿：泼辣直白，唱荤曲，酒底"桃之夭夭"
            - 薛蟠：粗俗不堪，唱"哼哼韵"，被免酒底
            - 蒋玉菡：工整温婉，酒底"花气袭人知昼暖"（无意中点出袭人之名）
        - name: 玩法 - 射覆
          keys: 射覆, 酒令
          content: |-
            **名称**: 射覆
            **规则说明**:
            1. 从古有之，被宝钗称为"酒令的祖宗"，比一切令都难
            2. 用令骰令盆，从宝琴掷起挨下掷去，对了点的二人射覆
            3. 一人覆（出题），一人射（猜答），须用典故
            4. 三次不中者罚一杯
            5. 限于室内之物，不可说到外头
            **示例**:
            - 宝琴覆"老"字→用"吾不如老圃"典，"圃"即门斗上"红香圃"
            - 探春覆"人""窗"二字→宝钗射"埘"字，用"鸡窗""鸡人""鸡栖于埘"典
            - 宝钗覆"宝"字→宝玉射"钗"字，用"敲断玉钗红烛冷"典
            - 李纨覆"瓢"字→岫烟射"绿"字
        - name: 玩法 - 省亲礼仪
          keys: 省亲, 归省, 省亲礼仪
          content: |-
            **名称**: 贵妃省亲礼仪规范
            **规则说明**:
            1. **前期准备**: 正月初八起太监出来先看方向，指定更衣、燕坐、受礼、开宴、退息之处；巡察关防，挡围幕；指示贾宅人员何处退、跪、进膳、启事
            2. **迎接礼仪**: 有爵者按品服大妆；贾赦等在西街门外，贾母等在荣府大门外跪迎
            3. **仪仗次序**: 红衣太监骑马→隐隐细乐→龙旌凤翣→销金提炉→曲柄七凤黄金伞→冠袍带履→值事太监→八太监抬版舆
            4. **正殿受礼**: 两陛乐起，外臣月台下排班，女眷东阶升月台排班，昭容传谕"免"
            5. **家礼**: 退入贾母正室行家礼，贾母等跪止
            6. **男眷觐见**: 贾政隔帘问安，宝玉无谕不得擅入，需元春命引方可进见
            7. **时间限制**: 丑正三刻请驾回銮，皇家规范违错不得
            **参与条件**: 奉朱批准奏方可省亲；外眷无职未敢擅入，需贾妃命请
        - name: 玩法 - 偷梁换柱之计
          keys: 偷梁换柱, 偷梁换柱之计, 妙计, 凤姐的妙计
          content: |-
            **名称**: 偷梁换柱之计
            **策划者**: 王熙凤
            **规则说明**:
            1. 对宝玉谎称娶的是林妹妹，利用其疯傻状态使其信以为真
            2. 安排雪雁（黛玉从南边带来的丫鬟）扶新人，让宝玉看见雪雁更加确信
            3. 严令上下人等不得走漏风声，不在潇湘馆提起婚事
            4. 过礼从园中便门送入，避开潇湘馆
            5. 婚礼在另收拾的新房举行，不在怡红院
            6. 连紫鹃、雪雁等黛玉身边人也不叫知道
            **目的**: 以宝钗代替黛玉嫁给宝玉，既完成"金玉良缘"，又借宝钗的金锁压邪冲喜
            **结果**: 宝玉揭盖头后发现真相，旧病复发更加昏愦；黛玉在同一夜焚稿断痴情，病入膏肓
        - name: 玩法 - 围棋
          keys: 下大棋, 下棋, 打劫
          content: |-
            **名称**: 围棋
            **规则说明**: 贾政与詹光对弈，下采（赌注）。贾政让詹光两子，詹光仍输。做棋时还棋头，输七个子。涉及打劫等围棋术语
            **参与者**: 贾政、詹光
            **赌注**: 詹光输了十来两银子不肯拿出，改罚做东
        - name: 玩法 - 相思局
          keys: 相思局, 毒设相思局, 圈套
          content: "**名称**: 王熙凤毒设相思局\n**规则说明**:\n### 第一局\n1. 凤姐假意殷勤接待贾瑞，言语挑逗引诱\n2. 约贾瑞晚上起更后到西边穿堂等候\n3. 声称已放上夜小厮的假，两边门关上无人\n4. 实际：贾瑞入穿堂后，东门被关锁，往贾母那边的门已倒锁，南北皆大房墙无法攀援\n5. 结果：贾瑞被困冻一夜，次日趁老婆子开门逃出\n\n### 第二局\n1. 凤姐故意抱怨贾瑞失信，再次约他到房后小过道空屋等候\n2. \"点兵派将，设下圈套\"：安排贾蓉在屋内假扮，贾蔷举灯配合\n3. 贾瑞抱住贾蓉误以为凤姐，被当场揭穿\n4. 贾蔷威胁说凤姐已告到太太跟前，勒索贾瑞各写五十两欠契\n5. 安排贾瑞蹲在大台矶底下，从上面泼下一净桶尿粪\n6. 结果：贾瑞满身尿屎，三更跑回家\n\n**参与条件**: 贾瑞对凤姐起淫心，自投罗网\n**奖惩机制**: \n- 贾瑞：两次受辱、被勒索一百两欠契、冻病、最终相思而死\n- 凤姐：成功惩治贾瑞，维护自身名节与权威"
        - name: 玩法 - 消寒会
          keys: 消寒会
          content: |-
            **名称**: 消寒会
            **规则说明**: 贾母每年十一月初一日的老规矩，齐打伙儿坐下，喝酒说笑，是冬日聚会活动
            **参与条件**: 贾母召集，请薛姨妈、史湘云、邢岫烟、李纨姐妹、探春、惜春、黛玉、宝琴等众人参加
            **地点**: 贾母房中，榻前摆桌，围炉闲谈
            **本次情况**: 宝玉提前在学房告假；宝钗、邢岫烟未到；凤姐因身上发热迟到
        - name: 玩法 - 薛蟠案审判流程
          keys: 审判, 翻供, 误伤, 斗殴
          content: |-
            **名称**: 薛蟠人命案审判流程
            **规则说明**:
            1. **初审（尸场）**: 仵作验尸填写伤痕，证人供词，嫌犯口供
            2. **呈纸申诉**: 亲属可代为具呈申诉冤抑
            3. **复审（坐堂）**: 知县挂牌坐堂，传齐邻保证见尸亲，提出嫌犯，逐一问话
            4. **画供定案**: 根据供词与尸格定性（斗殴致死或误伤），画供后监禁候详
            5. **详上司**: 报上级衙门审批定案
            **关键操作**:
            - 买嘱尸亲见证改口
            - 威胁同饮者吴良翻供
            - 书吏改轻尸格伤痕描述（将"砸伤"改为"磕碰伤"）
            - 知县收受贿赂后配合徇情
            **结果**: 由"斗殴致死"改判为"误伤"，薛蟠监禁候详
        - name: 玩法 - 牙牌令
          keys: 牙牌令, 骨牌副儿
          content: |-
            **名称**: 牙牌令
            **规则说明**: 由令官(鸳鸯)报出三张骨牌的图案组合，应答者需按顺序说出三句押韵的话对应每张牌，最后以一句成语或诗句总结牌名。必须叶韵，错者罚酒
            **参与条件**: 席上众人，由贾母起至刘姥姥止
            **奖惩机制**: 说错或叶韵不对者罚酒一杯
        - name: 玩法 - 魇魔法
          keys: 魇魔法, 魇魔, 邪祟, 五鬼
          content: |-
            **名称**: 魇魔法
            **规则说明**:
            1. 准备十个纸铰青脸白发鬼和两个纸人
            2. 将被害者的年庚八字写在纸人身上
            3. 将两个纸人和各五个鬼分别掖在被害者的床上
            4. 施法者（马道婆）在家中作法，远程生效
            **效果**: 被害者中邪不省人事，浑身火炭一般，口内胡言乱语，甚至持刀发狂
            **破解方法**: 癞头和尚与跛足道人持颂通灵玉，将玉悬于卧室上槛，被害者安在一屋，除亲身妻母外不可使阴人冲犯，三十三日后身安病退
            **参与者**: 赵姨娘（主谋）、马道婆（施法者）
            **受害者**: 贾宝玉、王熙凤
        - name: 玩法 - 咏白海棠诗赛
          keys: 咏白海棠, 白海棠诗, 限韵
          content: |-
            **名称**: 咏白海棠诗赛
            **规则说明**:
            1. **体裁**: 七言律诗
            2. **韵部**: 十三元
            3. **限韵字**: 门、盆、魂、痕、昏（由丫鬟随口说字、随手抽韵牌决定）
            4. **计时**: 梦甜香一支
            **参与者**: 探春、宝钗、宝玉、黛玉（后湘云补和两首）
            **评判结果**（李纨评）:
            - 第一：蘅芜君（宝钗）——"含蓄浑厚"
            - 第二：潇湘妃子（黛玉）——"风流别致"
            - 压尾：怡红公子（宝玉）
        - name: 玩法 - 元宵家宴赏戏撒钱
          keys: 赏, 撒钱, 赏文豹
          content: |-
            **名称**: 元宵家宴赏戏撒钱
            **规则说明**:
            1. 预备铜钱：新出局铜钱用大红彩绳串着，摆在炕桌上，打开散堆
            2. 三个媳妇手下预备簸箩
            3. 贾母说"赏"字，媳妇们各撮一簸箩钱
            4. 走至戏台前喊出赏赐名义："老祖宗、姨太太、亲家太太赏文豹买果子吃的！"
            5. 向台上撒钱，满台钱响
            6. 贾珍贾琏另命小厮抬大簸箩钱暗暗预备
        - name: 玩法 - 占花名
          keys: 占花名, 占花名儿, 花名签
          content: |-
            **名称**: 占花名儿
            **规则说明**:
            1. 用竹雕签筒装象牙花名签子，摇匀放在当中
            2. 用骰子决定顺序：掷骰子，按点数从掷者起数，数到谁谁掣签
            3. 每根签上画一种花，题四字评语，附一句旧诗，并注明饮酒规则
            4. 按签上注明的规则饮酒（如自饮、共贺、陪饮等）
            5. 掣签者可命人唱曲、说笑话等助兴
            6. 掣完签后由该人掷骰子决定下一位
            **参与条件**: 闺阁中取戏之令，不需识字亦可参与
            **特点**: 袭人评"斯文些的"，不用大呼小叫，不需识字
        - name: 玩法 - 中秋联诗
          keys: 联诗, 联句, 五言排律
          content: |-
            **名称**: 中秋夜大观园即景联句
            **规则说明**:
            1. **体裁**: 五言排律
            2. **限韵方式**: 数栏杆直棍，从头数至尽头，得第几根便用第几韵。实际数得十三根，故用"十三元"韵
            3. **参与者**: 林黛玉先起句，与史湘云交替联句，最后妙玉续貂收结
            4. **总计**: 三十五韵（黛玉湘云二十二韵，妙玉续十三韵）
            5. **记录方式**: 先口头吟诵，后由妙玉用笔墨抄录
            **参与条件**: 诗才与兴致
            **经典名句**:
            - 湘云："寒塘渡鹤影"（因白鹤飞起而得灵感）
            - 黛玉："冷月葬花魂"（以"魂"对"影"，凄美绝伦）
            **后书题名**: 《右中秋夜大观园即景联句三十五韵》
    events:
        - name: 章节剧情 - 第1章
          keys: 第1章, 甄士隐梦幻识通灵, 贾雨村风尘怀闺秀, 贾夫人仙逝扬州城, 冷子兴演说荣国府
          content: |-
            **章节标题**: 第1章（含甄士隐梦幻识通灵、贾雨村风尘怀闺秀、贾夫人仙逝扬州城、冷子兴演说荣国府）

            **主要事件**:

            ### 一、石头缘起
            1. 女娲补天剩余一块顽石，灵性已通，自怨无材补天
            2. 一僧一道将顽石变为通灵宝玉，携入红尘
            3. 空空道人发现石上故事，抄录传世，几经更名：《石头记》→《情僧录》→《红楼梦》→《风月宝鉴》→《金陵十二钗》

            ### 二、神瑛侍者与绛珠仙子
            1. 神瑛侍者以甘露灌溉绛珠草
            2. 绛珠草修成女体，发愿以眼泪偿还灌溉之恩
            3. 此事勾出多少风流冤家同入红尘

            ### 三、甄士隐的兴衰
            1. 甄士隐梦中见僧道，得见通灵宝玉，至太虚幻境牌坊前惊醒
            2. 癞头僧见英莲预言其"有命无运、累及爹娘"
            3. 甄士隐与贾雨村交往，中秋资助其五十两银赴京
            4. 元宵节英莲被霍启弄丢
            5. 葫芦庙失火，甄家烧为瓦砾
            6. 投奔岳丈封肃，受其刻薄
            7. 遇跛足道人听《好了歌》，彻悟出家

            ### 四、贾雨村的起落
            1. 穷儒寄居葫芦庙，见甄家丫鬟娇杏
            2. 受甄士隐资助赴京，中进士任知府
            3. 因贪酷恃才被参革职
            4. 游历后入林如海府做西宾，教林黛玉
            5. 复任知府，纳娇杏为二房后扶正

            ### 五、贾敏仙逝
            1. 林如海嫡妻贾敏一疾而终
            2. 林黛玉哀痛过伤，触犯旧症

            ### 六、冷子兴演说荣国府
            1. 贾雨村偶遇冷子兴于村肆
            2. 冷子兴详述宁荣两府世系、现状
            3. 介绍贾宝玉衔玉而生之异事及其性格
            4. 介绍元春、迎春、探春、惜春四姐妹
            5. 雨村阐述"正邪两赋"之论
            6. 雨村讲述甄府学生（甄宝玉）与贾宝玉相似之处
            7. 有人来报喜信（悬念）

            **出场角色**: 顽石、癞头僧、跛足道人、空空道人、甄士隐、封氏、英莲、贾雨村、娇杏、封肃、霍启、林如海、林黛玉、贾敏、冷子兴、神瑛侍者、绛珠仙子、警幻仙子

            **关键转折**:
            1. 顽石被变为通灵宝玉——全书核心道具诞生
            2. 英莲元宵失踪——甄家败落的导火索
            3. 葫芦庙大火——甄士隐家破
            4. 甄士隐听《好了歌》出家——第一个"了"的人物
            5. 贾敏病亡——林黛玉进贾府的前因

            **伏笔线索**:
            1. 癞头僧对英莲的预言："有命无运、累及爹娘"及"好防佳节元宵后，便是烟消火灭时"
            2. 还泪之说预示黛玉一生以泪偿情
            3. "假作真时真亦假，无为有处有还无"——全书主旨
            4. 冷子兴"一代不如一代"预示贾府衰败
            5. 宝玉抓周只取脂粉钗环，预示其性格命运
            6. 智通寺对联"身后有余忘缩手，眼前无路想回头"暗示贾府结局
            7. 甄士隐《好了歌注》中诸多预言暗合后文各人命运
        - name: 章节剧情 - 第2章
          keys: 第2章, 金陵城起复贾雨村, 荣国府收养林黛玉, 薄命女偏逢薄命郎, 葫芦僧乱判葫芦案
          content: |-
            **章节标题**: 第2章（含"金陵城起复贾雨村 荣国府收养林黛玉"及"薄命女偏逢薄命郎 葫芦僧乱判葫芦案"）

            **主要事件**:

            ### 一、贾雨村起复
            1. 张如圭报喜，告知都中奏准起复旧员之信
            2. 冷子兴献计，令雨村央烦林如海转托贾政
            3. 林如海修荐书，介绍贾赦袭一等将军、贾政任工部员外郎
            4. 择出月初二日，黛玉入都，雨村同路而往
            5. 贾政竭力协助，雨村谋得复职候缺，补授金陵应天府

            ### 二、林黛玉进荣国府
            1. **弃父入都**: 黛玉不忍弃父，林如海劝说，洒泪拜别，同奶娘王嬷嬷及小丫头雪雁登舟
            2. **初入贾府**: 步步留心、时时在意，先过宁国府，再至荣国府，从西边角门进入
            3. **拜见贾母**: 祖孙相见搂抱大哭，"心肝儿肉"叫着
            4. **认识众亲眷**: 大舅母邢夫人、二舅母王夫人、珠大嫂子李纨
            5. **初见三春**: 迎春（肌肤微丰、温柔沉默）、探春（削肩细腰、文彩精华）、惜春（身量未足、形容尚小）
            6. **初见王熙凤**: 未到先闻笑声，"我来迟了，不曾迎接远客！"彩绣辉煌，恍若神妃仙子。携黛玉之手夸赞，先喜后悲再转喜，八面玲珑
            7. **拜见贾赦**: 邢夫人带往，贾赦托辞身体不好未见面，只传话劝慰
            8. **拜见贾政处**: 贾政斋戒去了未见。黛玉观荣禧堂陈设。王夫人嘱咐不要理睬"混世魔王"宝玉
            9. **初见贾宝玉**:
               - 宝玉正装出场，面若中秋之月，色如春晓之花
               - 换装后再看黛玉，觉"这个妹妹我曾见过的"
               - 为黛玉取字"颦颦"
               - 问黛玉有无玉，闻无玉即摔玉，被贾母哄住
            10. **安置住处**: 黛玉住碧纱橱内，宝玉住碧纱橱外。贾母拨鹦哥给黛玉
            11. **夜间插曲**: 黛玉因宝玉摔玉伤心落泪，袭人安慰

            ### 三、薛蟠案与葫芦僧乱判
            1. **案情**: 拐子将英莲先卖冯渊又偷卖薛家，薛蟠令豪奴打死冯渊夺走英莲
            2. **门子认出雨村**: 原葫芦庙小沙弥，出示"护官符"，揭示四大家族关系
            3. **英莲身世**: 门子认出被卖丫头即甄士隐之女英莲，眉心有胭脂痣
            4. **雨村徇私**: 初有正义之念，终屈从权势，胡乱判断此案
            5. **过河拆桥**: 雨村恐门子说出当日贫贱事，寻不是将其远远充发
            6. **作书报信**: 致书贾政、王子腾，称"令甥之事已完"

            ### 四、薛家进京
            1. 薛蟠学名薛蟠字文龙，混名"呆霸王"，十五岁，幼年丧父
            2. 薛宝钗肌骨莹润、举止娴雅，进京待选才人赞善
            3. 薛姨妈坚持住贾府以拘紧薛蟠
            4. 贾政安排梨香院，贾母亦遣人挽留
            5. 薛蟠与贾府纨绔子弟交往，比当日更坏十倍

            **出场角色**: 贾雨村、张如圭、冷子兴、林如海、林黛玉、贾母、王熙凤、王夫人、邢夫人、贾赦（传话）、贾政（未出场）、迎春、探春、惜春、李纨、贾宝玉、袭人、鹦哥、雪雁、王嬷嬷、门子、冯渊、英莲、薛蟠、薛宝钗、薛姨妈、王子腾、贾琏

            **关键转折**:
            1. 宝黛初见——"这个妹妹我曾见过的"，暗合前世神瑛侍者与绛珠仙子之缘
            2. 宝玉摔玉——因黛玉无玉而痴狂，揭示宝玉叛逆性格与对黛玉的特殊情感
            3. 雨村徇私枉法——从"岂可因私废法"到胡乱判断，人物彻底堕落
            4. 英莲再现——甄士隐之女沦落为薛蟠侍妾，薄命女偏逢薄命郎
            5. 薛家入住贾府——宝钗进入荣府，为日后宝黛钗三角关系埋下伏笔

            **伏笔线索**:
            1. 癞头和尚曾说黛玉不见外姓亲友方可平安——入贾府恰恰违背此言
            2. 宝玉说"这个妹妹我曾见过的"——前世因缘
            3. 黛玉见宝玉亦觉"好生奇怪，倒像在那里见过"——双向前世记忆
            4. 护官符揭示四大家族盘根错节——为后文家族兴衰埋线
            5. 薛蟠入住贾府后更坏十倍——为后文惹祸埋伏
            6. 宝钗待选——为后文金玉良缘埋线
            7. 英莲命运——"薄命女偏逢薄命郎"，前生冤孽
        - name: 章节剧情 - 第3章
          keys: 第3章, 游幻境指迷十二钗, 饮仙醪曲演红楼梦
          content: |-
            **章节标题**: 第3章（对应原书第五回：游幻境指迷十二钗 饮仙醪曲演红楼梦）

            **主要事件**:

            ### 一、宝黛钗三角关系初现
            1. 黛玉在荣府深得贾母怜爱，与宝玉日则同行同坐、夜则同息同止
            2. 薛宝钗到来，品格端方、容貌丰美、行为豁达，大得下人之心
            3. 黛玉心中悒郁不忿，宝钗浑然不觉
            4. 宝玉与黛玉言语不合，黛玉独自垂泪，宝玉自悔俯就，黛玉方回转

            ### 二、宁府赏梅与秦氏安置宝玉
            1. 宁府会芳园梅花盛开，尤氏治酒请贾母等赏花
            2. 宝玉倦怠欲睡，秦可卿主动安置
            3. 宝玉见上房《燃藜图》及"世事洞明皆学问"对联，厌恶拒绝
            4. 秦氏引宝玉至自己房中，房内陈设皆为历代风流典故之物
            5. 宝玉在秦氏房中入睡

            ### 三、梦游太虚幻境
            1. 宝玉梦中随秦氏至一仙境，遇警幻仙姑
            2. 警幻自述身份：居离恨天灌愁海，司风情月债，掌女怨男痴
            3. 引宝玉入太虚幻境，经石牌坊（"假作真时真亦假"）、宫门（"孽海情天"）

            ### 四、翻阅金陵十二钗册籍
            1. 宝玉入薄命司，见十数个大橱按各省封存
            2. 依次翻阅又副册（晴雯、袭人）、副册（香菱）、正册（黛玉宝钗合页起，共十二页）
            3. 每页皆有判画判词暗示人物命运，宝玉皆不解其意

            ### 五、饮仙醪曲演红楼梦
            1. 警幻以群芳髓（仙香）、千红一窟（仙茶）、万艳同杯（仙酒）款待宝玉
            2. 十二舞女演唱《红楼梦》仙曲十二支
            3. 从引子"开辟鸿蒙谁为情种"到收尾"好一似食尽鸟投林，落了片白茫茫大地真干净"
            4. 宝玉觉声韵凄惋但未悟其深意

            ### 六、警幻授意与云雨之事
            1. 警幻阐述"意淫"之论，称宝玉为天下古今第一淫人
            2. 道出受宁荣二公之灵所托，以情欲声色警其痴顽
            3. 将妹妹兼美（字可卿）许配宝玉，秘授云雨之事
            4. 宝玉与兼美柔情缱绻数日

            ### 七、迷津惊梦
            1. 警幻携宝玉至迷津，荆榛遍地、黑水淌洋
            2. 警幻警告"作速回头要紧"
            3. 夜叉般怪物窜出，宝玉惊呼"可卿救我"
            4. 宝玉惊醒，袭人等扶起安慰
            5. 秦可卿在外听闻宝玉叫出自己小名，纳闷不已

            **出场角色**: 贾宝玉、林黛玉、薛宝钗、秦可卿、警幻仙姑、兼美、尤氏、贾母、袭人、媚人、晴雯、麝月、痴梦仙姑、钟情大士、引愁金女、度恨菩提

            **关键转折**:
            1. 宝钗到来打破宝黛二人世界，三角关系初现
            2. 太虚幻境揭示全书女子命运总纲
            3. 《红楼梦》十二支曲预示贾府由盛转衰及诸钗悲剧结局
            4. 迷津之警暗示宝玉未来的迷失与觉悟

            **伏笔线索**:
            1. 正册首页黛玉宝钗合为一页，暗示二人命运纠缠
            2. "千红一窟"谐音"千红一哭"，"万艳同杯"谐音"万艳同悲"
            3. 收尾曲"白茫茫大地真干净"预示贾府最终结局
            4. 秦可卿小名与梦中兼美之字相同，暗示其与太虚幻境的神秘关联
            5. 宝玉厌恶"世事洞明"之联，暗示其一生不入世俗正途
            6. 各判词判曲分别对应十二钗及重要丫鬟的最终命运
        - name: 章节剧情 - 第4章
          keys: 第4章, 第六回, 第七回, 贾宝玉初试云雨情, 刘姥姥一进荣国府, 送宫花周瑞叹英莲, 谈肆业秦钟结宝玉
          content: |-
            **章节标题**: 第4章（含贾宝玉初试云雨情、刘姥姥一进荣国府、送宫花周瑞叹英莲、谈肆业秦钟结宝玉）

            **主要事件**:

            ### 一、宝玉初试云雨
            1. 宝玉从太虚幻境梦中醒来，袭人为其系裤带时发现梦遗
            2. 宝玉将梦中之事细说与袭人，包括警幻所授云雨之情
            3. 宝玉与袭人偷试云雨之事，幸无人撞见
            4. 自此宝玉视袭人更与别个不同

            ### 二、刘姥姥一进荣国府
            1. **起因**: 狗儿家秋尽冬初，家中冬事未办，经济困难
            2. **谋划**: 刘姥姥提议去荣国府攀旧亲，找王夫人求助
            3. **进府过程**:
               - 刘姥姥带板儿进城，至宁荣街荣府大门
               - 先找到周瑞家的引荐
               - 周瑞家的带其见凤姐
            4. **见凤姐**:
               - 刘姥姥误认平儿为凤姐
               - 凤姐接待刘姥姥，先说家中艰难
               - 赠银二十两及一吊串钱
               - 贾蓉中途来借玻璃炕屏，展现凤姐威严
            5. **结果**: 刘姥姥千恩万谢，从后门离去

            ### 三、周瑞家的送宫花
            1. 周瑞家的回王夫人话，至梨香院
            2. 听薛宝钗讲述冷香丸配方（癞头和尚所授海上方）
            3. 薛姨妈托其送十二支宫制堆纱花
            4. **送花路线**:
               - 先送迎春、探春各两枝（二人正下围棋）
               - 送惜春两枝（惜春与智能儿玩耍，笑说要剃头作姑子）
               - 送凤姐四枝（凤姐与贾琏午间私会，平儿转交，另送两枝给秦可卿）
               - 最后送林黛玉两枝（黛玉在宝玉房中解九连环）
            5. 黛玉冷笑："别人不挑剩下的也不给我"
            6. 周瑞家的见香菱，感叹其模样像蓉大奶奶，为其身世叹息
            7. 周瑞家的女儿来求情——女婿冷子兴因卖古董打官司

            ### 四、秦钟结宝玉
            1. 凤姐携宝玉赴宁府，尤氏、秦氏接待
            2. 秦氏引荐弟弟秦钟与宝玉相见
            3. 宝玉见秦钟人品出众，自惭形秽；秦钟亦羡慕宝玉
            4. 二人商议同入贾家家塾读书
            5. 凤姐初见秦钟，喜爱其人品，平儿备表礼相赠

            ### 五、焦大醉骂
            1. 焦大被派送秦钟回家，借酒撒泼
            2. 先骂大总管赖二不公道
            3. 追骂贾蓉，自恃救主之功
            4. 骂出惊人之语："爬灰的爬灰，养小叔子的养小叔子"
            5. 被众小厮捆倒，用土和马粪填嘴
            6. 凤姐建议打发他去远庄
            7. 宝玉好奇问"爬灰"之意，被凤姐严厉喝止

            **出场角色**: 贾宝玉、袭人、秦可卿、刘姥姥、板儿、狗儿、刘氏、周瑞家的、王熙凤、平儿、贾蓉、王夫人、薛宝钗、薛姨妈、香菱、金钏儿、迎春、探春、惜春、智能儿、尤氏、秦钟、焦大、冷子兴（提及）、莺儿

            **关键转折**:
            1. 宝玉与袭人关系质变——从主仆到更亲密的关系
            2. 刘姥姥成功获得接济——打开了与荣府的联系通道
            3. 宝玉与秦钟结交——为入家塾读书埋下伏笔
            4. 焦大醉骂揭露宁府丑事——"爬灰"暗指贾珍与秦可卿的不伦关系

            **伏笔线索**:
            1. 惜春笑说要剃头作姑子——伏日后出家
            2. 香菱模样像蓉大奶奶——暗示身世与命运的关联
            3. 焦大"爬灰的爬灰，养小叔子的养小叔子"——揭示宁府隐秘丑闻
            4. 黛玉对宫花的敏感反应——体现其寄人篱下的心态
            5. 宝玉与秦钟商议入学——引出后续家塾故事
            6. 凤姐说"旧日的空架子"——暗示贾府外强中干的衰败趋势
        - name: 章节剧情 - 第5章
          keys: 第5章, 薛宝钗小恙梨香院, 贾宝玉大醉绛芸轩, 恋风流情友入家塾, 起嫌疑顽童闹学堂
          content: |-
            **章节标题**: 第5章（含薛宝钗小恙梨香院、贾宝玉大醉绛芸轩、恋风流情友入家塾、起嫌疑顽童闹学堂）

            **主要事件**:

            ### 一、宝玉探望宝钗·金玉初会
            1. 宝玉回明贾母秦钟上学之事，凤姐趁势请贾母去宁府看戏
            2. 宝玉绕远路避开父亲，前往梨香院探望养病的宝钗
            3. 途中遇清客詹光、单聘仁奉承，又遇银库总领吴新登等人
            4. 宝钗主动要求赏鉴通灵宝玉，念出"莫失莫忘，仙寿恒昌"
            5. **关键转折**: 莺儿指出宝钗金锁上"不离不弃，芳龄永继"与宝玉的字恰成一对，暗示金玉良缘
            6. 宝玉赏鉴金锁，莺儿透露是癞头和尚所赠
            7. 宝玉闻到宝钗身上凉森森甜丝丝的幽香，系冷香丸药气

            ### 二、黛玉来访·三人聚会
            1. 黛玉到来，说"我来的不巧了"，巧妙暗讽
            2. 黛玉借雪雁送手炉之事奚落宝玉听宝钗的话
            3. 薛姨妈设酒食款待，宝钗劝宝玉不要吃冷酒
            4. 李嬷嬷多次阻拦宝玉饮酒，搬出老爷吓唬
            5. 黛玉反驳李嬷嬷，言辞犀利
            6. 黛玉为宝玉整理斗笠，二人告辞回府

            ### 三、宝玉大醉绛芸轩
            1. 宝玉回到绛芸轩，晴雯接出抱怨写字之事
            2. 宝玉得知李嬷嬷拿走了留给晴雯的豆腐皮包子
            3. 又得知李嬷嬷喝了他的枫露茶
            4. **关键转折**: 宝玉大怒摔茶杯，泼了茜雪一裙子茶，要撵乳母
            5. 袭人假装睡觉后起来劝阻，谎称"倒茶被雪滑倒"
            6. 袭人用"趁势连我们一齐撵了"的话堵住宝玉
            7. 宝玉醉卧，袭人替他摘下通灵玉包好

            ### 四、秦钟拜见·入学准备
            1. 秦钟由贾蓉带领拜见贾母，贾母赠荷包和金魁星
            2. 众人因爱秦氏而喜爱秦钟，临去时都有表礼
            3. 秦业东拼西凑二十四两贽见礼，带秦钟拜见贾代儒
            4. 袭人为宝玉收拾书笔文物，细心嘱咐上学注意事项
            5. 宝玉见贾政被冷嘲热讽，清客们圆场
            6. 李贵被贾政问话，将"呦呦鹿鸣，荷叶浮萍"念错惹笑
            7. 宝玉辞别贾母，特意去辞黛玉，黛玉反问为何不辞宝姐姐

            ### 五、顽童闹学堂
            1. 宝玉秦钟入学，二人亲密无间，宝玉要求以兄弟相称
            2. 学中龙蛇混杂，薛蟠在此结交契弟，哄上手多个小学生
            3. 香怜、玉爱与宝玉秦钟四人暗中留情，八目勾留
            4. 代儒有事回家，留贾瑞暂管
            5. 秦钟与香怜到后院说话被金荣撞见
            6. 金荣要挟敲诈，嚷"贴的好烧饼"
            7. 贾瑞偏袒金荣，抢白香怜
            8. 金荣编造不堪之词，触怒贾蔷
            9. **关键转折**: 贾蔷用计调拨茗烟去闹事后脱身离开
            10. 茗烟揪住金荣破口大骂，引发全面斗殴
            11. 贾菌被飞砚波及，抱书匣子砸向对方，误砸宝玉桌上
            12. 金荣抓毛竹大板，茗烟等四小厮持门闩马鞭蜂拥而上
            13. 李贵等大仆人进来喝住，秦钟头被打破
            14. 宝玉要回太爷告状，李贵劝阻主张就地解决
            15. 茗烟揭露金荣是璜大奶奶侄儿，被李贵喝止
            16. 最终金荣被迫向秦钟作揖磕头赔不是

            **出场角色**: 贾宝玉、薛宝钗、林黛玉、薛姨妈、莺儿、李嬷嬷、晴雯、袭人、茜雪、雪雁、秦钟、秦业、贾蓉、贾政、贾母、王夫人、凤姐、詹光、单聘仁、吴新登、戴良、钱华、李贵、茗烟、贾代儒、贾瑞、贾蔷、金荣、香怜、玉爱、薛蟠、贾菌、贾兰、锄药、扫红、墨雨

            **伏笔线索**:
            1. **金玉良缘**: 通灵宝玉与金锁铭文恰成一对，莺儿点破，暗伏宝钗与宝玉的姻缘之说
            2. **冷香丸**: 宝钗身上的幽香来自药丸，暗示其体质与用药之谜
            3. **秦业身世**: 秦可卿系养生堂抱来，非秦业亲生，暗伏其身世之谜
            4. **贾蔷与贾珍**: 贾蔷被分出宁府，因"口声不大好"，暗示二人关系暧昧
            5. **焦大之言的延续**: 上回焦大骂"爬灰的爬灰"，此回秦业背景中提及秦可卿与贾蓉的关系
            6. **宝玉与黛玉的默契**: 黛玉问"怎么不去辞宝姐姐"，宝玉笑而不答，暗示二人心意相通
            7. **李嬷嬷矛盾**: 宝玉与乳母的矛盾积累，为后续撵人埋下伏笔
        - name: 章节剧情 - 第6章
          keys: 第6章, 金寡妇贪利权受辱, 张太医论病细穷源, 庆寿辰宁府排家宴, 见熙凤贾瑞起淫心
          content: |-
            **章节标题**: 第6章（含金寡妇贪利权受辱、张太医论病细穷源、庆寿辰宁府排家宴、见熙凤贾瑞起淫心）

            **主要事件**:

            ### 一、金荣忍气与金氏碰壁
            1. 金荣回家后越想越气，抱怨秦钟仗着宝玉目中无人
            2. 母亲胡氏（金寡妇）劝说：念书之地来之不易，靠姑妈求凤姐儿才得来，省了家中嚼用，还结识薛大爷得了七八十两银子资助
            3. 金荣忍气吞声，次日仍旧上学
            4. 姑妈金氏（璜大奶奶）来访，听闻此事怒从心起，要去宁府找秦氏理论
            5. 金氏到宁府后，听尤氏详述秦可卿病重之情，"盛气丢在爪洼国"，转怒为喜而归

            ### 二、张友士诊病
            1. 秦可卿经期两月未来，下半天懒待动、眼神发眩
            2. 秦钟不知好歹，将学堂打架之事告诉病中姐姐，秦可卿又恼又气连早饭也没吃
            3. 冯紫英向贾珍推荐幼时先生张友士，贾珍派人持名帖去请
            4. 张友士次日来诊，精准说出全部症状，众人惊叹"如神"
            5. 诊断病因：忧虑伤脾、肝木忒旺、聪明太过思虑太过
            6. 开出"益气养荣补脾和肝汤"，委婉暗示病情严重

            ### 三、贾敬寿辰宁府排家宴
            1. 贾敬好清净拒绝回家受礼，要求刻印《阴骘文》一万张
            2. 贾珍在家操办寿宴，邢夫人、王夫人、凤姐儿、宝玉等来贺
            3. 贾母因吃桃子闹肚子未能到场
            4. 四王八公等世交贵族差人送寿礼
            5. 会芳园中安排小戏班和打十番的
            6. 凤姐儿点戏《还魂》《弹词》

            ### 四、凤姐儿探望秦可卿
            1. 凤姐儿、宝玉到秦可卿房中探望
            2. 秦可卿拉着凤姐儿手诉说衷肠，自言"未必熬的过年去"
            3. 宝玉看到房中《海棠春睡图》和对联，想起梦游太虚幻境，听秦可卿之言"如万箭攒心"流泪
            4. 凤姐儿劝解秦可卿，又低低说了许多衷肠话

            ### 五、贾瑞起淫心
            1. 凤姐儿在会芳园假山石后遇贾瑞，贾瑞言语轻薄调戏
            2. 凤姐儿假意含笑应对，心中暗下杀机
            3. 贾瑞"身上已木了半边"，一面走一面回头看
            4. 凤姐儿暗忖："几时叫他死在我的手里，他才知道我的手段"

            ### 六、冬至前后与后事暗备
            1. 冬至交节时贾母、王夫人、凤姐儿日日差人看秦可卿
            2. 冬至后凤姐儿再去探望，秦可卿已瘦得"脸上身上的肉全瘦干了"
            3. 凤姐儿暗示尤氏准备后事："一应的后事用的东西给她料理料理，冲一冲也好"
            4. 尤氏说已暗暗预备，只是好木头还没得
            5. 凤姐儿回贾母时报喜不报忧

            ### 七、贾瑞纠缠
            1. 贾瑞多次到荣府找凤姐儿，偏都遇凤姐儿去宁府
            2. 派人打听凤姐儿在家与否，要来"请安说话"
            3. 凤姐儿对平儿说出贾瑞之事，称"这畜生合该作死"
            4. 平儿骂"癞蛤蟆想天鹅肉吃"
            5. 凤姐儿称"等他来了，我自有道理"

            **出场角色**: 金荣、胡氏、金氏（璜大奶奶）、贾璜、尤氏、贾珍、贾蓉、秦可卿、张友士、冯紫英、凤姐儿、宝玉、贾母、王夫人、邢夫人、贾瑞、平儿、贾敬、贾琏、贾蔷、秦钟、李贵、茗烟、来升

            **关键转折**:
            1. 金氏本欲兴师问罪却被秦可卿病情吓退——展现宁府内部的权力格局
            2. 张友士精准诊断却委婉暗示凶多吉少——秦可卿之死的伏笔
            3. 凤姐儿暗示准备后事——秦可卿病情已无可挽回
            4. 贾瑞调戏凤姐儿——"凤姐毒设相思局"的前奏

            **伏笔线索**:
            1. 秦可卿自言"未必熬的过年去""治得病治不得命"——预示其将亡
            2. 张友士说"过了春分可望全愈"实为委婉说法，贾蓉"也不往下细问"——暗示春天将是关键
            3. 凤姐儿对贾瑞暗下杀机——伏"毒设相思局"之笔
            4. 贾敬一心修道不问世事——宁府无人管束的根源
            5. 尤氏说"好木头还没得"——为秦可卿丧事用薄棺或义忠亲王老千岁棺木埋伏笔
        - name: 章节剧情 - 第7章
          keys: 第7章, 王熙凤毒设相思局, 贾天祥正照风月鉴, 秦可卿死封龙禁尉, 王熙凤协理宁国府
          content: |-
            **章节标题**: 第7章（含王熙凤毒设相思局、贾天祥正照风月鉴、秦可卿死封龙禁尉、王熙凤协理宁国府）

            **主要事件**:

            ### 一、凤姐毒设相思局
            1. 贾瑞上门拜访凤姐，言语轻薄调戏，凤姐假意殷勤应对
            2. **第一次设局**: 约贾瑞夜入穿堂等候，实则将其关锁其中，腊月寒夜冻了一整夜。贾瑞回家被代儒打了三四十板，罚跪读文章
            3. **第二次设局**: 凤姐"点兵派将"，安排贾蓉贾蔷在空屋设伏。贾瑞抱住贾蓉误以为凤姐，被当场揭穿勒索，各写五十两欠契，又被泼了一身尿粪
            4. 贾瑞此后不敢再去荣府，但相思不断，加之债务、冻恼、手淫等"三五下里夹攻"，不上一年病入膏肓

            ### 二、风月宝鉴与贾瑞之死
            1. 跛足道人赠风月宝鉴，嘱只照背面（骷髅），不可照正面
            2. 贾瑞照背面见骷髅惊恐，转照正面见凤姐招手，入镜云雨，反复三四次
            3. 最后一次被铁锁套住拉走，精尽而亡，身下一大滩精
            4. 代儒欲烧镜，镜内哭诉"你们自己以假为真，何苦来烧我"，跛足道人赶来抢回
            5. 代儒料理丧事，贾赦、贾政、贾珍各赠银二十两

            ### 三、凤姐克扣人参
            1. 代儒为贾瑞求"独参汤"，往荣府寻人参
            2. 凤姐只给渣末泡须凑了几钱，却回王夫人说凑了二两

            ### 四、林黛玉回扬州
            1. 林如海身染重疾，书信来接黛玉回去
            2. 贾母命贾琏送黛玉往扬州，宝玉大不自在

            ### 五、秦可卿之死
            1. 凤姐梦中秦可卿来别，托梦告诫"月满则亏""盛筵必散"，建议置祭祀产业、设家塾以保永全
            2. 临别赠言："三春去后诸芳尽，各自须寻各自门"
            3. 二门云板连叩四下（丧音），秦可卿去世
            4. 宝玉闻讯喷血，连夜赶往宁府痛哭

            ### 六、秦可卿丧礼
            1. 贾珍恣意奢华办丧：停灵四十九日，僧道各设法事
            2. 薛蟠赠樯木棺材（原系义忠亲王老千岁所要），贾政劝阻不听
            3. 丫鬟瑞珠触柱而亡，小丫鬟宝珠甘为义女任摔丧驾灵
            4. 贾珍花一千二百两通过戴权为贾蓉蠲五品龙禁尉，丧礼按五品职例
            5. 四十九日间亲朋官员络绎不绝

            ### 七、凤姐协理宁国府
            1. 尤氏犯病不能理事，贾珍恳求凤姐协理
            2. 宝玉向贾珍推荐凤姐，贾珍苦求王夫人应允
            3. 凤姐素喜揽事，欣然应允，接过宁国府对牌
            4. 凤姐理出宁府五大弊端：人口混杂、事无专执、滥支冒领、苦乐不均、家人豪纵

            **出场角色**: 贾瑞、王熙凤、平儿、贾蓉、贾蔷、代儒、跛足道人、秦可卿、贾珍、尤氏、贾宝玉、薛蟠、戴权、贾敬、贾政、王夫人、邢夫人、贾母、林黛玉、贾琏、林如海、瑞珠、宝珠、袭人

            **关键转折**:
            1. 贾瑞之死——以假为真、沉迷色欲的悲剧结局
            2. 秦可卿托梦——全书最重要的预言之一，暗示贾府衰败
            3. 凤姐接管宁国府——展现其管理才能的开端

            **伏笔线索**:
            1. "三春去后诸芳尽，各自须寻各自门"——预言贾府最终败落，众人各散
            2. "不日又有一件非常喜事""烈火烹油、鲜花着锦"——暗示元春省亲
            3. "盛筵必散"——贾府由盛转衰的总预言
            4. 义忠亲王老千岁"坏了事"——暗示政治风险
            5. 凤姐克扣人参——展现其贪利本性
            6. 宁府五大弊端——为凤姐协理整顿埋下伏笔
            7. 秦可卿之死"合家无不纳罕，都有些疑心"——暗示死因蹊跷
            8. 瑞珠触柱而亡——可能知晓秦可卿隐情
        - name: 章节剧情 - 第8章
          keys: 第8章, 林如海捐馆扬州城, 贾宝玉路谒北静王, 王凤姐弄权铁槛寺, 秦鲸卿得趣馒头庵
          content: |-
            **章节标题**: 第8章（含"林如海捐馆扬州城 贾宝玉路谒北静王"及"王凤姐弄权铁槛寺 秦鲸卿得趣馒头庵"）

            **主要事件**:

            ### 一、凤姐威重令行协理宁府
            1. 宁府都总管来升告诫众人小心应对凤姐
            2. 凤姐命彩明钉造簿册，按花名册逐一查看仆人
            3. 将仆人分班定岗，明确职责，制定严格考勤与赏罚制度
            4. 一人迟到被打二十板、革一月银米，众人从此兢兢业业
            5. 凤姐威重令行，心中十分得意，日夜操劳，合族上下称叹

            ### 二、林如海去世
            1. 昭儿从苏州回来报信：林如海九月初三日巳时去世
            2. 贾琏带林黛玉同送灵柩到苏州，大约年底回来
            3. 凤姐连夜打点大毛衣服交付昭儿带回
            4. 凤姐对宝玉说"你林妹妹可在咱们家住长了"，宝玉蹙眉长叹

            ### 三、秦可卿出殡盛况
            1. 五七正五日佛僧道士尼僧齐聚，十分热闹
            2. 出殡日六十四名青衣请灵，铭旌大书秦氏封号
            3. 八公后裔六家到场，南安郡王之孙、忠靖侯史鼎等众多王孙公子送殡
            4. 堂客十来顶大轿、三四十顶小轿，浩浩荡荡摆三四里远

            ### 四、宝玉路谒北静王
            1. 四王设路祭棚，北静王水溶亲至
            2. 贾珍、贾赦、贾政迎接，以国礼相见
            3. 水溶召见宝玉，赞其"龙驹凤雏"、"雏凤清于老凤声"
            4. 水溶赠宝玉圣上亲赐鹡鸰香念珠，劝贾政不宜过分钟溺
            5. 水溶谦让不越仙輀而进，待殡过完方回

            ### 五、郊外打尖与二丫头
            1. 凤姐让宝玉同坐车中，途中在村庄歇息
            2. 宝玉对农具好奇，感叹"粒粒皆辛苦"
            3. 宝玉拧纺车被二丫头阻止，二丫头纺线给他看
            4. 离去时宝玉留心寻找二丫头，"以目相送，展眼无踪"

            ### 六、铁槛寺安灵
            1. 灵柩安灵于铁槛寺内殿偏室，宝珠执意不回家
            2. 凤姐嫌铁槛寺不便，到水月庵（馒头庵）下处

            ### 七、凤姐弄权铁槛寺
            1. 净虚老尼向凤姐请托张金哥退亲之事
            2. 张家女儿金哥已受长安守备公子聘定，又被长安府太爷小舅子李衙内看上
            3. 凤姐被激将法激起兴头，索要三千两银子答应办事
            4. 凤姐命来旺儿假托贾琏名义修书给长安节度使云光
            5. 云光久欠贾府之情，两日内妥协

            ### 八、秦钟得趣馒头庵
            1. 秦钟与智能情投意合，趁黑夜到后房与智能云雨
            2. 宝玉撞破二人之事，以此要挟秦钟
            3. 秦钟调唆宝玉求凤姐再住一天
            4. 凤姐因三益（完善丧事、办净虚之事、顺宝玉心）同意多住一日
            5. 秦钟与智能百般不忍分离，含泪而别

            **出场角色**: 王熙凤、贾宝玉、秦钟、贾珍、贾政、贾赦、水溶（北静王）、来升、来升媳妇、彩明、昭儿、来旺媳妇、来旺儿、净虚、智能、智善、宝珠、尤氏、王夫人、邢夫人、平儿、丰儿、色空、二丫头、王兴媳妇、张材家的

            **关键转折**:
            1. 林如海去世——黛玉从此成为孤儿，将长住贾府
            2. 凤姐弄权——假托贾琏名义干预官司，为日后埋下祸根
            3. 北静王赏识宝玉——建立重要人脉关系

            **伏笔线索**:
            1. 凤姐"从来不信什么是阴司地狱报应的"——暗示日后报应
            2. 张金哥退亲事件——凤姐弄权敛财的开端
            3. 秦钟与智能的私情——为后续悲剧埋下伏笔
            4. 北静王与宝玉的交往——后文重要关系线
            5. 凤姐忙碌过度——"茶饭也没工夫吃得"，暗示身体隐患
        - name: 章节剧情 - 第9章
          keys: 第9章, 贾元春才选凤藻宫, 秦鲸卿夭逝黄泉路
          content: |-
            **章节标题**: 第9章 贾元春才选凤藻宫 秦鲸卿夭逝黄泉路

            **主要事件**:

            ### 一、凤姐弄权致人命
            1. 凤姐收到云光回信，张家守备忍气吞声退了前聘
            2. 张财主之女金哥闻知退亲，自缢而死
            3. 守备之子闻金哥死，投河殉情，张李两家人财两空
            4. 凤姐坐享三千两银子，王夫人等毫不知情
            5. 自此凤姐胆识愈壮，恣意作为

            ### 二、元春晋封
            1. 贾政生辰当日，六宫都太监夏守忠来传旨，宣贾政入朝临敬殿陛见
            2. 贾府上下惶惶不定，频繁派人打探消息
            3. 赖大等报喜：大小姐晋封凤藻宫尚书，加封贤德妃
            4. 贾母带邢夫人、王夫人、尤氏四乘大轿入朝谢恩
            5. 宁荣两府欣然踊跃，唯宝玉因秦钟病重而怅然若失

            ### 三、秦钟病重与秦业之死
            1. 秦钟体弱受风霜，又与智能偷情失于调养，病势日重
            2. 智能私逃进城看秦钟，被秦业发觉逐出，秦钟被打
            3. 秦业气得老病发作，三五日去世
            4. 秦钟悔痛无及，病情雪上加霜

            ### 四、贾琏黛玉归来
            1. 贾琏护送黛玉从扬州回府，林如海已葬入祖坟
            2. 贾雨村同路进京，由王子腾保本补京缺
            3. 黛玉越发出落超逸，带书籍分送众人
            4. 宝玉转赠北静王鹡鸰香串被黛玉拒绝

            ### 五、凤姐与贾琏叙话
            1. 凤姐以自谦之词向贾琏描述管家经历，实则展示才干
            2. 贾琏见香菱貌美赞叹，被凤姐打趣
            3. 平儿巧妙遮掩凤姐放利钱之事
            4. 赵嬷嬷来求凤姐照顾两个儿子

            ### 六、省亲别院筹建
            1. 皇帝体恤嫔妃思亲，准许省亲，特降谕旨
            2. 周贵人、吴贵妃家已动工或踏看地方
            3. 贾蓉传达选址方案：借东府花园起，三里半大
            4. 贾蔷受派往姑苏聘教习、采买女孩子、置办乐器行头
            5. 从江南甄家支取三万银子作经费
            6. 山子野总体筹画，各行匠役齐集开工
            7. 分工明确：贾珍赖大监工，贾蓉管金银器皿，贾琏总协调

            ### 七、秦钟之死
            1. 宝玉闻秦钟病危，急忙前往探望
            2. 秦钟已发过两三次昏，移床易箦
            3. 秦钟魂魄离身，见鬼判来捉，百般求告
            4. 鬼判闻"宝玉"之名，都判官唬慌，放秦魂回去
            5. 秦钟临终遗言："以前你我见识自为高过世人，我今日才知自误了。以后还该立志功名，以荣耀显达为是。"
            6. 秦钟萧然长逝

            **出场角色**: 贾宝玉、王熙凤、贾琏、林黛玉、贾元春、秦钟、秦业、智能、平儿、赵嬷嬷、夏守忠、贾蓉、贾蔷、贾母、贾政、贾赦、贾珍、香菱、贾雨村、赖大、山子野、张金哥、守备之子、李贵、茗烟

            **关键转折**:
            1. 元春晋封贤德妃——贾府命运转折，由此开始大兴土木，盛极之象
            2. 凤姐弄权致张金哥与守备之子双双殉情——凤姐贪婪本性暴露，伏后文之祸
            3. 秦钟之死——宝玉失去挚友，秦钟临终反转劝宝玉立志功名
            4. 林如海去世、黛玉归来——黛玉彻底成为寄人篱下的孤女

            **伏笔线索**:
            1. 凤姐"胆识愈壮，恣意作为"——暗伏日后更多弄权害命之事
            2. 凤姐暗中放利钱——伏后文败露
            3. 赵嬷嬷言"拿着皇帝家的银子往皇帝身上使"——暗示贾府繁华不过是虚热闹
            4. 省亲别院大兴土木——盛极而衰的开端
            5. 秦钟临终劝"立志功名"与宝玉一贯厌恶仕途形成对照
            6. 鬼判畏惧宝玉之名——暗示宝玉非凡来历
        - name: 章节剧情 - 第10章
          keys: 第10章, 大观园试才题对额, 怡红院迷路探曲折
          content: |-
            **章节标题**: 第10章 大观园试才题对额 怡红院迷路探曲折

            **诗曰**: 豪华虽足羡，离别却难堪。博得虚名在，谁人识苦甘？

            **主要事件**:

            ### 一、秦钟之死与宝玉哀悼
            1. 秦钟临终前魂魄被鬼判捉拿，因提及宝玉（荣国公孙子）之名，都判官惊慌命放回
            2. 秦钟临终遗言劝宝玉"立志功名，以荣耀显达为是"，萧然长逝
            3. 宝玉痛哭不已，贾母帮几十两银子，七日后送殡
            4. 宝玉日日思慕感悼

            ### 二、大观园工程告竣
            1. 贾珍来报园内工程俱已告竣，等贾政验看
            2. 贾政忧虑匾额对联之事：贵妃未亲睹不肯妄拟，无字标题又觉寥落
            3. 众清客建议先虚拟灯匾联悬挂，待贵妃游幸再请定名

            ### 三、贾政率众游园试才
            1. 宝玉因思念秦钟在园中戏耍，撞见贾政
            2. 贾政闻塾掌称赞宝玉能对对联有"歪才情"，命其随行
            3. **园门翠嶂处**: 众人拟"叠翠""锦嶂"等俗名，宝玉题"曲径通幽处"获赞
            4. **沁芳亭**: 众人拟"翼然"，贾政提"泻"字，宝玉驳之拟"沁芳"及对联
            5. **翠竹修舍（有凤来仪）**: 贾政感叹读书，宝玉题"有凤来仪"及对联
            6. **贾琏汇报**: 帐幔帘子陈设采办进度详细汇报
            7. **田庄（稻香村）**: 众人拟"杏花村"，宝玉拟"杏帘在望"再改"稻香村"；宝玉论"天然"之理批评田庄穿凿，被贾政怒斥"叉出去"又"回来"，逼题对联
            8. **蓼汀花溆**: 众人拟"武陵源""秦人旧舍"，宝玉拟"蓼汀花溆"
            9. **异草清厦（蘅芷清芬）**: 宝玉辨识异草引《离骚》《文选》，题"蘅芷清芬"及对联
            10. **正殿玉石牌坊**: 宝玉见此处似曾相识，心有所动却想不起，无法作题被限一日
            11. **怡红院**: 宝玉解释"女儿棠"命名，题"红香绿玉"；众人在室内迷路遇玻璃大镜
            12. 贾政命宝玉回去，怕贾母悬挂

            **出场角色**: 贾政、贾宝玉、贾珍、贾琏、众清客、李贵、秦钟（死亡）、都判官、众鬼判

            **关键转折**:
            1. 秦钟之死——临终劝宝玉立志功名，与宝玉一贯性情形成反差
            2. 贾政借游园考察宝玉才学——父子关系的微妙展现
            3. 宝玉见玉石牌坊"似曾相识"——暗示太虚幻境的记忆，伏笔深远

            **伏笔线索**:
            1. 宝玉见玉石牌坊心有所动，"倒像那里曾见过的一般"——呼应太虚幻境
            2. 各处题名暗合日后住客：翠竹修舍（黛玉）、异草清厦（宝钗）、田庄（李纨）、海棠芭蕉院（宝玉）
            3. 贾政提及"将雨村请来令他再拟"——贾雨村仍与贾府关系密切
            4. 贵妃省亲之事即将到来
            5. 秦钟遗言"立志功名"与宝玉性情相悖，形成反讽
        - name: 章节剧情 - 第11章
          keys: 第11章, 林黛玉误剪香袋囊, 贾元春归省庆元宵
          content: |-
            **章节标题**: 第11章 林黛玉误剪香袋囊 贾元春归省庆元宵

            **主要事件**:

            ### 一、宝玉佩物被解与宝黛争执
            1. 宝玉出院后被贾政的小厮们拦住索赏，将身上荷包、扇囊等佩物尽数解去
            2. 袭人发现宝玉佩物全无，黛玉误以为自己所赠荷包也被送人
            3. 黛玉赌气回房，剪破正在为宝玉做的香袋（才做一半，十分精巧）
            4. 宝玉解开衣领，展示贴身藏于红袄襟上的黛玉所赠荷包，证明珍重之心
            5. 黛玉又愧又气，宝玉百般赔不是，二人最终和好

            ### 二、省亲筹备
            1. 贾蔷从姑苏采买十二个女戏子，聘教习，在梨香院教演
            2. 薛姨妈迁居，腾出梨香院
            3. 林之孝家的回禀妙玉之事：苏州仕宦之家，自小多病入空门，带发修行，十八岁，父母亡故，才貌双全，性格清高
            4. 王夫人命下帖子请妙玉入园
            5. 各处筹备齐全：古董陈设、鸟雀饲养、杂戏排练、尼姑道姑学经
            6. 贾政择日题本，奉朱批准奏次年正月十五省亲

            ### 三、元春归省盛典
            1. 正月初八太监出来勘察方向，十四日一切停妥，十五日五鼓大妆迎接
            2. 等候良久，太监报信：未初用晚膳，未正拜佛，酉初领宴看灯，戌初起身
            3. 元春仪仗浩荡入府，乘金顶绣凤版舆
            4. 入园更衣，登舟游览，默默叹息奢华过费
            5. 改"蓼汀花溆"为"花溆"，改"天仙宝境"为"省亲别墅"

            ### 四、骨肉团聚
            1. 元春至贾母正室行家礼，贾母等跪止
            2. 元春与贾母、王夫人三人呜咽对泣，感叹"那不得见人的去处"
            3. 薛姨妈、宝钗、黛玉被召入相见
            4. 贾政隔帘含泪启奏，元春感叹骨肉分离
            5. 元春召见宝玉，携手拦于怀内，泪如雨下

            ### 五、题匾赋诗
            1. 元春亲搦湘管为各处赐名，题诗一绝
            2. 命众姊妹及宝玉各题一匾一诗
            3. 迎春作"旷性怡情"、探春作"万象争辉"、惜春作"文章造化"、李纨作"文采风流"、宝钗作"凝晖钟瑞"、黛玉作"世外仙源"
            4. 元春评薛林二人之作与众不同
            5. 宝钗提醒宝玉将"绿玉"改为"绿蜡"，引唐代钱珝典故
            6. 黛玉代宝玉作"杏帘在望"，被评为四首之冠
            7. 元春将"浣葛山庄"改为"稻香村"

            ### 六、演戏赐物
            1. 点四出戏：《豪宴》《乞巧》《仙缘》《离魂》
            2. 龄官获赏，拒演《游园》《惊梦》，执意演《相约》《相骂》
            3. 元春赐物，按等级分赐各人
            4. 题佛寺匾"苦海慈航"

            ### 七、依依惜别
            1. 丑正三刻请驾回銮
            2. 元春满眼滚泪，拉住贾母王夫人不忍释放
            3. 叮咛不须挂念，嘱咐不可再奢华靡费
            4. 忍心上舆离去

            **出场角色**: 贾宝玉、林黛玉、薛宝钗、贾元春、贾母、王夫人、贾政、邢夫人、王熙凤、李纨、迎春、探春、惜春、袭人、贾蔷、龄官、贾兰、妙玉（被提及）、林之孝家的、薛姨妈、尤氏、贾赦、贾珍、抱琴

            **关键转折**:
            1. 宝玉贴身珍藏荷包揭示其对黛玉的真心珍重
            2. 妙玉身世揭露及入园，为后续情节埋下伏笔
            3. 元春归省的盛大与悲凉形成强烈对比——"虽富贵已极，骨肉各方，然终无意趣"
            4. 黛玉代作之诗被评为冠首，暗示其才华远超众人
            5. 宝钗提醒宝玉改字，展现其细心与博学

            **伏笔线索**:
            1. 元春叹息奢华过费，嘱咐不可再如此靡费——暗示贾府由盛转衰
            2. 妙玉师父遗言"在此静居，后来自然有你的结果"——暗示妙玉未来命运
            3. 龄官执意不演本角之外的戏——暗示其个性及后续与贾蔷的情感线
            4. 四出戏《豪宴》《乞巧》《仙缘》《离魂》——暗喻贾府命运及元春结局
            5. 元春题"苦海慈航"——暗含佛家意味，暗示苦难
            6. 元春说"那不得见人的去处"——暗示宫中生活的压抑与不自由
