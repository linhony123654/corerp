            - 两边游廊相接，院中山石点衬
            - 一边数本芭蕉，一边一棵西府海棠（女儿棠），势若伞，丝垂翠缕，葩吐丹砂
            - 室内四面雕空玲珑木板，"流云百蝠""岁寒三友"等花样，五彩销金嵌宝
            - 各式槅子：天圆地方、葵花蕉叶、连环半璧
            - 满壁随古董形抠成槽子，琴剑悬瓶与壁相平
            - 内部迷宫般设计，纱橱锦槅层层，玻璃大镜造成幻觉
            - 后院满架蔷薇宝相，青溪前阻
            **重要事件**:
            1. 贾政称"女儿棠"为外国之种
            2. 宝玉解释"女儿"命名由来
            3. 众人提"蕉鹤""崇光泛彩"，宝玉题"红香绿玉"兼蕉棠红绿
            4. 贾政等人在室内迷路，遇玻璃大镜
            5. 贾珍引路从后院出去

