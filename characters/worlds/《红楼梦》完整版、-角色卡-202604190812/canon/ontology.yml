          keys: 第31章, 憨湘云醉眠芍药裀, 呆香菱情解石榴裙, 第六十二回
          content: |-
            **章节标题**: 第31章 憨湘云醉眠芍药裀 呆香菱情解石榴裙

            **主要事件**:

            ### 一、平儿善后与秦显家的落空
            1. 平儿吩咐大事化小，恢复柳家的母女原职，退回秦显家的
            2. 秦显家的刚接手厨房便送礼打点、查亏空，忽被通知撤出，白丢了送人之物还要赔补亏空
            3. 司棋等人空欢喜一场

            ### 二、贾环猜忌彩云
            1. 宝玉替彩云担下偷窃之事，赵姨娘放心
            2. 贾环却起疑心，怀疑彩云与宝玉有私情
            3. 将彩云私赠之物摔在她脸上，威胁告发
            4. 彩云赌气将东西全扔进河里，夜间暗哭

            ### 三、宝玉生日宴
            1. 宝玉与宝琴同日生日，因王夫人不在家，不如往年热闘
            2. 各方送礼：张道士、僧尼庙、王子腾、薛姨妈、凤姐等
            3. 宝玉清晨行礼拜祖，遍访各房
            4. 湘云说出平儿、岫烟也是同日生日
            5. 探春提议凑份子为平儿庆生，在红香圃设宴

            ### 四、宴席行令
            1. 黛玉提议拈阄决定酒令，拈出"射覆"与"拇战"
            2. 射覆精彩对弈：宝琴覆"老"、探春覆"人窗"、宝钗覆"宝"等
            3. 湘云划拳输后说出精彩酒令，"这鸭头不是那丫头"引众人大笑
            4. 黛玉替宝玉说酒令"落霞与孤骛齐飞"一串
            5. 香菱引唐诗反驳湘云，证明"宝玉""宝钗"皆有出处
            6. 黛玉失言牵连彩云，自悔不及

            ### 五、湘云醉眠芍药裀
            1. 湘云多饮几杯后不见踪影
            2. 众人寻找，发现她卧于山石僻处石凳上
            3. 四面芍药花飞满身，用鲛帕包芍药花瓣作枕，蜂蝶围绕
            4. 口中犹作睡语说酒令
            5. 醒后用醒酒石、酸汤解酒

            ### 六、宝玉与芳官吃饭
            1. 芳官嫌闷独自回房睡觉，宝玉拉她起来
            2. 柳家的送来精致饭菜，芳官只吃汤泡饭
            3. 宝玉也吃了卷酥和泡饭，觉得比往常更香
            4. 嘱咐小燕照看芳官，提及让五儿进来

            ### 七、香菱情解石榴裙
            1. 丫鬟们斗草，香菱提"夫妻蕙"被荳官取笑
            2. 二人打闹，香菱新做的石榴红绫裙被弄脏
            3. 宝玉心疼裙子，提出让袭人送同样的裙子给她换
            4. 袭人亲自送裙，香菱换上
            5. 宝玉将夫妻蕙与并蒂菱用落花掩埋
            6. 香菱叮嘱宝玉不要告诉薛蟠

            **出场角色**: 平儿、探春、宝玉、黛玉、宝钗、湘云、香菱、贾环、彩云、赵姨娘、芳官、袭人、晴雯、麝月、宝琴、岫烟、薛蝌、薛姨妈、尤氏、李纨、鸳鸯、荳官、小燕、柳家的、秦显家的、林之孝家的、司棋等

            **关键转折**:
            1. 贾环的猜忌导致彩云心碎，将东西扔进河中——暗示贾环与彩云关系的破裂
            2. 宝钗告知宝玉园中还有更大的亏空事件，已提前布局
            3. 黛玉与宝玉私语论及贾府入不敷出，宝玉却说"短不了咱们两个人的"，黛玉转身离去

            **伏笔线索**:
            1. 宝钗提及比玫瑰露、茯苓霜更大的事件，"若叨登出来，不知里头连累多少人"——暗示贾府更大的危机
            2. 黛玉论贾府"出的多，进的少，必致后手不接"——预示贾府衰败
            3. 宝玉心中暗叹香菱"没父母，连自己本姓都忘了，被人拐出来，偏又卖与了这个霸王"——香菱命运的悲剧底色
            4. 香菱叮嘱不要告诉薛蟠——暗示薛蟠的暴虐
            5. 宝玉掩埋夫妻蕙与并蒂菱——象征美好事物终将消逝
        - name: 章节剧情 - 第32章
          keys: 第32章, 寿怡红群芳开夜宴, 死金丹独艳理亲丧
          content: |-
            **章节标题**: 第32章 寿怡红群芳开夜宴 死金丹独艳理亲丧

            **主要事件**:

            ### 一、怡红院夜宴筹备
            1. 袭人等八个丫鬟凑银子为宝玉过生日，共筹三两二钱银子，交柳嫂子预备四十碟果子
            2. 袭人与平儿商量借了一坛好绍兴酒
            3. 宝玉向小燕询问柳五儿之事，得知五儿受委屈气病回家

            ### 二、林之孝家的查夜
            1. 林之孝家的带人查上夜，宝玉迎出应对
            2. 林之孝家的劝宝玉早睡、喝普洱茶消食
            3. 提醒宝玉不要直呼丫鬟名字，应尊重长辈之人
            4. 晴雯等评价其"唠三叨四"，麝月则认为她是好意提醒

            ### 三、群芳开夜宴
            1. 众人卸妆宽衣，在炕上摆花梨圆炕桌
            2. 小燕、四儿分头请来宝钗、黛玉、湘云、探春、李纨、宝琴、香菱等人
            3. 行"占花名"酒令，各人抽签暗合命运：
               - **宝钗**：牡丹 - "任是无情也动人"
               - **探春**：杏花 - "日边红杏倚云栽"（必得贵婿）
               - **李纨**：老梅 - "竹篱茅舍自甘心"
               - **湘云**：海棠 - "只恐夜深花睡去"
               - **麝月**：荼蘼 - "开到荼蘼花事了"（宝玉愁眉藏签）
               - **香菱**：并蒂花 - "连理枝头花正开"
               - **黛玉**：芙蓉 - "莫怨东风当自嗟"
               - **袭人**：桃花 - "桃红又是一年春"
            4. 芳官唱《赏花时》曲子
            5. 二更后客人散去，丫鬟们继续行令至四更

            ### 四、妙玉拜帖与岫烟指点
            1. 次日宝玉发现妙玉送来的粉笺拜帖："槛外人妙玉恭肃遥叩芳辰"
            2. 宝玉不知如何回帖，欲去问黛玉
            3. 途中偶遇岫烟，得知岫烟与妙玉有十年邻居之谊、半师之分
            4. 岫烟解说"槛外人"典故：源自"纵有千年铁门槛，终须一个土馒头"
            5. 指点宝玉以"槛内人"回帖，宝玉如醍醐灌顶
            6. 宝玉写"槛内人宝玉熏沐谨拜"，亲送至栊翠庵门缝投入

            ### 五、芳官改男装取番名
            1. 宝玉命芳官改男装，剃去周围短发，改名"雄奴"
            2. 又取番名"耶律雄奴"，后改"温都里纳"（金星玻璃），众人简称"玻璃"
            3. 湘云将葵官扮成小子改名"韦大英"，宝琴将豆官改名"豆童"

            ### 六、平儿还席与贾敬暴亡
            1. 平儿在榆荫堂还席，击鼓传花行令
            2. 尤氏带佩凤、偕鸾来游玩
            3. 东府人慌报贾敬"宾天"——服丹砂烧胀而殁
            4. 尤氏独自主持丧事：锁拿道士、挪灵至铁槛寺、接继母看家
            5. 天子追赐贾敬五品之职，准子孙扶柩入都殡殓

            ### 七、贾珍父子奔丧与贾蓉轻薄
            1. 贾珍父子星夜驰回，至铁槛寺放声大哭
            2. 贾蓉先回家料理停灵，却与尤二姐、尤三姐调笑打闹
            3. 贾蓉信口开河，说出贾琏与小姨娘、贾瑞想凤姐等丑事
            4. 戏弄尤老安人，说贾珍要给两位姨娘寻婆家

            **出场角色**: 宝玉、袭人、晴雯、麝月、芳官、小燕、四儿、秋纹、碧痕、宝钗、黛玉、湘云、探春、李纨、宝琴、香菱、平儿、林之孝家的、妙玉、岫烟、葵官、豆官、佩凤、偕鸾、尤氏、贾敬、贾珍、贾蓉、尤老安人、尤二姐、尤三姐

            **关键转折**:
            1. 花名签暗示各人命运走向（尤其麝月荼蘼签令宝玉愁眉）
            2. 贾敬服丹砂暴亡，宁府大丧
            3. 尤二姐、尤三姐正式出场，贾蓉与之调笑，为后文尤氏姐妹悲剧埋下伏笔

            **伏笔线索**:
            1. 宝钗牡丹签"任是无情也动人"——暗示其性格与命运
            2. 探春杏花签"必得贵婿"——暗示远嫁
            3. 黛玉芙蓉签"莫怨东风当自嗟"——暗示悲剧结局
            4. 麝月荼蘼签"开到荼蘼花事了"——暗示繁华将尽
            5. 袭人桃花签"桃红又是一年春"——暗示离开贾府另嫁
            6. 贾蓉与尤二姐的暧昧互动——为后文贾珍、贾琏与尤氏姐妹的纠葛埋伏笔
            7. 柳五儿气病——后续入怡红院之事悬而未决
        - name: 章节剧情 - 第33章
          keys: 第33章, 幽淑女悲题五美吟, 浪荡子情遗九龙佩, 第六十四回
          content: |-
            **章节标题**: 第33章 幽淑女悲题五美吟 浪荡子情遗九龙佩

            **主要事件**:

            ### 一、贾敬灵柩进城与丧事料理
            1. 贾蓉回明贾珍，择初四日卯时请灵柩进城，丧仪焜耀，宾客如云
            2. 贾珍贾蓉表面居丧，人散后仍寻小姨子们厮混
            3. 凤姐身体未愈，偶尔扎挣过来帮尤氏料理

            ### 二、怡红院丫鬟嬉闹
            1. 宝玉回怡红院，见晴雯追赶芳官（因抓子儿赢瓜子输了不肯挨打）
            2. 袭人独自在里间赶制新扇套结子，细心体贴
            3. 宝玉吩咐往林姑娘处找他

            ### 三、黛玉悲题五美吟
            1. 雪雁向宝玉透露黛玉异常举动：写诗、搬琴桌、摆龙文鼒、传瓜果
            2. 宝玉推测黛玉在私室奠祭父母，斟酌如何探望不致其过悲
            3. 宝玉先至凤姐处稍坐，凤姐抱怨家中大娘们不安分
            4. 宝玉至潇湘馆，见黛玉病体恹恹，二人相对而泣
            5. 宝玉发现黛玉所作《五美吟》（咏西施、虞姬、明妃、绿珠、红拂）
            6. 宝钗来访，三人共赏诗作，宝钗赞其"命意新奇，别开生面"

            ### 四、贾母归来与贾敬送殡
            1. 贾琏先行回府报信，次日贾母王夫人等到家
            2. 贾母至宁府灵前痛哭，当夜感风寒病倒
            3. 幸发散得快，数日后渐愈
            4. 贾敬送殡，贾珍尤氏贾蓉留寺守灵，家中托尤老娘及二姐三姐照管

            ### 五、贾琏勾搭尤二姐
            1. 贾琏素闻尤氏姐妹之名，与二姐三姐相识后动垂涎之意
            2. 借料理家务之名频至宁府，与二姐眉目传情
            3. 以取银子为由进宁府，向二姐讨槟榔，暗赠汉玉九龙佩
            4. 二姐装作不理，最终悄悄收下

            ### 六、贾蓉献计偷娶
            1. 贾蓉主动为贾琏作媒，建议在外置房偷娶二姐为二房
            2. 贾蓉实则另有私心：想趁贾琏不在时与二姐鬼混
            3. 贾琏"欲令智昏"，不顾身上有服、停妻再娶、严父妒妻等不妥

            ### 七、退婚置房筹备迎娶
            1. 贾蓉向尤老娘说得天花乱坠，谎称凤姐将死，骗其同意
            2. 尤二姐"水性"，本与姐夫不妥，又怨错许张华，点头依允
            3. 尤氏知事不妥极力劝止，无奈贾珍主意已定
            4. 逼张华写退婚书，给银十数两
            5. 于小花枝巷买房二十余间，安排鲍二夫妇服侍
            6. 择初三黄道吉日迎娶

            **出场角色**: 贾琏、尤二姐、尤三姐、贾蓉、贾珍、尤老娘、尤氏、贾宝玉、林黛玉、薛宝钗、王熙凤、晴雯、袭人、芳官、紫鹃、雪雁、贾母、俞禄、张华、鲍二、探春、四儿、麝月、秋纹、碧痕、紫绡

            **关键转折**:
            1. 贾琏赠九龙佩，尤二姐悄然收下——偷情关系正式建立
            2. 贾蓉献计偷娶——揭示其表面帮忙实则为己谋私的阴暗心理
            3. 尤氏劝止无效——预示此事必将酿成大祸

            **伏笔线索**:
            1. 贾蓉谎称凤姐"已是不能好的了"，暗示日后凤姐发现必有大闹
            2. 张华被迫退婚心中不愿，为日后反告埋下伏笔
            3. 结尾诗"只为同枝贪色欲，致教连理起戈矛"预示家庭悲剧
            4. 黛玉《五美吟》所咏皆薄命才女，暗喻自身命运
            5. 尤二姐"水性"及与贾珍旧事，为日后被凤姐拿捏埋下伏笔
        - name: 章节剧情 - 第34章
          keys: 第34章, 贾二舍偷娶尤二姨, 尤三姐思嫁柳二郎, 情小妹耻情归地府, 冷二郎一冷入空门
          content: |-
            **章节标题**: 第34章（含"贾二舍偷娶尤二姨 尤三姐思嫁柳二郎"与"情小妹耻情归地府 冷二郎一冷入空门"）

            **主要事件**:

            ### 一、贾琏偷娶尤二姐
            1. 初二日尤老与三姐先入新房，初三吉日以素轿迎娶尤二姐
            2. 贾琏与二姐颠鸾倒凤，命人以"奶奶"称之，将凤姐一笔勾倒
            3. 贾琏将积年梯己交与二姐，枕边尽诉凤姐为人，只等凤姐一死便接她进府
            4. 月出五两银子供给，十来个人过起日子来

            ### 二、贾珍私会与尤三姐反制
            1. 贾珍趁贾琏不在，夜访新房与尤三姐私会
            2. 贾琏撞见后主动打破尴尬，表示不介意
            3. 尤三姐大放手眼，高谈阔论，反将珍琏二人制住——"竟真是她嫖了男人，并非男人淫了她"
            4. 此后三姐泼声厉言痛骂珍琏蓉三人，挑拣穿吃，百般作践

            ### 三、兴儿细说荣府
            1. 兴儿向尤二姐母女详述荣府家事
            2. 痛评凤姐："嘴甜心苦，两面三刀，明是一盆火，暗是一把刀"
            3. 赞平儿为人好，背着奶奶常作好事
            4. 评说府中姑娘：迎春"二木头"、探春"玫瑰花"、李纨"大菩萨"
            5. 形容黛玉"多病西施"、宝钗"雪堆出来的"，透露宝黛婚事

            ### 四、尤三姐自择柳湘莲
            1. 二姐劝三姐择婿，三姐主动提出要嫁五年前看上的柳湘莲
            2. 击断玉簪为誓，从此改过守分，吃斋念佛等候

            ### 五、路遇定亲
            1. 贾琏赴平安州途中遇薛蟠与柳湘莲同行
            2. 湘莲曾救薛蟠于强盗，二人结拜为生死弟兄
            3. 贾琏为三姐说媒，湘莲以鸳鸯剑为定礼

            ### 六、湘莲退亲与三姐殉情
            1. 湘莲回京后向宝玉打听，宝玉无意中说"混了一个月"
            2. 湘莲因东府名声疑心三姐品行，前往退亲索剑
            3. 尤三姐听闻反悔，以鸳鸯剑雌锋自刎殉情
            4. 湘莲大悔，扶尸大哭

            ### 七、湘莲出家
            1. 湘莲离去后恍惚间梦见三姐魂魄告别，言奉警幻之命往太虚幻境修注情鬼
            2. 醒来身在破庙，遇跏腿道士
            3. 以雄剑削去烦恼丝，随道士飘然而去

            **出场角色**: 贾琏、尤二姐、尤三姐、尤老娘、贾珍、贾蓉、柳湘莲、薛蟠、贾宝玉、兴儿、隆儿、鲍二、鲍二家的、喜儿、寿儿、跏腿道士

            **关键转折**:
            1. 尤三姐从放浪形骸到改过守分的巨大转变
            2. 宝玉无心之言"混了一个月"导致湘莲疑心退亲
            3. 三姐自刎——全书最惨烈的殉情场面
            4. 湘莲由此看破红尘出家

            **伏笔线索**:
            1. 兴儿详述凤姐为人，为日后凤姐发现二姐、大闹宁府埋下伏笔
            2. 兴儿透露宝黛婚事"准是林姑娘定了的"，暗示未来走向
            3. 贾琏枕边尽诉凤姐为人，二姐已知凤姐厉害，为日后悲剧铺垫
            4. 三姐死后奉命修注"情鬼"案册，呼应太虚幻境薄命司
        - name: 章节剧情 - 第35章
          keys: 第35章, 嫌隙人有心生嫌隙, 鸳鸯女无意遇鸳鸯, 第七十一回
          content: |-
            **章节标题**: 第35章 嫌隙人有心生嫌隙 鸳鸯女无意遇鸳鸯

            **主要事件**:

            ### 一、贾母八旬寿宴盛况
            1. 贾政回京赐假一月，与家人共叙天伦
            2. 贾母八旬大寿，七月二十八日至八月初五日连开筵宴
            3. 宁府请官客，荣府请堂客，大观园作退居
            4. 礼部奉旨钦赐寿礼，元春亦送出丰厚贺礼，各家送礼络绎不绝
            5. 二十八日南安太妃、北静王妃等贵客到场，贾母按品大妆迎接

            ### 二、南安太妃见众姊妹
            1. 南安太妃问宝玉，贾母说去跪经了
            2. 太妃要见众小姐，贾母命凤姐带黛玉、宝钗、探春、湘云、宝琴前来
            3. 太妃与湘云最熟，逐一夸赞众姊妹，赠送礼物
            4. 太妃以身体不适先行告辞，北静王妃随后也辞去

            ### 三、婆子顶撞引发连锁事件
            1. 尤氏晚间饿了去园中，发现园门大开无人看守
            2. 小丫头传话时被两个喝酒的婆子顶撞，说"各家门另家户"
            3. 尤氏冷笑但被众人劝住，暂且忍下
            4. 周瑞家的借机献勤，将事情告诉凤姐
            5. 凤姐命捆了两个婆子送马圈看守

            ### 四、邢夫人借题发挥羞辱凤姐
            1. 费婆子（邢夫人陪房）因亲家被捆，求邢夫人出面
            2. 邢夫人积怨已久——求鸳鸯被拒、贾母冷淡、凤姐体面胜己、迎春被忽视
            3. 身边小人挑拨，说凤姐调唆二太太、不把大太太放在心上
            4. 邢夫人次日当着众人以"求情"为名羞辱凤姐
            5. 王夫人命放了婆子，凤姐又羞又气又愧，赌气回房哭泣

            ### 五、贾母明察与众人闲谈
            1. 鸳鸯向贾母回报凤姐被羞辱之事
            2. 贾母一针见血指出邢夫人"素日没好气，拿着这个作法子"
            3. 贾母留下喜鸾、四姐儿，嘱咐下人善待
            4. 鸳鸯去园中传话，众人在晓翠堂闲谈
            5. 鸳鸯感叹凤姐不易，"治一经损一经"
            6. 探春感叹大家族烦难不如小户人家快乐
            7. 宝玉说出"和姊妹们过一日是一日，死了就完了"的痴语

            ### 六、鸳鸯撞破司棋幽会
            1. 鸳鸯夜间独自回园，在湖山石后大桂树阴下小解
            2. 撞见迎春房里的司棋与其姑舅兄弟（小厮）幽会
            3. 司棋跪求鸳鸯保密，鸳鸯答应不告诉任何人
            4. 角门上有人要锁门，鸳鸯脱身而去

            **出场角色**: 贾母、贾政、贾赦、贾珍、贾琏、邢夫人、王夫人、王熙凤、尤氏、鸳鸯、宝玉、黛玉、宝钗、宝琴、探春、湘云、迎春、惜春、李纨、平儿、袭人、琥珀、周瑞家的、林之孝家的、赵姨娘、费婆子、司棋、喜鸾、四姐儿、南安太妃、北静王妃、佩凤

            **关键转折**:
            1. 邢夫人当众羞辱凤姐，标志着邢夫人与凤姐矛盾公开化
            2. 贾母看穿邢夫人用意，但宝琴等人进来打断未再深说
            3. 司棋幽会被鸳鸯撞见，埋下后续隐患

            **伏笔线索**:
            1. 鸳鸯感叹"新出来的奴字号奶奶们"挑三窝四，暗示贾府内部管理日益混乱
            2. 探春感叹大家族烦难，呼应贾府衰败之势
            3. 宝玉"死了就完了"的痴语，暗含对未来离散的预感
            4. 司棋幽会事件为后续被逐埋下伏笔
            5. 邢夫人与凤姐嫌隙加深，为后续凤姐失势埋下伏笔
            6. 江南甄家送重礼，暗示两家关系密切（甄家后被抄家）
        - name: 章节剧情 - 第36章
          keys: 第36章, 惑奸谗抄检大观园, 矢孤介杜绝宁国府
          content: |-
            **章节标题**: 第36章 惑奸谗抄检大观园 矢孤介杜绝宁国府

            **主要事件**:

            ### 一、凤姐心态转变与贾琏借当风波
            1. 柳家媳妇被告与妹子合伙开赌，凤姐表示"看破了"不再操心
            2. 贾琏与鸳鸯借当之事被王夫人得知，王夫人索要二百银子做中秋节用
            3. 凤姐拿金项圈典押二百银子应急
            4. 凤姐担忧消息走漏会连累鸳鸯

            ### 二、春意香袋引发风暴
            1. 王夫人气色大变来找凤姐，掷出傻大姐拾到的十锦春意香袋
            2. 王夫人怀疑是凤姐贾琏之物，凤姐跪下以五条理由辩白
            3. 王夫人被说服，商议对策

            ### 三、王善保家的进谗·晴雯受辱
            1. 王善保家的趁机进谗，首告晴雯"妖妖娇娇，大不成个体统"
            2. 王夫人想起曾见一个"水蛇腰削肩膀"的丫头骂人，确认是晴雯
            3. 召见晴雯，见其病后慵懒之美反更怒，斥为"病西施""妖精"
            4. 晴雯机智应对称只是看屋子上夜，但仍被下令隔离
            5. 晴雯含泪离去

            ### 四、抄检大观园
            1. 王善保家的提议晚间突击搜检，王夫人批准
            2. **怡红院**: 晴雯愤怒倒箱示清白
            3. **潇湘馆**: 紫鹃房中有宝玉旧物，凤姐说不算什么
            4. **探春院**: 探春怒斥抄检如"自杀自灭"，掌掴王善保家的
            5. **惜春房**: 入画箱中搜出金银锞子等，系贾珍赏赐其兄之物
            6. **迎春房**: 司棋箱中搜出潘又安情书及定情信物，王善保家的自取其辱

            ### 五、凤姐病重
            抄检当夜凤姐淋血不止，次日身体十分软弱，太医诊为忧劳所伤

            ### 六、惜春与尤氏决裂
            1. 惜春坚决要撵走入画，任何人劝说不听
            2. 惜春声明要与宁国府划清界限，不再往来
            3. 暗指宁国府有"不堪的闲话"，尤氏羞恼
            4. 引用"不作狠心人，难得自了汉"，表明孤介决绝之心
            5. 尤氏赌气离去

            **出场角色**: 王熙凤、平儿、贾琏、王夫人、王善保家的、晴雯、探春、惜春、尤氏、司棋、入画、紫鹃、袭人、宝玉、周瑞家的、待书、王住儿媳妇等

            **关键转折**:
            1. 春意香袋的出现成为抄检大观园的导火索
            2. 王善保家的进谗导致晴雯命运急转直下
            3. 探春掌掴王善保家的，发出"百足之虫死而不僵"的衰败预言
            4. 司棋私情败露，王善保家的搬起石头砸自己的脚
            5. 惜春与宁国府彻底决裂，"矢孤介杜绝宁国府"

            **伏笔线索**:
            1. 凤姐病情加重（淋血不止），暗示其身体将持续恶化
            2. 探春"自杀自灭"之语预言贾府最终败亡
            3. 晴雯被王夫人盯上，命运堪忧
            4. 惜春决绝态度暗示其日后出家之路
            5. 甄家被抄家的消息在贾府传开，与贾府命运形成对照
            6. 贾府经济困窘日益严重（凤姐典当金项圈、贾琏借当）
        - name: 章节剧情 - 第37章
          keys: 第37章, 开夜宴异兆发悲音, 赏中秋新词得佳谶
          content: |-
            **章节标题**: 第37章 开夜宴异兆发悲音　赏中秋新词得佳谶

            **主要事件**:

            ### 一、甄家抄没与贾府隐忧
            1. 尤氏从惜春处赌气出来，老嬷嬷告知甄家有人来送东西办机密事，劝其别去上房
            2. 尤氏得知甄家犯罪抄没家私、调取进京治罪
            3. 王夫人向贾母说明甄家情况，贾母心中不自在

            ### 二、宝钗搬出大观园
            1. 宝钗因薛姨妈身体不适、家中女人时症未起，要出园回家伴母
            2. 来告知李纨，建议请湘云来同住
            3. 探春表态支持，并借机发泄对贾府内部矛盾的不满

            ### 三、探春谈抄检后续
            1. 探春主动讲述昨夜抄检大观园及打王善保家的经过
            2. 得知邢夫人嗔王善保家的多事
            3. 探春冷笑评价"这种掩饰谁不会作"

            ### 四、贾母用饭与家道窘迫
            1. 贾母用饭，各房孝敬菜品，贾母吩咐蠲了旧规矩
            2. 红稻米粥不够分，鸳鸯感叹"可着头做帽子"
            3. 王夫人解释旱涝不定、田米不能按数交
            4. 贾母叹"巧媳妇做不出没米的粥"

            ### 五、贾珍聚赌始末
            1. 贾珍居丧无聊，以习射为名聚集世家子弟
            2. 渐次由射转赌，三四月后公然夜赌
            3. 邢大舅、薛蟠等参与，赌博种类多样
            4. 尤氏回宁府后悄悄窗下偷看
            5. 邢大舅酒后抱怨邢夫人把持家私

            ### 六、中秋前夜异兆（核心事件）
            1. 十四日夜贾珍在丛绿堂设宴赏月
            2. 三更时分，墙下传来长叹之声
            3. 风声过墙，祠堂内扇开阖之声，月色惨淡，风气森森
            4. 众人毛发倒竖，贾珍酒醒大半
            5. 次日查祠堂无异，贾珍自认醉后自怪

            ### 七、中秋夜凸碧山庄赏月
            1. 贾母率众人在嘉荫堂拜月后登山至凸碧山庄
            2. 贾母感叹人口渐少，不如当年热闹
            3. 击鼓传花行令：
               - 贾政被罚说"怕老婆舔脚"笑话，逗贾母开心
               - 宝玉被罚改为即景作秋诗，获赏海南扇子
               - 贾兰主动作诗，贾政喜不自胜
               - 贾赦说"偏心婆子针灸"笑话，暗讽贾母偏心，贾母敏感察觉
               - 贾环作诗，贾政批评，贾赦大赞并暗示其可袭世职
            4. 二更后贾母命男丁散去，留姑娘们继续赏月

            **出场角色**: 尤氏、李纨、宝钗、探春、湘云、贾母、王夫人、贾珍、贾政、贾赦、宝玉、贾环、贾兰、贾蓉、贾琏、邢夫人、邢德全、薛蟠、鸳鸯、琥珀、银蝶、佩凤、文花、素云、宝琴、迎春、惜春

            **关键转折**:
            1. 甄家被抄——预示贾府未来命运的重大伏笔
            2. 宝钗搬出大观园——大观园诸钗离散的开始
            3. 祠堂异兆——宁国府衰败的不祥之兆
            4. 贾赦笑话暗讽偏心——贾赦与贾母、贾政之间的嫌隙公开化
            5. 贾赦暗示贾环袭爵——嫡庶之争的伏笔

            **伏笔线索**:
            1. 甄家抄没暗示贾府将来同样命运
            2. 贾母感叹人少、鸳鸯叹"可着头做帽子"——家道中落
            3. 祠堂悲音异兆——宁府将有大祸
            4. 贾赦拉拢贾环、暗示袭爵——家族内部争斗
            5. 宝钗出园——大观园繁华将尽
        - name: 章节剧情 - 第38章
          keys: 第38章, 凸碧堂品笛感凄清, 凹晶馆联诗悲寂寞
          content: |-
            **章节标题**: 第38章 凸碧堂品笛感凄清 凹晶馆联诗悲寂寞

            **主要事件**:

            ### 一、贾母中秋夜赏月听笛
            1. 贾赦贾政等男眷散去后，贾母命撤围屏并席，继续与女眷赏月
            2. 贾母感叹宝钗姊妹回家团圆、凤姐李纨病着，少了四人冷清，叹"天下事总难十全"
            3. 命吹笛助兴，要求"只用吹笛的远远的吹起来"，追求雅致
            4. 贾赦出去被石头绊了歪了腿，邢夫人告辞回去照看
            5. 尤氏以孝服未满为由坚持留下陪贾母

            ### 二、笛声催泪，贾母伤感
            1. 桂花树下笛声呜咽悠扬，众人肃然危坐默默相赏
            2. 贾母命送月饼热酒给吹笛之人，要求吹慢曲
            3. 第二次笛声比先越发凄凉，夜静月明，贾母年老带酒，触动心事，堕下泪来
            4. 众人皆有凄凉寂寞之意，忙命住笛，转身陪笑解释
            5. 尤氏说笑话解闷，贾母已朦胧欲睡
            6. 四更时分，众姊妹已散，只剩探春一人等候，贾母方散

            ### 三、黛玉湘云凹晶馆联诗
            1. 黛玉见贾母叹人少，对景感怀，俯栏垂泪
            2. 湘云宽慰黛玉，抱怨宝钗弃约不来联句，提议二人联诗
            3. 湘云讲解"凸碧""凹晶"命名之妙，黛玉透露此二字为自己所拟
            4. 二人至凹晶馆，坐湘妃竹墩赏水月，感叹天上水中双月争辉
            5. 二人感慨"事若求全何所乐"，各自身世不遂心
            6. 以数栏杆限韵（十三元），联五言排律
            7. 联诗渐入佳境，湘云因白鹤飞起得灵感对出"寒塘渡鹤影"
            8. 黛玉苦思后对出"冷月葬花魂"，湘云赞叹但忧其太颓丧

            ### 四、妙玉续诗收结
            1. 妙玉从山石后转出，称赞好诗但"太悲凉了"，出言止住
            2. 三人同至栊翠庵品茶
            3. 妙玉提笔一挥而就续写十三韵，将颓丧之气翻转，以"彻旦休云倦，烹茶更细论"收结
            4. 黛玉湘云赞赏不已，称妙玉为"诗仙"

            ### 五、夜宿潇湘馆
            1. 湘云不回尤氏处，随黛玉至潇湘馆同宿
            2. 湘云有择席之病睡不着，黛玉心血不足常年失眠
            3. 黛玉自述一年之中通共只好睡十夜满足

            **出场角色**: 贾母、王夫人、邢夫人、尤氏、林黛玉、史湘云、妙玉、探春、鸳鸯、紫鹃、翠缕、贾赦（提及）、贾宝玉（提及）、宝钗（提及）、凤姐（提及）、李纨（提及）

            **关键转折**:
            1. 笛声由雅致转为凄凉，贾母由兴致勃勃转为落泪伤感，暗示贾府由盛转衰
            2. "寒塘渡鹤影""冷月葬花魂"——湘云黛玉各自命运的诗谶
            3. 妙玉出言"此亦关人之气数"，暗示诗句与人物命运相关

            **伏笔线索**:
            1. 贾母叹"天下事总难十全"，暗示贾府繁华难续
            2. 黛玉"冷月葬花魂"——葬花与黛玉命运的深层关联
            3. 湘云"寒塘渡鹤影"——孤寂漂泊的命运暗示
            4. 妙玉说"过于颓败凄楚，此亦关人之气数"——以诗论命
            5. 晴雯病势甚重，宝玉诸务无心——晴雯之死的前兆
            6. 探春因家事着恼——暗示贾府内部矛盾加剧
            7. 黛玉常年失眠、心血不足——病体日衰的征兆
        - name: 章节剧情 - 第39章
          keys: 第39章, 贾存周报升郎中任, 薛文起复惹放流刑, 受私贿老官翻案牍, 寄闲情淑女解琴书
          content: |-
            **章节标题**: 第39章（含贾存周报升郎中任、薛文起复惹放流刑、受私贿老官翻案牍、寄闲情淑女解琴书）

            **主要事件**:

            ### 一、赵姨娘贾环母子争吵
            1. 贾环弄倒药吊子洒了药，扬言要小丫头的命
            2. 赵姨娘握住其嘴制止，听凤姐的话越想越气
            3. 两边结怨更深一层

            ### 二、北静王府拜寿
            1. 贾赦、贾政带贾珍、贾琏、宝玉赴北静王府拜寿
            2. 北静王单留宝玉说话，赏坐赏茶赏饭
            3. 告知吴巡抚保举贾政之事
            4. 赠宝玉仿制玉

            ### 三、宝玉玉放光与亲事暗议
            1. 宝玉称通灵玉夜间放红光，凤姐说是"喜信发动"
            2. 贾母、王夫人暗议宝玉与宝钗亲事
            3. 薛姨妈十分愿意，但需等薛蟠商量
            4. 袭人猜出是提亲之事，去潇湘馆探紫鹃口气未果

            ### 四、贾芸帖子风波
            1. 贾芸送帖子给宝玉，封皮改称"叔父"
            2. 宝玉看后情绪大变，撕毁焚烧
            3. 麝月抱怨，袭人劝解

            ### 五、贾政升郎中
            1. 工部郎中缺出，贾政拟正
            2. 报喜人来吵喜，宝玉得知
            3. 贾芸提及宝玉亲事被啐骂
            4. 代儒放假一天

            ### 六、庆贺与黛玉生日
            1. 贾政升官庆贺，恰逢黛玉生日
            2. 王子腾送戏班，搭行台唱戏
            3. 黛玉"宛如嫦娥下界"出场
            4. 凤姐打趣宝玉黛玉"相敬如宾"
            5. 贾母称凤姐为"给事中"，命舅舅家给黛玉做生日
            6. 戏中《蕊珠记·冥升》演嫦娥未嫁而逝升月宫（暗伏黛玉命运）

            ### 七、薛蟠打死人
            1. 薛蟠途中遇蒋玉菡喝酒，因当槽儿张三惹怒
            2. 次日酒后用碗砸死张三，被县里拿去
            3. 薛家全家动员营救
            4. 宝钗冷静主持大局，劝阻薛姨妈
            5. 薛蝌赶赴当地打点

            ### 八、知县徇情审案
            1. 薛蝌买嘱吴良翻供、买通尸亲见证
            2. 贾府花几千银子买通知县
            3. 知县坐堂复审，书吏改轻尸格
            4. 张王氏哭诉被撵出
            5. 最终定为误伤，薛蟠监禁候详

            ### 九、周贵妃薨逝与元妃八字
            1. 路上传闻贵妃薨，皇上辍朝三日
            2. 贾府一度误以为是元妃，后确认是周贵妃
            3. 贾母合眼见元妃，元妃说"荣华易尽，须要退步抽身"
            4. 宝钗转述元妃八字算命：飞天禄马格，贵受椒房之宠，但"荣华不久"，遇寅年卯月则劫

            ### 十、宝玉访黛玉论琴
            1. 宝玉到潇湘馆，黛玉在看琴谱
            2. 黛玉详细讲解减字谱与琴理
            3. 论述抚琴之道：择静室、衣冠整齐、焚香静坐、心身俱正
            4. 引师旷鼓琴、孔子学琴、高山流水典故
            5. 宝玉提"猗兰操"，黛玉心中不舒服
            6. 黛玉看兰花触景伤情，想到自己如三秋蒲柳，落泪

            **出场角色**: 贾宝玉、林黛玉、贾政、贾母、王熙凤、袭人、薛蟠、薛宝钗、薛姨妈、薛蝌、北静郡王、贾芸、贾环、赵姨娘、麝月、紫鹃、金桂、香菱、张王氏、吴良、贾赦、邢夫人、王夫人、湘云、探春、惜春、李纨、贾珍、贾琏、林之孝、贾代儒、秋纹、雪雁、李贵、锄药、蒋玉菡

            **关键转折**:
            1. 贾政升郎中——贾府权势更盛
            2. 宝玉亲事暗中推进——薛姨妈愿意但需等薛蟠
            3. 薛蟠打死人——薛家陷入危机，需依赖贾府
            4. 知县徇情改判——司法腐败，为后续埋下隐患
            5. 周贵妃薨与元妃异兆——"荣华易尽，须要退步抽身"的警示

            **伏笔线索**:
            1. 通灵玉放光——"喜信发动"暗示亲事将近
            2. 戏文《冥升》嫦娥"未嫁而逝"——暗伏黛玉结局
            3. 元妃八字"荣华不久，遇寅年卯月"——预示元妃将薨
            4. 贾母见元妃说"退步抽身"——预示贾府衰败
            5. 黛玉看兰花伤感"如三秋蒲柳"——暗示黛玉命不久矣
            6. 贾芸帖子内容不明但令宝玉大怒——可能涉及不当之事
            7. 宝玉想起蒋玉菡与红汗巾——与袭人未来命运相关
            8. 黛玉说到"对牛弹琴"缩口不言——心事难诉
        - name: 章节剧情 - 第40章
          keys: 第40章, 人亡物在公子填词, 蛇影杯弓颦卿绝粒, 失绵衣贫女耐嗷嘈, 送果品小郎惊叵测
          content: |-
            **章节标题**: 第40章（含"人亡物在公子填词 蛇影杯弓颦卿绝粒"与"失绵衣贫女耐嗷嘈 送果品小郎惊叵测"）

            **主要事件**:

            ### 一、宝玉触物伤情，焚词祭晴雯
            1. 贾政因河南决河口公务繁忙，宝玉功课渐松
            2. 十月中旬天气陡寒，茗烟送来晴雯所补雀金裘，宝玉见之神痴
            3. 宝玉托病告假，回房后不吃不喝，心事重重
            4. 在晴雯旧居焚香填词祭奠，词曰"随身伴，独自意绸缪"

            ### 二、宝玉访黛玉，谈琴论诗
            1. 宝玉到潇湘馆，见黛玉写经
            2. 二人谈《斗寒图》出处、琴艺、诗作
            3. 宝玉提及曾偷听黛玉弹琴吟唱
            4. 黛玉说"古来知音人能有几个"，宝玉觉得冒失
            5. 二人"亲极反疏"，满腔心事说不出口

            ### 三、黛玉窃听定亲消息，绝粒自戕
            1. 雪雁从侍书处听闻宝玉定亲消息（某知府家，王大爷做媒）
            2. 紫鹃与雪雁在门外议论，被黛玉窃听七八分
            3. 黛玉"如同将身撂在大海里"，立定主意糟蹋身子
            4. 茶饭无心，日渐消减，半月后粥都不能吃
            5. 疑心日重，见人说话都似宝玉娶亲之事，"竟成蛇影"
            6. 终至绝粒，恹恹一息

            ### 四、侍书二次传话，黛玉起死回生
            1. 黛玉绝粒之日，紫鹃去报贾母等人
            2. 侍书来探望，与雪雁再次谈论，透露真相：亲事"议而未成"，是门客讨好之举
            3. 侍书转述凤姐之言：老太太主意"亲上作亲"，人"就在园子里"
            4. 黛玉虽病重但心里明白，听到真相后"阴极阳生"，心神清爽
            5. 喝了两口水，病势好转
            6. 贾母等赶来探望，见已无大碍

            ### 五、贾母定调宝玉婚事
            1. 贾母与王夫人、凤姐商议，指出宝玉黛玉"有了些知觉"不宜再搁一处
            2. 贾母明确表态：不把黛玉配宝玉，因其乖僻且虚弱恐不长寿
            3. 认为"只有宝丫头最妥"
            4. 王夫人建议也给黛玉说人家
            5. 贾母主张先给宝玉娶亲，不许宝玉知道定亲之事
            6. 凤姐受命加强大观园管理

            ### 六、凤姐维护岫烟，赠送衣物
            1. 凤姐巡视大观园，在紫菱洲遇婆子与岫烟丫头冲突
            2. 训斥婆子，维护岫烟
            3. 发现岫烟衣着单薄、生活清苦，送去四件衣物
            4. 岫烟初拒后经平儿劝说收下

            ### 七、薛家内忧外患
            1. 薛蝌赶走薛蟠结交的狐群狗党
            2. 薛姨妈倚重薛蝌，盼望早日完成其与岫烟的婚事
            3. 薛蝌感慨岫烟处境，写诗抒怀
            4. 金桂派宝蟾送酒果给薛蝌，宝蟾言行暧昧
            5. 薛蝌察觉不对，怀疑金桂设局陷害
            6. 窗外忽传笑声，薛蝌受惊

            **出场角色**: 宝玉、黛玉、袭人、麝月、茗烟、紫鹃、雪雁、侍书、凤姐、贾母、王夫人、贾珍、贾政、代儒、邢岫烟、平儿、丰儿、薛蝌、薛姨妈、宝钗、宝蟾、夏金桂、秋纹

            **关键转折**:
            1. 雀金裘触发宝玉对晴雯的深切悼念
            2. 雪雁传播的不实定亲消息导致黛玉绝粒
            3. 侍书第二次传话揭示真相，黛玉"阴极阳生"转危为安
            4. 贾母明确表态选宝钗不选黛玉，为后续悲剧埋下伏笔
            5. 金桂派宝蟾向薛蝌示好，暗藏阴谋

            **伏笔线索**:
            1. 贾母"只有宝丫头最妥"的决定，预示宝黛爱情的最终悲剧
            2. 黛玉虽暂时好转，但贾母的真实态度与黛玉的理解完全相反
            3. 侍书所传"亲上作亲、园中之人"让黛玉误以为指自己，实际贾母心中是宝钗
            4. 金桂通过宝蟾向薛蝌示好，暗示后续可能的陷害阴谋
            5. 窗外的笑声留下悬念
        - name: 章节剧情 - 第41章
          keys: 第41章, 纵淫心宝蟾工设计, 布疑阵宝玉妄谈禅, 评女传巧姐慕贤良, 玩母珠贾政参聚散
          content: |-
            **章节标题**: 第41章（含"纵淫心宝蟾工设计 布疑阵宝玉妄谈禅"与"评女传巧姐慕贤良 玩母珠贾政参聚散"）

            **主要事件**:

            ### 一、宝蟾设计引诱薛蝌
            1. 薛蝌夜间听窗外笑声、吹气声，吹灯装睡拒绝
            2. 宝蟾次日穿娇媚衣服来取家伙，薛蝌心动但克制
            3. 宝蟾向金桂献计：先笼络感情，再灌醉得手，不应则以"调戏"要挟
            4. 金桂采纳，一心笼络薛蝌，家中反倒安静
            5. 宝蟾以退为进，见薛蝌时低头不理；金桂则一盆火般热情
            6. 薛蝌反倒过意不去，怀疑自己错想了她们

            ### 二、金桂引入夏三
            1. 薛姨妈见金桂安静，以为薛蟠转运
            2. 金桂引入过继兄弟夏三，在薛姨妈面前过了明路
            3. 夏三从此往来不绝，"生出无限风波"

            ### 三、薛蟠来信与宝钗病重
            1. 薛蟠来信：道里驳回府里准详，要亲提，急需打点银子
            2. 薛蝌连夜兑银起程赴县
            3. 宝钗帮忙收拾至四更，次日发烧病倒，七八天不见效
            4. 吃冷香丸三丸才好
            5. 贾政与王夫人商议宝钗婚事：冬底放定，明春过礼

            ### 四、宝玉与黛玉禅语对答
            1. 宝玉见薛姨妈冷淡，满腹猜疑
            2. 到潇湘馆与黛玉谈论，黛玉分析薛姨妈是为官司心烦
            3. 黛玉连设六问考验宝玉对宝钗的态度
            4. 宝玉答"任凭弱水三千，我只取一瓢饮"，以禅语表明心迹
            5. 黛玉以"禅门第一戒是不打诳语"收束

            ### 五、消寒会与巧姐论女传
            1. 十一月初一消寒会，众人齐聚贾母处
            2. 巧姐已认三千多字，念《女孝经》，学《列女传》
            3. 宝玉为巧姐讲解列女传中各类贤良女子
            4. 巧姐转告柳五儿要补入怡红院，宝玉喜出望外

            ### 六、司棋殉情
            1. 司棋出府后终日啼哭，表兄来访
            2. 司棋声明"一个女人配一个男人"，母亲不允
            3. 司棋一头撞墙而死
            4. 表兄买两口棺材，收拾完司棋后抹脖子殉情
            5. 凤姐感叹可怜，答应帮忙说情

            ### 七、冯紫英展示洋货
            1. 冯紫英带来四种洋货：紫檀围屏、自鸣钟、母珠、鲛绡帐，共二万两
            2. 当场演示母珠吸珠、鲛绡帐展开
            3. 贾母等观赏后，凤姐主张不买，应置不动产根基
            4. 贾政讲述贾雨村发迹经过，提及甄家抄家
            5. 贾赦说"咱们家是最没有事的"，冯紫英附和
            6. 贾政忧虑："白白的衣租食税，那里当得起"

            **出场角色**: 薛蝌、金桂、宝蟾、夏三、薛姨妈、宝钗、宝玉、黛玉、贾母、贾政、王夫人、凤姐、巧姐、袭人、麝月、秋纹、紫鹃、贾琏、贾赦、冯紫英、詹光、薛蟠（信中）、司棋（转述）、宝琴、李纨、探春、惜春、湘云、邢岫烟

            **关键转折**:
            1. 金桂从明面混闹转为暗中笼络薛蝌的策略转变
            2. 夏三的引入为后续"无限风波"埋下伏笔
            3. 贾政正式定下宝钗婚事时间表
            4. 司棋与表兄双双殉情，烈性悲剧
            5. 贾政提及甄家抄家，暗示贾府危机

            **伏笔线索**:
            1. 夏三往来不绝，"生出无限风波"——暗示后续祸事
            2. 凤姐主张置不动产根基——暗示对贾府衰败的预感
            3. 贾政感叹甄家抄家、"做官的怕不怕"——暗示贾府将遭同样命运
            4. 贾赦盲目乐观"咱们家最没有事"——反讽伏笔
            5. 柳五儿即将进怡红院——后续情节铺垫
            6. 宝玉"弱水三千只取一瓢"——与最终结局形成对照
