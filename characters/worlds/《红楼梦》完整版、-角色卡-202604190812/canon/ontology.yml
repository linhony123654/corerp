          content: |-
            **章节标题**: 第42章（含甄家仆投靠贾家门、水月庵掀翻风月案、宴海棠贾母赏花妖、失宝玉通灵知奇祸）

            **主要事件**:

            ### 一、临安伯府听戏
            1. 临安伯请客看戏，贾政因公务不能去，贾赦带宝玉前往
            2. 宝玉在席间重逢蒋玉菡，蒋玉菡已成掌班
            3. 蒋玉菡演《占花魁》中秦小官，宝玉看得神魂俱醉
            4. 宝玉由此萌生研究音律之念

            ### 二、拿车风波
            1. 管租人报告：官差在京外强拿贾府运租车辆
            2. 贾琏写帖交涉，知县不在家，其门上承诺追办送还
            3. 贾琏整顿家人纪律，查点花名册

            ### 三、甄家仆包勇投靠
            1. 甄家旧仆包勇携手书投靠贾府
            2. 贾政收留包勇，听其讲述甄家近况
            3. 包勇讲述甄宝玉大病后性情大变、改过自新之事
            4. 贾政默然沉思（暗与贾宝玉对比）

            ### 四、水月庵匿名揭帖事件
            1. 贾府门上发现匿名揭帖，揭发贾芹在水月庵窝娼聚赌
            2. 贾政大怒，命赖大到水月庵提人
            3. 赖大到庵中，发现贾芹正与众人饮酒
            4. 贾芹向贾琏跪求庇护
            5. 贾琏与赖大商量遮掩
            6. 王夫人最终决定：遣送女尼女道回乡、训斥贾芹、销账、禁止贾家子弟再去水月庵
            7. 凤姐因平儿误说"馒头庵"而惊惧吐血（暗示铁槛寺旧事）

            ### 五、紫鹃忧心黛玉婚事
            1. 紫鹃从鸳鸯处听闻傅家常来夸耀女儿，暗示欲与贾家结亲
            2. 紫鹃担忧黛玉处境，又自我开解
            3. 黛玉无意中问紫鹃是否找袭人，失言后不好意思

            ### 六、海棠反季开花
            1. 怡红院已萎的海棠在十一月忽然盛开
            2. 贾母率众人赏花，认为是小阳春天气所致
            3. 贾赦主张砍去"花妖"，贾政说"见怪不怪"，贾母训斥二人
            4. 探春内心认为是不祥之兆，但不说出
            5. 黛玉以田家荆树典故比方，获称赞
            6. 贾母命宝玉、贾环、贾兰各作诗志喜
            7. 凤姐送红绸贺礼，被贾母称赞体面

            ### 七、通灵宝玉丢失
            1. 宝玉换衣时将玉摘下放在炕桌上，随后不翼而飞
            2. 袭人等偷偷搜寻，翻箱倒笼无果
            3. 探春命关园门搜寻，李纨提议搜身
            4. 众人怀疑贾环，平儿去盘问，贾环愤怒否认
            5. 赵姨娘大闹，被王夫人喝止
            6. 王夫人限袭人三天内找出
            7. 凤姐建议暗中察访，不声张
            8. 刘铁嘴测"赏"字，称玉丢不了
            9. 邢岫烟提议请妙玉扶乩
            10. 茗烟报告得到玉的准信

            **出场角色**: 贾政、贾赦、贾琏、宝玉、蒋玉菡、包勇、贾芹、赖大、凤姐、平儿、袭人、紫鹃、鸳鸯、黛玉、贾母、王夫人、探春、李纨、贾环、贾兰、赵姨娘、邢岫烟、邢夫人、麝月、秋纹、茗烟、旺儿、周瑞、林之孝家的、贾蓉、芳官、沁香、鹤仙

            **关键转折**:
            1. 通灵宝玉丢失——全书重大转折，预示宝玉命运巨变
            2. 海棠反季开花——表面喜事，实为不祥之兆（探春内心判断）
            3. 凤姐因"馒头庵"三字吐血——暗示铁槛寺旧事将成隐患

            **伏笔线索**:
            1. 甄宝玉经历幻境后改过自新，与贾宝玉形成对照，暗示贾宝玉未来可能有类似转变
            2. 傅家姑娘之事，暗示宝玉婚事的又一变数
            3. 蒋玉菡"人生配偶"之论，伏笔其日后与袭人的姻缘
            4. 茗烟报告得到玉的"准信"，悬念待解
            5. 贾芹想起一个人（贴帖者），悬念未揭
            6. 凤姐心虚于铁槛寺/馒头庵之事，伏笔日后败露
