          keys: 贾兰, 兰哥, 兰小子, 兰哥儿, 兰儿
          content: "**名称**: 贾兰  \n**性别**: 男  \n**年龄**: 五岁  \n**身份**: 贾珠与李纨之子，荣国府子弟  \n**外貌**: 文雅俊秀  \n**MBTI**: ISTJ（省事稳重，勤勉上进，主动争取表现）  \n**性格**: 省事不愿惹事，天生牛心古怪，规矩方正  \n\n---\n\n### 重要事件\n\n1. **幼年入学**  \n   已入学攻书，在义学读书。\n\n2. **学堂风波**  \n   学堂闹事时按住砚台劝贾菌：“好兄弟，不与咱们相干。”\n\n3. **元宵节拒召**  \n   因贾政未亲自叫他，元宵节不肯前来，后被贾政遣人唤来。\n\n4. **主动作诗获赏**  \n   见宝玉作诗受奖，主动出席也作诗一首，令贾政喜不自胜，贾母也十分欢喜，并获贾政赏赐。\n\n5. **海棠诗夺魁**  \n   海棠花开时作诗，被贾母评为最好。诗作如下：  \n   > 烟凝媚色春前萎，霜浥微红雪后开。  \n   > 莫道此花知识浅，欣荣预佐合欢杯。\n\n6. **抄家后提醒贾政**  \n   抄家后提醒贾政进内看老太太，并打听东府之事，言语得体：“请爷爷进内瞧老太太，再想法儿打听东府里的事。”\n\n7. **中举慰亲**  \n   已中乡榜举人，众人以此安慰贾政；曾为王夫人念贾政家书。\n\n---\n\n### 前景与预言  \n甄士隐预言“兰桂齐芳”中的“兰”即指贾兰，明年有望成进士做官，应验“家道复初”之预言。"
