            **章节标题**: 第15章 魇魔法叔嫂逢五鬼 通灵玉蒙蔽遇双真

            **主要事件**:

            ### 一、红玉与宝玉的暗生情愫
            1. 红玉梦见贾芸拉她被门槛绊倒惊醒，一夜无眠
            2. 宝玉对红玉留了心，隔窗寻找她身影，但怕袭人等寒心不敢点名
            3. 红玉奉命去潇湘馆取喷壶，途中远望贾芸监工，不敢靠近

            ### 二、贾环蜡油烫伤宝玉
            1. 贾环在王夫人处抄《金刚咒》，拿腔作势使唤丫鬟被厌恶
            2. 彩霞与贾环私下亲近，贾环怀疑她和宝玉好
            3. 宝玉与彩霞拉手说笑，贾环嫉恨
            4. 贾环故意将滚油蜡灯推向宝玉脸上，烫伤左脸一溜燎泡
            5. 王夫人骂贾环又骂赵姨娘，凤姐讽刺贾环
            6. 黛玉赶来探望，强搬宝玉脖子看伤

            ### 三、马道婆两面敛财
            1. 马道婆以宝玉干娘身份进府，向贾母兜售海灯供奉，定下每日五斤油
            2. 贾母命人给宝玉出门带钱施舍
            3. 马道婆到赵姨娘房中，讨要鞋面缎子

            ### 四、赵姨娘与马道婆密谋魇魔法
            1. 赵姨娘向马道婆抱怨凤姐搬送家私、宝玉得宠
            2. 马道婆暗示可用暗法算计，步步引诱
            3. 赵姨娘拿出梯己银子并写五百两欠契
            4. 马道婆交出十个纸鬼和两个纸人，教授施法方法

            ### 五、凤姐打趣黛玉姻缘
            1. 黛玉信步来怡红院，与凤姐、李纨、宝钗聚会
            2. 凤姐借暹罗茶打趣："吃了我们家的茶，怎么还不给我们家作媳妇？"
            3. 凤姐指宝玉说人物门第家私样样般配
            4. 黛玉含羞，宝钗叫住她
            5. 赵姨娘、周姨娘进来，凤姐正眼不看

            ### 六、宝玉凤姐同时中邪
            1. 宝玉拉黛玉袖子嘻笑，忽然大叫头疼，跳起三四尺高发狂说胡话
            2. 凤姐手持钢刀砍进园来，见鸡杀鸡见人要杀人
            3. 二人被抬至王夫人上房，浑身火炭，不省人事
            4. 合家惊慌，百般医治祈祷无效
            5. 薛蟠忙乱中瞥见黛玉"酥倒在那里"
            6. 三日后二人几近断气，后事衣履已备
            7. 赵姨娘贾环"自是称愿"

            ### 七、赵姨娘落井下石被贾母痛骂
            1. 宝玉睁眼说"我可不在你家了"
            2. 赵姨娘劝贾母让宝玉"早些回去"，被贾母啐唾沫痛骂
            3. 贾母骂赵姨娘是"淫妇"调唆逼死宝玉
            4. 有人回说棺椁做齐，贾母如火上浇油

            ### 八、癞头和尚跛足道人救治
            1. 一僧一道闻声而来，声称善能医治邪祟
            2. 道人指出贾家"现放着希世奇珍"——通灵玉
            3. 和尚感叹"青埂峰一别十三载"，念诵两首诗偈
            4. 持颂通灵玉后嘱咐悬于门上，三十三日后可愈
            5. 当晚二人渐醒，喝米汤，精神渐长
            6. 黛玉先念"阿弥陀佛"，被宝钗打趣"如来佛又要管林姑娘的姻缘了"

            **出场角色**: 红玉、贾宝玉、贾芸、袭人、碧痕、秋纹、贾环、彩霞、王夫人、凤姐、赵姨娘、马道婆、林黛玉、薛宝钗、李纨、贾母、贾政、贾赦、邢夫人、贾珍、贾琏、贾蓉、贾萍、薛姨妈、薛蟠、香菱、平儿、丰儿、周瑞媳妇、周姨娘、紫鹃、雪雁、惜春、癞头和尚、跛足道人

            **关键转折**:
            1. 贾环蜡油烫伤宝玉——贾环对宝玉的嫉恨从暗到明
            2. 赵姨娘与马道婆密谋魇魔法——阴谋从酝酿到实施
            3. 宝玉凤姐同时中邪——魇魔法生效，全府陷入危机
            4. 癞头和尚持颂通灵玉——化解危机，揭示通灵玉"被声色货利所迷"

            **伏笔线索**:
            1. 通灵玉"被声色货利所迷"失去灵验，暗示宝玉沉溺红尘
            2. "沉酣一梦终须醒，冤孽偿清好散场"——预示宝玉最终出家结局
            3. 凤姐打趣黛玉嫁宝玉，多次暗示宝黛姻缘
            4. 赵姨娘的五百两欠契——日后可能成为罪证
            5. 红玉与贾芸的暗生情愫——为后续私定终身埋线
            6. 薛蟠瞥见黛玉"酥倒"——暗写薛蟠好色本性
