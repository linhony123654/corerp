            **成员**:
            1. **贾家**: "贾不假，白玉为堂金作马。"宁国、荣国二公之后，共二十房分，都中八房，原籍十二房
            2. **史家**: "阿房宫，三百里，住不下金陵一个史。"保龄侯尚书令史公之后，共十八房，都中十房，原籍八房
            3. **王家**: "东海缺少白玉床，龙王来请金陵王。"都太尉统制县伯王公之后，共十二房，都中二房
            4. **薛家**: "丰年好大雪，珍珠如土金如铁。"紫薇舍人薛公之后，现领内府帑银行商，共八房分
            **重要事件**: 门子出示护官符，告诫雨村不可触犯这些人家，否则不但官爵不保，连性命也保不成
