          content: "**名称**: 贾赦  \n**性别**: 男  \n**身份**:  \n- 荣国府贾代善长子，贾母长子，黛玉大舅  \n- 袭一等将军，字恩侯  \n- 荣国府大老爷，长房  \n**子女**: 长子贾琏、庶女迎春等  \n**MBTI**: ESTP（好色贪欲、强势霸道、冲动行事、世故圆滑、暗藏心机）  \n**性格**:  \n- 好色成性，略平头正脸的便不放手，年纪已大仍纳妾不止  \n- 强势霸道，以权势威胁他人  \n- 暴躁易怒，不顾体面  \n**重要事件**:  \n1. 黛玉初来拜见时，托辞“连日身上不好”未亲自相见，只传话劝慰：“连日身上不好，见了姑娘彼此倒伤心，暂且不忍相见。劝姑娘不要伤心想家，跟着老太太和舅母，即同家里一样。”  \n2. 欲纳贾母丫鬟鸳鸯为妾，命邢夫人去讨，被拒后怒骂贾琏，又威胁鸳鸯之兄金文翔：“凭她嫁到谁家，也难出我的手心。除非她死了，或是终身不嫁男人，我就服了她！”“若依了，仔细你的脑袋。”被贾母拒绝后含愧告病，不敢见贾母，后花八百两银子买十七岁女孩嫣红收在屋内。  \n3. 因贾琏顶嘴，将贾琏毒打一顿。  \n4. 通过贾雨村设计夺取石呆子的扇子，强占旧扇。  \n5. 祭祀中担任陪祭；元宵家宴略领贾母之赐便告辞，自去与门客赏灯吃酒，“笙歌聒耳，锦绣盈眸”，贾母知他在此不便，随他去了。  \n6. 中秋夜击鼓传花被罚说笑话，讲“偏心婆子针灸”的笑话暗讽贾母偏心贾政；贾母察觉后，他忙起身把盏以别言解释。看贾环诗后连声赞好，称有“侯门气概”，赏赐玩物，并拍贾环头暗示：“将来这世袭的前程，定跑不了你袭呢。”  \n7. 与冯紫英在贾政处饮酒，说“咱们家是最没有事的”“我们家里也比不得从前了，这回儿也不过是个空门面”，盲目乐观。  \n8. 带宝玉到临安伯府听戏；海棠花开时主张“砍去，必是花妖作怪”，被贾母训斥。  \n**弱点与结局**:  \n- 好色荒淫，交通外官，包揽词讼，依势凌弱  \n- 被参革去世职，遭锦衣府拘质  \n**话语示例**:  \n- 传黛玉话：“连日身上不好，见了姑娘彼此倒伤心，暂且不忍相见……”  \n- 议鸳鸯事：“自古嫦娥爱少年，她必定嫌我老了，大约她恋着少爷们。”“凭她嫁到谁家，也难出我的手心……”  \n- 评贾环诗：“这诗据我看甚是有骨气……将来这世袭的前程，定跑不了你袭呢。”  \n- 论家势：“咱们家是最没有事的。”“……这回儿也不过是个空门面。”  \n- 饮酒时：“咱们不用说这些话，大家吃酒罢。”\n\n---\n\n**名称**: 贾赦\n**性别**: 男\n**MBTI**: ESTP (放纵享乐，不顾后果)\n**年龄**: 中年\n**身份**: 荣府大老爷，贾母长子\n**背景**: 袭荣国公世职。\n**性格**: 贪婪强横，行事不妥。\n**重要事件**: \n1. 因交通平安州外官、包揽词讼、强索石呆子古扇逼死人命，革去世职，发往台站效力赎罪。\n2. 家产抄没入官。\n3. 临行前贾母分派三千两银子作盘费。"
