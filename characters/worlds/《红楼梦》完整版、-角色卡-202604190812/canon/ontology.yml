          keys: 第16章, 蒋玉菡情赠茜香罗, 薛宝钗羞笼红麝串
          content: |-
            **章节标题**: 第16章 蒋玉菡情赠茜香罗 薛宝钗羞笼红麝串

            **主要事件**:

            ### 一、黛玉葬花与宝黛和解
            1. 黛玉因晴雯不开门之事错疑宝玉，又逢饯花之期，葬花时感花伤己，吟出"侬今葬花人笑痴，他年葬侬知是谁"等句
            2. 宝玉在山坡上听闻，恸倒于地，由花及人推想万物终归无可寻觅
            3. 黛玉发现宝玉，欲走又止
            4. 宝玉追上倾诉衷肠：回忆自幼相伴之情，抱怨黛玉疏远自己、亲近外人
            5. 黛玉感动落泪，问起昨夜不开门之事，宝玉解释是丫头懒怠，二人和解

            ### 二、王夫人处论药趣事
            1. 王夫人问黛玉病情，宝玉分析黛玉是内症先天弱
            2. 王夫人记不清药名，只记得"金刚"二字，宝玉打趣"金刚丸""菩萨散"，宝钗说出正确药名"天王补心丹"
            3. 宝玉编出三百六十两银子的奇方，称薛蟠曾花上千银子配成
            4. 宝钗摇手否认，王夫人赞宝钗不撒谎
            5. 凤姐出来佐证，确认薛蟠曾来求珍珠配药

            ### 三、冯紫英家宴与女儿酒令
            1. 宝玉赴冯紫英家宴，薛蟠、蒋玉菡（琪官）、妓女云儿在座
            2. 宝玉发起"女儿"酒令，众人依次行令
            3. 宝玉唱《红豆曲》（"滴不尽相思血泪抛红豆"）
            4. 薛蟠说出粗俗之语和"哼哼韵"
            5. 蒋玉菡酒底念"花气袭人知昼暖"，薛蟠识破"袭人"之名

            ### 四、宝玉与蒋玉菡互赠信物
            1. 宝玉在廊檐下得知蒋玉菡即琪官，欣喜不已
            2. 宝玉赠玉玦扇坠，蒋玉菡赠茜香国进贡的大红汗巾（北静王所赐）
            3. 宝玉以袭人的松花汗巾交换
            4. 薛蟠跳出抓住二人，冯紫英出面解围

            ### 五、袭人发现汗巾与元春赐礼
            1. 袭人发现扇坠丢失、汗巾被换，责怪宝玉
            2. 宝玉夜间将茜香罗偷系在袭人腰上，袭人次日解下掷入空箱
            3. 袭人汇报元春赐端午节礼：宝玉与宝钗规格相同，黛玉等级较低
            4. 宝玉疑惑为何与黛玉不同而与宝钗相同
            5. 宝玉让紫绡送礼物给黛玉挑选，黛玉拒收

            ### 六、金玉之辩与呆雁之讽
            1. 宝玉遇黛玉，黛玉提出"金玉"之说，自称"草木之人"
            2. 宝玉发誓心中无金玉之想，表白黛玉在心中排第四（仅次于祖母、父、母）
            3. 宝钗因金锁配玉之说总远着宝玉，见赐礼相同更觉没意思
            4. 宝玉请宝钗褪红麝串观看，见其雪白酥臂发呆，又想起金玉之事，看宝钗容貌也呆了
            5. 黛玉在门槛旁目睹，讽刺宝玉是"呆雁"，以帕子甩其脸

            **出场角色**: 贾宝玉、林黛玉、薛宝钗、王夫人、王熙凤、薛蟠、冯紫英、蒋玉菡（琪官）、云儿、袭人、茗烟、探春、惜春、紫绡、红玉

            **关键转折**:
            1. 宝黛山坡和解——从误会到交心，宝玉首次明确表白黛玉在心中的地位
            2. 元春赐礼暗示金玉良缘——宝玉与宝钗规格相同，黛玉等级较低
            3. 宝玉与蒋玉菡互赠信物——茜香罗最终系在袭人身上，暗伏袭人嫁琪官

            **伏笔线索**:
            1. 蒋玉菡的茜香罗经宝玉之手到袭人处，伏袭人日后嫁蒋玉菡
            2. 蒋玉菡酒令"丈夫一去不回归"，伏其日后命运
            3. 元春赐礼宝玉宝钗相同，伏金玉良缘之势
            4. 宝玉对宝钗容貌发呆，暗示其内心并非完全无动于衷
            5. 凤姐要走红玉，伏红玉日后在凤姐处的发展
        - name: 章节剧情 - 第17章
          keys: 第17章, 撕扇子作千金一笑, 因麒麟伏白首双星, 诉肺腑心迷活宝玉, 含耻辱情烈死金钏
          content: |-
            **章节标题**: 第17章（含撕扇子作千金一笑、因麒麟伏白首双星、诉肺腑心迷活宝玉、含耻辱情烈死金钏）

            **主要事件**:

            ### 一、袭人吐血与宝玉问医
            1. 袭人见自己吐的鲜血，想到"少年吐血，年月不保"，争荣夸耀之心尽灰
            2. 袭人劝宝玉不要声张，暗中找王太医问药
            3. 宝玉五更即去找王济仁，得知不过是伤损，依方调治

            ### 二、端阳节宴席冷场
            1. 端阳佳节，王夫人治酒席请薛家母女赏午
            2. 宝钗淡淡的、宝玉没精打彩、黛玉懒懒的、凤姐随王夫人气色行事，众人无趣早散
            3. 叙述黛玉"喜散不喜聚"与宝玉"愿常聚"的对比性情

            ### 三、晴雯跌扇引发大吵
            1. 晴雯换衣服时跌折扇子，宝玉责骂"蠢才"
            2. 晴雯反唇相讥，提及宝玉打袭人、摔玻璃缸玛瑙碗等旧事
            3. 袭人来劝，晴雯讽刺二人"鬼鬼祟祟干的那事儿"，袭人羞得脸紫胀
            4. 宝玉要去回太太打发晴雯出去，袭人跪下拦阻，众丫鬟齐跪
            5. 黛玉来访打趣"争粽子吃"，称袭人为"嫂子"，化解气氛
            6. 黛玉伸两指笑说宝玉"做了两个和尚了"

            ### 四、撕扇子作千金一笑
            1. 宝玉晚间微醉回院，与晴雯和好
            2. 宝玉提出"爱物"之论：物是借人所用，可为取乐而毁，不可生气时出气
            3. 晴雯撕扇子，"嗤嗤"撕了数把，又撕麝月的扇子，宝玉大笑
            4. 宝玉笑道"千金难买一笑，几把扇子能值几何"

            ### 五、史湘云来访
            1. 次日午间史湘云来贾府做客，众人回忆她穿宝玉衣服扮男装、披斗篷扑雪人等趣事
            2. 湘云带来四个绛纹石戒指分送袭人、鸳鸯、金钏儿、平儿
            3. 黛玉冷笑"她不会说话，她的金麒麟也会说话"，只有宝钗听见抿嘴一笑

            ### 六、湘云翠缕论阴阳
            1. 湘云与翠缕在大观园中边走边论阴阳之理
            2. 从天地日月讲到树叶正反、扇子正反、金麒麟雌雄
            3. 翠缕说"姑娘是阳，我就是阴"，又改口"主子为阳，奴才为阴"

            ### 七、金麒麟失而复得
            1. 蔷薇架下翠缕拾得一只金麒麟，比湘云佩的更大更有文彩
            2. 湘云"伸手擎在掌上，只是默默不语"，正出神时宝玉走来
            3. 湘云连忙藏起麒麟
            4. 宝玉发现自己的麒麟丢了，湘云笑着归还，宝玉欢喜非常

            ### 八、袭人与湘云叙旧、论鞋
            1. 袭人与湘云回忆幼时同住西边暖阁的旧情
            2. 袭人请湘云做鞋，湘云说"你的我才做，别人的我可不能"
            3. 湘云提及扇套子被铰之事（黛玉所为）
            4. 湘云盛赞宝钗，说"这些姐姐们再没一个比宝姐姐好的"

            ### 九、宝玉厌恶仕途经济
            1. 贾雨村来访，贾政叫宝玉出去会客
            2. 湘云劝宝玉"谈谈讲讲些仕途经济的学问"
            3. 宝玉拒绝，让湘云"别的姊妹屋里坐坐"
            4. 袭人提及宝钗也曾劝过，宝玉当面走了，宝钗有涵养不恼
            5. 宝玉说"林姑娘从来说过这些混帐话不曾？若她也说过这些混帐话，我早和她生分了"

            ### 十、黛玉偷听——又喜又惊又悲又叹
            1. 黛玉因担心宝玉与湘云因麒麟生情，悄悄来察看
            2. 听到宝玉称赞自己不说"混帐话"，内心四重感受：喜（知己不错）、惊（不避嫌疑）、叹（何必有金玉之论、何必来一宝钗）、悲（父母早逝无人主张、病已渐成恐不能久待）
            3. 不禁滚下泪来，抽身回去

            ### 十一、宝黛诉肺腑
            1. 宝玉追上黛玉，替她拭泪，黛玉退后说"你又要死了，作什么这么动手动脚的"
            2. 黛玉又提"金"和"麒麟"，宝玉急了
            3. 黛玉自悔说错话，反替宝玉拭汗
            4. **宝玉说出"你放心"三个字**——全文最关键的表白
            5. 黛玉怔了半天问"怎么是放心不放心"，宝玉解释："你皆因总是不放心的原故，才弄了一身病"
            6. 黛玉听了"如轰雷掣电"，万句言语不能吐出半字，两人怔怔对望
            7. 黛玉滚下泪来，说"有什么可说的。你的话我早知道了"，头也不回走了

            ### 十二、宝玉心迷误诉袭人
            1. 宝玉呆立出神，袭人送扇子来
            2. 宝玉未看清来人，拉住袭人说出肺腑之言："我为你也弄了一身的病""睡里梦里也忘不了你"
            3. 袭人吓得魄消魂散，推他说"坑死我了"
            4. 宝玉醒悟，羞得满面紫涨，夺扇跑了
            5. 袭人自思此言因黛玉而起，忧虑"将来难免不才之事"

            ### 十三、宝钗论湘云家境
            1. 宝钗告诉袭人：湘云在家做不得主，做活做到三更天，替别人做还被家里人不受用
            2. 袭人恍然大悟，后悔烦湘云做针线
            3. 宝钗主动提出替袭人做针线活

            ### 十四、金钏儿投井
            1. 老婆子来报金钏儿投井死了
            2. 前日被王夫人撵出后在家哭天哭地，今日在东南角井中发现尸首
            3. 宝钗去安慰王夫人，说"多半是失了脚掉下去的""也不过是个胡涂人，也不为可惜"
            4. 王夫人赏其母五十两银子
            5. 宝钗主动拿出自己两套新衣服给金钏儿妆裹，说"我从来不计较这些"
            6. 宝玉在王夫人旁边坐着垂泪，被王夫人数说

            **出场角色**: 贾宝玉、林黛玉、薛宝钗、史湘云、袭人、晴雯、麝月、碧痕、秋纹、翠缕、佳蕙、王夫人、王济仁、贾雨村、金钏儿（已死）、贾迎春、凤姐、贾母、周奶妈

            **关键转折**:
            1. 宝玉对黛玉说出"你放心"三字——宝黛爱情最核心的表白
            2. 宝玉误将袭人当黛玉诉说私心——暴露内心，袭人开始忧虑
            3. 金钏儿投井自尽——王夫人撵人的严重后果
            4. 宝钗对金钏儿之死的冷静态度——展现其理性务实甚至冷漠的一面

            **伏笔线索**:
            1. "因麒麟伏白首双星"——湘云与宝玉各有一只金麒麟，暗示未来姻缘
            2. 黛玉"近日每觉神思恍惚，病已渐成"——伏黛玉早逝
            3. 袭人忧虑宝黛"将来难免不才之事"——伏后文袭人向王夫人进言
            4. 湘云"前儿有人家来相看"——伏湘云婚事
            5. 宝玉说"林姑娘从来说过这些混帐话不曾"——确立宝黛精神契合的核心
        - name: 章节剧情 - 第18章
          keys: 第18章, 手足耽耽小动唇舌, 不肖种种大承笞挞, 情中情因情感妹妹, 错里错以错劝哥哥
          content: |-
            **章节标题**: 第18章（含"手足耽耽小动唇舌 不肖种种大承笞挞"与"情中情因情感妹妹 错里错以错劝哥哥"）

            **主要事件**:

            ### 一、宝玉挨打的导火索层层叠加
            1. **金钏儿之死的阴影**: 宝玉因金钏儿投井自尽五内摧伤，见贾政时垂头丧气、怔怔发呆
            2. **忠顺王府索人**: 忠顺府长史官奉命来贾府索要琪官，揭露宝玉与戏子交往、互赠汗巾之事，贾政又惊又气
            3. **贾环告密**: 贾环乘机向贾政告密，称宝玉"拉着太太的丫头金钏儿强奸不遂"致其投井，贾政气得面如金纸

            ### 二、贾政痛打宝玉
            1. 贾政下令关门堵嘴，"着实打死"
            2. 小厮打了十来下，贾政嫌轻，亲自夺板狠命盖了三四十下
            3. 宝玉由臂至胫青紫遍体，面白气弱

            ### 三、王夫人、贾母先后阻止
            1. **王夫人冲入书房**: 抱住板子，哭诉"只有这个孽障"，提及已故长子贾珠
            2. **贾母驾到**: 厉声斥责贾政，以"回南京"相威胁，贾政苦苦叩求认罪
            3. 宝玉被抬回怡红院养伤

            ### 四、众人探望与宝钗送药
            1. 宝钗送药探望，说"心里也疼"后红脸咽住，流露真情
            2. 袭人向茗烟打听原因，得知琪官和金钏儿两件事
            3. 宝玉怕宝钗因薛蟠之事多心，忙拦袭人的话
            4. 宝钗理性分析，不偏袒哥哥，叮嘱袭人照顾宝玉

            ### 五、宝玉以旧帕传情黛玉
            1. 黛玉哭肿双眼来探望，说"你从此可都改了罢"
            2. 宝玉答"我便为这些人死了，也是情愿的"
            3. 宝玉支开袭人，托晴雯送两条旧帕子给黛玉
            4. 黛玉悟出深意，"神魂驰荡"，在帕上题诗三首
            5. 黛玉写毕浑身火热，"病由此萌起"

            ### 六、袭人向王夫人进言
            1. 王夫人召见袭人，询问宝玉伤情
            2. 袭人进言：宝玉该受教训，但更重要的是应搬出大观园
            3. 提出男女之防的大道理：园中姑娘多，日夜一处不方便
            4. 王夫人深为感动，将宝玉托付袭人
            5. 赐木樨清露、玫瑰清露

            ### 七、薛家风波
            1. 薛蟠被母亲和宝钗怀疑唆人告发宝玉（实际此次并非他所为）
            2. 薛蟠气急之下说出"金玉良缘"之事刺伤宝钗
            3. 宝钗被哥哥言语伤害，整哭一夜
            4. 次日遇黛玉，黛玉笑道"哭出两缸眼泪来，也医不好棒疮"

            **出场角色**: 贾宝玉、贾政、贾环、贾母、王夫人、薛宝钗、林黛玉、袭人、晴雯、王熙凤、李纨、薛蟠、薛姨妈、茗烟、忠顺府长史官、春纤、彩云

            **关键转折**:
            1. 忠顺王府来人——标志贾府政治危机，贾政与忠顺王府素无来往，此事暗示宝玉行为已牵涉政治风险
            2. 贾环告密——将金钏儿之死歪曲为"强奸不遂"，直接引爆贾政怒火
            3. 袭人进言——首次正式向王夫人提出宝玉搬出园子的建议，为后续情节埋下伏笔
            4. 旧帕传情——宝黛感情的重要里程碑，黛玉"病由此萌起"暗示悲剧走向

            **伏笔线索**:
            1. 袭人建议宝玉搬出大观园，王夫人"自有道理"，暗示后续将有动作
            2. 黛玉题帕后"病由此萌起"，为黛玉日后病重埋下伏笔
            3. 薛蟠说出"金玉良缘"，揭示薛家内部对宝黛钗关系的态度
            4. 忠顺王府与贾府的对立关系，暗示贾府政治处境的危险
            5. 茗烟猜测薛蟠调唆实为误判，"被人生生的一口咬死"，真正告密者成谜
        - name: 章节剧情 - 第19章
          keys: 第19章, 白玉钏亲尝莲叶羹, 黄金莺巧结梅花络, 绣鸳鸯梦兆绛芸轩, 识分定情悟梨香院
          content: |-
            **章节标题**: 第19章（含白玉钏亲尝莲叶羹、黄金莺巧结梅花络、绣鸳鸯梦兆绛芸轩、识分定情悟梨香院）

            **主要事件**:

            ### 一、黛玉花阴感伤与潇湘馆独处
            1. 黛玉花阴下远望怡红院，见众人探望宝玉，感叹有父母的人好处，泪珠满面
            2. 回潇湘馆见竹影苔痕，自比《西厢记》双文，叹命薄
            3. 鹦哥念出《葬花吟》诗句，黛玉教鹦哥念诗解闷

            ### 二、薛家母子和解
            1. 宝钗回家探母，母女相对而泣
            2. 薛蟠诚恳道歉，推说酒后撞客胡言
            3. 薛蟠发誓不再与人吃酒闲逛，说到父亲去世时落泪
            4. 薛蟠要给宝钗炸项圈添衣裳以示关心

            ### 三、众人探望宝玉与莲叶汤
            1. 薛姨妈母女至怡红院探望宝玉
            2. 宝玉想吃小荷叶小莲蓬汤，凤姐安排制作
            3. 凤姐主动承担费用，"拿着官中的钱做人"被贾母笑称"猴儿"
            4. 贾母赞宝钗"从我们家四个女孩儿算起都不如宝丫头"
            5. 宝玉本想赞黛玉，不想反引出贾母赞宝钗

            ### 四、白玉钏亲尝莲叶羹
            1. 玉钏儿送汤给宝玉，因姐姐金钏儿之死满脸怒色
            2. 宝玉耐心温存，将人支开后陪笑问长问短
            3. 宝玉哄玉钏儿尝汤
            4. 傅试家婆子来访，宝玉因遐想傅秋芳而接见
            5. 汤碗碰翻烫了宝玉手，宝玉反问玉钏儿疼不疼
            6. 傅家婆子出去后议论宝玉"呆气"

            ### 五、黄金莺巧结梅花络
            1. 莺儿为宝玉打络子，讨论花样颜色搭配
            2. 莺儿透露本名金莺，姓黄，十六岁
            3. 莺儿欲说宝钗好处，被宝钗进来打断
            4. 宝钗建议用金线配黑珠儿线打络子络宝玉的玉
            5. 王夫人送两碗菜给袭人，宝钗暗示"明儿还有比这个更叫你不好意思的呢"

            ### 六、凤姐理财与袭人晋升
            1. 金钏儿死后仆人争大丫鬟名额，纷纷孝敬凤姐
            2. 凤姐回王夫人：金钏儿月例给玉钏儿吃双分
            3. 详细讨论各房月例银子：姨娘二两、大丫鬟一吊、小丫鬟五百钱等
            4. 王夫人决定从自己月例中拨二两一吊给袭人，待遇比照姨娘
            5. 王夫人不让袭人明面开脸，"且浑着，等再过二三年再说"
            6. 凤姐出来后骂抱怨之人

            ### 七、绣鸳鸯梦兆绛芸轩
            1. 贾母命人挡住贾政，编"星宿不利"借口保护宝玉
            2. 宝玉得意，日日在园中游卧，甘心为丫鬟充役
            3. 宝钗午后独入怡红院，见袭人为宝玉绣鸳鸯兜肚
            4. 袭人出去后，宝钗坐在袭人位置替她代刺
            5. 黛玉、湘云来至窗外窥见此景，湘云拉走黛玉
            6. **关键转折**: 宝玉梦中喊"什么是金玉姻缘，我偏说是木石姻缘"，宝钗听了怔住

            ### 八、识分定情悟梨香院
            1. 宝玉至梨香院找龄官唱"袅晴丝"，被龄官正色拒绝
            2. 宝官透露蔷二爷来了龄官必唱
            3. 贾蔷买玉顶金豆雀儿哄龄官，龄官怒斥是打趣她们
            4. 龄官逼贾蔷放生雀儿拆笼子
            5. 龄官咳血，贾蔷要去请大夫
            6. **关键转折**: 宝玉目睹贾蔷龄官之情，领会划"蔷"深意，悟出"人生情缘各有分定"，"从此后只是各人各得眼泪罢了"

            ### 九、湘云离别
            1. 袭人告诉宝玉宝钗替她赶蚊子之事，宝玉说"不该，亵渎了她"
            2. 湘云家人来接，眼泪汪汪依依不舍
            3. 宝钗催湘云走，怕她回去受气
            4. 湘云临别嘱宝玉常提醒贾母接她

            **出场角色**: 贾宝玉、林黛玉、薛宝钗、薛蟠、薛姨妈、贾母、王夫人、王熙凤、袭人、玉钏儿、莺儿、紫鹃、晴雯、麝月、秋纹、史湘云、平儿、香菱、龄官、贾蔷、宝官、玉官、赵姨娘、周姨娘、邢夫人、李纨、迎春、探春、惜春

            **关键转折**:
            1. 宝玉梦中喊"木石姻缘"——暴露内心真实情感取向
            2. 王夫人提拔袭人待遇比照姨娘——预示袭人未来地位
            3. 宝玉悟"人生情缘各有分定"——情感认知重大转变

            **伏笔线索**:
            1. 宝钗听见"木石姻缘"怔住，暗示金玉良缘与木石前盟的矛盾
            2. 袭人绣鸳鸯兜肚、宝钗代刺——暗示二人与宝玉的关系纠葛
            3. 龄官咳血——与黛玉病症相似，命运暗合
            4. 傅秋芳二十三岁未嫁——暗示攀附豪门的悲剧
            5. 湘云离别不舍——暗示其在家中处境不佳
            6. 王夫人说"且浑着"——袭人身份的悬而未决
            7. 宝玉论"文死谏武死战皆非正死"——反映其叛逆思想
        - name: 章节剧情 - 第20章
          keys: 第20章, 秋爽斋偶结海棠社, 蘅芜苑夜拟菊花题, 林潇湘魁夺菊花诗, 薛蘅芜讽和螃蟹咏
          content: |-
            **章节标题**: 第20章（含秋爽斋偶结海棠社、蘅芜苑夜拟菊花题、林潇湘魁夺菊花诗、薛蘅芜讽和螃蟹咏）

            **主要事件**:

            ### 一、贾政出门·宝玉自在
            1. 贾政点了学差，八月二十日拜过宗祠及贾母后起身
            2. 宝玉等送至洒泪亭
            3. 贾政走后，宝玉在园中任意逛荡，"真把光阴虚度，岁月空添"

            ### 二、探春发起海棠诗社
            1. 探春因病卧床，忽生起诗社之念，写花笺邀宝玉
            2. 宝玉途中收到贾芸送来的两盆珍贵白海棠和字帖
            3. 宝玉至秋爽斋，宝钗、黛玉、迎春已在
            4. 李纨自荐掌坛，众人各起别号：
               - 李纨——稻香老农
               - 探春——蕉下客
               - 黛玉——潇湘妃子
               - 宝钗——蘅芜君
               - 宝玉——富贵闲人/怡红公子
               - 迎春——菱洲
               - 惜春——藕榭
            5. 定规每月初二、十六开社，地点稻香村

            ### 三、首咏白海棠
            1. 以白海棠为题，七律，十三元韵（门盆魂痕昏）
            2. 用"梦甜香"计时
            3. 探春先成，宝钗次之，宝玉苦吟，黛玉最后一挥而就
            4. 李纨评：宝钗第一（含蓄浑厚），黛玉第二（风流别致），宝玉压尾

            ### 四、丫鬟们的日常
            1. 袭人安排送东西给史湘云（红菱、鸡头、栗粉糕、玛瑙碟子、针线活计）
            2. 晴雯、秋纹、麝月闲话：
               - 秋纹讲述送桂花得贾母赏钱、王夫人赏衣裳
               - 晴雯嘲讽秋纹得的是别人挑剩的
               - 麝月提醒收回联珠瓶防赵姨奶奶弄坏
               - 晴雯抢着去取瓶子

            ### 五、湘云入社·和诗惊艳
            1. 宝玉想起忘请湘云，催贾母派人接来
            2. 湘云到后即兴和了两首白海棠诗，众人惊叹
            3. 湘云自荐作东道先邀一社

            ### 六、蘅芜苑夜拟菊花题
            1. 宝钗邀湘云至蘅芜苑安歇
            2. 宝钗提醒湘云家境不便作东，主动提出用自家当铺伙计送的螃蟹请客
            3. 二人共拟菊花十二题：忆菊、访菊、种菊、对菊、供菊、咏菊、画菊、问菊、簪菊、菊影、菊梦、残菊
            4. 宝钗主张不限韵，"分明有好诗，何苦为韵所缚"
            5. 宝钗又劝湘云读有益之书，"纺绩针黹是身心的本等"

            ### 七、螃蟹宴·赏桂花
            1. 湘云请贾母等赏桂花吃螃蟹
            2. 地点藕香榭，凤姐张罗一切
            3. 贾母回忆小时在枕霞阁落水往事
            4. 凤姐以寿星老儿笑话逗贾母开心
            5. 凤姐被平儿误抹螃蟹黄在脸上，众人大笑
            6. 凤姐开玩笑说贾琏要讨鸳鸯作小老婆
            7. 贾母嘱咐宝玉黛玉别多吃螃蟹

            ### 八、菊花诗评比
            1. 众人各选题目作菊花诗
            2. 黛玉作《咏菊》《问菊》《菊梦》三首
            3. 李纨评：黛玉夺魁（《咏菊》第一、《问菊》第二、《菊梦》第三）
            4. 众人互评佳句，各有称赞

            ### 九、螃蟹咏
            1. 宝玉先作一首螃蟹咏
            2. 黛玉一挥而就后自己撕毁烧去
            3. 宝钗作螃蟹咏，"眼前道路无经纬，皮里春秋空黑黄"，被众人称为"食螃蟹绝唱"，"讽刺世人太毒了些"

            **出场角色**: 贾政、宝玉、探春、宝钗、黛玉、迎春、惜春、李纨、史湘云、袭人、晴雯、秋纹、麝月、翠墨、贾芸、贾母、王夫人、凤姐、薛姨妈、鸳鸯、琥珀、彩霞、彩云、平儿、莺儿、紫鹃、司棋、待书、入画

            **关键转折**:
            1. 贾政出门为宝玉等人自在结社创造条件
            2. 贾芸送白海棠恰好成为诗社首题
            3. 宝钗为湘云筹划螃蟹宴，展现其周到与慷慨
            4. 黛玉菊花诗夺魁，"恼不得要推潇湘妃子为魁"
            5. 宝钗螃蟹咏寓讽刺于咏物，"讽刺世人太毒了些"

            **伏笔线索**:
            1. 探春取黛玉号"潇湘妃子"，以娥皇女英洒泪成斑竹典故，暗示黛玉未来命运
            2. 黛玉诗中"娇羞默默同谁诉，倦倚西风夜已昏"、"醒时幽怨同谁诉？衰草寒烟无限情"等句暗含孤寂悲凉
            3. 宝钗劝湘云"纺绩针黹是身心的本等"，体现其封建淑女观
            4. 麝月提及赵姨奶奶"使黑心弄坏"东西，暗示赵姨娘与宝玉房中人的矛盾
            5. 宝钗螃蟹咏"眼前道路无经纬，皮里春秋空黑黄"寓意深远
        - name: 章节剧情 - 第21章
          keys: 第21章, 村姥姥是信口开合, 情哥哥偏寻根究底, 第三十九回
          content: |-
            **章节标题**: 第21章 村姥姥是信口开合 情哥哥偏寻根究底

            **主要事件**:

            ### 一、螃蟹宴尾声与丫鬟品评
            1. 平儿受凤姐之命来取螃蟹，被李纨等人留下喝酒
            2. 李纨打趣平儿是凤姐的"总钥匙"
            3. 众人品评各房得力丫鬟：鸳鸯（贾母处）、彩霞（王夫人处）、袭人（宝玉处）、平儿（凤姐处）
            4. 李纨提及亡夫贾珠，感伤落泪，众人散去

            ### 二、平儿透露凤姐放贷秘密
            5. 袭人问平儿月钱为何迟发
            6. 平儿悄悄告知：凤姐将全府月钱提前支出放贷生利，等利钱收回才发放
            7. 凤姐几年间靠此翻出几百两，梯己利钱一年上千两

            ### 三、刘姥姥二进荣国府
            8. 刘姥姥带板儿及枣子、倭瓜、野菜等土产再次来访
            9. 凤姐留她住一夜，贾母听闻后主动要求见面
            10. 平儿与周瑞家的引刘姥姥去见贾母

            ### 四、刘姥姥与贾母相见
            11. 刘姥姥称贾母"老寿星"，二人聊年纪身体
            12. 贾母留刘姥姥住一两天，明日游园
            13. 刘姥姥讲乡村见闻，贾母越发有趣味
            14. 鸳鸯安排刘姥姥洗澡换衣

            ### 五、刘姥姥讲故事
            15. **雪地抽柴故事**：大雪天一个十七八岁标致姑娘在柴草堆抽柴——被马棚走水打断
            16. **老奶奶得孙故事**：九十多岁老奶奶吃斋念佛感动观音，绝后之家又得孙子——合了贾母王夫人心事

            ### 六、宝玉寻根究底
            17. 宝玉对雪地姑娘念念不忘，散后私下追问刘姥姥
            18. 刘姥姥编造"茗玉小姐"故事：知书识字、十七岁病死、父母建祠堂塑像、像成了精
            19. 宝玉深信不疑，要化布施修庙
            20. 次日派茗烟去寻庙，找到的却是供瘟神爷的破庙
            21. 宝玉不甘心，嘱茗烟改日再找

            **出场角色**: 平儿、李纨、宝钗、湘云、惜春、探春、黛玉、宝玉、袭人、贾母、王夫人、凤姐、鸳鸯、刘姥姥、板儿、周瑞家的、张材家的、茗烟

            **关键转折**:
            1. 贾母主动召见刘姥姥，开启刘姥姥在贾府深度游的序幕
            2. 马棚走水打断雪地姑娘故事，制造悬念
            3. 茗烟寻庙发现瘟神爷，揭示刘姥姥信口编造的真相，但宝玉仍不死心

            **伏笔线索**:
            1. 凤姐挪用月钱放贷——暗示贾府经济隐患与凤姐贪利
            2. 李纨提及贾珠落泪——暗示其内心孤苦
            3. 贾母留刘姥姥住下——为后续刘姥姥游大观园做铺垫
            4. 宝玉对茗玉小姐的痴迷——体现其对薄命女子的怜惜，与全书"千红一哭、万艳同悲"主题呼应
            5. 马棚走水——不祥之兆，暗示贾府隐患
        - name: 章节剧情 - 第22章
          keys: 第22章, 史太君两宴大观园, 金鸳鸯三宣牙牌令, 栊翠庵茶品梅花雪, 怡红院劫遇母蝗虫
          content: "**章节标题**: 第22章 史太君两宴大观园 金鸳鸯三宣牙牌令 / 栊翠庵茶品梅花雪 怡红院劫遇母蝗虫\n**主要事件**: \n1. 贾母还席湘云，两宴大观园。早餐在秋爽斋，刘姥姥故意出丑说笑话引发哄堂大笑。\n2. 贾母带领刘姥姥游览大观园，依次参观潇湘馆、紫菱洲、秋爽斋、蘅芜苑、栊翠庵。\n3. 贾母评点黛玉窗纱，辨识软烟罗，赐名霞影纱。\n4. 凤姐、鸳鸯合谋用象牙镶金大筷子和鸽子蛋戏弄刘姥姥。\n5. 在缀锦阁设宴，鸳鸯三宣牙牌令，众人一一应对，刘姥姥以庄稼人本色打趣，说“花儿落了结个大倭瓜”。\n6. 刘姥姥误饮大杯，品尝茄鲞，详述做法。\n7. 栊翠庵妙玉奉茶，贾母饮老君眉，妙玉嫌刘姥姥脏弃成窑杯，另邀宝钗、黛玉、宝玉喝体己茶，展示珍贵古玩茶具。\n8. 宝玉细品梅花雪水茶，妙玉讥评品茶之道。\n9. 大姐儿与板儿交换柚子、佛手。\n**出场角色**: 贾母、刘姥姥、王熙凤、鸳鸯、林黛玉、薛宝钗、贾探春、史湘云、贾宝玉、李纨、王夫人、薛姨妈、妙玉、贾迎春、贾惜春、板儿、大姐儿等\n**关键转折**: 通过刘姥姥的眼睛，全面展示大观园的豪奢精致，形成贫富两种生活方式的喜剧性碰撞\n**伏笔线索**: 妙玉的极度洁癖与孤傲；刘姥姥游园为后续情节埋下伏笔"
        - name: 章节剧情 - 第23章
          keys: 第23章, 蘅芜君兰言解疑癖, 潇湘子雅谑补余香
          content: |-
            **章节标题**: 第23章（含栊翠庵品茶续、刘姥姥醉卧怡红院、刘姥姥辞别贾府、蘅芜君兰言解疑癖、潇湘子雅谑补余香）

            **主要事件**:

            ### 一、栊翠庵品茶（续）
            1. 妙玉用梅花雪水泡茶，黛玉未能辨别，被妙玉嘲为"大俗人"
            2. 宝玉提议将妙玉嫌弃的成窑茶杯送给刘姥姥度日，妙玉同意
            3. 宝玉又提议打水洗栊翠庵地面，妙玉要求水桶不许进山门

            ### 二、刘姥姥醉卧怡红院
            1. 贾母回稻香村歇息，王夫人也歪着睡了
            2. 刘姥姥将省亲别墅牌坊误认为"玉皇宝殿"，跪拜磕头
            3. 刘姥姥因酒后腹泻如厕，出来后酒被风禁，迷失方向
            4. 误入怡红院：撞上逼真画作以为真人、照西洋穿衣镜以为遇见"亲家母"、误触机括穿过暗门
            5. 醉卧宝玉床上，鼾齁如雷，酒屁臭气满屋
            6. 袭人推断路径找到刘姥姥，叫醒她，用百合香遮味，教她说辞掩饰

            ### 三、凤姐与刘姥姥论病、取名
            1. 凤姐告知贾母受风、大姐儿发热
            2. 刘姥姥建议查祟书，凤姐命彩明翻《玉匣记》，按法送祟后大姐儿安稳
            3. 凤姐请刘姥姥为大姐儿取名，刘姥姥取名"巧哥儿"（生于七月初七），预言"遇难成祥，逢凶化吉"

            ### 四、刘姥姥辞别贾府
            1. 平儿打点凤姐所赠之物并另送私礼
            2. 贾母欠安，王太医诊治：贾母偶感风寒不必吃药，大姐儿饿两顿即好
            3. 鸳鸯代贾母送衣物、药品、荷包锞子，转交宝玉所赠成窑钟子
            4. 刘姥姥千恩万谢离去

            ### 五、宝钗规劝黛玉
            1. 宝钗将黛玉叫到蘅芜苑，指出其行酒令时说了《牡丹亭》《西厢记》的话
            2. 黛玉羞红脸认错，宝钗自述幼时也偷看杂书的经历
            3. 宝钗发表女子本分论：该做针黹纺织，不该看杂书移性情
            4. 黛玉心下暗服

            ### 六、商议惜春画大观园图
            1. 惜春因贾母命画大观园图想告长假
            2. 黛玉给刘姥姥取绰号"母蝗虫"，拟画名《携蝗大嚼图》
            3. 宝钗详细分析画技难度，建议给半年假并派宝玉协助
            4. 宝钗开列详尽画具颜料单子，展现丰富绘画知识
            5. 黛玉调侃单子像"嫁妆单子"，众人大笑
            6. 湘云笑得连人带椅歪倒

            **出场角色**: 妙玉、宝玉、宝钗、黛玉、贾母、凤姐、刘姥姥、板儿、袭人、平儿、鸳鸯、王夫人、李纨、惜春、探春、湘云、王太医、贾珍、贾琏、贾蓉、彩明

            **关键转折**:
            1. 刘姥姥为巧姐取名，伏下日后"遇难成祥"的命运线索
            2. 宝钗规劝黛玉，二人关系由疏转亲，黛玉"心下暗服"
            3. 贾母因游园劳累生病，暗示年事已高

            **伏笔线索**:
            1. 巧姐之名及"遇难成祥，逢凶化吉"的预言，伏后文巧姐遭难被刘姥姥搭救
            2. 刘姥姥收到大量馈赠（尤其王夫人一百两银子），为日后报恩埋下伏笔
            3. 妙玉将自己常用的绿玉斗给宝玉用，暗示对宝玉的特殊情感
            4. 宝钗对黛玉的教导使二人关系转变，为后文"金兰契"友谊奠基
        - name: 章节剧情 - 第24章
          keys: 第24章, 闲取乐偶攒金庆寿, 不了情暂撮土为香, 变生不测凤姐泼醋, 喜出望外平儿理妆
          content: |-
            **章节标题**: 第24章（含"闲取乐偶攒金庆寿 不了情暂撮土为香"与"变生不测凤姐泼醋 喜出望外平儿理妆"）

            **主要事件**:

            ### 一、凑份子为凤姐做生日
            1. 贾母病愈后提议九月初二为凤姐过生日，出新法子"凑分子"
            2. 召集全府上下商议，按等级出银：贾母薛姨妈各二十两，邢王夫人各十六两，尤氏李纨各十二两，下至丫鬟姨娘各出一二两
            3. 凤姐精明算账，替李纨出份子，又指出贾母替宝玉黛玉出钱吃亏
            4. 共凑一百五十余两，贾母将操办之事交给尤氏
            5. 尤氏暗中退还鸳鸯、彩云、周赵姨娘等人份子钱，体恤下人

            ### 二、宝玉私祭金钏儿
            1. 九月初二正是金钏儿生日，宝玉一早穿素服，只带茗烟骑马出城
            2. 谎称去北静王府，实则往城外水仙庵
            3. 在水仙庵后院井台上焚香含泪祭奠
            4. 茗烟代祝，祝词诙谐深情："想来自然是那人间有一，天上无双的极聪明极俊雅的一位姐姐妹妹了"
            5. 宝玉吃素斋后赶回城中，谎称北静王爱妾去世

            ### 三、凤姐生日宴与泼醋事件
            1. 贾母命凤姐坐首席，众人轮番敬酒，凤姐喝得酒沉
            2. 凤姐回房换衣，发现小丫头望风行迹可疑，逼问得知贾琏与鲍二家的偷情
            3. 凤姐窗下偷听，听到鲍二家的咒她死、贾琏抱怨她是"夜叉星"
            4. 凤姐怒不可遏，先打平儿，再冲入房中撕打鲍二家的
            5. 贾琏借酒逞凶，拔剑要杀凤姐
            6. 凤姐跑到贾母处哭诉，添油加醋说贾琏要毒死她
            7. 贾琏追至贾母处仍逞强，被贾母喝止

            ### 四、贾母调解与平儿理妆
            1. 贾母宽慰凤姐，轻描淡写化解矛盾
            2. 平儿被李纨拉入大观园，宝钗劝解
            3. 宝玉将平儿请至怡红院，用自制紫茉莉花粉和胭脂为她理妆，摘并蒂秋蕙簪鬓
            4. 宝玉独自感伤平儿命薄，"薄命比黛玉犹甚"，凄然泪下
            5. 宝玉为平儿熨衣洗帕

            ### 五、善后与和解
            1. 次日贾琏在贾母面前跪下认错，给凤姐作揖赔不是
            2. 贾母命凤姐贾琏安慰平儿，三人和解
            3. 鲍二媳妇吊死，其娘家要告官
            4. 凤姐表面强硬不给钱，贾琏暗中花二百两摆平
            5. 贾琏命林之孝将银子入流年帐，又私给鲍二银两安慰
            6. 凤姐酒醒后愧悔，私下拉平儿查看伤处

            **出场角色**: 贾母、王熙凤、贾琏、平儿、贾宝玉、茗烟、尤氏、薛姨妈、邢夫人、王夫人、李纨、林黛玉、薛宝钗、鸳鸯、袭人、赖大母亲、玉钏儿、林之孝家的、鲍二家的、探春、琥珀

            **关键转折**:
            1. 宝玉出城祭金钏儿——揭示宝玉对金钏儿之死的深切愧疚
            2. 凤姐生日当天撞破贾琏偷情——喜庆变为闹剧
            3. 鲍二媳妇吊死——凤姐泼醋的严重后果，暗伏日后隐患
            4. 宝玉为平儿理妆——展现宝玉"意淫"本质，怜惜薄命女子

            **伏笔线索**:
            1. 尤氏劝凤姐"太满了，就要泼出来的"——暗示凤姐日后败落
            2. 玉钏儿独坐垂泪——暗扣金钏儿之死的余波
            3. 鲍二媳妇之死被银子摆平——暗示贾府以权势压人的惯例
            4. 凤姐说"我没一个钱"——暗示其敛财与吝啬的矛盾性格
            5. 宝玉感叹平儿"薄命比黛玉犹甚"——宝玉对女性命运的普遍悲悯
        - name: 章节剧情 - 第25章
          keys: 第25章, 尴尬人难免尴尬事, 鸳鸯女誓绝鸳鸯偶
          content: |-
            **章节标题**: 第25章 尴尬人难免尴尬事 鸳鸯女誓绝鸳鸯偶

            **主要事件**:

            ### 一、邢夫人找凤姐商议
            1. 贾赦看上贾母的大丫鬟鸳鸯，欲收为小妾
            2. 命邢夫人去贾母处讨要
            3. 邢夫人先找凤姐商议，凤姐直言劝阻：老太太离不了鸳鸯，且贾母平日就不满贾赦纳妾
            4. 邢夫人不听，凤姐见其弄左性，转而顺从附和
            5. 凤姐暗中算计：担心邢夫人多疑，设计与其同行以避嫌

            ### 二、邢夫人亲劝鸳鸯
            1. 邢夫人到鸳鸯卧房，打量鸳鸯外貌后开口劝说
            2. 许以姨娘之位，称"天大的喜事"
            3. 鸳鸯始终低头不语，沉默拒绝
            4. 邢夫人以为她害臊，决定找她家人来说

            ### 三、园中三丫鬟密谈
            1. 鸳鸯躲入大观园，遇见平儿
            2. 平儿将凤姐所述始末告知鸳鸯
            3. 鸳鸯首次明确表态：别说做小老婆，就是娶去做大老婆也不去
            4. 袭人从山石后现身，三人议论
            5. 袭人评价贾赦"太好色了"
            6. 平儿、袭人开玩笑出主意，鸳鸯急了发誓：宁可剪发当尼姑或寻死

            ### 四、嫂子劝说被骂
            1. 金文翔媳妇（鸳鸯嫂子）兴冲冲来劝
            2. 鸳鸯啐其一口，痛骂其趋炎附势、想把自己送入火坑
            3. 嫂子试图挑拨袭人、平儿，被二人驳回
            4. 嫂子赌气而去

            ### 五、贾赦威胁逼迫
            1. 邢夫人计划失败，回告贾赦
            2. 贾赦怒骂贾琏，叫来金文翔威胁
            3. 次日金文翔接鸳鸯回家，转述贾赦威胁：说她恋着少爷们，凭嫁到谁家也难出他手心
            4. 鸳鸯咬定牙不愿意

            ### 六、鸳鸯当众铰发明志
            1. 鸳鸯假装回心转意，让嫂子带自己去见贾母
            2. 当着王夫人、薛姨妈、凤姐、宝钗等众人面前跪下哭诉
            3. 发誓一辈子不嫁人，袖中取出剪子铰发明志
            4. 贾母大怒，迁怒王夫人

            ### 七、探春解围与凤姐逗趣
            1. 探春挺身而出为王夫人辩解：大伯子要收屋里人，小婶子如何知道
            2. 贾母醒悟，向王夫人道歉
            3. 宝玉替母亲跪下赔不是
            4. 凤姐以幽默打趣化解尴尬，逗贾母发笑
            5. 邢夫人来到，王夫人迎出

            **出场角色**: 鸳鸯、邢夫人、凤姐、平儿、袭人、贾赦、贾琏、贾母、宝玉、探春、王夫人、薛姨妈、金文翔、金文翔媳妇、琥珀、李纨、宝钗、丰儿

            **关键转折**:
            1. 凤姐从劝阻到顺从的态度转变——展现其精明自保
            2. 鸳鸯从沉默到爆发——从低头不语到啐骂嫂子再到当众铰发
            3. 贾母从大怒迁怒到醒悟道歉——探春一语点醒

            **伏笔线索**:
            1. 鸳鸯发誓"老太太归了西"后或寻死或当尼姑，暗示其悲剧结局
            2. 贾赦威胁"凭她嫁到谁家也难出我的手心"，暗示日后可能报复
            3. 平儿、袭人被鸳鸯骂"自为都有了结果，将来都是做姨娘的"，鸳鸯说"天下的事未必都遂心如意"，暗示二人未来命运未必如愿
            4. 贾赦好色荒淫、贾母年迈，暗示贾府衰败之兆
        - name: 章节剧情 - 第26章
          keys: 第26章, 呆霸王调情遭苦打, 冷郎君惧祸走他乡, 滥情人情误思游艺, 慕雅女雅集苦吟诗
          content: |-
            **章节标题**: 第26章（含"呆霸王调情遭苦打 冷郎君惧祸走他乡"与"滥情人情误思游艺 慕雅女雅集苦吟诗"）

            ### 主要事件

            #### 一、鸳鸯事件余波
            1. 邢夫人来贾母处，方知贾母已知鸳鸯之事，满面愧悔
            2. 贾母训斥邢夫人不敢劝贾赦，详述鸳鸯的不可替代性
            3. 贾母表示愿出钱让贾赦买人，唯独鸳鸯不能给
            4. 凤姐借斗牌逗趣化解贾母怒气，故意输钱哄贾母开心
            5. 贾琏来请邢夫人，被贾母训斥为"下流种子"，提及鲍二家的旧事
            6. 贾赦含愧告病，花八百两买十七岁嫣红收房

            #### 二、赖大家宴与薛蟠遭打
            1. 十四日贾母等赴赖大花园宴席
            2. 柳湘莲被请来坐陪串戏，薛蟠对其起淫心
            3. 宝玉与湘莲在书房叙旧，谈及秦钟坟墓，湘莲告知将远行
            4. 湘莲设计将薛蟠骗至北门外苇塘，痛打一顿
            5. 薛蟠被打得"面目肿破，似个泥猪"，被迫喝脏水、叫"好老爷"
            6. 贾蓉带人找到薛蟠，打趣后雇轿送回
            7. 宝钗劝阻薛姨妈不要兴师动众追究

            #### 三、贾琏被打与石呆子扇子事件
            1. 平儿向宝钗讲述贾琏被贾赦毒打的原委
            2. 贾赦看中石呆子的二十把古扇，命贾琏购买不成
            3. 贾雨村设计讹石呆子拖欠官银，抄没扇子送给贾赦
            4. 贾琏评论"弄得人坑家败业不算能为"触怒贾赦，被毒打

            #### 四、薛蟠外出经商
            1. 薛蟠伤愈后借口做买卖躲羞，决定随张德辉外出
            2. 宝钗理性分析利弊，劝薛姨妈同意
            3. 薛姨妈打点行装，主仆六人、三辆大车出发
            4. 香菱随宝钗搬入大观园蘅芜苑

            #### 五、香菱学诗
            1. 香菱拜黛玉为师学诗
            2. 黛玉提出诗歌理论："第一立意要紧""不以词害意"
            3. 黛玉开出阅读书单：王维→杜甫→李白→陶谢等
            4. 香菱对王维诗有精妙领悟，宝玉赞其已得"三昧"
            5. 香菱第一首咏月诗被评"措词不雅"，第二首被评"过于穿凿"
            6. 香菱废寝忘食苦思，"诗魔"上身，连"闲"字都当韵脚
            7. 最终于梦中得诗八句

            ### 出场角色
            贾母、邢夫人、王夫人、凤姐、鸳鸯、薛姨妈、宝玉、宝钗、黛玉、探春、贾琏、平儿、贾赦、薛蟠、柳湘莲、贾珍、贾蓉、赖尚荣、香菱、张德辉、李纨、惜春

            ### 关键转折
            1. 柳湘莲设计痛打薛蟠——薛蟠由此决定外出经商
            2. 薛蟠外出——香菱得以入住大观园
            3. 香菱入园——开启学诗之路
            4. 石呆子扇子事件——揭示贾雨村的阴险与贾赦的贪婪

            ### 伏笔线索
            1. 柳湘莲告知宝玉将远行三五年，暗示后续出走
            2. 宝玉将诗社诗稿传到外头，被探春黛玉批评，暗示闺阁之事不宜外传
            3. 贾雨村为讨好贾赦不惜害人，暗示其日后祸患
            4. 香菱梦中得诗，暗示其诗才天赋
        - name: 章节剧情 - 第27章
          keys: 第27章, 宁国府除夕祭宗祠, 国府元宵开夜宴
          content: |-
            **章节标题**: 第27章（宁国府除夕祭宗祠　荣国府元宵开夜宴）

            **主要事件**:

            ### 一、晴雯病情与日常
            1. 晴雯病情反复，王太医诊脉后改用益神养血之剂
            2. 宝玉忧心晴雯，为其调停饮食
            3. 袭人送母殡回来，听闻坠儿被撵之事
            4. 李纨感冒、邢夫人害火眼，诗社空了几社

            ### 二、年关将近，宁府备祭
            1. 王子腾升九省都检点，贾雨村补授大司马
            2. 贾珍开宗祠打扫，准备祭祀
            3. 尤氏查看押岁锞子（二百二十个，各式样）
            4. 贾蓉去光禄寺领春祭恩赏银两
            5. 贾珍强调皇恩体面的重要性

            ### 三、乌进孝进贡
            1. 黑山村庄头乌进孝送年贡，走了一个月零两日
            2. 呈上大量物资清单及折银二千五百两
            3. 解释年成不好：连月大雨、碗大冰雹
            4. 贾珍不满收成减少，感叹经济压力
            5. 贾蓉透露荣府经济困境：省亲花费巨大，每年多赔几千银子
            6. 贾珍评价："黄柏木作磬槌子——外头体面里头苦"
            7. 贾蓉提及凤姐鸳鸯偷当老太太东西，贾珍认为是凤姐设计

            ### 四、贾珍训斥贾芹
            1. 贾珍分派族中子弟年物
            2. 贾芹来领被训斥：揭露其在家庙中赌钱、养老婆小子
            3. 贾珍威胁过年后换回他

            ### 五、除夕祭宗祠大典
            1. 腊月二十九万事齐备，两府焕然一新
            2. 贾母率众进宫朝贺后至宁府宗祠
            3. 薛宝琴初次观看宗祠，细述宗祠匾额对联（御笔"星辉辅弼""慎终追远"等）
            4. 祭祀仪式：贾敬主祭、贾赦陪祭、贾珍献爵等，传菜层层递送
            5. 正堂拜遗像，贾母拈香下拜，众人齐跪

            ### 六、除夕行礼与合欢宴
            1. 贾母在宁府短暂停留后回荣府
            2. 贾敬贾赦等至荣府向贾母行礼
            3. 合欢宴：献屠苏酒、合欢汤、吉祥果、如意糕
            4. 除夕夜各处焚香上供，爆竹起火络绎不绝

            ### 七、元宵家宴
            1. 正月十五贾母在大花厅设家宴
            2. 贾敬出城修道，贾赦告辞自去享乐
            3. 详述花厅陈设：慧纹璎珞、各色宫灯、錾珐琅荷叶烛台
            4. 座次安排：贾母歪榻，宝琴湘云黛玉宝玉四人近坐
            5. 族中来者甚少，各有不来的原因
            6. 看戏《西楼·楼会》，文豹发科诨提及荣国府
            7. 贾母赏文豹，媳妇们撒钱满台

            **出场角色**: 贾珍、尤氏、贾蓉、贾蓉之妻、贾母、凤姐、宝玉、晴雯、袭人、麝月、王太医、乌进孝、贾芹、贾敬、贾赦、邢夫人、王夫人、薛姨妈、李婶、薛宝琴、湘云、黛玉、宝钗、李纨、迎春、探春、惜春、岫烟、李纹、李绮、贾琏、贾琮、贾芸、贾菖、贾菱、贾菌、娄氏、林之孝家的

            **关键转折**:
            1. 贾府经济困境首次全面暴露：庄地歉收、荣府入不敷出、省亲花费巨大
            2. 贾珍"黄柏木作磬槌子"之喻揭示贾府外强中干的本质
            3. 凤姐鸳鸯偷当之事暗示贾府经济已到捉襟见肘之境

            **伏笔线索**:
            1. 贾府经济每况愈下，"再两年再省一回亲，只怕就精穷了"——预示家族衰败
            2. 贾芹在家庙中的劣迹——族中子弟堕落的缩影
            3. 族中人不来赴宴的各种原因（妒富愧贫、憎畏凤姐等）——暗示家族内部离心
            4. 贾赦告辞自去享乐——暗示荣府长房与贾母的疏离
            5. 祭祀的盛大排场与经济困窘形成强烈反差——盛极而衰的象征
        - name: 章节剧情 - 第28章
          keys: 第28章, 史太君破陈腐旧套, 王熙凤效戏彩斑衣, 第五十四回
          content: |-
            **章节标题**: 第28章 史太君破陈腐旧套 王熙凤效戏彩斑衣

            **主要事件**:

            ### 一、元宵家宴敬酒
            1. 贾珍贾琏撒钱赏戏，贾母大悦
            2. 二人至贾母榻前屈膝跪下敬酒，贾环、宝玉等一溜跪下
            3. 湘云悄推宝玉打趣
            4. 宝玉后单独为众人斟酒一巡，至黛玉前，黛玉不饮，将杯放在宝玉唇边让他代饮

            ### 二、宝玉回园探袭人
            1. 宝玉离席回大观园，贾母问起袭人不在
            2. 王夫人解释袭人母亲去世有热孝，凤姐补充袭人留守看屋子"三处有益"
            3. 贾母感叹袭人服侍经历，得知鸳鸯母亲也去世
            4. 宝玉回园发现袭人与鸳鸯对谈，体贴地不打扰悄悄退出
            5. 宝玉夸赞和气的媳妇，教导丫鬟善待下人

            ### 三、贾母破陈腐旧套
            1. 戏歇后请女先生说书，说《凤求鸾》
            2. 书中主角名"王熙凤"，与凤姐重名，引发笑场
            3. **贾母痛批才子佳人小说套路**：小姐见男人便忘父母书礼、大家小姐身边只一个丫鬟不合理、编书人或妒富贵或自己看魔了
            4. 贾母强调贾家从不许说这些书，丫头们也不懂这些话

            ### 四、凤姐效戏彩斑衣
            1. 凤姐打趣贾母批评为《掰谎记》，妙语连珠逗众人大笑
            2. 自比"斑衣戏彩"，以逗贾母开心为孝行
            3. 讨贾母杯中酒喝，说"讨老祖宗的寿"

            ### 五、小戏班唱戏
            1. 贾母命梨香院小戏子来唱，芳官唱《寻梦》（只用箫管），葵官唱《惠明下书》
            2. 众人"鸦雀无闻"，薛姨妈赞叹从没见用箫管的
            3. 贾母回忆湘云爷爷家小戏班弹琴的往事

            ### 六、击鼓传梅与笑话
            1. 凤姐提议行"春喜上眉梢"令
            2. 贾母先中，讲了十个媳妇求孙行者问嘴巧的笑话（暗讽凤姐吃了猴儿尿）
            3. 小丫头与女先生串通，以咳嗽为号让梅花停在凤姐手中
            4. 凤姐讲两个笑话：一家人过正月半的冷笑话、聋子放炮仗的笑话
            5. 凤姐以"聋子放炮仗——散了"巧妙提议散席

            ### 七、放烟火与宵夜
            1. 贾母命放烟火解酒，各色进贡烟火精巧
            2. 黛玉怕炮仗声被贾母搂住，湘云不怕
            3. 凤姐说自己"比小厮们还放得好"
            4. 贾母夜长觉饿，凤姐依次报菜：鸭子肉粥、枣儿粳米粥、杏仁茶，贾母选了杏仁茶
            5. 散席

            ### 八、元宵后应酬
            1. 十七日过宁府行礼，掩宗祠收影像
            2. 十七日薛姨妈家请吃年酒，十八日赖大家，十九日赖升家，二十日林之孝家，二十一日单大良家，二十二日吴新登家
            3. 贾母或去或不去，宝玉只去了王子腾家

            **出场角色**: 贾母、王熙凤、贾宝玉、林黛玉、史湘云、薛宝钗、薛姨妈、李婶、邢夫人、王夫人、贾珍、贾琏、贾蓉、尤氏、李纨、娄氏、贾兰、贾菌、袭人、鸳鸯、麝月、秋纹、琥珀、文官、芳官、葵官、女先生等

            **关键转折**:
            1. 贾母对才子佳人小说的深刻批评，体现其见识与价值观
            2. 凤姐展现超强的察言观色与语言才能，既为袭人圆场又逗贾母开心
            3. 宝玉与黛玉的亲密互动（代饮酒）

            **伏笔线索**:
            1. 贾珍退出后与贾琏"追欢买笑"，暗示二人品行
            2. 袭人母亲去世、鸳鸯母亲去世，暗示二人身世飘零
            3. 贾母说"她从小儿服侍了我一场，又伏侍了云儿一场，末后给了一个魔王宝玉"，暗示袭人的服侍经历与命运
            4. 贾母批评才子佳人小说，与《红楼梦》自身的写作形成对照与反讽
        - name: 章节剧情 - 第29章
          keys: 第29章, 第五十七回, 慧紫鹃情辞试忙玉, 慈姨妈爱语慰痴颦
          content: |-
            **章节标题**: 第29章 慧紫鹃情辞试忙玉 慈姨妈爱语慰痴颦

            **主要事件**:

            ### 一、宝玉拜访甄家
            1. 王夫人带宝玉拜访甄夫人，甄家形景与荣宁相似，果有一宝玉
            2. 甄夫人留席，竟日方回；王夫人回请后，甄夫人母女回任

            ### 二、紫鹃冷言试探
            1. 宝玉去潇湘馆看黛玉，黛玉午睡未醒
            2. 紫鹃在回廊做针线，宝玉关心黛玉病情并摸紫鹃衣服嫌她穿得单薄
            3. 紫鹃以"一年大二年小"为由疏远宝玉，说姑娘吩咐不叫和他说笑，起身离去
            4. 宝玉如浇冷水，独坐山石上发呆流泪，呆了五六顿饭工夫

            ### 三、雪雁巧拒赵姨娘
            1. 雪雁从王夫人处取人参回来，路过发现宝玉独坐哭泣
            2. 宝玉以为雪雁也要疏远他，赶她走
            3. 雪雁回房讲述巧妙拒绝赵姨娘借衣裳的经过

            ### 四、紫鹃编谎试宝玉（核心事件）
            1. 紫鹃得知宝玉在外哭泣，主动去找他
            2. 借口问燕窝之事接近话题，得知是宝玉向贾母建议每日送燕窝给黛玉
            3. 紫鹃突然说"你妹妹回苏州家去"，编造林家有人来接、黛玉要还礼物等谎话
            4. 宝玉如头顶响了焦雷，当场呆住

            ### 五、宝玉急痛迷心
            1. 晴雯找来，将呆滞的宝玉拉回怡红院
            2. 宝玉症状：眼珠直直、口角流涎、手脚冰冷、不知疼痛
            3. 李嬷嬷来看后大哭说"不中用了"，众人皆哭
            4. 袭人急至潇湘馆质问紫鹃
            5. 黛玉听闻宝玉"已死了大半个"，将药全部呛出，痛声大嗽

            ### 六、紫鹃赴怡红院
            1. 紫鹃赶到怡红院，贾母、王夫人等已在
            2. 宝玉见紫鹃方哭出声来，死拉不放，说"要去连我也带了去"
            3. 众人方知是紫鹃"要回苏州"的玩话引出
            4. 宝玉听"林"字便发狂，见金西洋自行船认为是接黛玉的船
            5. 王太医诊断为"急痛迷心"，开方服药后渐安
            6. 贾母命紫鹃留在怡红院照顾宝玉，另派琥珀服侍黛玉

            ### 七、宝玉渐愈与紫鹃交心
            1. 宝玉渐好，有时佯作狂态留紫鹃
            2. 湘云病愈后来看宝玉，形容其病中狂态
            3. 宝玉问紫鹃为何唬他，紫鹃坦白：担忧黛玉去留及自己的归属
            4. 宝玉说出"活着一处活着，不活着一处化灰化烟"的誓言
            5. 紫鹃问宝玉是否定了琴姑娘的亲，宝玉否认并再次激动
            6. 紫鹃回潇湘馆，留下小菱花镜给宝玉

            ### 八、紫鹃夜劝黛玉
            1. 紫鹃夜间向黛玉进言："一动不如一静"，从小一处长大、脾气情性彼此知道最难得
            2. 劝黛玉趁贾母健在时定下婚事："老健春寒秋后热"，"万两黄金容易得，知心一个也难求"
            3. 黛玉表面斥责，实则伤感，直泣一夜

            ### 九、薛蝌与邢岫烟定亲
            1. 薛姨妈看中岫烟端雅稳重，原欲说与薛蟠，恐遭塌人家女儿
            2. 改说与薛蝌，通过凤姐向贾母提亲
            3. 贾母硬作保山，邢夫人将机就计应允
            4. 命尤氏居中料理婚事

            ### 十、宝钗体贴岫烟
            1. 宝钗发现岫烟换了夹衣，追问得知她当了棉衣
            2. 岫烟诉苦：月钱被邢夫人要求省一两给父母，迎春处丫鬟嘴尖
            3. 宝钗劝慰并主动帮忙赎回棉衣
            4. 劝岫烟"从实守分为主"，不必追求富丽妆饰
            5. 当票当在恒舒典，恰是薛家的当铺

            ### 十一、薛姨妈提议宝黛婚事
            1. 薛姨妈到潇湘馆探望黛玉，说"千里姻缘一线牵"
            2. 搂着黛玉说"心里更疼你"，黛玉认薛姨妈做娘
            3. 宝钗打趣黛玉"认不得娘"，暗示薛蟠已相准黛玉
            4. 薛姨妈正式提议："不如竟把你林妹妹定与他，岂不四角俱全？"
            5. 黛玉羞红了脸与宝钗笑闹，紫鹃急忙催促
            6. 婆子们也附和说此事"千妥万妥"

            ### 十二、当票风波
            1. 湘云拾到岫烟的当票不认识，拿来给众人看
            2. 湘云、黛玉等侯门千金均不识当票
            3. 宝钗急忙掩饰，谎称是旧年废票
            4. 宝钗私下告知黛玉、湘云岫烟的困境
            5. 黛玉感叹"兔死狐悲"，湘云要去打抱不平
            6. 三姑娘、四姑娘来访，三人掩口不提

            **出场角色**: 宝玉、黛玉、紫鹃、雪雁、袭人、晴雯、薛姨妈、宝钗、湘云、贾母、王夫人、邢夫人、凤姐、尤氏、邢岫烟、薛蝌、王太医、李嬷嬷、赵姨娘、琥珀、贾环、贾兰、甄夫人

            **关键转折**:
            1. 紫鹃一句"回苏州"的谎话引发宝玉急痛迷心——揭示宝玉对黛玉感情之深
            2. 紫鹃坦白试探动机——为黛玉婚事忧心
            3. 薛姨妈正式提议宝黛婚事——"四角俱全"之说
            4. 薛蝌与邢岫烟定亲——贾母硬作保山

            **伏笔线索**:
            1. 紫鹃劝黛玉"趁老太太还明白硬朗时作定大事"——暗示贾母若不在，黛玉处境堪忧
            2. 薛姨妈提议宝黛婚事，但仅是口头说说，并未付诸行动——为后文婚事变故埋伏笔
            3. 宝钗暗示薛蟠"已经相准了"黛玉——实为打趣，但涉及薛蟠婚事走向
            4. 岫烟当衣度日的困境——反映寄人篱下之苦，与黛玉处境形成对照
            5. 宝玉"活着一处活着，不活着一处化灰化烟"的誓言——为后文悲剧结局埋下伏笔
            6. 甄家亦有一宝玉——真假宝玉的对照线索
        - name: 章节剧情 - 第30章
          keys: 第30章, 杏子阴假凤泣虚凰, 茜纱窗真情揆痴理, 柳叶渚边嗔莺咤燕, 绛云轩里召将飞符
          content: |-
            **章节标题**: 第30章（含"杏子阴假凤泣虚凰 茜纱窗真情揆痴理"与"柳叶渚边嗔莺咤燕 绛云轩里召将飞符"）

            **主要事件**:

            ### 一、老太妃薨逝与府中变动
            1. 老太妃薨逝，诰命等皆入朝随班按爵守制，敕谕天下一年内不得筵宴音乐
            2. 贾母、邢夫人、王夫人等每日入朝随祭，府中无主
            3. 尤氏报产育被腾挪出来协理两府事务，薛姨妈受托入园照管姊妹
            4. 薛姨妈搬至潇湘馆与黛玉同住，黛玉感戴不尽，与宝钗宝琴"俨似同胞"
            5. 两府下人趁主人不在偷安结党、窃弄威福

            ### 二、遣发十二女伶
            1. 朝廷令凡养优伶者一概蠲免遣发
            2. 王夫人主张给盘费放归，体现慈悲；尤氏提出叫父母亲领的妥当方案
            3. 一多半不愿回家，只四五人愿去
            4. 不愿去者分配至各房：芳官归宝玉、蕊官归宝钗、藕官归黛玉等

            ### 三、宝玉杏树下感伤
            1. 清明日宝玉病后出院散步，见杏树花落结子
            2. 联想邢岫烟出嫁，感叹"绿叶成荫子满枝"，又想到青春易逝、红颜似槁
            3. 见雀儿落枝乱啼，又发呆想雀儿是否记得杏花

            ### 四、藕官烧纸与宝玉护庇
            1. 藕官在园中偷烧纸钱祭奠已故的菂官，被婆子发现要告发
            2. 宝玉编造"杏花神托梦要白纸钱"的谎言巧妙护庇
            3. 用拄杖敲开婆子的手，威胁要告老太太，婆子只得作罢

            ### 五、藕官菂官痴情故事
            1. 芳官向宝玉讲述：藕官与菂官在戏中常演夫妻，日久生真情
            2. 菂官死后藕官哭得死去活来，每节烧纸祭奠
            3. 后补蕊官为搭档，藕官阐述"续弦"之理：不把死者丢过不提便是情深
            4. 宝玉深感共鸣，称"天既生这样人，又何用我这须眉浊物"
            5. 宝玉嘱咐以后不可烧纸钱，阐述"只在诚心不在虚名"的祭祀观

            ### 六、芳官洗头风波
            1. 芳官干娘用亲女儿剩水给芳官洗头，芳官不满吵起来
            2. 干娘打芳官，晴雯、麝月先后出面训斥
            3. 麝月讲明规矩：干娘不得在主子屋里管教，威胁要"痛回一回"
            4. 干娘企图闯入内室替芳官吹汤，被晴雯骂出
            5. 袭人送洗头用品给芳官，晴雯替她洗净头发

            ### 七、莺儿编花篮与柳堤风波
            1. 莺儿与蕊官去潇湘馆取蔷薇硝，路上采柳条编花篮送黛玉
            2. 春燕讲述母亲姨妈贪利、与芳官藕官争吵的经过
            3. 春燕转述宝玉"珠子论"：女孩未嫁是无价宝珠，出嫁变死珠，老了变鱼眼睛
            4. 春燕姑妈（管柳堤的婆子）心疼花木，以老卖老打春燕
            5. 春燕母亲追来也打春燕，在青苔上滑倒
            6. 莺儿赌气将花柳掷于河中

            ### 八、怡红院婆子闹事
            1. 春燕跑入怡红院求助，抱住袭人
            2. 春燕母亲追入院中继续打骂
            3. 麝月提议叫平儿来处理，婆子害怕
            4. 平儿传话"撵出去打四十板子"，婆子哭求留下
            5. 宝玉心软留下婆子，吩咐不可再闹
            6. 平儿到场后说"得饶人处且饶人"，透露各处已出八九件事

            ### 九、送灵出发
            1. 鸳鸯、玉钏等打点贾母王夫人之物，先发帐幔铺陈至下处
            2. 贾母带蓉妻坐驮轿，王夫人随后，贾珍骑马率家丁护卫
            3. 贾琏押后跟随
            4. 赖大添派人丁上夜，各门关锁，安插妥当

            **出场角色**: 宝玉、黛玉、宝钗、湘云、香菱、宝琴、探春、薛姨妈、尤氏、王夫人、贾母、贾琏、贾珍、贾环、贾琮、贾兰、贾蓉、藕官、芳官、蕊官、菂官（已故）、文官、葵官、豆官、艾官、茄官、袭人、晴雯、麝月、平儿、莺儿、紫鹃、鸳鸯、玉钏、春燕、春燕母亲、春燕姑妈、赖大

            **关键转折**:
            1. 老太妃薨逝导致府中权力真空，下人趁机作乱
            2. 十二女伶遣散分配，引发新旧势力（女伶vs婆子）冲突
            3. 藕官菂官的痴情故事揭示，呼应宝玉的情感哲学

            **伏笔线索**:
            1. 两府下人趁主人不在"偷安结党、窃弄威福"，暗示贾府管理日益混乱
            2. 平儿说"大小出了八九件事"，暗示更多乱象
            3. 薛姨妈与黛玉亲近，宝钗黛玉关系融洽，为后续关系变化埋伏笔
            4. 宝玉对杏树的感伤（花落子成→红颜似槁）暗示对女儿命运的悲叹主题
