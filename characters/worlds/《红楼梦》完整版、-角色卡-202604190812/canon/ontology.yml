        - name: 角色 - 包勇
          keys: 包勇, 甄家仆
          content: "**名称**: 包勇\n**性别**: 男\n**MBTI**: ISTP（务实、直率、忠诚，不善言辞但行动力强）\n**身份**: 甄家旧仆，后投靠贾家\n**背景**: 原为甄家使用多年的奴仆，甄家被抄家后家人星散，甄老爷修书推荐其到贾府谋生\n**性格**: 悫实（老实本分）、直率、忠心耿耿，对旧主感情深厚\n**外貌**: 身长五尺有零，肩背宽肥，浓眉爆眼，磕额长髯，气色粗黑\n**重要事件**:\n1. 携甄老爷手书投靠贾府\n2. 向贾政讲述甄宝玉大病后性情大变、改过自新之事\n**话语示例**:\n- \"小的原不肯出来。只是家爷再四叫小的出来，说是别处你不肯去，这里老爷家里只当原在自己家里一样的\"\n- \"我们老爷只是太好了，一味的真心待人，反倒招出事来\"\n- \"因为太真了，人人都不喜欢，讨人厌烦是有的\"\n\n---\n\n**名称**: 包勇\n**性别**: 男\n**MBTI**: ESTP（直爽冲动，赤心护主，不知好歹）\n**身份**: 贾府家人\n**性格**: 直爽，赤心护主，酒后冲动\n**重要事件**:\n1. 酒后在荣府街上听闻贾雨村忘恩负义踢弄贾家之事\n2. 趁酒兴当街大骂\"没良心的男女\"\n3. 贾政怕风波，责骂后派他去看园，不许在外行走\n4. 收拾行李往园中看守浇灌\n\n---\n\n**名称**: 包勇\n**性别**: 男\n**MBTI**: ESFP (直率冲动，讲义气)\n**年龄**: 成年\n**身份**: 甄府荐来的仆人\n**背景**: 新投荣府，恰遇抄家。\n**性格**: 直爽赤心，不随和，好酒。\n**重要事件**: \n1. 见众人欺瞒主子，心中不忿，吃了睡，睡了吃。\n2. 酒后大骂贾雨村忘恩负义，踢弄贾府。\n3. 被贾政责骂，派去看守园子。"
        - name: 角色 - 宝钗
          keys: 宝钗, 宝丫头, 宝姐姐, 蘅芜君, 宝妹妹, 薛宝钗, 姑娘, 宝姑娘, 二奶奶
          content: "**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISTJ（内向感觉思维判断型，博学多识、稳重端庄、恪守礼教，但内心也曾有淘气一面）\n**身份**: 薛姨妈之女，寄居贾府\n**性格**: 博学广识、端庄大方、善于教导、恪守闺训\n**重要事件**:\n1. 在栊翠庵用妙玉的\"瓟斝\"（晋王恺珍玩）品茶\n2. 将黛玉叫到蘅芜苑，指出黛玉在行酒令时说了《牡丹亭》《西厢记》中的话，善意提醒\n3. 自述幼时也偷看过《西厢》《琵琶》《元人百种》等杂书，后被大人发现禁止\n4. 对黛玉发表一番关于女子本分的议论：女孩儿家该做针黹纺织，不该看杂书移性情\n5. 为惜春画大观园图详细分析技法难度，提出给半年假期并派宝玉帮忙的方案\n6. 开列详尽的画具颜料单子，展现丰富的绘画知识\n7. 解释生姜和酱的用途：抹在粗色碟子底上烤过防炸\n**话语示例**:\n- \"你当我是谁，我也是个淘气的。从小七八岁上也够个人缠的。\"\n- \"咱们女孩儿家不认得字的倒好。\"\n- \"更有颦儿这促狭嘴，他用'春秋'的法子，将市俗的粗话，撮其要，删其繁，再加润色。\"\n- \"那雪浪纸写字，画写意画儿，或是会山水的画南宗山水，托墨，禁得皴染。拿了画这个，又不托色，又难滃。\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ESTJ\n**身份**: 薛姨妈之女，寄居贾府\n**重要事件**:\n1. 凑份子时随薛姨妈一份\n2. 看《荆钗记》时黛玉评论王十朋，宝钗不答\n3. 劝解平儿：\"素日凤丫头何等待你，今儿不过她多吃一口酒\"\n**话语示例**:\n- \"你是个明白人，素日凤丫头何等待你，今儿不过她多吃一口酒。他可不拿你出气，难道倒拿别人出气不成？\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISTJ（理性务实、深思熟虑、大局观强，善于劝导安抚）\n**身份**: 薛姨妈之女，薛蟠之妹\n**性格**: 冷静理智、识大体、顾大局。对兄长的荒唐行为既无奈又清醒，能以理服人。对香菱学诗持宽容态度。\n**重要事件**:\n1. 劝阻薛姨妈不要因薛蟠被打而兴师动众，分析利弊\n2. 与薛姨妈商议后同意薛蟠外出经商，认为\"花两个钱叫他学些乖来也值了\"\n3. 带香菱入住大观园蘅芜苑作伴\n4. 催促香菱睡觉，关心其学诗过度\n5. 给平儿棒疮药丸\n**话语示例**:\n- \"哥哥果然要经历正事，正是好的了\"\n- \"一半尽人力，一半听天命罢了\"\n- \"这个人定要疯了！\"\n- \"你能够像她这苦心就好了，学什么有个不成的？\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISTJ（稳重端庄、理性务实，注重礼节规矩）\n**身份**: 薛家大小姐，寄居贾府\n**重要事件**:\n1. 被请至怡红院参加夜宴，初说\"夜深了\"不肯来，后被袭人晴雯拉来\n2. 第一个抽花名签，抽中牡丹，题\"艳冠群芳\"，诗云\"任是无情也动人\"\n3. 命芳官唱曲助兴\n4. 与袭人同庚\n**花名签**: 牡丹，\"艳冠群芳\"，\"任是无情也动人\"——众人评\"你也原配牡丹花\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISTJ（稳重周全，行事有分寸，善于安排）\n**身份**: 薛姨妈之女，暂居贾府大观园\n**重要事件**:\n1. 因薛姨妈身上不自在、家中女人因时症未起炕，要出园回家伴老人家\n2. 不愿惊动贾母太太，只来告知李纨\n3. 建议请湘云来与李纨同住，省去添人看屋之事\n4. 已打发人去找探春和湘云\n**话语示例**:\n- \"依我的主意，也不必添人过去，竟把云丫头请了来，你和她住一两日，岂不省事。\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**身份**: 薛姨妈之女\n**重要事件**:\n1. 听闻岫烟之事与薛姨妈落泪\n2. 关心岫烟处境，说\"到底是咱们家里人\"\n3. 贾母、王夫人商议中被认为是宝玉最妥当的婚配人选\n**话语示例**:\n- \"都为哥哥不在家，所以叫邢姑娘多吃几天苦。如今还亏凤姐姐不错。\"\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISTJ（稳重体谅，但本章未直接出场，通过他人描述呈现）\n**身份**: 薛姨妈之女，薛蟠之妹\n**重要事件**:\n1. 因薛蝌连夜起程之事亲自帮忙收拾行李，直闹至四更\n2. 心急加劳累，晚上发烧，满面通红，身如燔灼，话都不说\n3. 汤水不进，治了七八天不见效\n4. 最终靠冷香丸吃了三丸才病好\n5. 消寒会未到场，薛姨妈假说身上不好\n**背景**: 贾政已定下冬底放定、明春过礼、过了贾母生日便定日子娶宝钗过门\n\n---\n\n**名称**: 宝钗（薛宝钗）\n**性别**: 女\n**身份**: 宝玉之妻\n**性格**: 沉厚稳重，比先时更甚\n**重要事件**:\n1. 贾政回家见其沉厚更胜先时，甚为喜欢\n2. 宝玉夜间要找袭人说话时，宝钗以为他怕老爷查问功课，安慰后先去睡\n3. 抄家时与宝玉等在贾母处\n\n---\n\n**名称**: 薛宝钗\n**性别**: 女\n**MBTI**: ISFJ (稳重务实，隐忍坚强)\n**年龄**: 青年\n**身份**: 宝玉之妻，薛姨妈之女\n**背景**: 金陵薛家小姐。\n**性格**: 懂事明理，压抑苦楚。\n**重要事件**: \n1. 因哥哥薛蟠在外监，家业萧条，宝玉疯傻，忧及终身，比众人哭得更痛。\n**话语示例**: 无\n**弱点**: 隐忍过度。"
        - name: 角色 - 宝蟾
          keys: 宝蟾
          content: |-
            **名称**: 宝蟾
            **性别**: 女
            **身份**: 夏金桂的陪嫁丫鬟，薛蟠屋里人
            **性格**: 鬼鬼祟祟、不尴不尬、暧昧挑逗
            **重要事件**:
            1. 受金桂之命给薛蝌送酒果
            2. 言语暧昧，笑瞅薛蝌，暗示金桂要亲自来"道乏"
            3. 临走时往外看看，回头一笑，指着里面说话，举止不正经
            **话语示例**:
            - "服侍的着大爷，就服侍的着二爷，这有何妨呢！"
            - "她还只怕要来亲自给你道乏呢！"

            ---

            **名称**: 宝蟾
            **性别**: 女
            **MBTI**: ENTP（机智善辩，善于察言观色，借风使船，工于设计）
            **身份**: 金桂的丫鬟，原是薛蟠屋里人
            **性格**:
            - 鬼鬼祟祟，善于挑拨
            - 乐得借风使船，想先弄薛蝌到手
            - 能装能演，时而娇媚引诱，时而一脸正气
            - 心思缜密，能想出完整的设计方案
            **外貌**: 穿片锦边琵琶襟小紧身，系松花绿半新汗巾，露石榴红洒花夹裤，新绣红鞋，未梳洗时越显娇媚
            **重要事件**:
            1. 夜间送酒果试探薛蝌，窗外偷窥吹气戏弄
            2. 次日故意穿动人衣服、不梳洗去取家伙，以退为进
            3. 向金桂献计：先笼络感情，再灌醉得手，不应则以"调戏"要挟
            4. 之后见薛蝌时故意低头不理，装出正气
            **话语示例**: "那个耗子不偷油呢？他也不过怕事情不密，大家闹出乱子来，不好看。"
        - name: 角色 - 宝玉
          keys: 宝玉, 贾宝玉, 宝兄弟, 宝二爷, 槛内人, 怡红主人, 二爷, 二叔叔
          content: "**名称**: 贾宝玉\n**性别**: 男\n**重要事件**:\n1. 随凤姐儿去探望秦可卿\n2. 看到秦可卿房中《海棠春睡图》和秦太虚对联，想起在此梦游太虚幻境之事\n3. 听秦可卿说病中感言，\"如万箭攒心\"，不觉流泪\n4. 被凤姐儿说\"忒婆婆妈妈\"，被劝先去会芳园\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: ENFP（外向直觉情感感知型，感性浪漫、体贴善良、不拘礼法）\n**身份**: 荣国府嫡孙，贾政与王夫人之子\n**重要事件**:\n1. 在栊翠庵与妙玉交流品茶，用\"随乡入乡\"之语讨妙玉欢心\n2. 提议将妙玉嫌弃的成窑茶杯送给刘姥姥度日，又提议打水洗栊翠庵地面\n3. 将成窑钟子交给小丫头，嘱咐明日给刘姥姥带去\n4. 迎接王太医为贾母诊病\n5. 在稻香村为惜春画画之事记录宝钗开列的画具单子\n6. 听宝钗提到詹子亮、程日兴等画师，急于去请教，被宝钗制止\n7. 看黛玉抿鬓后觉得更好看，暗自后悔不该让她抿上去\n**话语示例**:\n- \"俗说'随乡入乡'，到了你这里，自然把那金玉珠宝一概贬为俗器了。\"\n- \"这话极是。詹子亮的工细楼台就极好，程日兴的美人是绝技。\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP\n**身份**: 贾母最疼爱的孙子\n**本章表现**:\n1. 在园中藏起来哄袭人，后绕到袭人身后偷听\n2. 听到鸳鸯之事后心中不快，默默歪在床上\n3. 在贾母面前替母亲王夫人跪下赔不是\n**话语示例**:\n- \"我偏着娘说大爷大娘不成？通共一个不是，我娘在这里不认，却推给谁去？\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: ENFP（重情重义、感性细腻、不拘世俗）\n**身份**: 贾政与王夫人之子\n**重要事件**:\n1. 在赖大家宴上与柳湘莲在书房叙旧\n2. 关心秦钟坟墓，曾摘莲蓬叫茗烟去供奉\n3. 感叹自己被圈在家中不得自由\n4. 听闻湘莲要远行，滴下泪来\n5. 将大观园诗社的诗稿给外头相公们看，被探春黛玉批评\n6. 评价香菱学诗已得\"三昧\"\n7. 感叹香菱\"地灵人杰\"，\"老天生人再不虚赋情性\"\n**话语示例**:\n- \"会心处不在多，听你说了这两句，可知'三昧'你已得了\"\n- \"说慌的是那架上的鹦哥\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP（感性细腻，关心身边人，重情重义）\n**身份**: 荣国府贾政之子\n**重要事件**:\n1. 关心晴雯病情，叹说\"倘或有个好歹，都是我的罪孽\"\n2. 为晴雯调停饮食，变法要汤要羹\n3. 祭祀中担任捧香之职\n4. 元宵家宴中与宝琴、湘云、黛玉同坐贾母身旁\n**话语示例**:\n- \"这怎么处？倘或有个好歹，都是我的罪孽。\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: ENFP（热情浪漫、富有想象力，喜欢与人亲近，厌恶俗套礼节，追求自由与美好事物）\n**身份**: 贾府荣国府公子\n**性格**: 厌恶俗套，喜欢与丫鬟们亲近玩乐，心思细腻，对美好事物有独特感受力，对弱者充满怜悯\n**外貌**: 穿大红棉纱小袄子，下面绿绫弹墨夹裤，散着裤脚\n**重要事件**:\n1. 生日当晚与丫鬟们在怡红院开夜宴，占花名签行酒令\n2. 收到妙玉拜帖\"槛外人妙玉恭肃遥叩芳辰\"，不知如何回帖\n3. 偶遇岫烟，得其指点以\"槛内人\"回帖，亲送至栊翠庵\n4. 为芳官改男装，取番名\"耶律雄奴\"、\"温都里纳\"（玻璃）\n**话语示例**:\n- \"她们是哪里的钱，不该叫她们出才是。\"\n- \"怕什么！咱们三姑娘也吃酒，再请她一声才好。\"\n- \"好好的并无疾病，怎么就没了？\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP（理想主义、活在当下、厌恶世俗功利、珍惜与姊妹们的时光）\n**身份**: 荣国府嫡孙\n**重要事件**:\n1. 寿宴当日去庙里跪经念\"保安延寿经\"\n2. 在贾母榻上脚下为贾母捶腿\n3. 与众人闲谈时说出\"我能够和姊妹们过一日是一日，死了就完了\"等语\n**话语示例**:\n- \"谁都像三妹妹好多心多事，我常劝你，总别听那些俗语，想那俗事，只管安富尊荣才是。\"\n- \"人事莫定，知道谁死谁活。倘或我在今日明日，今年明年死了，也算是遂心一辈子了。\"\n**性格特征**: 被众人评为\"假长了一个胎子，究竟是个又傻又呆的\"，说话不是呆话就是疯话\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**身份**: 荣国府嫡孙\n**重要事件**:\n1. 因柳家媳妇之事，想约迎春一同去讨情\n2. 抄检时不知何故，迎出凤姐询问\n3. 凤姐以\"丢了东西\"搪塞\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP（敏感多思，在父亲面前踧踖不安，善于揣度进退）\n**身份**: 荣国府贾政之子\n**重要事件**:\n1. 饭后跟贾珍习射，弓力有长进\n2. 中秋夜陪贾母赏月，击鼓传花时花落手中\n3. 因贾政在座不敢说笑话，辞说不能，改为即景作秋诗\n4. 作诗受贾政认可，获赏海南扇子两把\n5. 贾母命其搀扶上山赏月\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP（重情感、理想化，对逝去之人深情缅怀，面对黛玉时欲言又止，内心矛盾丰富）\n**身份**: 贾府公子，荣国府嫡孙\n**性格**: 多情善感、呆头呆脑（王夫人语）、不避嫌疑、重情义\n**背景**: 因贾政公务繁忙，功课渐松，但仍不敢不去学房。与黛玉关系亲密却\"亲极反疏\"，有万千言语说不出口\n**重要事件**:\n1. 在学房中见到晴雯所补的雀金裘，神色痴呆，触物伤情\n2. 回房后为晴雯焚香填词，写下悼词\"随身伴，独自意绸缪\"，焚化祭奠\n3. 到潇湘馆探望黛玉，谈琴论诗，劝黛玉不要弹琴劳神\n4. 与黛玉对话时半吐半吞、忽冷忽热，欲将实言安慰又恐黛玉生嗔\n**话语示例**:\n- \"怎么拿这一件来！是谁给你的？\"\n- \"我身上不大冷，且不穿呢，包上罢。\"\n- \"那么着，你就收拾起来，给我包好了。我也总不穿他了。\"\n- \"琴虽是清高之品，却不是好东西，从没有弹琴里弹出富贵寿考来的\"\n**弱点**: 情感过于敏感，面对黛玉时欲言又止，不敢表露真心\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP（理想主义，情感丰富，容易陷入冥想，对禅理有悟性但不稳定）\n**身份**: 荣国府贾政之子，正在上学读书\n**性格**:\n- 多情善感，听闻薛姨妈冷淡便满腹猜疑\n- 有禅悟之才，能与黛玉对禅机\n- 仍有少年心性，听闻柳五儿要进怡红院便喜出望外呆呆出神\n- 对巧姐儿讲《列女传》头头是道，学识不浅\n**重要事件**:\n1. 去潇湘馆与黛玉谈论宝钗之事，引发禅语对答\n2. 说出\"任凭弱水三千，我只取一瓢饮\"表明心迹\n3. 为巧姐讲解《列女传》中各类贤良女子故事\n4. 听闻柳五儿要补入怡红院，喜出望外\n5. 消寒会上见宝钗未来，心中纳闷\n**话语示例**:\n- \"任凭弱水三千，我只取一瓢饮。\"\n- \"禅心已作沾泥絮，莫向春风舞鹧鸪。\"\n- \"我想这个人，生他做什么！天地间没有了我，倒也干净！\"\n\n---\n\n**名称**: 宝玉\n**性别**: 男\n**MBTI**: INFP（多情善感、执着于情、不谙世事，病后灵机渐失）\n**身份**: 荣国府嫡孙，贾政之子\n**背景**: 大病初愈后被瞒婚娶宝钗，心中始终挂念林黛玉，病后思维迟钝\n**性格**: 痴情、执着、不通世务、感伤多泪\n**重要事件**:\n1. 因贾政问起黛玉，暗里伤心落泪\n2. 夜间央求袭人叫紫鹃来问黛玉临终之事\n3. 想为黛玉写祭文，却自觉灵机全无\n4. 质疑黛玉是否真死，猜测其成仙\n5. 抄家时假说有病躲在贾母处\n**话语示例**:\n- \"她是我本不愿意的，都是老太太她们捉弄的，好端端把一个林妹妹弄死了。\"\n- \"我并不是负心的，我如今叫你们弄成了一个负心人了！\"\n- \"如今林姑娘死了，莫非倒不如晴雯么？\"\n\n---\n\n**名称**: 贾宝玉\n**性别**: 男\n**MBTI**: INFP (重情敏感，理想主义，逃避现实)\n**年龄**: 青年\n**身份**: 贾政之子，贾母之孙\n**背景**: 含玉而生，深受贾母宠爱。\n**性格**: 疯傻痴情，不知忧患，见人哭他就哭。\n**重要事件**: \n1. 在贾母身边劝慰，但见众人哭泣，自己也嚎啕大哭。\n2. 听史湘云出阁消息，感叹女子出嫁便改变，更觉自己无味。\n**话语示例**: “老太太年老不得安……众姐妹风流云散，一日少似一日。”\n**弱点**: 毫无志气，不能担当。"
