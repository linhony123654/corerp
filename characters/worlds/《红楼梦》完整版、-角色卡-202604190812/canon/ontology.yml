          content: "**名称**: 绛珠仙子（前身为绛珠草）  \n**性别**: 女  \n**身份**: 林黛玉前世  \n\n**背景**: 原为西方灵河岸上三生石畔一株绛珠草，因受神瑛侍者以甘露灌溉，方得久延岁月。后汲取天地精华与雨露滋养，脱去草胎木质，修炼成女体，化为仙子。  \n\n**性格**: 终日游于离恨天外，饥食蜜青果，渴饮灌愁海水，内心郁结缠绵不尽之意。  \n\n**重要事件**:  \n1. 受神瑛侍者甘露灌溉之恩。  \n2. 神瑛侍者下凡投胎，绛珠仙子发愿随之下界，誓言“把我一生所有的眼泪还他”，以偿灌溉之恩。  \n3. 此事牵动诸多风流冤家陪同一并了结此案。  \n\n**话语示例**:  \n- “他是甘露之惠，我并无此水可还。他既下世为人，我也去下世为人，但把我一生所有的眼泪还他，也偿还得过他了。”"
