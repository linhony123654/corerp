            **主要事件**:

            ### 一、宝玉晨间厮混与袭人箴劝
            1. 湘云与黛玉打闹后同住黛玉房中，宝玉次日清晨便去黛玉房，见二人睡态，替湘云盖被
            2. 宝玉借湘云之手梳头、用黛玉处水洗脸，顺手拈胭脂被湘云打落
            3. 袭人对宝玉无昼夜与姊妹厮闹不满，用冷战方式规劝
            4. 宝钗来访与袭人交谈，暗中赏识袭人见识
            5. 宝玉与袭人冷战，将丫头蕙香改名四儿
            6. 宝玉夜读《南华经·胠箧》，趁酒兴续写涉及宝钗黛玉的文字
            7. 次日袭人以柔情再劝，宝玉折玉簪发誓，二人和好

            ### 二、贾琏偷情与平儿遮掩
            1. 大姐儿出痘，凤姐忙于供奉痘疹娘娘，贾琏搬至外书房斋戒
            2. 贾琏独寝难熬，与多姑娘儿私通
            3. 十二日后大姐儿痊愈，贾琏搬回
            4. 平儿收拾衣物发现枕套中多姑娘儿的一绺青丝
            5. 凤姐进来旁敲侧击，平儿巧妙遮掩化解危机
            6. 贾琏抢回头发，平儿邀功，贾琏调戏平儿被拒
            7. 凤姐再进来，平儿伶俐应对，贾琏叹服

            ### 三、宝钗生日与宝玉悟禅
            1. 凤姐与贾琏商议宝钗十五岁生日规格，贾母蠲资二十两
            2. 凤姐打诨逗贾母开心
            3. 宝钗生日家宴，点戏看戏，宝钗为宝玉念《寄生草》
            4. 湘云说小旦像黛玉，宝玉使眼色，引发湘云和黛玉双双生气
            5. 宝玉两面受气，感悟"赤条条来去无牵挂"，写偈语和《寄生草》
            6. 黛玉以禅机问住宝玉，宝钗以六祖惠能典故点化，宝玉放弃参禅

            ### 四、元宵灯谜与贾政悲谶
            1. 元春差人送灯谜，众人猜谜并各作一谜送入宫中
            2. 贾政来贾母处承欢，与贾母互猜灯谜
            3. 贾政猜众姊妹灯谜，内心沉思：爆竹一响而散、算盘乱如麻、风筝飘浮、海灯孤独、宝钗更香亦不祥
            4. 贾政深感"皆非福寿之辈"，悲戚难寐
            5. 贾母撵贾政走后，众人方自在取乐

            **出场角色**: 贾宝玉、林黛玉、史湘云、薛宝钗、袭人、麝月、四儿（蕙香）、贾琏、王熙凤、平儿、多姑娘儿、多浑虫、贾母、贾政、薛姨妈、王夫人、李纨、迎春、探春、惜春、贾环、贾兰、紫鹃、翠缕、元春（未出场，差人送灯谜）

            **关键转折**:
            1. 袭人用冷战策略成功规劝宝玉，确立了她在宝玉身边的特殊地位
            2. 平儿替贾琏遮掩私情，展现其在凤姐与贾琏间的微妙立场
            3. 宝玉因情感受挫而悟禅，但被黛玉宝钗轻易破解，说明其悟并非真悟
            4. 贾政从灯谜中预感不祥，暗示众姊妹命运的悲剧走向

            **伏笔线索**:
            1. 元春灯谜"爆竹"——一响而散，暗示元春盛极而衰
            2. 迎春"算盘"——打动乱如麻，暗示迎春婚后悲惨
            3. 探春"风筝"——飘飘浮荡，暗示探春远嫁
            4. 惜春"海灯"——清净孤独，暗示惜春出家
            5. 宝钗"更香"——焦首煎心、风雨阴晴，暗示宝钗婚后凄凉
            6. 宝玉续《庄子》涉及"戕宝钗之仙姿，灰黛玉之灵窍"，暗示钗黛命运
            7. 黛玉续偈"无立足境，是方干净"，暗合其最终归宿
