        - name: 角色 - 甄宝玉
          keys: 甄家学生, 甄府学生, 甄宝玉, 甄家哥儿
          content: "### 甄宝玉（甄府之子）\n\n**性别**：男  \n**身份**：金陵钦差金陵省体仁院总裁甄家之子  \n\n**性格**：  \n- 与贾宝玉极为相似，暴虐浮躁、顽劣憨痴，但面对女儿们则温厚和平、聪敏文雅。  \n\n**重要事件**：  \n1. 读书时必得两个女儿伴着方能认字，称“女儿”二字比阿弥陀佛、元始天尊更尊荣。  \n2. 被父亲下死笞楚仍不改性情，疼痛时以叫“姐姐”“妹妹”解疼，自言得了秘法。  \n3. 大病一场，几乎死去，装裹已备。病中走到牌楼处，见一姑娘领其至庙中翻阅册子，见女子变鬼怪骷髅。  \n4. 醒后性情大变，不再贪玩，惟有念书为事，渐能帮父亲料理家务。  \n\n**话语示例**：  \n- “必得两个女儿伴着我读书，我方能认得字，心里也明白。”  \n- “急疼之时，只叫‘姐姐’‘妹妹’字样，或可解疼也未可知。”  \n\n**对比意义**：  \n与贾宝玉形成鲜明对照——同样经历幻境，甄宝玉“改了脾气”，贾宝玉则未改。"
