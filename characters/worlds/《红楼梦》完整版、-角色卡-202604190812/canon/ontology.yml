        - name: 组织 - 金陵十二钗
          keys: 金陵十二钗, 十二钗, 正册, 副册, 又副册
          content: |-
            **名称**: 金陵十二钗
            **性质**: 贵省（金陵）中十二冠首女子之册籍分类
            **分类**:
              1. **正册**: 十二位最重要女子，册中判词判画暗示各人命运
              2. **副册**: 次一等女子
              3. **又副册**: 再次一等女子
              4. 余者庸常之辈无册可录
            **正册判词所涉人物（按顺序）**:
              1. 林黛玉与薛宝钗（合一页）：两株枯木悬玉带，雪下金簪
              2. 贾元春：弓上挂香橼，"虎兔相逢大梦归"
              3. 贾探春：两人放风筝，大海大船，女子泣涕
              4. 史湘云：飞云逝水，"湘江水逝楚云飞"
              5. 妙玉：美玉落泥垢，"欲洁何曾洁，云空未必空"
              6. 贾迎春：恶狼追扑美女，"子系中山狼"
              7. 贾惜春：古庙美人看经，"缁衣顿改昔年妆"
              8. 王熙凤：冰山雌凤，"一从二令三人木"
              9. 巧姐：荒村野店美人纺绩，"偶因济刘氏"
              10. 李纨：茂兰凤冠霞帔美人，"桃李春风结子完"
              11. 秦可卿：高楼大厦美人悬梁自缢，"造衅开端实在宁"
            **又副册判词所涉人物**:
              1. 晴雯：水墨乌云浊雾，"霁月难逢，彩云易散。心比天高，身为下贱"
              2. 袭人：鲜花破席，"枉自温柔和顺，空云似桂如兰"
            **副册判词所涉人物**:
              1. 香菱：桂花枯池，"根并荷花一茎香......自从两地生孤木"
