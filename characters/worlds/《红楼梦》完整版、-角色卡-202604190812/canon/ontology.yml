          keys: 第43章, 因讹成实元妃薨逝, 以假混真宝玉疯颠, 瞒消息凤姐设奇谋, 泄机关颦儿迷本性
          content: "**章节标题**: 第43章（含第九十五回、第九十六回部分内容）\n**主要事件**: \n1. **真假玉风波**: 茗烟在当铺寻玉未果；邢岫烟求妙玉扶乩，得乩语暗示玉在青埂峰。贾母悬赏万两寻玉，有人持假玉冒充，被贾琏识破，贾母宽厚处理。\n2. **元妃薨逝**: 元春因痰疾突发，于十二月十九日薨逝，贾府上下忙碌治丧。\n3. **接连打击**: 宝玉失玉后神志昏聩，如同傻子。王子腾在进京途中病故，王夫人悲女哭弟，心口疼痛发作。贾政被外放江西粮道。\n4. **冲喜之议**: 贾母见宝玉病重，做主采纳算命先生之言，欲娶宝钗为宝玉冲喜。贾政虽不情愿，但不敢违逆母命。\n5. **掉包计**: 袭人向王夫人哭诉宝玉心中只有黛玉，担心冲喜反成催命。凤姐献“掉包计”，假称老爷做主将林姑娘配给宝玉，以试探并安抚其心，贾母、王夫人同意。\n6. **黛玉迷本性**: 傻大姐在沁芳桥无意中向黛玉泄露宝玉娶亲的消息。黛玉闻讯，心智迷乱，去宝玉处两人对脸傻笑，回到潇湘馆门口一口血吐出来。\n**出场角色**: 贾宝玉、林黛玉、贾母、王夫人、王熙凤、贾政、袭人、妙玉、邢岫烟、紫鹃、傻大姐、贾琏、元春。\n**关键转折**: 贾府祸不单行，接连遭遇失玉、贵妃薨逝、重臣病故、家主外放。宝玉与黛玉的命运因凤姐的掉包计发生根本性转折，黛玉得知婚讯后精神崩溃。\n**伏笔线索**: 妙玉的乩语“青埂峰下倚古松”暗示了宝玉的来历与归宿；“入我门来一笑逢”预示了未来的重逢方式。"
        - name: 章节剧情 - 第44章
          keys: 第44章, 林黛玉焚稿断痴情, 薛宝钗出闺成大礼
          content: |-
            **章节标题**: 第44章 林黛玉焚稿断痴情 薛宝钗出闺成大礼

            **主要事件**:

            ### 一、黛玉吐血病重
            1. 黛玉回潇湘馆途中吐血几乎晕倒，紫鹃、雪雁扶回屋中
            2. 吐血后渐渐清醒，反不伤心，惟求速死以完此债
            3. 贾母、王夫人、凤姐来探视，王大夫诊断"郁气伤肝，肝不藏血"
            4. 贾母吩咐预备后事以"冲一冲"

            ### 二、贾母态度转变与婚事商议
            1. 贾母表态：若黛玉是心病，"不但治不好，我也没心肠了"
            2. 凤姐提议到薛姨妈处商议宝玉婚事
            3. 凤姐试探宝玉，用"娶林妹妹"稳住宝玉
            4. 贾母、王夫人到薛家，邀薛姨妈晚间商议

            ### 三、薛家应承婚事
            1. 薛姨妈虽虑宝钗委屈，终满口应承
            2. 议定凤姐夫妇作媒人，装奁蠲免从简
            3. 薛姨妈告知宝钗，宝钗低头不语后垂泪
            4. 薛蝌去探薛蟠，带回口信同意婚事
            5. 办泥金庚帖，商定过礼日期

            ### 四、过礼与黛玉焚稿
            1. 过礼从便门送入，避开潇湘馆
            2. 宝玉信以为真，精神好转
            3. 黛玉病日重一日，紫鹃苦劝无效
            4. 贾府上下无人再来问候黛玉
            5. **焚稿断痴情**：黛玉让雪雁取出诗稿和题诗旧帕，先将旧帕撂入火中烧毁，又将诗稿焚烧殆尽，随后几乎昏厥

            ### 五、紫鹃探知真相
            1. 紫鹃去贾母处报信，发现上下无人
            2. 从墨雨口中得知宝玉今夜完婚
            3. 紫鹃悲愤交加，咬牙发狠

            ### 六、黛玉弥留与李纨赶来
            1. 黛玉两颧红赤（回光返照之象），不能言语
            2. 紫鹃请来李纨照看
            3. 李纨催促准备衣衾装裹
            4. 平儿受凤姐之命来探视
            5. 林之孝家的要调紫鹃去新房，紫鹃拒绝，改派雪雁

            ### 七、宝钗出闺成大礼
            1. 大轿从大门进来，细乐迎出，十二对宫灯
            2. 雪雁扶新人，宝玉见雪雁更信是黛玉
            3. 拜天地、受贾母四拜、行礼、送入洞房
            4. 宝玉揭盖头，发现是宝钗而非黛玉，发怔以为做梦
            5. 宝玉口口声声要找林妹妹，旧病复发
            6. 众人点安息香定神，扶宝玉睡下
            7. 宝钗置若罔闻，和衣暂歇

            ### 八、贾政起程
            1. 次日贾政辞宗祠、拜别贾母
            2. 贾母隐瞒宝玉复病之事
            3. 宝玉见父亲时神志略敛
            4. 贾政嘱咐管教宝玉、明年乡试务必下场
            5. 宝钗行新妇送行之礼
            6. 贾政起程赴任
            7. 宝玉回来后旧病陡发，更加昏愦，连饮食也不能进

            **出场角色**: 林黛玉、贾宝玉、薛宝钗、王熙凤、贾母、紫鹃、雪雁、袭人、薛姨妈、李纨、平儿、贾政、王夫人、贾琏、鸳鸯、薛蝌、墨雨、林之孝家的、王大夫、莺儿、秋纹、王奶奶、尤氏、宝琴

            **关键转折**:
            1. 黛玉焚稿断痴情——彻底斩断与宝玉的情感纽带
            2. 宝玉揭盖头发现新娘是宝钗——"偷梁换柱"真相大白
            3. 宝玉旧病陡发——婚事非但未冲喜，反而加重病情

            **伏笔线索**:
            1. 黛玉"一息奄奄"，李纨已在准备衣衾装裹——暗示黛玉即将离世
            2. 宝玉"旧病陡发，更加昏愦，连饮食也不能进"——暗示后续更大危机
            3. 贾母对黛玉疼爱之心减退，鸳鸯"不常去回"——暗示黛玉在贾府已被边缘化
            4. 紫鹃拒绝去新房、坚守黛玉——为后续黛玉之死的见证者埋下伏笔
