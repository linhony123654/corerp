        - name: 组织 - 贾家义学
          keys: 贾家义学, 家塾, 学堂
          content: |-
            **名称**: 贾家义学
            **性质**: 贾氏宗族公立学堂
            **成员**:
            - **塾掌**: 贾代儒（年高有德之老儒）
            - **代管**: 贾瑞（代儒长孙，代儒不在时暂管）
            - **学生**: 贾宝玉、秦钟、贾蔷、贾兰、贾菌、金荣、香怜、玉爱、薛蟠（挂名）等本族人丁与亲戚子弟
            - **书童/仆人**: 茗烟、锄药、扫红、墨雨（宝玉的小厮），李贵等大仆人
            **目标**: 训课子弟读书
            **问题**:
            1. 人多龙蛇混杂，下流人物混迹其中
            2. 薛蟠横行霸道，贾瑞以公报私助纣为虐
            3. 同窗间诟谇谣诼，风气不正
            4. 闹学堂事件暴露管理混乱
        - name: 组织 - 贾氏宗族
          keys: 贾氏, 贾府, 两府, 荣宁二府
          content: |-
            **名称**: 贾氏宗族
            **性质**: 世袭贵族家族
            **成员层级**:
            - 从文字辈：贾敬为首
            - 从玉字辈：贾珍为首（另有贾赦、贾政等）
            - 从草头字辈：贾蓉为首（另有贾芹、贾芸、贾菖、贾菱等）
            **祭祀排列**: 左昭右穆，男东女西
            **经济状况**:
            1. 宁府有八九个庄子，今年两处报旱涝
            2. 荣府近年添了许多花钱的事（省亲、盖花园等），每年多赔出几千银子
            3. 享有皇恩永锡春祭赏银
            4. 贾珍评价荣府："黄柏木作磬槌子——外头体面里头苦"
            **目标**: 维持家族体面与祖宗祭祀
        - name: 组织 - 贾珍聚赌局
          keys: 习射, 聚赌, 赌局
          content: |-
            **名称**: 贾珍聚赌局
            **性质**: 以习射为名、实为聚赌的纨绔聚会
            **成员**:
            - 主持：贾珍（不肯出名）
            - 局家：贾蓉
            - 参与者：世袭公子、诸富贵亲友、邢德全（傻大舅）、薛蟠（呆大爷）
            - 被命来习射者：贾环、贾琮、宝玉、贾兰（饭后来射一回方许回去）
            **发展过程**:
            1. 初以习射为由，立罚约赌利物
            2. 每日轮流作晚饭之主，竞相卖弄厨役
            3. 一二日后以歇臂养力为由，改为抹骨牌赌酒
            4. 渐次至钱，三四月后公然斗叶掷骰、放头开局、夜赌
            **赌博种类**: 抢新快、打幺番、抹骨牌打天九
            **目标**: 贾珍居丧无聊的破闷之法
            **外部反应**: 贾赦贾政不知就里，反说习武是正理；家下人借此各有进益；外人皆不知一字
        - name: 组织 - 江南甄家
