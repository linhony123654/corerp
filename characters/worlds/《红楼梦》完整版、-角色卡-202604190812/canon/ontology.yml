            **性质**: 大观园内众姐妹及宝玉自发组建的诗歌社团
            **发起人**: 贾探春
            **成员及分工**:
            - **社长**: 李纨（稻香老农）——评阅优劣
            - **副社长**: 迎春（菱洲）——出题限韵；惜春（藕榭）——誊录监场
