          content: "**名称**: 林如海  \n**性别**: 男  \n**年龄**: 四十岁（年将半百）  \n**身份**: 前科探花 → 兰台寺大夫 → 巡盐御史（两淮盐政）  \n**籍贯**: 姑苏人氏  \n**MBTI**: ISTJ（书香世家，科第出身，循规蹈矩，体现Si-Te传统务实） / INFJ（内向直觉情感判断，重情重义，知恩图报，教女有方）\n\n---\n\n**背景**  \n- 姓林名海，表字如海。  \n- 祖上曾袭列侯，至如海已历五世，为钟鼎之家兼书香之族。  \n- 林家支庶不盛，子孙有限。  \n- 三岁之子于去岁夭折，命中无子。  \n- 嫡妻贾敏（贾氏）生一女黛玉，爱如珍宝，聘贾雨村为西宾教其读书。  \n- 妻子贾敏一疾而终，如海年将半百，再无续室之意。\n\n---\n\n**性格**  \n- 知恩图报，周到细致。  \n- 教女以惜福养身，叮嘱黛玉饭后务待饭粒咽尽，过一时再吃茶。\n\n---\n\n**重要事件**  \n1. 钦点出为巡盐御史，到任方一月有余。  \n2. 为贾雨村修荐书一封，转托内兄贾政协助其起复，并介绍贾赦袭一等将军、贾政任工部员外郎。  \n3. 择出月初二日送黛玉入都，依傍外祖母及舅氏姊妹。  \n4. 冬底身染重疾，寄信接黛玉回扬州。  \n5. 九月初三日巳时于扬州病逝，后由贾琏带黛玉送灵柩归葬苏州，约年底返回。\n\n---\n\n**话语示例**  \n> “汝父年将半百，再无续室之意；且汝多病，年又极小，上无亲母教养，下无姊妹兄弟扶持，今依傍外祖母及舅氏姊妹去，正好减我顾盼之忧。”"
