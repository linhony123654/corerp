        - name: 地点 - 大观园
          keys: 大观园, 新园, 园, 省亲别墅, 园子, 园内, 园中, 园子里, 园里
          content: |-
            **名称**: 大观园
            **位置**: 贾府内，为迎接贵妃省亲而建
            **特征**:
            - 正门五间，桶瓦泥鳅脊，细雕花样，无朱粉涂饰，水磨群墙，白石台矶
            - 迎面翠嶂挡住全景，设计巧妙
            - 园内山石、花木、亭台、楼阁、桥梁、溪流、村庄等景致丰富
            - 工程由贾珍负责，陈设采办由贾琏负责
            - 游览十之五六已觉腿酸
            **重要事件**:
            1. 贾珍回报工程告竣
            2. 贾政率众清客及宝玉游览试才题对额
            3. 宝玉因思念秦钟常来此戏耍

            ---

            **名称**: 大观园
            **原名**: 天仙宝境（贾妃命改为"省亲别墅"）
            **位置**: 贾府内，为迎接元春省亲而建
            **特征**:
            1. 豪华壮丽，香烟缭绕，花彩缤纷，灯光相映，细乐声喧
            2. 清流游龙，两边石栏系水晶玻璃风灯，点得如银花雪浪
            3. 柳杏诸树以通草、绸绫纸绢依势作成花叶粘于枝上，每株悬灯数盏
            4. 池中荷荇凫鹭以螺蚌羽毛作就
            5. 庭燎烧空，香屑布地，火树琪花，金窗玉槛
            **元春赐名各处**:
            - 正殿匾额："顾恩思义"
            - 园名：大观园
            - 有凤来仪 → 潇湘馆
            - 红香绿玉 → 怡红快绿 → 怡红院
            - 蘅芷清芬 → 蘅芜苑
            - 杏帘在望 → 浣葛山庄 → 稻香村
            - 正楼：大观楼；东面飞楼：缀锦阁；西面斜楼：含芳阁
            - 另有蓼风轩、藕香榭、紫菱洲、荇叶渚、梨花春雨、桐剪秋风、荻芦夜雪等
            **重要事件**: 元春省亲主要场所，元春叹息奢华过费，嘱咐不可再如此靡费

            ---

            **名称**: 大观园
            **位置**: 荣国府内
            **特征**:
            - 元春省亲后命勒石题咏
            - 元春下谕命姊妹们入住，不可禁约封锢
            - 二月二十二日众人搬入
            **各处分配**:
            - 潇湘馆——林黛玉
            - 怡红院——贾宝玉
            - 蘅芜苑——薛宝钗
            - 缀锦楼——贾迎春
            - 秋爽斋——贾探春
            - 蓼风轩——贾惜春
            - 稻香村——李纨
            **配置**: 每处添两个老嬷嬷、四个丫头，另有专管收拾打扫的人
            **重要事件**: 搬入后"花招绣带，柳拂香风"，不似前番寂寞

            ---

