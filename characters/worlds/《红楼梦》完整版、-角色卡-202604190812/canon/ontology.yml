            2. 主持除夕祭宗祠：安排打扫、收拾供器、请神主、悬挂遗真影像，担任献爵之职。
            3. 命贾蓉领春祭恩赏银两，强调皇恩体面。
            4. 接见庄头乌进孝，查看年贡清单，对收成减少不满；分析荣府经济困境：“黄柏木作磬槌子——外头体面里头苦”。
            5. 分派族中子弟年物，严厉训斥贾芹在家庙招聚匪类赌钱、养老婆小子。
