    items:
        - name: 道具 - 《会真记》
          keys: 会真记, 西厢记
          content: |-
            **名称**: 《会真记》（即《西厢记》）
            **类型**: 传奇戏曲/禁书
            **来源**: 茗烟从书坊购买
            **持有者**: 贾宝玉
            **功能/影响**:
            - 宝玉视为珍宝，藏在床顶上密看
            - 宝玉在沁芳闸桥桃花下细读
            - 黛玉看后"越看越爱看"，"自觉词藻警人，余香满口"
            - 宝玉引其中"多愁多病身""倾国倾城貌"戏语黛玉
            - 黛玉反引"银样镴枪头"回敬
            **相关名句**: "花落水流红，闲愁万种"
        - name: 道具 - 安息香
          keys: 安息香
          content: |-
            **名称**: 安息香
            **类型**: 香料
            **功能**: 定住神魂，安抚宝玉婚夜旧病复发后的躁动
            **重要事件**: 婚夜宝玉发现新娘是宝钗后旧病复发，众人满屋点起安息香，扶他睡下
        - name: 道具 - 白海棠
          keys: 白海棠, 海棠花, 海棠
          content: |-
            **名称**: 白海棠
            **类型**: 珍贵花卉
            **来源**: 贾芸通过花匠"变尽方法"弄得两盆
            **持有者**: 贾芸送给宝玉
            **功能/意义**:
            - 成为海棠诗社首次咏诗的题目
            - 诗社因此得名"海棠社"
            - 李纨见两盆白海棠被抬进来，提议以此为题
        - name: 道具 - 白玉比目磬
          keys: 白玉比目磬
          content: |-
            **名称**: 白玉比目磬
            **类型**: 玉器乐器
            **功能**: 陈设，敲击
            **位置**: 秋爽斋洋漆架上
        - name: 道具 - 棒疮药丸
          keys: 丸药, 棒疮药
          content: |-
            **名称**: 棒疮药丸
            **类型**: 药物
            **功能**: 治疗棒疮（被打后的伤痕）
            **持有者**: 薛姨妈/宝钗处
            **重要事件**: 平儿来向宝钗要药丸，给被贾赦打伤的贾琏上药
        - name: 道具 - 宝钗送的药
          keys: 药, 一丸药
          content: |-
            **名称**: 宝钗送的棒疮药
            **类型**: 外敷药物
            **功能**: 用酒研开敷上，散开淤血热毒
            **持有者**: 宝钗送来，交与袭人
            **重要事件**: 宝钗亲自托着一丸药来探望宝玉，交代用法，袭人敷上后宝玉好转
        - name: 道具 - 宝玉悼晴雯词笺
          keys: 泥金角花粉红笺, 悼词
          content: |-
            **名称**: 泥金角花粉红笺
            **类型**: 书写用品/祭文
            **内容**: 宝玉以"怡红主人"名义焚付"晴姐"的悼词，词云："随身伴，独自意绸缪。谁料风波平地起，顿教躯命实时休。孰与话轻柔？东逝水，无复向西流。想象更无怀梦草，添衣还见翠云裘。脉脉使人愁！"
            **用途**: 焚化祭奠晴雯
        - name: 道具 - 宝玉偈语
          keys: 偈语, 偈, 寄生草
          content: |-
            **名称**: 宝玉所作偈语及《寄生草》
            **类型**: 诗偈
            **内容原文**:
            - 偈语："你证我证，心证意证。是无有证，斯可云证。无可云证，是立足境。"
            - 《寄生草》："无我原非你，从他不解伊。肆行无碍凭来去。茫茫着甚悲愁喜？纷纷说甚亲疏密？从前碌碌却因何？到如今，回头试想真无趣！"
            **来源**: 宝玉因两面受气，感悟"赤条条来去无牵挂"后所作
            **重要事件**:
            1. 袭人将偈语交给黛玉看
            2. 黛玉续偈"无立足境，是方干净"
            3. 宝钗看后撕碎烧毁，恐宝玉移性
            4. 宝钗以六祖惠能典故点化
        - name: 道具 - 北静王仿制玉
          keys: 仿制的玉
          content: |-
            **名称**: 北静王仿制玉
            **类型**: 仿制饰物
            **来源**: 北静王按宝玉通灵玉的式样命人制作
            **持有者**: 赠予贾宝玉
            **功能**: 玩赏之物
            **重要事件**: 北静王亲手递给宝玉，贾母命人收起，叮嘱别与真玉混了
        - name: 道具 - 碧玉佩
          keys: 碧玉佩
          content: |-
            **名称**: 碧玉佩
            **类型**: 饰品
