            **位置**: 大观园内
            **特征**: 薛宝钗居所
            **重要事件**: 宝钗与湘云夜间在此灯下商议螃蟹宴东道及拟定菊花十二题

            ---

            **名称**: 蘅芜苑
            **位置**: 大观园内
            **特征**: 宝钗居所
            **重要事件**:
            1. 香菱搬入蘅芜苑与宝钗作伴
            2. 香菱在此灯下苦读诗书，宝钗连催数次睡觉不听
            3. 香菱在此翻腾一夜后于梦中得诗八句

            ---

            **名称**: 蘅芜苑
            **位置**: 大观园内
            **特征**: 薛宝钗居所，湘云、香菱亦住此处
            **重要事件**: 莺儿与蕊官从此处出发去潇湘馆取蔷薇硝

            ---

            **名称**: 蘅芜苑
            **位置**: 大观园内，花溆萝港附近
            **特征**: 奇草仙藤，珊瑚豆子般累垂果实；室内雪洞一般，一色玩器全无，仅土定瓶、菊花、书、茶奁、青纱帐幔
            **重要事件**: 贾母叹其太朴素，亲自吩咐鸳鸯取石头盆景、纱桌屏、墨烟冻石鼎、水墨字画白绫帐子为之布置
        - name: 地点 - 蘅芷清芬
          keys: 蘅芷清芬, 蘅芜苑, 异草, 兰风蕙露
          content: |-
            **名称**: 蘅芷清芬（宝玉所题）
            **位置**: 大观园内，清凉瓦舍，水磨砖墙
            **特征**:
            - 迎面插天大玲珑山石，四面群绕石块遮住房屋
            - 无一株花木，满是异草：杜若蘅芜、茞兰、清葛、金簦草、玉蕗藤、紫芸、青芷等
            - 味芬气馥，非花香可比
            - 五间清厦连卷棚，四面出廊，绿窗油壁
            **重要事件**:
            1. 宝玉辨识各种异草，引《离骚》《文选》
            2. 众清客提"兰风蕙露"，贾政认可
            3. 宝玉题"蘅芷清芬"及联："吟成荳蔻才犹艳，睡足酴醾梦也香"
            4. 贾政评为套"书成蕉叶文犹绿"，众客反驳更妙
        - name: 地点 - 红香圃
          keys: 红香圃, 芍药栏
          content: |-
            **名称**: 红香圃
            **位置**: 大观园芍药栏内
            **特征**: 三间小敞厅，门斗上贴着"红香圃"三个字
            **重要事件**:
            1. 宝玉生日宴席设于此处，"筵开玳瑁，褥设芙蓉"
            2. 众人在此行射覆、划拳等酒令
            3. 湘云醉后在附近山石僻处芍药花丛中睡着
        - name: 地点 - 葫芦庙
          keys: 葫芦庙, 古庙
          content: |-
            **名称**: 葫芦庙
            **位置**: 姑苏阊门外十里街仁清巷内
            **特征**: 因地方窄狭，人皆呼作葫芦庙
            **重要事件**:
            1. 贾雨村寄居于此
            2. 三月十五炸供，和尚不加小心致油锅火逸，烧着窗纸
            3. 大火将一条街烧得如火焰山，甄家烧成瓦砾场
        - name: 地点 - 会芳园
          keys: 会芳园, 宁府花园, 园子, 登仙阁
          content: |-
            **名称**: 会芳园
            **位置**: 宁国府东边花园内
            **特征**: 梅花盛开
            **重要事件**: 贾珍之妻尤氏治酒请贾母等赏花，宝玉在此倦怠欲睡，引出秦氏安置及梦游太虚幻境之事

            ---

            **名称**: 会芳园
            **位置**: 宁国府内的园林
            **特征**: 黄花满地，白柳横坡，小桥通溪，曲径接路，石中清流，篱落飘香，树头红叶，疏林如画。有假山石、天香楼、凝曦轩等建筑
            **重要事件**:
            1. 贾敬寿宴期间，小戏班和打十番的在园中戏台上表演
            2. 凤姐儿在假山石后遇贾瑞调戏
            3. 邢夫人、王夫人等在天香楼上吃酒听戏

            ---

            **名称**: 会芳园
            **位置**: 宁国府内
            **重要事件**:
            1. 秦可卿停灵于此
            2. 瑞珠亦停灵于会芳园中之登仙阁
            3. 临街大门洞开，设鼓乐厅、执事、朱红销金大字牌等

            ---

            **名称**: 会芳园·登仙阁
            **位置**: 宁国府内
            **特征**: 秦可卿灵柩停放之处
            **重要事件**: 凤姐每日来此灵前祭拜，放声大哭

            ---

            **名称**: 会芳园
            **位置**: 宁国府内
            **特征**: 北角墙下引来一股活水，有山石树木
            **重要事件**: 被拆除墙垣楼阁，作为省亲别院的基础部分，与荣府东大院连通
        - name: 地点 - 会芳园丛绿堂
          keys: 会芳园, 丛绿堂
          content: |-
            **名称**: 会芳园丛绿堂
            **位置**: 宁国府会芳园内
            **特征**: 屏开孔雀，褥设芙蓉，可赏月作乐
            **重要事件**:
            1. 中秋前夜（十四日）贾珍在此设宴，带领妻子姬妾赏月
            2. 三更时分，众人听到墙下长叹声，风过墙去，祠堂内扇开阖之声，月色惨淡，风气森森
        - name: 地点 - 急流津觉迷渡口
          keys: 急流津觉迷渡口, 急流津, 觉迷渡口, 觉迷度口
          content: |-
            **名称**: 急流津觉迷渡口
            **特征**: 有渡头草棚、附近有草庵（茅庵）
            **重要事件**:
            1. 贾雨村褫籍为民后行至此处
            2. 甄士隐在此迎接贾雨村，两人入草庵叙谈
            3. 甄士隐详说太虚幻境与宝玉来历
            4. 贾雨村在草庵中睡着
            5. 空空道人在此遇到沉睡的贾雨村，被指引去找曹雪芹
        - name: 地点 - 夹道空屋
          keys: 房后小过道子, 空屋, 夹道中屋子
          content: |-
            **名称**: 凤姐房后小过道子里的空屋
            **位置**: 荣国府凤姐住处后方
            **重要事件**: 凤姐第二次设局之地。贾瑞在此等候，抱住贾蓉误以为凤姐，被贾蓉贾蔷勒索。后被安排蹲在院外大台矶底下，被泼了一身尿粪。
        - name: 地点 - 嘉荫堂
          keys: 嘉荫堂
          content: |-
            **名称**: 嘉荫堂
            **位置**: 大观园内
            **特征**: 大地方，用作退居之所
            **重要事件**: 贾母寿宴期间，贵客先入嘉荫堂茶毕更衣，方出至荣庆堂

            ---

            **名称**: 嘉荫堂
            **位置**: 大观园正门内
            **特征**: 前有月台
            **重要事件**:
            1. 中秋夜在月台上焚斗香、秉风烛、陈献瓜饼果品
            2. 贾母率众人在此上香拜月
            3. 拜毕在此吃茶少歇，等候山上铺设完毕
        - name: 地点 - 贾家义学
          keys: 贾家义学, 家塾, 学中, 学堂
          content: |-
            **名称**: 贾家义学
            **位置**: 离荣国府不远，不过一里之遥
            **性质**: 始祖所立义学，供族中贫穷不能请师的子弟肄业
            **特征**:
            1. 凡族中有官爵之人按俸禄多寡供给银两为学中之费
            2. 共举年高有德之人为塾掌
            3. 现由贾代儒主持
            **重要事件**:
            1. 宝玉、秦钟入学读书
            2. 学中龙蛇混杂，薛蟠在此结交契弟
            3. 闹学堂事件：金荣挑衅引发大规模斗殴
        - name: 地点 - 贾母房中
          keys: 贾母房中, 老太太房里, 贾母房, 贾母跟前
          content: |-
            **名称**: 贾母房中
            **位置**: 荣国府内
            **特征**: 满屋珠围翠绕、花枝招展，有榻可歪靠
            **重要事件**:
            1. 刘姥姥被召见，与贾母相谈甚欢
            2. 刘姥姥讲述乡村故事
            3. 马棚走水时贾母出至廊上观看

            ---

            **名称**: 贾母房中
            **位置**: 荣国府贾母居所
            **特征**: 贾府权力中心之一，众人常在此凑趣请安
            **重要事件**:
            1. 鸳鸯当众跪下哭诉，铰发明志
            2. 贾母大怒迁怒王夫人
            3. 探春挺身为王夫人辩解
            4. 凤姐以幽默化解尴尬
        - name: 地点 - 贾母花厅
          keys: 大花厅, 花厅
          content: |-
            **名称**: 贾母花厅（大花厅）
            **位置**: 荣国府内
            **特征**:
            1. 共摆十来席，每席旁设几，焚御赐百合宫香
            2. 八寸来长小盆景，新鲜花卉
            3. 紫檀透雕嵌大红纱透绣花卉璎珞
            4. 两边大梁挂联三聚五玻璃芙蓉彩穗灯
            5. 每席前竖錾珐琅荷叶烛台，活信可扭转
            6. 窗格门户摘下，全挂彩穗各种宫灯
            7. 廊檐内外挂满羊角、玻璃、戳纱、料丝等诸灯
            **重要事件**: 元宵节贾母家宴、看戏赏灯之所
        - name: 地点 - 贾母内院
          keys: 贾母内院, 贾母上房
          content: |-
            **名称**: 贾母内院/上房
            **位置**: 荣国府内
            **特征**: 宝钗生日时搭了家常小巧戏台；元宵节设围屏灯、悬彩灯
            **重要事件**:
            1. 宝钗十五岁生日家宴，定了一班新出小戏
            2. 元宵节猜灯谜，贾政与贾母互猜，众姊妹作灯谜
        - name: 地点 - 贾蓉居室
          keys: 贾蓉居室
          content: |-
            **名称**: 贾蓉居室（秦可卿卧房）
            **位置**: 宁国府内
            **特征**: 挂有《海棠春睡图》，有秦太虚所写对联"嫩寒锁梦因春冷，芳气笼人是酒香"
            **重要事件**:
            1. 张友士在此为秦可卿诊脉
            2. 凤姐儿、宝玉来此探望秦可卿
            3. 宝玉曾在此午睡梦游太虚幻境
        - name: 地点 - 贾赦住处
          keys: 贾赦院, 大舅住处
          content: |-
            **名称**: 贾赦住处
            **位置**: 出荣府西角门往东，过荣府正门，入一黑油大门
            **特征**:
            - 房屋院宇是荣府中花园隔断过来的
            - 三层仪门，正房厢庑游廊皆小巧别致
            - 不似贾政处轩峻壮丽
            - 院中随处树木山石
            - 有许多盛妆丽服之姬妾丫鬟
        - name: 地点 - 贾氏宗祠
          keys: 宗祠, 贾氏宗祠, 贾祠
          content: |-
            **名称**: 贾氏宗祠
            **位置**: 宁府西边另一个院宇
            **特征**:
            1. 黑油栅栏内五间大门，上悬"贾氏宗祠"匾额，衍圣公孔继宗书
            2. 门旁长联："肝脑涂地，兆姓赖保育之恩；功名贯天，百代仰蒸尝之盛"，亦衍圣公所书
            3. 院中白石甬路，两边苍松翠柏
            4. 月台上设青绿古铜鼎彝等器
            5. 抱厦前悬九龙金匾"星辉辅弼"，先皇御笔；对联"勋业有光昭日月，功名无间及儿孙"，御笔
            6. 五间正殿前悬闹龙填青匾"慎终追远"；对联"已后儿孙承福德，至今黎庶念荣宁"，御笔
            7. 里边香烛辉煌，锦帐绣幕，列着神主
            **重要事件**:
            - 除夕祭祖大典举行之地
            - 贾敬主祭，贾赦陪祭，贾珍献爵，贾琏贾琮献帛，宝玉捧香
            - 正堂悬宁荣二祖遗像，皆披蟒腰玉
        - name: 地点 - 贾政书房
          keys: 书房
          content: |-
            **名称**: 贾政书房
            **位置**: 贾府厅堂附近
            **重要事件**:
            1. 贾政在此接见忠顺府长史官
            2. 贾政在此痛打宝玉
            3. 王夫人冲入书房阻止
            4. 贾母赶来斥责贾政

            ---

            **名称**: 贾政书房
            **位置**: 荣国府
            **重要事件**:
            1. 贾政与詹光下围棋
            2. 冯紫英来访，展示四种洋货
            3. 贾政讲述贾雨村发迹史，感叹甄家抄家
            4. 贾赦、贾政、冯紫英饮酒至下雪
        - name: 地点 - 绛芸轩
          keys: 绛芸轩
          content: |-
            **名称**: 绛芸轩
            **位置**: 贾宝玉的卧室
            **特征**: 宝玉亲笔题写"绛芸轩"三字，由晴雯亲自爬高贴在门斗上
            **重要事件**:
            1. 宝玉醉归后在此摔茶杯怒斥李嬷嬷
            2. 袭人在此假装睡觉引宝玉来
            3. 宝玉在此醉卧，袭人替他摘下通灵玉包好
        - name: 地点 - 金陵
          keys: 金陵
          content: |-
            **名称**: 金陵
            **重要事件**:
            1. 贾政扶贾母灵柩至此安葬
            2. 贾蓉送秦氏、凤姐、鸳鸯棺木至此安葬
            3. 贾蓉另送黛玉灵柩安葬
            4. 贾政在此料理坟基之事
        - name: 地点 - 锦衣府
          keys: 锦衣府
          content: |-
            **名称**: 锦衣府
            **位置**: 京都
            **特征**: 关押贾赦、贾珍、贾蓉之处。
            **重要事件**: 赵堂官办案，必照御史参奏办理。
        - name: 地点 - 赖大花园
          keys: 赖大花园, 赖大家
          content: |-
            **名称**: 赖大花园
            **位置**: 赖大家中
            **特征**: 虽不及大观园，却也十分齐整宽阔，泉石林木、楼阁亭轩，有好几处惊人骇目之景
            **重要事件**:
            1. 十四日贾母带王夫人、薛姨妈及宝玉姊妹等前来赴宴
            2. 外面厅上薛蟠、贾珍、贾琏、贾蓉等男客饮宴
            3. 赖大家请了几个现任官长及世家子弟作陪
            4. 柳湘莲被求串了两出戏
            5. 薛蟠在此对柳湘莲起淫心，后被骗出北门
        - name: 地点 - 梨香院
          keys: 梨香院
          content: |-
            **名称**: 梨香院
            **位置**: 荣国府东北角
            **特征**:
            - 当日荣公暮年养静之所
            - 小小巧巧，约有十余间房屋，前厅后舍俱全
            - 另有一门通街，薛蟠家人走此门出入
            - 西南有一角门通夹道，出夹道便是王夫人正房东院
            **重要事件**: 贾政安排薛家母子在此居住

            ---

            **名称**: 梨香院
            **位置**: 荣国府东院，转东角门出至东院
            **特征**: 薛姨妈一家暂住之所
            **重要事件**:
            1. 王夫人在此与薛姨妈闲话
            2. 薛宝钗在此养病，与丫鬟莺儿描花样
            3. 周瑞家的在此听宝钗讲冷香丸配方
            4. 冷香丸埋在梨花树下

            ---

            **名称**: 梨香院
            **位置**: 贾府内，从穿堂向东向北绕厅后可达
            **特征**: 薛家母女寄居之所，宝钗在此养病
            **重要事件**:
            1. 宝玉探望宝钗，二人互赏金玉
            2. 黛玉随后到来，三人在此说笑
            3. 薛姨妈设茶果酒食款待宝玉黛玉
            4. 宝玉在此饮酒数杯

            ---

            **名称**: 梨香院
            **位置**: 贾府内
            **特征**: 原为薛姨妈居所，薛姨妈迁出后腾挪修理，用作教习教演女戏之所
            **重要事件**: 贾蔷带领十二个女戏子在此排练

            ---

            **名称**: 梨香院
            **位置**: 大观园附近
            **特征**: 十二个女戏子在此演习戏文
            **重要事件**: 黛玉经过墙角时听到墙内传出《牡丹亭》曲词，心动神摇

            ---

            **名称**: 梨香院
            **位置**: 大观园角门外
            **特征**: 十二女伶居住之所
            **重要事件**:
            1. 宝玉来找龄官唱曲被拒
            2. 贾蔷买雀儿哄龄官
            3. 宝玉目睹贾蔷龄官之情，悟"人生情缘各有分定"

            ---

            **名称**: 梨香院
            **位置**: 贾府内
            **特征**: 小戏子们居住和排练之处
            **重要事件**: 教习带文官等十二个小戏子从梨香院出来，经游廊角门到前面唱戏

            ---

            **名称**: 梨香院
            **位置**: 贾府内
