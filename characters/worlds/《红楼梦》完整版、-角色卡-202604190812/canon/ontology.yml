          content: "好的，这是整理后的贾雨村条目内容。\n\n---\n\n### 贾雨村\n\n#### 基本属性\n*   **姓名**: 贾化，字时飞，别号雨村\n*   **别称**: 兴隆街的大爷\n*   **性别**: 男\n*   **籍贯**: 原系胡州（浙江湖州府）人氏\n*   **MBTI**: ENTJ（早期由理想抱负转向功利务实，呈现Te-Ni主导的权谋与目标导向，后期落魄后有所反思）\n\n#### 背景与出身\n*   出身于诗书仕宦之族，但生于末世，父母祖宗根基已尽，人口衰丧，只剩他一身一口，穷困潦倒。\n*   早期寄居葫芦庙，以卖字作文为生。与乡绅甄士隐交好，中秋时受其资助五十两白银并冬衣，得以赴京赶考。\n\n#### 外貌特征\n*   早期：敝巾旧服，一副穷儒打扮。\n*   发迹后：生得腰圆背厚，面阔口方，剑眉星眼，直鼻权腮，相貌雄壮。\n\n#### 性格与为人\n*   **才干与缺陷**: 确有才干，但为人贪酷，恃才侮上，品行有亏。\n*   **功利权谋**: 善于攀附权贵，工于心计，名利心极重，表面感恩戴德，实则忘恩负义。\n*   **表里不一**: 面对挫折时面上全无怨色，嬉笑自若；受人恩惠（如甄士隐的银衣）不过略谢一语，并不十分介怀。\n*   **恩将仇报**: 为了前程不惜徇私枉法，甚至对知晓其底细的旧人（如门子）过河拆桥。\n\n#### 人物关系\n*   **甄士隐**: 早期恩人，受其资助赴考。后甄家败落，雨村对其见死不救。\n*   **林如海**: 林黛玉之父。雨村被革职后，入林府为西宾，教授林黛玉学业。后得其荐书攀附贾府。\n*   **贾府**: 以同宗侄名帖拜见贾政，得其竭力协助起复为官，成为贾府政治上的依附者与后来的背叛者。\n*   **贾宝玉**: 贾政曾多次要求宝玉会见雨村，令宝玉心生不悦。\n\n#### 重要事件与人生轨迹\n1.  **发迹与初任**: 中进士，选入外班，升任知府。因贪酷且恃才侮上，被参革职。\n2.  **攀附与起复**: 游历至维扬，入林如海府做西宾。后经冷子兴献计，央烦林如海修荐书托付贾政，得以复职候缺，补授金陵应天府。\n3.  **徇私枉法**: 审理薛蟠打死冯渊一案时，屈从于贾、王两家权势，徇情枉法胡乱判决。事后恐门子说出当年贫贱事，寻了个不是将其远远充发。\n4.  **作恶帮凶**: 为了讨好贾赦，讹陷石呆子拖欠官银，将其扇子抄没作官价送给贾赦，致其家破人亡，被平儿痛骂为“没天理的野杂种”。\n5.  **官场沉浮**: 官职几经变迁，由知府推升御史，升吏部侍郎，署兵部尚书，后降为府尹。又曾补授大司马，协理军机参赞朝政。\n6.  **忘恩负义**: 在渡口遇见甄士隐所在的庙宇起火，不肯亲自回去查看，仅派人探问，对昔日恩人见死不救。\n7.  **结局与收场**: 最终因犯婪索案件，审明定罪，遇大赦被褫籍为民。在急流津觉迷渡口与甄士隐重逢，听其详说太虚玄机。后在草庵中沉睡，醒来后指引空空道人将《石头记》传世，成为“假语村言”的关键中间人。\n\n#### 经典话语\n*   “玉在匮中求善价，钗于奁内待时飞。”（抒发怀才不遇与待价而沽的抱负）\n*   “时逢三五便团圆，满把晴光护玉栏。天上一轮才捧出，人间万姓仰头看。”（中秋咏月，显露野心）\n*   “非晚生酒后狂言，若论时尚之学，晚生也或可去充数沽名。”\n*   “事关人命，蒙皇上隆恩，起复委用，实是重生再造，正当殚心竭力图报之时，岂可因私而废法！”（审理薛蟠案时的虚伪开场白）\n\n#### 人物评价\n*   才干优长，但品行有亏，是封建官场中忘恩负义、徇私枉法的典型官僚形象。\n*   其人生轨迹深刻揭示了“因嫌纱帽小，致使锁枷扛”的仕途悲剧。\n\n---\n\n**名称**: 贾雨村\n**性别**: 男\n**MBTI**: ENTJ (功利主义，忘恩负义)\n**年龄**: 中年\n**身份**: 府尹，前任兵部\n**背景**: 受贾府提拔。\n**性格**: 势利负恩。\n**重要事件**: \n1. 御史参奏后，怕人说他回护，便狠狠踢了贾府一脚，导致两府被抄。\n2. 包勇酒后当街大骂，他装作不理会过去。"
