            2. 众人提"杏花村"，宝玉提"杏帘在望"再改"稻香村"
            3. 贾政命做酒幌用竹竿挑在树梢
            4. 贾珍提议买鹅鸭鸡类
            5. 宝玉批评此处人力穿凿、非天然，论"天然"之理被贾政喝斥
            6. 宝玉被逼题联："新涨绿添浣葛处，好云香护采芹人"

