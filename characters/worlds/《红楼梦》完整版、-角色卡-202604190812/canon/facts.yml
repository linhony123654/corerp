          4. 赖大母亲等有体面嬷嬷：与少奶奶同等十二两
          5. 姑娘们：照一个月月例
          6. 大丫鬟们：二两或一两不等
          7. 姨娘们：各二两
        - 共凑得一百五十两有余
        **参与条件**: 贾府上下有头脸的人均参与
        **特殊规则**:
        - 凤姐精明算账，指出贾母替宝玉黛玉出钱吃亏
        - 凤姐主动替李纨出份子
