    - subject: 玩法 - 凤姐协理宁府管理制度
      predicate: 体系规则
      object: |-
        **名称**: 凤姐协理宁国府管理制度
        **规则说明**:
        ### 一、人员分工
        - 二十人分两班：专管人来客往、倒茶
        - 二十人分两班：专管本家亲戚茶饭
        - 四十人分两班：专管灵前上香添油、挂幔守灵、供饭供茶、随起举哀
        - 四人：内茶房收管杯碟茶器（少一件描赔）
        - 四人：管酒饭器皿（少一件描赔）
        - 八人：监收祭礼
        - 八人：管各处灯油蜡烛纸札（总支后按定数分派）
        - 三十人：轮流各处上夜、照管门户、监察火烛、打扫地方
        - 其余按房屋分开，各守各处，物品丢坏则描赔
        ### 二、时间制度
        - 卯正二刻：点卯
        - 巳正：吃早饭
        - 午初刻：领牌、回事
        - 戌初：烧黄昏纸后亲查各处
        - 查完后上夜的交明钥匙
        ### 三、奖惩机制
        - 来升媳妇每日揽总查看，发现偷懒、赌钱吃酒、打架拌嘴立刻回报
        - 徇情者严惩
        - 迟到者：第一次打二十板、革一月银米；明日四十板，后日六十板，递增
        ### 四、领牌交牌制度
        - 支取东西须持帖子，经凤姐审核数目
        - 彩明登记，前一人交清牌后方发下一人
