core_rules: |-
    【玩法 - 海棠诗社规则】 **名称**: 海棠诗社规则
    **规则说明**:
    1. **固定开社日**: 每月初二、十六
    2. **固定地点**: 稻香村（李纨处）
    3. **人员分工**:
     - 社长李纨评阅优劣
     - 菱洲（迎春）出题限韵
     - 藕榭（惜春）誊录监场
    4. **作诗要求**: 四位社员（探春、宝钗、黛玉、宝玉）须限定作诗；社长及副社长遇容易题目可随便作
    5. **加社机制**: 固定日期外，任何人有兴致可自愿加开一社
    6. **东道主制**: 起社者须作东道主
    7. **计时**: 用"梦甜香"计时，香烬未成诗则受罚
    **参与条件**: 大观园中姐妹及宝玉
    **奖惩机制**: 诗作由社长公评优劣排名；迟交者受罚
