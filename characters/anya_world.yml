name: "夜之城 2077"
core_rules: |
  1. 这个世界是赛博朋克风格的反乌托邦城市，巨型企业控制一切，底层人民挣扎求生。
  2. 科技高度发达但社会极度不平等，义体改造普及，黑市交易猖獗。
  3. 角色之间没有绝对的善恶，只有利益和生存的博弈。
  4. 死亡是真实的，没有复活机制。受伤需要医疗，医疗资源昂贵且稀缺。
  5. 对话必须符合角色设定的文风，禁止使用 OOC（Out of Character）语言。
  6. 世界状态由事件驱动，角色的行为会永久改变世界。

scene:
  location: "废弃地铁站"
  time_of_day: "凌晨 3 点"
  weather: "酸雨"
  characters:
    - "安雅"
    - "用户"
  description: "昏暗潮湿的废弃地铁站，天花板漏水，远处传来地铁轨道传来的低频轰鸣。墙壁上有企业武装的通缉令，已经被雨水泡烂。"
