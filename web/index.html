<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
<title>CoreRP</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column;
}
header {
  padding: 12px 16px; background: #16213e;
  border-bottom: 1px solid #0f3460;
  display: flex; justify-content: space-between; align-items: center;
}
header h1 { font-size: 16px; color: #e94560; }
header .meta { font-size: 12px; color: #888; }
#chat { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 12px; max-width: 80%; line-height: 1.6; }
.msg.user { margin-left: auto; text-align: right; }
.msg .bubble {
  display: inline-block; padding: 10px 14px; border-radius: 12px;
  font-size: 14px; white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 2px; }
.msg.assistant .bubble { background: #0f3460; color: #e0e0e0; border-bottom-left-radius: 2px; }
.msg.system .bubble { background: #333; color: #999; font-style: italic; text-align: center; display: block; }
.msg .time { font-size: 10px; color: #666; margin-top: 4px; }
#input-area {
  padding: 12px 16px; background: #16213e;
  border-top: 1px solid #0f3460;
  display: flex; gap: 8px;
}
#input-area input {
  flex: 1; padding: 10px 14px; border: none; border-radius: 8px;
  background: #0f3460; color: #e0e0e0; font-size: 14px;
}
#input-area input:focus { outline: 2px solid #e94560; }
#input-area button {
  padding: 10px 20px; border: none; border-radius: 8px;
  background: #e94560; color: #fff; font-size: 14px; cursor: pointer;
}
#input-area button:disabled { background: #555; cursor: not-allowed; }
#status { font-size: 11px; color: #888; padding: 0 16px 8px; }
</style>
</head>
<body>
<header>
  <h1>CoreRP</h1>
  <select id="char-select" style="padding:4px 8px;border-radius:6px;background:#0f3460;color:#e0e0e0;border:1px solid #e94560;font-size:13px;max-width:140px;"></select>
  <span class="meta" id="world-meta">加载中...</span>
</header>
<div id="chat"></div>
<div id="status"></div>
<div id="input-area">
  <input type="text" id="msg-input" placeholder="输入消息..." autocomplete="off">
  <button id="send-btn">发送</button>
</div>
<script src="/app.js"></script>
</body>
</html>
