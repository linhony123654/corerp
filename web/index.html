<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
<title>CoreRP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F172A;
  --bg-card: #1E293B;
  --bg-input: #0F172A;
  --fg: #F8FAFC;
  --fg-muted: #94A3B8;
  --fg-dim: #64748B;
  --accent: #22C55E;
  --accent-dim: #166534;
  --border: #334155;
  --border-light: #475569;
  --danger: #EF4444;
  --warn: #EAB308;
  --info: #3B82F6;
  --radius: 8px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Orbitron', sans-serif;
  --panel-w: 320px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--fg);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.6;
}

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  flex-shrink: 0;
  z-index: 10;
}
#header .logo {
  font-family: var(--font-display);
  font-weight: 900;
  color: var(--accent);
  font-size: 14px;
  letter-spacing: 2px;
  margin-right: auto;
}
#header select {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  max-width: 140px;
  cursor: pointer;
}
.header-stat {
  display: flex; align-items: center; gap: 4px;
  color: var(--fg-muted);
  white-space: nowrap;
}
.header-stat .val { color: var(--accent); font-weight: 500; }
#tension-bar {
  width: 60px; height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
#tension-bar .fill {
  height: 100%; border-radius: 2px;
  background: var(--accent);
  transition: width 1s ease, background 0.5s;
}

/* ── Main Layout ── */
#main {
  flex: 1; display: flex; overflow: hidden;
}

/* ── Chat Column ── */
#chat-col {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0;
}
#chat {
  flex: 1; overflow-y: auto; padding: 16px;
  scroll-behavior: smooth;
}
.msg { margin-bottom: 16px; max-width: 85%; }
.msg.user { margin-left: auto; }
.msg .role { font-size: 10px; color: var(--fg-dim); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
.msg.user .role { text-align: right; color: var(--accent); }
.msg .bubble {
  padding: 10px 14px; border-radius: 6px;
  font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble { background: var(--accent-dim); color: var(--fg); border-bottom-right-radius: 2px; }
.msg.assistant .bubble { background: var(--bg-card); color: var(--fg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
.msg.system .bubble {
  background: transparent; color: var(--fg-dim);
  font-size: 11px; text-align: center; font-style: italic;
  border: 1px dashed var(--border); padding: 8px;
}
.msg .time { font-size: 9px; color: var(--fg-dim); margin-top: 2px; }
.msg.user .time { text-align: right; }

/* ── Input ── */
#input-area {
  padding: 10px 16px;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
  flex-shrink: 0;
}
#input-area input {
  flex: 1; padding: 10px 14px;
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--font-mono); font-size: 13px;
  outline: none; transition: border-color 0.2s;
}
#input-area input:focus { border-color: var(--accent); }
#input-area button {
  padding: 10px 20px;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 6px;
  font-family: var(--font-display); font-weight: 700;
  font-size: 12px; letter-spacing: 1px; cursor: pointer;
  transition: opacity 0.2s;
}
#input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Panel (right on desktop, drawer on mobile) ── */
#panel {
  width: var(--panel-w); flex-shrink: 0;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
#panel-toggle {
  display: none;
  position: fixed; bottom: 80px; right: 12px; z-index: 20;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); color: var(--bg);
  border: none; font-size: 18px; cursor: pointer;
  font-family: var(--font-display); font-weight: 900;
  box-shadow: 0 2px 12px rgba(34,197,94,0.3);
}

.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 11px;
}
.card h3 {
  font-family: var(--font-display);
  font-size: 10px; letter-spacing: 2px;
  color: var(--fg-dim); margin-bottom: 8px;
  text-transform: uppercase;
}
.card .row {
  display: flex; justify-content: space-between;
  padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.card .row .label { color: var(--fg-muted); }
.card .row .value { color: var(--fg); font-weight: 500; }
.card .value.accent { color: var(--accent); }
.card .value.warn { color: var(--warn); }
.card .value.info { color: var(--info); }

#npc-feed { max-height: 160px; overflow-y: auto; }
#npc-feed .item {
  padding: 4px 0; border-bottom: 1px solid var(--border);
  font-size: 10px; color: var(--fg-muted);
}
#npc-feed .item .actor { color: var(--info); }
#npc-feed .item .ts { color: var(--fg-dim); font-size: 9px; }

.usage-bar {
  height: 6px; background: var(--border); border-radius: 3px;
  margin-top: 4px; overflow: hidden;
}
.usage-bar .fill { height: 100%; border-radius: 3px; background: var(--accent); }

/* ── Mobile ── */
@media (max-width: 768px) {
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 15;
    transform: translateX(100%); transition: transform 0.25s ease;
    width: min(var(--panel-w), 85vw);
    box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  #panel.open { transform: translateX(0); }
  #panel-toggle { display: flex; align-items: center; justify-content: center; }
  #header { flex-wrap: wrap; gap: 6px; padding: 6px 10px; font-size: 10px; }
  #header .logo { font-size: 12px; }
  #input-area { padding: 8px 10px; }
  #input-area input { font-size: 11px; padding: 8px 10px; }
  #input-area button { padding: 8px 14px; font-size: 11px; }
  #chat { padding: 10px; }
  .msg { max-width: 92%; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <span class="logo">CORERP</span>
  <select id="char-select"></select>
  <span class="header-stat">⏱<span class="val" id="clock-val">--:--</span></span>
  <span class="header-stat">T<span id="tension-bar"><span class="fill" id="tension-fill" style="width:0%"></span></span><span class="val" id="tension-val">0</span></span>
  <span class="header-stat">⛁<span class="val" id="token-val">0</span></span>
</div>

<div id="main">
  <div id="chat-col">
    <div id="chat"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="输入..." autocomplete="off">
      <button id="send-btn">发送</button>
    </div>
  </div>

  <button id="panel-toggle" aria-label="Toggle panel">☰</button>

  <div id="panel">
    <div class="card">
      <h3>世界状态</h3>
      <div class="row"><span class="label">地点</span><span class="value" id="ws-loc">--</span></div>
      <div class="row"><span class="label">时间</span><span class="value" id="ws-time">--</span></div>
      <div class="row"><span class="label">天气</span><span class="value" id="ws-weather">--</span></div>
      <div class="row"><span class="label">叙事状态</span><span class="value" id="ws-nstate">--</span></div>
      <div class="row"><span class="label">在场</span><span class="value" id="ws-chars" style="font-size:10px">--</span></div>
    </div>

    <div class="card">
      <h3>用量统计</h3>
      <div class="row"><span class="label">本次调用</span><span class="value accent" id="us-calls">0</span></div>
      <div class="row"><span class="label">Token 总计</span><span class="value" id="us-tokens">0</span></div>
      <div class="row"><span class="label">预估费用</span><span class="value warn" id="us-cost">¥0</span></div>
      <div class="usage-bar"><span class="fill" id="us-bar" style="width:0%"></span></div>
    </div>

    <div class="card">
      <h3>NPC 动态</h3>
      <div id="npc-feed"><span style="color:var(--fg-dim)">等待中...</span></div>
    </div>

    <div class="card">
      <h3>记忆状态</h3>
      <div class="row"><span class="label">事实数</span><span class="value" id="mem-facts">--</span></div>
      <div class="row"><span class="label">检索模式</span><span class="value" id="mem-mode">--</span></div>
      <div class="row"><span class="label">对话轮数</span><span class="value" id="mem-dialogue">--</span></div>
      <div class="row"><span class="label">已压缩</span><span class="value" id="mem-compress">--</span></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
