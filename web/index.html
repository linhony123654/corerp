<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<title>CoreRP — Persistent Narrative Runtime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,500;0,600;1,400&family=Public+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #18181B;
  --surface: #27272A;
  --surface-alt: #232326;
  --fg: #F4F4F5;
  --fg-secondary: #A1A1AA;
  --fg-tertiary: #71717A;
  --accent: #EC4899;
  --accent-dim: #9D174D;
  --accent-glow: rgba(236,72,153,0.15);
  --border: #3F3F46;
  --border-subtle: #27272A;
  --radius: 0px;
}

/* Light theme */
[data-theme="light"] {
  --bg: #FAFAFA;
  --surface: #F4F4F5;
  --surface-alt: #E4E4E7;
  --fg: #18181B;
  --fg-secondary: #52525B;
  --fg-tertiary: #A1A1AA;
  --accent: #BE185D;
  --accent-dim: #FCE7F3;
  --accent-glow: rgba(190,24,93,0.1);
  --border: #E4E4E7;
  --border-subtle: #F4F4F5;
}

/* Kraft paper theme */
[data-theme="kraft"] {
  --bg: #F5F0E8;
  --surface: #EDE6D8;
  --surface-alt: #E6DCC8;
  --fg: #3D3226;
  --fg-secondary: #6B5D4F;
  --fg-tertiary: #9B8D7F;
  --accent: #8B4513;
  --accent-dim: #E8D5C4;
  --accent-glow: rgba(139,69,19,0.1);
  --border: #D4C8B4;
  --border-subtle: #E6DCC8;
  --font-serif: 'Libre Bodoni', 'Georgia', serif;
  --font-sans: 'Public Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
  --font-serif: 'Libre Bodoni', 'Georgia', serif;
  --font-sans: 'Public Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --panel-w: 340px;
  --content-max: 720px;
  --gap: 1.5rem;
  --gap-lg: 3rem;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  font-size: 14px;
  line-height: 1.65;
  font-weight: 350;
}

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
  background: var(--bg);
}
#header .logo {
  font-family: var(--font-serif);
  font-weight: 600; font-size: 18px;
  color: var(--fg);
  letter-spacing: 0.5px;
  margin-right: auto;
}
#header .logo em { color: var(--accent); font-style: italic; }
#header select {
  background: transparent; color: var(--fg-secondary);
  border: none; border-bottom: 1px solid var(--border);
  padding: 4px 0; font-family: var(--font-sans);
  font-size: 12px; font-weight: 500; cursor: pointer;
  outline: none; min-width: 120px;
}
#header select:focus { border-color: var(--accent); color: var(--fg); }

.header-stat {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--fg-tertiary);
}
.header-stat .val { color: var(--fg-secondary); }

#tension-meter {
  display: flex; align-items: center; gap: 4px;
}
#tension-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); transition: background 0.5s;
}
#tension-val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }

#clock-display {
  font-family: var(--font-serif); font-size: 13px; font-style: italic;
  color: var(--fg-secondary);
}

/* ── Main Layout ── */
#main { flex: 1; display: flex; overflow: hidden; }

/* ── Chat ── */
#chat-col {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; background: var(--bg);
}
#chat-scroll {
  flex: 1; overflow-y: auto; padding: 32px 24px;
}
.msg {
  max-width: var(--content-max);
  margin: 0 auto var(--gap-lg) auto;
  position: relative;
}
.msg.user {
  text-align: right; margin-right: 0;
}
.msg .bubble {
  font-family: var(--font-serif);
  font-size: 16px; line-height: 1.8; white-space: pre-wrap; word-break: break-word;
}
.msg.assistant .bubble {
  color: var(--fg);
  font-weight: 400;
}
.msg.user .bubble {
  color: var(--fg-secondary); font-style: italic;
}
.msg.system .bubble {
  font-family: var(--font-sans); font-size: 12px;
  color: var(--fg-tertiary); font-style: normal;
  padding: 12px 0; border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
  max-width: 480px; margin: 0 auto;
  text-align: center;
}

.msg .byline {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 10px;
}
.msg .byline .name {
  font-family: var(--font-sans); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--fg-tertiary);
}
.msg.user .byline .name { color: var(--accent); }
.msg .byline .time {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--fg-tertiary);
}
.msg.user .byline { justify-content: flex-end; }

/* Drop cap for first assistant message after a system/user message */
.msg.assistant .first-letter {
  font-family: var(--font-serif);
  float: left; font-size: 56px; line-height: 1;
  margin: 4px 10px 0 -4px; color: var(--accent);
  font-weight: 600;
}

/* Scene-change divider */
.scene-divider {
  text-align: center; padding: 16px 0;
  margin: 0 auto var(--gap-lg) auto;
  max-width: 480px;
  font-family: var(--font-sans); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 3px;
  color: var(--fg-tertiary);
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
}

/* ── Input ── */
#input-area {
  padding: 16px 24px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; gap: 12px; flex-shrink: 0;
}
#input-area input {
  flex: 1; padding: 12px 16px;
  background: var(--surface); color: var(--fg);
  border: 1px solid transparent; font-family: var(--font-sans);
  font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
#input-area input:focus {
  border-color: var(--accent); background: var(--surface-alt);
}
#input-area input::placeholder { color: var(--fg-tertiary); font-style: italic; }
#input-area button {
  padding: 12px 24px;
  background: transparent; color: var(--fg-secondary);
  border: 1px solid var(--border); font-family: var(--font-sans);
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#input-area button:hover { border-color: var(--accent); color: var(--accent); }
#input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

#theme-toggle {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: var(--fg-tertiary); padding: 2px 6px; transition: color 0.2s;
}
#theme-toggle:hover { color: var(--accent); }

/* ── Panel ── */
#panel {
  width: var(--panel-w); flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 20px;
}
#panel-toggle {
  display: none; position: fixed; bottom: 96px; right: 16px; z-index: 20;
  width: 40px; height: 40px;
  background: transparent; color: var(--fg-secondary);
  border: 1px solid var(--border); font-size: 16px; cursor: pointer;
  font-family: var(--font-mono);
}
#panel-toggle:hover { border-color: var(--accent); color: var(--accent); }

.panel-section {
  border-bottom: 1px solid var(--border-subtle);
  padding-bottom: 16px;
}
.panel-section:last-child { border-bottom: none; }

.panel-label {
  font-family: var(--font-sans); font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 3px;
  color: var(--fg-tertiary); margin-bottom: 12px;
}

.stat-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 0;
}
.stat-key { font-size: 12px; color: var(--fg-tertiary); font-weight: 350; }
.stat-val {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--fg-secondary); font-weight: 500; text-align: right;
}
.stat-val.highlight { color: var(--accent); }
.stat-val.warn { color: #F59E0B; }

.tension-viz {
  margin-top: 6px; height: 2px; background: var(--border);
  position: relative;
}
.tension-viz .level {
  position: absolute; top: -5px; width: 2px; height: 12px;
  background: var(--border); z-index: 1;
}
.tension-viz .fill-bar {
  height: 100%; transition: width 1s ease;
}

.world-desc {
  font-family: var(--font-serif); font-size: 13px; line-height: 1.7;
  color: var(--fg-secondary); font-style: italic;
  margin-top: 8px;
}

.npc-item {
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02);
  font-size: 11px;
}
.npc-item .who { color: var(--accent); font-weight: 500; }
.npc-item .what { color: var(--fg-tertiary); }
.npc-item .when { font-family: var(--font-mono); font-size: 9px; color: var(--fg-tertiary); }

.usage-bar { margin-top: 4px; height: 1px; background: var(--border); }
.usage-bar span { display: block; height: 100%; background: var(--accent); transition: width 0.5s; }

/* ── Mobile ── */
@media (max-width: 768px) {
  #header { padding: 10px 16px; gap: 8px; }
  #header .logo { font-size: 15px; }
  #chat-scroll { padding: 20px 16px; }
  .msg .bubble { font-size: 14px; }
  .msg { margin-bottom: var(--gap); }
  #input-area { padding: 10px 16px; }
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 15;
    transform: translateX(100%); transition: transform 0.3s ease;
    width: min(85vw, var(--panel-w));
    box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  }
  #panel.open { transform: translateX(0); }
  #panel-toggle { display: flex; align-items: center; justify-content: center; }
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

::selection { background: var(--accent-glow); color: var(--fg); }
</style>
</head>
<body>

<header id="header">
  <span class="logo">Core<em>RP</em></span>
  <select id="char-select"></select>
  <button id="theme-toggle" title="切换明暗主题" aria-label="切换主题">◐</button>
  <span id="clock-display"></span>
  <span class="header-stat" id="token-stat">⛁<span class="val">0</span></span>
  <span id="tension-meter">
    <span id="tension-dot"></span>
    <span id="tension-val">0.0</span>
  </span>
</header>

<div id="main">
  <div id="chat-col">
    <div id="chat-scroll"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="键入消息开始叙事..." autocomplete="off">
      <button id="send-btn">发送</button>
    </div>
  </div>

  <button id="panel-toggle" aria-label="面板">◈</button>

  <aside id="panel">
    <div class="panel-section">
      <div class="panel-label">场景</div>
      <div class="world-desc" id="pan-scene">--</div>
      <div class="stat-row"><span class="stat-key">地点</span><span class="stat-val" id="pan-loc">--</span></div>
      <div class="stat-row"><span class="stat-key">时间</span><span class="stat-val" id="pan-time">--</span></div>
      <div class="stat-row"><span class="stat-key">天气</span><span class="stat-val" id="pan-weather">--</span></div>
      <div class="stat-row"><span class="stat-key">叙事状态</span><span class="stat-val highlight" id="pan-nstate">--</span></div>
      <div class="tension-viz">
        <span class="level" style="left:35%"></span>
        <span class="level" style="left:75%"></span>
        <span class="fill-bar" id="pan-tension-bar" style="width:0%;background:var(--accent)"></span>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label" style="display:flex;justify-content:space-between;align-items:center">
        用量
        <button id="pricing-btn" style="background:none;border:1px solid var(--border);color:var(--fg-tertiary);cursor:pointer;font-size:10px;padding:1px 6px;" title="设置价格">¥</button>
      </div>
      <div class="stat-row"><span class="stat-key">调用次数</span><span class="stat-val highlight" id="pan-calls">0</span></div>
      <div class="stat-row"><span class="stat-key">Token 总量</span><span class="stat-val" id="pan-tokens">0</span></div>
      <div class="stat-row"><span class="stat-key">预估费用</span><span class="stat-val warn" id="pan-cost">¥0</span></div>
      <div id="pricing-popup" style="display:none;margin-top:8px;padding:8px;background:var(--surface-alt);border:1px solid var(--border)">
        <div style="font-size:10px;color:var(--fg-tertiary);margin-bottom:4px">模型定价 (¥/1M tokens)</div>
        <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">
          <span style="font-size:10px;color:var(--fg-tertiary)">输入:</span>
          <input id="price-prompt" type="number" step="0.1" min="0" style="width:60px;padding:2px 4px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px">
          <span style="font-size:10px;color:var(--fg-tertiary)">输出:</span>
          <input id="price-comp" type="number" step="0.1" min="0" style="width:60px;padding:2px 4px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px">
          <button id="price-save" style="padding:2px 8px;background:transparent;color:var(--accent);border:1px solid var(--accent);cursor:pointer;font-size:10px">保存</button>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <button id="reset-btn" style="width:100%;padding:8px;background:transparent;color:var(--fg-tertiary);border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">重新开始</button>
    </div>

    <div class="panel-section" id="char-panel-section">
      <div class="panel-label">角色</div>
      <div id="pan-chars"></div>
    </div>

    <div class="panel-section">
      <div class="panel-label" style="display:flex;justify-content:space-between;align-items:center">
        时间线
        <span style="display:flex;gap:4px">
          <select id="tl-branch" style="background:var(--bg);color:var(--fg-tertiary);border:1px solid var(--border);font-size:9px;padding:1px 4px;max-width:80px"></select>
          <button id="tl-fork-btn" style="background:none;border:1px solid var(--border);color:var(--fg-tertiary);cursor:pointer;font-size:9px;padding:1px 6px" title="从最新事件分叉">+↪</button>
        </span>
      </div>
      <div id="pan-timeline" style="max-height:200px;overflow-y:auto"></div>
    </div>

    <div class="panel-section">
      <div class="panel-label">NPC 动态</div>
      <div id="pan-npc"><span style="color:var(--fg-tertiary);font-size:11px">空闲中</span></div>
    </div>

    <div class="panel-section">
      <div class="panel-label" style="display:flex;justify-content:space-between;align-items:center">
        LLM 配置
        <button id="cfg-add-btn" style="background:none;border:1px solid var(--border);color:var(--fg-tertiary);cursor:pointer;font-size:16px;line-height:1;padding:0 6px;" title="添加配置">+</button>
      </div>
      <div id="pan-llm-configs"></div>
      <div id="cfg-form" style="display:none;margin-top:8px;">
        <input id="cfg-name" placeholder="名称" style="width:100%;padding:6px;margin-bottom:4px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px;font-family:var(--font-mono)">
        <input id="cfg-endpoint" placeholder="API 地址" style="width:100%;padding:6px;margin-bottom:4px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px;font-family:var(--font-mono)">
        <input id="cfg-key" placeholder="API Key" type="password" style="width:100%;padding:6px;margin-bottom:4px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px;font-family:var(--font-mono)">
        <input id="cfg-model" placeholder="模型名" style="width:100%;padding:6px;margin-bottom:6px;background:var(--bg);color:var(--fg);border:1px solid var(--border);font-size:11px;font-family:var(--font-mono)">
        <button id="cfg-save" style="padding:4px 12px;background:transparent;color:var(--accent);border:1px solid var(--accent);cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1px;">保存</button>
        <button id="cfg-cancel" style="padding:4px 12px;background:transparent;color:var(--fg-tertiary);border:1px solid var(--border);cursor:pointer;font-size:10px;margin-left:4px;">取消</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">记忆</div>
      <div class="stat-row"><span class="stat-key">事实</span><span class="stat-val" id="pan-facts">--</span></div>
      <div class="stat-row"><span class="stat-key">检索</span><span class="stat-val" id="pan-vmode">--</span></div>
      <div class="stat-row"><span class="stat-key">对话轮数</span><span class="stat-val" id="pan-dialogue">--</span></div>
      <div class="stat-row"><span class="stat-key">事件数</span><span class="stat-val" id="pan-events">--</span></div>
    </div>
  </aside>
</div>

<script src="/app.js"></script>
</body>
</html>
