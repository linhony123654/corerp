openapi: 3.0.0
info:
  title: CoreRP API
  version: 1.0.0
  description: CoreRP 前后端接口契约（HTTP + SSE）

servers:
  - url: http://localhost:8080

paths:
  /:
    get:
      summary: PWA 首页
      responses:
        "200":
          description: HTML 页面
          content:
            text/html:
              schema:
                type: string

  /api/chat:
    post:
      summary: 发送消息，SSE 流式返回叙事文本
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 用户输入
              required:
                - message
      responses:
        "200":
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  格式: data: <chunk>\n\n
                  最后发送: data: \n\n 表示结束

  /api/health:
    get:
      summary: 存活探针
      responses:
        "200":
          description: 服务存活

  /api/ready:
    get:
      summary: 就绪探针
      responses:
        "200":
          description: 服务就绪
        "503":
          description: 服务未就绪

  /api/version:
    get:
      summary: 服务版本信息（version / commit / time）
      responses:
        "200":
          description: 版本信息

  /api/state:
    get:
      summary: 获取当前世界状态
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: WorldState JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldState"

  /api/instances:
    get:
      summary: 列出当前可用 runtime instances
      responses:
        "200":
          description: 实例列表

  /api/instances/status:
    get:
      summary: 获取单个 runtime instance 状态
      parameters:
        - in: query
          name: id
          schema: { type: string }
      responses:
        "200":
          description: 实例摘要

  /api/instances/create:
    post:
      summary: 从现有实例创建新实例
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                label: { type: string }
                source_id: { type: string }
                focus_character: { type: string }
                active_character: { type: string, description: "兼容旧字段" }
              required: [id]
      responses:
        "200":
          description: 新实例摘要

  /api/instances/default:
    post:
      summary: 切换默认 runtime instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
              required: [id]
      responses:
        "200":
          description: 默认实例切换成功

  /api/instances/stop:
    post:
      summary: 停止 runtime instance 的 tick loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
              required: [id]
      responses:
        "200":
          description: 实例已停止

  /api/instances/delete:
    post:
      summary: 删除 runtime instance 及其实例级持久化数据
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
              required: [id]
      responses:
        "200":
          description: 实例已删除

  /api/trace/latest:
    get:
      summary: 获取最近一轮 turn trace
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 单条 trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurnTrace"

  /api/trace:
    get:
      summary: 获取指定轮次 turn trace
      parameters:
        - in: query
          name: turn
          schema: { type: integer }
          required: true
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 单条 trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurnTrace"

  /api/traces:
    get:
      summary: 获取最近若干轮 turn trace 历史
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: trace 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  traces:
                    type: array
                    items:
                      $ref: "#/components/schemas/TurnTrace"

  /api/checkpoints:
    get:
      summary: 列出当前实例的 checkpoints
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: checkpoint 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkpoints:
                    type: array
                    items:
                      $ref: "#/components/schemas/SaveSlot"
    post:
      summary: 为当前实例创建 checkpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                branch: { type: string }
                note: { type: string }
              required: [name]
      responses:
        "200":
          description: checkpoint 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSlot"

  /api/checkpoints/load:
    post:
      summary: rollback 到指定 checkpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "200":
          description: checkpoint 已加载
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSlot"

  /api/presets:
    get:
      summary: 列出当前实例的 scenario presets
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: preset 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  presets:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScenarioPreset"
    post:
      summary: 保存当前 scene/player role/focus character 为 scenario preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                branch: { type: string }
                note: { type: string }
              required: [name]
      responses:
        "200":
          description: preset 已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioPreset"

  /api/presets/apply:
    post:
      summary: 套用 scenario preset 到当前实例
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "200":
          description: preset 已套用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioPreset"

  /api/character:
    get:
      summary: 获取当前视角的人物定义
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: Character JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: 当前视角未找到对应人物定义

  /api/character-config:
    get:
      summary: 获取当前或指定视角的人物定义配置
      parameters:
        - in: query
          name: character
          schema: { type: string }
      responses:
        "200":
          description: 人物定义配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterConfig"
    post:
      summary: 更新人物定义并回写 YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                character: { type: string }
                card:
                  $ref: "#/components/schemas/Character"
      responses:
        "200":
          description: 更新后的人物定义配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterConfig"

  /api/director-config:
    get:
      summary: 获取当前导演配置与最近决策
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 导演配置
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: "#/components/schemas/DirectorConfig"
                  plan:
                    type: object
    post:
      summary: 更新导演配置
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectorConfig"
      responses:
        "200":
          description: 更新后的导演配置
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: "#/components/schemas/DirectorConfig"

  /api/characters:
    get:
      summary: 获取当前场景参与者列表和当前视角
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 当前场景参与者与视角列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: string
                    description: 当前视角名（兼容字段）
                  focus_character:
                    type: string
                    description: 当前视角名
                  characters:
                    type: array
                    items:
                      type: string
                  participants:
                    type: array
                    items:
                      type: string
                    description: 当前场景参与者
                  participant_details:
                    type: array
                    items:
                      $ref: "#/components/schemas/ParticipantSummary"

  /api/switch:
    post:
      summary: 切换当前视角
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                character:
                  type: string
                  description: 要切换到的参与者名
              required:
                - character
      responses:
        "200":
          description: 切换成功
        "400":
          description: 目标参与者未找到

  /api/world:
    get:
      summary: 获取当前世界名称
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description:
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string

  /api/memory:
    get:
      summary: 获取当前或指定视角的记忆快照
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
        - in: query
          name: character
          schema: { type: string }
        - in: query
          name: facts
          schema: { type: integer }
        - in: query
          name: episodic
          schema: { type: integer }
        - in: query
          name: dialogue
          schema: { type: integer }
      responses:
        "200":
          description: 记忆快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySnapshot"

  /api/export:
    get:
      summary: 导出当前会话为 JSON 或 Markdown
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
        - in: query
          name: format
          schema: { type: string, enum: [json, markdown, md] }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: 导出文件

  /api/world-structure:
    get:
      summary: 获取当前世界的完整结构配置
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 世界结构配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldStructureConfig"
    post:
      summary: 更新当前世界的结构配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorldStructureConfig"
      responses:
        "200":
          description: 更新成功

  /api/population:
    get:
      summary: 获取当前世界的人口配置
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 人口配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopulationConfig"
    post:
      summary: 更新当前世界的人口配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PopulationConfig"
      responses:
        "200":
          description: 更新成功

  /api/population-insights:
    get:
      summary: 获取当前世界的人口运行洞察
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 人口洞察
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopulationInsights"

  /api/saves:
    get:
      summary: 列出世界存档
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 存档列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  saves:
                    type: array
                    items:
                      $ref: "#/components/schemas/SaveSlot"
    post:
      summary: 保存当前世界到指定存档名
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                branch: { type: string }
                note: { type: string }
      responses:
        "200":
          description: 新建或覆盖后的存档
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSlot"

  /api/saves/load:
    post:
      summary: 读档到指定世界锚点
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "200":
          description: 已载入的存档
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSlot"

  /api/sim/status:
    get:
      summary: Tick loop 状态查询
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: Tick 状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  running: { type: boolean }
                  paused: { type: boolean }
                  tick_count: { type: integer }
                  world_advance: { type: string }
                  turn_count: { type: integer }
                  tick_interval: { type: string }
                  world_ratio: { type: string }
                  pressure_states:
                    type: object
                    additionalProperties: { type: number }
                    description: "pressure_id -> 动态 intensity"
                  faction_tensions:
                    type: object
                    additionalProperties: { type: number }
                    description: "faction_id -> 紧张度"
                  npc_tick_exposure:
                    type: object
                    additionalProperties: { type: integer }
                    description: "npc_name -> tick 在场累积次数"

  /api/sim/tick:
    post:
      summary: 手动触发一次 tick
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: Tick 执行结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  tick_status:
                    type: object

  /api/sim/pause:
    post:
      summary: 暂停 tick loop
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 暂停成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  paused: { type: boolean }

  /api/sim/resume:
    post:
      summary: 恢复 tick loop
      parameters:
        - in: query
          name: instance_id
          schema: { type: string }
      responses:
        "200":
          description: 恢复成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  paused: { type: boolean }

components:
  schemas:
    WorldState:
      type: object
      properties:
        clock:
          $ref: "#/components/schemas/WorldTime"
        scene:
          $ref: "#/components/schemas/SceneState"
        relationships:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Relationship"
        variables:
          type: object
        flags:
          type: object
          additionalProperties:
            type: boolean
        tension:
          type: number

    WorldTime:
      type: object
      properties:
        hour: { type: integer }
        minute: { type: integer }
        day: { type: integer }

    SceneState:
      type: object
      properties:
        location: { type: string }
        time_of_day: { type: string }
        weather: { type: string }
        characters:
          type: array
          items: { type: string }
        description: { type: string }

    Relationship:
      type: object
      properties:
        trust: { type: number }
        intimacy: { type: number }
        fear: { type: number }
        respect: { type: number }
        debt: { type: number }
        last_scene: { type: string }

    Character:
      type: object
      properties:
        identity:
          $ref: "#/components/schemas/IdentityEnvelope"
        goals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"

    IdentityEnvelope:
      type: object
      properties:
        name: { type: string }
        immutable:
          type: array
          items: { type: string }
        adaptive:
          type: object
          additionalProperties:
            type: number
        forbidden:
          type: array
          items: { type: string }
        voice:
          type: object
          properties:
            style: { type: string }
            rhythm: { type: string }

    Goal:
      type: object
      properties:
        id: { type: string }
        priority: { type: integer }
        type: { type: string, enum: [primary, secondary, hidden] }
        target: { type: string }
        condition: { type: string }
        known_by:
          type: array
          items: { type: string }
        reveal_condition: { type: string }

    FactFrame:
      type: object
      properties:
        subject: { type: string }
        predicate: { type: string }
        object: { type: string }
        confidence: { type: number }

    EventFrame:
      type: object
      properties:
        event_id: { type: string }
        type: { type: string }
        description: { type: string }
        emotional_weight: { type: number }

    Message:
      type: object
      properties:
        role: { type: string, enum: [user, assistant] }
        content: { type: string }

    PlayerRole:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        bound_character: { type: string }

    MemorySnapshot:
      type: object
      properties:
        character: { type: string, description: "兼容旧字段" }
        focus_character: { type: string, description: "当前视角名" }
        working_memory: { type: string }
        facts:
          type: array
          items:
            $ref: "#/components/schemas/FactFrame"
        episodic:
          type: array
          items:
            $ref: "#/components/schemas/EventFrame"
        dialogue:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    SaveSlot:
      type: object
      properties:
        name: { type: string }
        branch: { type: string }
        event_id: { type: string }
        character: { type: string, description: "兼容旧字段" }
        focus_character: { type: string, description: "当前视角名" }
        player_role:
          $ref: "#/components/schemas/PlayerRole"
        note: { type: string }
        preview: { type: string }
        created_at: { type: string, format: date-time }
        world_state:
          $ref: "#/components/schemas/WorldState"

    ScenarioPreset:
      type: object
      properties:
        name: { type: string }
        branch: { type: string }
        character: { type: string, description: "兼容旧字段" }
        focus_character: { type: string, description: "当前视角名" }
        player_role:
          $ref: "#/components/schemas/PlayerRole"
        note: { type: string }
        preview: { type: string }
        created_at: { type: string, format: date-time }
        scene:
          $ref: "#/components/schemas/SceneState"

    CharacterConfig:
      type: object
      properties:
        character: { type: string, description: "兼容旧字段" }
        focus_character: { type: string, description: "当前视角名" }
        path: { type: string }
        world_path: { type: string }
        card:
          $ref: "#/components/schemas/Character"

    ParticipantSummary:
      type: object
      properties:
        name: { type: string }
        kind: { type: string, description: "player | npc | persona" }
        source: { type: string, description: "player_role | character_definition | promoted_population | background_population | scene_shell | scene_presence" }
        world_path: { type: string }
        loaded: { type: boolean }
        switchable: { type: boolean }
        present: { type: boolean }
        focus: { type: boolean }

    TurnTrace:
      type: object
      properties:
        turn: { type: integer }
        character: { type: string, description: "兼容旧字段" }
        user_input: { type: string }
        director_plan: { type: object }
        participant_details:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantSummary"
        step_traces: { type: array, items: { type: object } }
        active_goals: { type: array, items: { type: object } }
        allowed_actions: { type: array, items: { type: string } }
        memories: { type: array, items: { type: object } }
        semantic_facts: { type: array, items: { type: object } }
        episodic_events: { type: array, items: { type: object } }
        working_memory: { type: string }
        action_frame: { type: object }
        validator: { type: object }
        narrative: { type: string }
        created_at: { type: string, format: date-time }

    WorldStructureConfig:
      type: object
      properties:
        path: { type: string }
        seed:
          type: object
          properties:
            premise: { type: string }
            current_situation: { type: string }
            starting_scene: { type: string }
            time_anchor: { type: string }
            stability: { type: string }
            variables: { type: object }
        factions:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
