rules:
  - id: return_by_death
    description: "Restore the last safe checkpoint and raise suspicion pressure. Declarative only; no script execution."
    when:
      event_type: focus_death
    do:
      - restore_checkpoint:
          name: "last_safe_checkpoint"
      - increment_variable:
          key: "loop_count"
          by: 1
      - add_pressure:
          id: "witch_scent"
          by: 0.15
      - emit_event:
          type: "loop_returned"
          payload:
            memory_scope: "focus"
            memory_flag: "loop_memory"
  - id: scent_pressure_tick
    description: "If witch_scent dominates, suspicion should affect director and population attention."
    when:
      event_type: dcl_pressure_threshold
    do:
      - add_memory_flag:
          target: "focus"
          key: "scent_pressure"
